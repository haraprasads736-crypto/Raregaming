<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winners - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 120px; }
        .header { padding: 30px; text-align: center; color: #ffaa00; font-size: 24px; font-weight: 800; }
        .list { padding: 0 20px; }
        .card { background: #111116; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 1px solid #1f1f25; }
        .rank { font-weight: 800; color: #00f2fe; margin-right: 10px; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>
    <div class="header">🏆 TOP WINNERS</div>
    <div class="list" id="leaderboard">Loading...</div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item active"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxav2f0FIc_pmd-ntNG7szqzECf_MXkDSYa0OO5JhTyijFTMEgVgff5cxpBMm8Z9C3H/exec";
        function load() {
            fetch(scriptURL + "?action=getLeaderboard").then(res => res.json()).then(data => {
                let html = "";
                data.forEach((p, i) => {
                    html += `<div class="card"><span><span class="rank">#${i+1}</span> ${p.name}</span><span style="color:#ffaa00">${p.coins} Coins</span></div>`;
                });
                document.getElementById('leaderboard').innerHTML = html;
            });
        }
        window.onload = load;
    </script>
</body>
</html>
