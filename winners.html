<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Winners - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; 
        }

        /* HEADER */
        .header { padding: 30px; text-align: center; color: #ffaa00; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* WINNERS LIST */
        .list { padding: 0 20px; }
        .card { 
            background: #111116; padding: 15px; border-radius: 12px; 
            margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid #1f1f25; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .rank { font-weight: 800; color: #00f2fe; margin-right: 10px; font-size: 18px; }
        .player-name { font-weight: 600; text-transform: uppercase; font-size: 14px; }

        /* 🌟 NEW 5-BUTTON NAV SYSTEM 🌟 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; 
            background: #111116; display: flex; justify-content: space-between; 
            align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; 
            padding: 0 5px;
        }

        .nav-item { 
            text-decoration: none; color: #666; font-size: 9px; font-weight: 800; 
            display: flex; flex-direction: column; align-items: center; flex: 1; 
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Active Effect (Diamond Shape) */
        .nav-item.active:not(.center-btn) { color: white; position: relative; }
        .nav-item.active:not(.center-btn) i { color: #000; z-index: 2; font-size: 22px; }
        .nav-item.active:not(.center-btn)::before { 
            content: ''; position: absolute; top: -16px; width: 55px; height: 55px; 
            background: #ffffff; border-radius: 16px; transform: rotate(45deg); 
            z-index: -1; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); 
        }

        /* Center Button (Transfer) */
        .nav-item.center-btn { position: relative; color: #666; margin-top: -30px; }
        .nav-item.center-btn .icon-circle { 
            width: 55px; height: 55px; background: #222; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid #050508; transition: 0.3s; 
        }
        .nav-item.center-btn i { color: white; font-size: 22px; margin: 0; }
    </style>
</head>
<body>

    <div class="header">🏆 TOP WINNERS</div>
    
    <div class="list" id="leaderboard">
        <div style="text-align: center; color: #888; margin-top: 20px;">Fetching Champions...</div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px;">TRANSFER</span>
        </a>

        <a href="winners.html" class="nav-item active"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        // 🔗 APNA NAYA MASTER SCRIPT LINK
        const scriptURL = "https://script.google.com/macros/s/AKfycbzPZrXEmFzQYiABm5xeGuRmGfWcZzfe4_YOOKc-WVMDf-fsQs39YhiQAWopkFmvGQSDbw/exec";

        function load() {
            fetch(scriptURL + "?action=getLeaderboard")
            .then(res => res.json())
            .then(data => {
                let html = "";
                if(data.length === 0) {
                    html = "<div style='text-align:center; color:#888;'>No winners yet!</div>";
                } else {
                    data.forEach((p, i) => {
                        html += `
                        <div class="card">
                            <span><span class="rank">#${i+1}</span> <span class="player-name">${p.name}</span></span>
                            <span style="color:#ffaa00; font-weight:800;">${p.coins} Coins</span>
                        </div>`;
                    });
                }
                document.getElementById('leaderboard').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('leaderboard').innerHTML = "<div style='text-align:center; color:#ff3131;'>Offline</div>";
            });
        }
        window.onload = load;
    </script>
</body>
</html>
