<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>Winners - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; padding-bottom: 120px; }
        .header { padding: 15px; text-align: center; font-weight: 800; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5,5,8,0.8); position: sticky; top: 0; z-index: 100; letter-spacing: 1px; color: #ffd700; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .page-title { text-align: center; font-size: 14px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        .winner-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 18px; border-radius: 16px; border: 1px solid rgba(255,215,0,0.2); margin-bottom: 15px; }
        .w-left { display: flex; align-items: center; gap: 15px; }
        .w-avatar { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #777; border: 1px solid rgba(255,255,255,0.1); }
        .w-name { font-weight: 800; color: #fff; font-size: 16px; text-transform: uppercase; margin: 0; }
        .w-match { font-size: 10px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-top: 2px; }
        .w-right { text-align: right; }
        .w-prize { font-weight: 800; color: #777; font-size: 18px; }
        .w-tag { font-size: 8px; color: #fff; background: #555; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 4px; }

        /* 🔥 GUARANTEED FIX: BOTTOM NAV 🔥 */
        .nav-wrapper { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000000; z-index: 9999; padding-bottom: 25px; }
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; height: 65px; background-color: #000000; border-top: 1.5px solid rgba(255, 215, 0, 0.4); }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; flex: 1; position: relative; }
        .nav-icon { font-size: 22px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active { color: white; }
        .nav-item.active::before { content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 45px; height: 45px; background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); border-radius: 10px; z-index: -1; box-shadow: 0 0 15px rgba(255,215,0,0.5); }
    </style>
</head>
<body>
    <div class="header"><i class="fas fa-trophy"></i> HALL OF FAME</div>
    <div class="container">
        <div class="page-title">Recent Match Winners</div>
        <div class="winner-card"><div class="w-left"><div class="w-avatar"><i class="fas fa-user-secret"></i></div><div><div class="w-tag">Pending</div><h4 class="w-name">Not Decided</h4><div class="w-match">BR SQUAD BATTLE</div></div></div><div class="w-right"><div class="w-prize">---</div></div></div>
        <div class="winner-card"><div class="w-left"><div class="w-avatar"><i class="fas fa-user-secret"></i></div><div><div class="w-tag">Pending</div><h4 class="w-name">Not Decided</h4><div class="w-match">CS PRO LEAGUE</div></div></div><div class="w-right"><div class="w-prize">---</div></div></div>
        <div class="winner-card"><div class="w-left"><div class="w-avatar"><i class="fas fa-user-secret"></i></div><div><div class="w-tag">Pending</div><h4 class="w-name">Not Decided</h4><div class="w-match">LONE WOLF 1</div></div></div><div class="w-right"><div class="w-prize">---</div></div></div>
    </div>
    <div class="nav-wrapper">
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home nav-icon"></i><span>HOME</span></a>
            <a href="earn.html" class="nav-item"><i class="fas fa-wallet nav-icon"></i><span>EARN</span></a>
            <a href="winners.html" class="nav-item active"><i class="fas fa-crown nav-icon"></i><span>WINNERS</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user-circle nav-icon"></i><span>PROFILE</span></a>
        </nav>
    </div>
</body>
</html>
