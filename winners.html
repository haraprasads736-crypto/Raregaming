<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Winners - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; position: relative; 
            padding-bottom: 110px; /* Safe space for Nav Bar */
        }
        
        /* 🔥 GOLDEN BACKGROUND SPARKS 🔥 */
        .bg-orb-1 { position: fixed; top: 10%; left: -10%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%); filter: blur(50px); z-index: -1; animation: pulse 4s infinite alternate; }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1.1); } }

        /* HEADER */
        .header { padding: 15px; text-align: center; font-weight: 800; font-size: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; letter-spacing: 1px; color: #ffd700; }
        
        .container { padding: 15px; max-width: 480px; margin: auto; }

        .page-title { text-align: center; font-size: 14px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }

        /* 🏆 WINNER CARD STYLE 🏆 */
        .winner-card { 
            display: flex; align-items: center; justify-content: space-between; 
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%); 
            padding: 18px; border-radius: 16px; 
            border: 1px solid rgba(255,215,0,0.2); 
            margin-bottom: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .winner-card:active { transform: scale(0.98); border-color: #ffd700; }
        
        .w-left { display: flex; align-items: center; gap: 15px; }
        .w-avatar { width: 45px; height: 45px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #777; border: 1px solid rgba(255,255,255,0.1); }
        .w-name { font-weight: 800; color: #fff; font-size: 16px; text-transform: uppercase; margin: 0; }
        .w-match { font-size: 10px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-top: 2px; }
        
        .w-right { text-align: right; }
        .w-prize { font-weight: 800; color: #777; font-size: 18px; }
        .w-tag { font-size: 8px; color: #fff; background: #555; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 4px; }

        /* 🔥 CLEAN BOTTOM NAV BAR (Overlap Fixed) 🔥 */
        .bottom-nav-container { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; background: #000; }
        .bottom-nav { position: relative; display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: 12px; background: #000; border-top: 1.5px solid rgba(255, 215, 0, 0.3); }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; position: relative; z-index: 2; flex: 1; transition: 0.3s; margin-top: 10px; }
        .nav-item .nav-icon { font-size: 22px; margin-bottom: 4px; }
        
        .nav-item.active { color: white; }
        
        /* 💎 GOLDEN DIAMOND FOR WINNERS PAGE 💎 */
        .nav-item.active::before { 
            content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%) rotate(45deg); 
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); 
            border-radius: 12px; z-index: -1; box-shadow: 0 0 15px rgba(255,215,0,0.5); 
        }
    </style>
</head>
<body>

    <div class="bg-orb-1"></div>
    
    <div class="header">
        <i class="fas fa-trophy"></i> HALL OF FAME
    </div>
    
    <div class="container">
        <div class="page-title">Recent Match Winners</div>

        <div class="winner-card">
            <div class="w-left">
                <div class="w-avatar"><i class="fas fa-user-secret"></i></div>
                <div>
                    <div class="w-tag">Pending</div>
                    <h4 class="w-name">Not Decided</h4>
                    <div class="w-match">BR SQUAD BATTLE</div>
                </div>
            </div>
            <div class="w-right">
                <div class="w-prize">---</div>
            </div>
        </div>

        <div class="winner-card">
            <div class="w-left">
                <div class="w-avatar"><i class="fas fa-user-secret"></i></div>
                <div>
                    <div class="w-tag">Pending</div>
                    <h4 class="w-name">Not Decided</h4>
                    <div class="w-match">CS PRO LEAGUE</div>
                </div>
            </div>
            <div class="w-right">
                <div class="w-prize">---</div>
            </div>
        </div>

        <div class="winner-card">
            <div class="w-left">
                <div class="w-avatar"><i class="fas fa-user-secret"></i></div>
                <div>
                    <div class="w-tag">Pending</div>
                    <h4 class="w-name">Not Decided</h4>
                    <div class="w-match">LONE WOLF 1</div>
                </div>
            </div>
            <div class="w-right">
                <div class="w-prize">---</div>
            </div>
        </div>

    </div>

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span>HOME</span>
            </a>
            <a href="earn.html" class="nav-item">
                <i class="fas fa-wallet nav-icon"></i>
                <span>EARN</span>
            </a>
            <a href="winners.html" class="nav-item active">
                <i class="fas fa-crown nav-icon"></i>
                <span>WINNERS</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user-circle nav-icon"></i>
                <span>PROFILE</span>
            </a>
        </nav>
    </div>

</body>
</html>
