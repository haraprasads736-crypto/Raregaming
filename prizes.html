<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Prize Pool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #0c0e12; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }

        /* Top Header with Back Button */
        .nav-header { 
            background: #15181e; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #ffd700; /* Gold theme for prizes */
        }
        .back-btn { 
            color: #66fcf1; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 14px; 
            background: rgba(102, 252, 241, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #66fcf1;
        }
        .nav-title { font-weight: 800; font-size: 18px; color: #ffd700; letter-spacing: 1px; }

        .container { padding: 15px; max-width: 480px; margin: auto; }

        /* --- PRIZE CARD STYLE --- */
        .prize-card {
            background: #1a1d24; 
            border-radius: 12px; 
            border: 1.5px solid #2b303b;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-align: left;
        }

        /* Card Header */
        .card-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #15181e;
            border-bottom: 1.5px solid #2b303b;
        }
        .card-title { font-weight: 800; font-size: 16px; color: white; display: flex; align-items: center; gap: 8px; }
        
        /* Badges */
        .badge-live { background: rgba(102, 252, 241, 0.1); color: #66fcf1; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; border: 1px solid #66fcf1; }
        .badge-na { background: rgba(255, 75, 43, 0.1); color: #ff4b2b; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; border: 1px solid #ff4b2b; }

        /* Prize List */
        .prize-list { padding: 15px; }
        .prize-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px dashed #333;
        }
        .prize-item:last-child { border-bottom: none; }
        
        .rank { font-size: 14px; font-weight: 600; color: #ccc; }
        .amount { font-size: 16px; font-weight: 800; color: #ffd700; } /* Gold Amounts */

        /* Entry Fee Bar */
        .entry-bar {
            background: #66fcf1; color: #000; padding: 10px;
            font-weight: 800; font-size: 13px; text-align: center; text-transform: uppercase;
        }
        
        /* CS Card specific */
        .cs-card { opacity: 0.85; border-color: #333; }
        .cs-card .entry-bar { background: #444; color: #aaa; }

    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span class="nav-title">🏆 PRIZE POOL</span>
        <div style="width: 60px;"></div> </div>

    <div class="container">

        <div class="prize-card">
            <div class="card-header">
                <div class="card-title"><span>🎮</span> BR MATCH</div>
                <div class="badge-live">AVAILABLE</div>
            </div>
            
            <div class="prize-list">
                <div class="prize-item">
                    <span class="rank">🥇 1st Prize (Winner)</span>
                    <span class="amount">₹ 150</span>
                </div>
                <div class="prize-item">
                    <span class="rank">🥈 2nd Prize (Runner Up)</span>
                    <span class="amount">₹ 70</span>
                </div>
                <div class="prize-item">
                    <span class="rank">💀 Per Kill</span>
                    <span class="amount">₹ 0</span>
                </div>
            </div>

            <div class="entry-bar" style="background: #44bd32; color: white;">
                ENTRY FEE: FREE
            </div>
        </div>

        <div class="prize-card cs-card">
            <div class="card-header">
                <div class="card-title"><span>⚔️</span> CS MATCH</div>
                <div class="badge-na">NOT AVAILABLE</div>
            </div>
            
            <div class="prize-list">
                <div class="prize-item">
                    <span class="rank">🥇 1st Prize (Winner)</span>
                    <span class="amount">₹ TBD</span>
                </div>
                <div class="prize-item">
                    <span class="rank">🥈 2nd Prize (Runner Up)</span>
                    <span class="amount">₹ TBD</span>
                </div>
                <div class="prize-item">
                    <span class="rank">💀 Per Kill</span>
                    <span class="amount">₹ TBD</span>
                </div>
            </div>

            <div class="entry-bar">
                ENTRY FEE: DECIDING SOON
            </div>
        </div>

    </div>

</body>
</html>
