<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Room - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        .nav-header { width: 100%; background: #15181e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0055; box-sizing: border-box; position: sticky; top: 0; z-index: 10;}
        .back-btn { color: #ff0055; text-decoration: none; font-weight: 800; border: 1px solid #ff0055; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        .container { padding: 25px 15px; width: 100%; max-width: 400px; margin: 0 auto; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }

        /* THE SECRET VAULT DESIGN */
        .room-card { background: linear-gradient(135deg, #15181e 0%, #0c0e12 100%); padding: 25px; border-radius: 12px; border: 1.5px solid #ff0055; text-align: center; box-shadow: 0 4px 20px rgba(255, 0, 85, 0.2); position: relative; overflow: hidden; }
        
        /* TOP SECRET TAG */
        .room-card::before { content: 'TOP SECRET'; position: absolute; top: 12px; left: -35px; background: #ff0055; color: white; font-size: 10px; font-weight: 800; padding: 5px 40px; transform: rotate(-45deg); letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        
        .room-card h3 { color: #fff; font-weight: 800; margin-top: 15px; margin-bottom: 5px; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;}
        .room-card p { color: #a0aab2; font-size: 11px; margin-bottom: 25px; }

        .detail-box { background: #0c0e12; border: 1px solid #2b303b; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .detail-text { text-align: left; }
        .detail-text span { display: block; color: #a0aab2; font-size: 10px; font-weight: 600; text-transform: uppercase; margin-bottom: 3px;}
        .detail-text strong { color: #66fcf1; font-size: 18px; font-weight: 800; letter-spacing: 2px;}
        
        .copy-btn { background: #66fcf1; color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; font-size: 11px; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .copy-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">BACK</a>
        <span style="font-weight:800; font-size:14px; text-transform:uppercase;">MATCH ROOM</span>
    </div>

    <div class="container">
        <div class="room-card">
            <h3>🎮 LIVE ROOM DETAILS</h3>
            <p>Match start hone se 15 minute pehle Room ID aur Password yahan update hoga. Refresh karte rahein!</p>

            <div class="detail-box">
                <div class="detail-text">
                    <span>ROOM ID</span>
                    <strong id="roomId">WAITING...</strong>
                </div>
                <button class="copy-btn" onclick="copyText('roomId')">COPY</button>
            </div>

            <div class="detail-box">
                <div class="detail-text">
                    <span>PASSWORD</span>
                    <strong id="roomPass">****</strong>
                </div>
                <button class="copy-btn" onclick="copyText('roomPass')">COPY</button>
            </div>
        </div>
    </div>

    <script>
        // Copy Button Logic
        function copyText(elementId) {
            let text = document.getElementById(elementId).innerText;
            if(text === "WAITING..." || text === "****") {
                alert("⚠️ Abhi admin ne room nahi banaya hai! Thodi der mein check karein.");
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ Copied: " + text);
            });
        }
    </script>
</body>
</html>
