<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Access - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #030305; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        .room-card { 
            background: #0a0a0f; border: 1px solid rgba(0, 242, 254, 0.3); 
            border-radius: 15px; padding: 20px; width: 280px; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); text-align: center;
        }

        .header { color: #00f2fe; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Match Details Section */
        .match-info { font-size: 11px; color: #888; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .match-name { color: #fff; font-weight: 700; display: block; font-size: 13px; }

        .info-box { background: rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 10px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 8px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .value { font-size: 18px; font-weight: 800; color: #fff; font-family: monospace; letter-spacing: 1px; }

        .back-btn { margin-top: 15px; background: #8B3EEB; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
        
        .error-msg { font-size: 12px; color: #ff3131; font-weight: 600; padding: 10px; }
    </style>
</head>
<body>

    <div class="room-card" id="mainCard">
        <div id="contentArea">
            <div class="header"><i class="fas fa-key"></i> Room Details</div>
            
            <div class="match-info">
                <span class="label">Tournament Match</span>
                <span id="matchName" class="match-name">Loading...</span>
                <span id="matchIDDisplay" style="font-size: 9px;">ID: #--</span>
            </div>

            <div class="info-box">
                <span class="label">Room ID</span>
                <div id="roomID" class="value">--</div>
            </div>

            <div class="info-box">
                <span class="label">Password</span>
                <div id="roomPass" class="value">--</div>
            </div>
        </div>

        <a href="match_details.html" class="back-btn">GO BACK</a>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwra0VJU6qYQfK4SCZTz5mIfrzv6t3PwvMxmckvZX0tj9WO1jKik0zzeuvNgGu8u1qRcQ/exec";
        
        async function fetchRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const contentArea = document.getElementById('contentArea');

            if(!matchId || !user) {
                contentArea.innerHTML = "<div class='error-msg'>Access Denied:<br>Invalid Session</div>";
                return;
            }

            try {
                // Backend se check karenge ki join kiya hai ya nahi
                const res = await fetch(`${scriptURL}?action=getNewRoomDetails&matchId=${matchId}&userId=${user.uid}`);
                const data = await res.json();
                
                if (data.status === "Success") {
                    document.getElementById('matchName').innerText = data.matchTitle || "Match Joined";
                    document.getElementById('matchIDDisplay').innerText = "ID: #" + matchId;
                    document.getElementById('roomID').innerText = data.roomId;
                    document.getElementById('roomPass').innerText = data.password;
                } else {
                    // Agar join nahi kiya ya ID password nahi mila
                    contentArea.innerHTML = `
                        <div class="header" style="color:#ff3131">Access Denied</div>
                        <div class="error-msg">You have not joined this match yet. Please join to view details.</div>
                    `;
                }
            } catch (e) {
                contentArea.innerHTML = "<div class='error-msg'>System Error:<br>Try Again Later</div>";
            }
        }

        window.onload = fetchRoom;
    </script>
</body>
</html>
