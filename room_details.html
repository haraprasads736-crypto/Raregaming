<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Access - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #030305; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        .room-card { 
            background: #0a0a0f; border: 1px solid rgba(0, 242, 254, 0.3); 
            border-radius: 15px; padding: 20px; width: 290px; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); text-align: center;
        }

        .header { color: #00f2fe; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .match-tag { background: #8B3EEB; color: white; font-size: 9px; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
        .match-info { font-size: 11px; color: #888; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .match-name { color: #fff; font-weight: 700; display: block; font-size: 14px; margin-top: 5px; }

        .info-box { 
            background: rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 12px; 
            margin: 10px 0; border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; transition: 0.3s;
        }
        .info-box:active { background: rgba(0, 242, 254, 0.2); }
        .label { font-size: 8px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 20px; font-weight: 800; color: #fff; font-family: monospace; letter-spacing: 2px; }
        .copy-icon { font-size: 10px; color: #00f2fe; margin-top: 5px; display: block; }

        .back-btn { margin-top: 15px; background: #8B3EEB; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        
        .error-msg { font-size: 12px; color: #ff3131; font-weight: 600; padding: 20px; }
        .loading-icon { color: #00f2fe; font-size: 25px; margin-bottom: 10px; }

        /* Toast for Copy Feedback */
        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 5px; padding: 10px;
            position: fixed; z-index: 100; bottom: 30px; font-size: 12px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="room-card" id="mainCard">
        <div id="contentArea">
            <div class="loading-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
            <p style="font-size: 12px; color: #aaa;">Syncing match credentials...</p>
        </div>
        <button onclick="goBack()" class="back-btn">EXIT ROOM</button>
    </div>

    <div id="toast">Copied to Clipboard!</div>

    <script>
        // 🚀 UPDATED DEPLOY URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbwXTjlNStatYaz4VefCnqzbDUizrw8MsPnkld9wgGWw4zBSJQsZsjsNkLivOo_S_M-3dA/exec";
        
        function goBack() {
            const lastType = localStorage.getItem("lastType") || "LW";
            window.location.href = "match_details.html?type=" + lastType;
        }

        function copyTxt(text) {
            navigator.clipboard.writeText(text).then(() => {
                const x = document.getElementById("toast");
                x.className = "show";
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
            });
        }

        async function fetchRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const contentArea = document.getElementById('contentArea');

            if(!matchId || !user) {
                contentArea.innerHTML = `
                    <div class="header" style="color:#ff3131"><i class="fas fa-exclamation-circle"></i> Error</div>
                    <div class="error-msg">Match session not found!<br><span style="font-size:10px; color:#666;">Go back and re-enter.</span></div>
                `;
                return;
            }

            try {
                // 🚀 Backend call using the new v3.0 script logic
                const res = await fetch(`${scriptURL}?action=getNewRoomDetails&matchId=${matchId}&userId=${user.uid}`);
                const data = await res.json();
                
                if (data.status === "Success") {
                    if (data.roomId && data.password && data.roomId !== "WAIT") {
                        contentArea.innerHTML = `
                            <div class="header"><i class="fas fa-unlock-alt"></i> Access Granted</div>
                            <div class="match-tag">Match #${matchId}</div>
                            <div class="match-info">
                                <span class="label">Tournament</span>
                                <span class="match-name">${data.matchTitle || "Rare Gaming Pro Match"}</span>
                            </div>
                            <div class="info-box" onclick="copyTxt('${data.roomId}')">
                                <span class="label">Room ID (Tap to copy)</span>
                                <div class="value">${data.roomId}</div>
                                <span class="copy-icon"><i class="fas fa-copy"></i> Click to Copy</span>
                            </div>
                            <div class="info-box" onclick="copyTxt('${data.password}')">
                                <span class="label">Password (Tap to copy)</span>
                                <div class="value">${data.password}</div>
                                <span class="copy-icon"><i class="fas fa-copy"></i> Click to Copy</span>
                            </div>
                        `;
                    } else {
                        contentArea.innerHTML = `
                            <div class="header" style="color:#f1c40f"><i class="fas fa-clock"></i> Not Ready</div>
                            <div class="error-msg">Admin hasn't updated details yet.<br>Check 15 mins before match.</div>
                        `;
                    }
                } else {
                    // This handles the "Not Joined" error from the script
                    contentArea.innerHTML = `
                        <div class="header" style="color:#ff3131"><i class="fas fa-user-lock"></i> No Access</div>
                        <div class="error-msg">${data.message || "You have not joined this match."}</div>
                    `;
                }
            } catch (e) {
                contentArea.innerHTML = "<div class='error-msg'><i class='fas fa-wifi'></i> Connection Error<br><span style='font-size:10px; color:#666;'>Check your internet.</span></div>";
            }
        }

        window.onload = fetchRoom;
    </script>
</body>
</html>
