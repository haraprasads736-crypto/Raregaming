<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Access - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        body { background-color: #0F041C; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .room-card { background: linear-gradient(135deg, #1A0A2D 0%, #2D1B44 100%); border: 2px solid #00f2fe; border-radius: 20px; padding: 30px; width: 80%; max-width: 350px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }
        .header { color: #00f2fe; font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }
        .info-box { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 10px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 24px; font-weight: 800; color: #fff; font-family: monospace; letter-spacing: 2px; }
        .back-btn { margin-top: 25px; background: #8B3EEB; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="room-card" id="mainCard">
        <div class="header"><i class="fas fa-lock-open"></i> Room Access</div>
        
        <div class="info-box">
            <span class="label">Room ID</span>
            <div id="roomID" class="value">Loading...</div>
        </div>

        <div class="info-box">
            <span class="label">Password</span>
            <div id="roomPass" class="value">Loading...</div>
        </div>

        <a href="match_details.html" class="back-btn"><i class="fas fa-arrow-left"></i> Go Back</a>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwra0VJU6qYQfK4SCZTz5mIfrzv6t3PwvMxmckvZX0tj9WO1jKik0zzeuvNgGu8u1qRcQ/exec";
        
        async function fetchRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));

            if(!matchId || !user) {
                document.body.innerHTML = "<h1>Unauthorized Access!</h1>";
                return;
            }

            try {
                const res = await fetch(`${scriptURL}?action=getNewRoomDetails&matchId=${matchId}&userId=${user.uid}`);
                const data = await res.json();
                
                if (data.status === "Success") {
                    document.getElementById('roomID').innerText = data.roomId;
                    document.getElementById('roomPass').innerText = data.password;
                } else {
                    document.getElementById('roomID').innerText = "WAITING...";
                    document.getElementById('roomPass').innerText = "WAITING...";
                }
            } catch (e) {
                document.getElementById('roomID').innerText = "ERROR";
            }
        }

        window.onload = fetchRoom;
    </script>
</body>
</html>
