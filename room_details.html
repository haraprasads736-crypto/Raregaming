<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Access - RARE GAMING</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #030305; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        .room-card { 
            background: #0a0a0f; border: 1px solid rgba(0, 242, 254, 0.3); 
            border-radius: 20px; padding: 25px; width: 300px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }

        .header { font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .match-tag { background: #8B3EEB; color: white; font-size: 9px; padding: 3px 12px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }

        .info-box { 
            background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 15px; 
            margin: 12px 0; border: 1px solid rgba(255,255,255,0.05); 
            cursor: pointer; transition: 0.3s;
        }
        .info-box:active { background: rgba(0, 242, 254, 0.2); transform: scale(0.98); }
        
        .label { font-size: 8px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .value { font-size: 22px; font-weight: 800; color: #fff; font-family: monospace; letter-spacing: 2px; }

        .back-btn { margin-top: 20px; background: #1a1a2e; color: #888; border: 1px solid #333; padding: 10px 25px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; }
        
        #toast {
            visibility: hidden; min-width: 200px; background-color: #39ff14; color: #000;
            text-align: center; border-radius: 50px; padding: 10px;
            position: fixed; z-index: 100; bottom: 30px; font-size: 12px; font-weight: 800;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="room-card" id="mainCard">
        <div id="contentArea">
            <div style="color:#00f2fe; font-size:30px;"><i class="fas fa-shield-alt fa-spin"></i></div>
            <p style="font-size: 12px; color: #aaa; margin-top: 15px;">Verifying Access...</p>
        </div>
        <button onclick="goBack()" class="back-btn">GO BACK</button>
    </div>

    <div id="toast">Copied! ✅</div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function goBack() {
            const lastType = localStorage.getItem("lastType") || "BR";
            window.location.href = "match_details.html?type=" + lastType;
        }

        function copyTxt(text) {
            navigator.clipboard.writeText(text).then(() => {
                const x = document.getElementById("toast");
                x.className = "show";
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
            });
        }

        // 2. 🚀 SECURED LIVE LISTENER
        function checkAndListen() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const contentArea = document.getElementById('contentArea');

            if(!matchId || !user) {
                contentArea.innerHTML = `<p style="color:#ff3131;">Invalid Session!</p>`;
                return;
            }

            // --- SECURITY CHECK ---
            // Pehle check karo ki kya user participants list mein hai
            const participantRef = database.ref('matches/' + matchId + '/participants/' + user.uid);
            
            participantRef.once('value').then((snap) => {
                if (!snap.exists()) {
                    // ❌ Access Denied
                    contentArea.innerHTML = `
                        <div class="header" style="color:#ff3131;"><i class="fas fa-user-lock"></i> NO ACCESS</div>
                        <div class="match-tag">Match #${matchId}</div>
                        <p style="font-size:12px; color:#888; padding:15px;">Aapne is match mein join nahi kiya hai. Pehle join karein!</p>
                    `;
                } else {
                    // ✅ Access Granted - Listen for Live Room Info
                    database.ref('matches/' + matchId).on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            if (data.roomId && data.roomId !== "WAIT") {
                                contentArea.innerHTML = `
                                    <div class="header" style="color:#39ff14;"><i class="fas fa-unlock-alt"></i> ROOM READY</div>
                                    <div class="match-tag">#${matchId}</div>
                                    <p style="font-size:11px; color:#aaa; margin-bottom:10px;">${data.title || 'Pro Match'}</p>
                                    
                                    <div class="info-box" onclick="copyTxt('${data.roomId}')">
                                        <span class="label">Room ID</span>
                                        <div class="value">${data.roomId}</div>
                                        <span style="font-size:8px; color:#00f2fe;">Tap to Copy</span>
                                    </div>
                                    
                                    <div class="info-box" onclick="copyTxt('${data.password}')">
                                        <span class="label">Password</span>
                                        <div class="value">${data.password}</div>
                                        <span style="font-size:8px; color:#00f2fe;">Tap to Copy</span>
                                    </div>
                                `;
                            } else {
                                // ⏳ Waiting for Admin
                                contentArea.innerHTML = `
                                    <div class="header" style="color:#f1c40f;"><i class="fas fa-history"></i> WAITING...</div>
                                    <div class="match-tag">#${matchId}</div>
                                    <p style="font-size:12px; color:#888; padding:20px;">Room ID/Pass abhi update nahi hua hai. <br><br><b>Refresh mat karna,</b> yahan automatic dikhega.</p>
                                `;
                            }
                        }
                    });
                }
            });
        }

        window.onload = checkAndListen;
    </script>
</body>
</html>
