<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Access - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { 
            background-color: #030305; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        .room-card { 
            background: #0a0a0f; border: 1px solid rgba(0, 242, 254, 0.3); 
            border-radius: 15px; padding: 20px; width: 290px; 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.1); text-align: center;
        }

        .header { color: #00f2fe; font-size: 14px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        
        .match-tag { background: #8B3EEB; color: white; font-size: 9px; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; }
        .match-info { font-size: 11px; color: #888; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
        .match-name { color: #fff; font-weight: 700; display: block; font-size: 14px; margin-top: 5px; }

        .info-box { background: rgba(255, 255, 255, 0.03); border-radius: 8px; padding: 12px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 8px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .value { font-size: 20px; font-weight: 800; color: #fff; font-family: monospace; letter-spacing: 2px; }

        .back-btn { margin-top: 15px; background: #8B3EEB; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        
        .error-msg { font-size: 12px; color: #ff3131; font-weight: 600; padding: 20px; }
        .loading-icon { color: #00f2fe; font-size: 25px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="room-card" id="mainCard">
        <div id="contentArea">
            <div class="loading-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
            <p style="font-size: 12px; color: #aaa;">Fetching room credentials...</p>
        </div>
        <button onclick="goBack()" class="back-btn">EXIT ROOM</button>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwra0VJU6qYQfK4SCZTz5mIfrzv6t3PwvMxmckvZX0tj9WO1jKik0zzeuvNgGu8u1qRcQ/exec";
        
        // 🚀 SMART NAVIGATION: Back aane par blank screen nahi dikhegi
        function goBack() {
            const lastType = localStorage.getItem("lastMatchCategory") || "LW";
            window.location.href = "match_details.html?type=" + lastType;
        }

        async function fetchRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            const matchId = urlParams.get('matchId');
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const contentArea = document.getElementById('contentArea');

            if(!matchId || !user) {
                contentArea.innerHTML = "<div class='error-msg'><i class='fas fa-ban'></i> Access Denied<br><span style='font-size:10px; color:#666;'>No active match session found.</span></div>";
                return;
            }

            try {
                const res = await fetch(`${scriptURL}?action=getNewRoomDetails&matchId=${matchId}&userId=${user.uid}`);
                const data = await res.json();
                
                if (data.status === "Success") {
                    contentArea.innerHTML = `
                        <div class="header"><i class="fas fa-door-open"></i> Access Granted</div>
                        <div class="match-tag">Match ID: #${matchId}</div>
                        <div class="match-info">
                            <span class="label">Tournament Name</span>
                            <span class="match-name">${data.matchTitle || "Rare Gaming Pro Match"}</span>
                        </div>
                        <div class="info-box">
                            <span class="label">Room ID</span>
                            <div class="value">${data.roomId}</div>
                        </div>
                        <div class="info-box">
                            <span class="label">Room Password</span>
                            <div class="value">${data.password}</div>
                        </div>
                    `;
                } else {
                    contentArea.innerHTML = `
                        <div class="header" style="color:#ff3131"><i class="fas fa-lock"></i> Locked</div>
                        <div class="error-msg">You haven't joined Match #${matchId} yet. Join to unlock credentials.</div>
                    `;
                }
            } catch (e) {
                contentArea.innerHTML = "<div class='error-msg'><i class='fas fa-exclamation-triangle'></i> Connection Error<br><span style='font-size:10px; color:#666;'>Check your internet.</span></div>";
            }
        }

        window.onload = fetchRoom;
    </script>
</body>
</html>
