<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Deposit - Rare Gaming</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(to bottom, #1b103c, #a1368b); font-family: 'Poppins', sans-serif; color: white; margin: 0; padding: 0; min-height: 100vh; padding-bottom: 120px; }
        .container { padding: 20px; max-width: 400px; margin: 0 auto; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 15px; }
        .input-box { background: transparent; border: 1px solid #4a3b75; border-radius: 8px; width: 100%; padding: 15px; font-size: 20px; color: white; box-sizing: border-box; margin-bottom: 20px; outline: none; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
        .amount-btn { background-color: #1a153a; border: none; color: white; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .continue-btn { background: linear-gradient(90deg, #1b3266, #2d559e); width: 100%; padding: 15px; border: none; border-radius: 30px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        #step2 { background: white; color: black; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .trans-input { width: 95%; padding: 12px; margin-top: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; font-weight: bold; outline: none; }
        .verify-btn { background: #4caf50; color: white; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .verify-btn:disabled { background: #888; }
        .status-card { margin-top: 15px; padding: 10px; border-radius: 10px; background: #f0f8ff; color: #007bff; font-size: 13px; font-weight: bold; border: 1px dashed #007bff; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: #00f2fe; }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h2 style="margin: 0; font-size: 20px; font-weight: normal; margin-left: 20px;">Deposit Coins</h2>
        </div>

        <div id="step1">
            <p style="font-weight: bold; margin-bottom: 10px;">Amount to Deposit</p>
            <input type="number" id="payAmount" class="input-box" placeholder="Enter Amount">

            <div class="grid-container">
                <button class="amount-btn" onclick="setAmount(20)">20</button>
                <button class="amount-btn" onclick="setAmount(50)">50</button>
                <button class="amount-btn" onclick="setAmount(100)">100</button>
                <button class="amount-btn" onclick="setAmount(200)">200</button>
            </div>
            <button class="continue-btn" onclick="generateQR()">Continue</button>
        </div>

        <div id="step2" style="display: none;">
            <h2 style="margin-top: 0; font-size: 20px; color: #333;">RareGaming Pay</h2>
            <p style="font-size: 14px; color: #555;">Paying ₹<span id="displayAmount"></span></p>
            
            <img id="qrImage" src="" alt="QR" style="width: 220px; height: 220px; margin: 15px 0;">
            
            <p style="color: #d9534f; font-weight: bold; margin: 10px 0;">Time Left: <span id="timer">05:00</span></p>

            <div id="inputSection">
                <p style="font-size: 14px; font-weight: bold; color: #333; margin-bottom: 2px;">Enter Transaction ID (UTR)</p>
                <input type="number" id="transNumber" class="trans-input" placeholder="12 Digit Transaction ID">
                <button class="verify-btn" id="subBtn" onclick="submitWithUTR()">SUBMIT & VERIFY ✅</button>
            </div>
            
            <div id="statusMsg" class="status-card" style="display: none;">
                <i class="fas fa-spinner fa-spin"></i> Verifying with FamPay...<br>
                <span style="font-size: 10px; font-weight: normal;">Paisa milte hi coins add ho jayenge.</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="refer.html" class="nav-item"><i class="fas fa-gift"></i><span>REFER</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let timerInterval;

        function setAmount(val) { document.getElementById('payAmount').value = val; }

        function generateQR() {
            let amount = document.getElementById('payAmount').value;
            if(amount < 1) return alert("Valid amount dalo!");

            let upiId = "8328875119-3@ybl"; 
            let upiLink = `upi://pay?pa=${upiId}&pn=RareGaming&am=${amount}&cu=INR`;
            
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
            document.getElementById('displayAmount').innerText = amount;
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            startTimer(300);
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            timerInterval = setInterval(() => {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                document.getElementById('timer').textContent = `${minutes < 10 ? "0"+minutes : minutes}:${seconds < 10 ? "0"+seconds : seconds}`;
                if (--timer < 0) { clearInterval(timerInterval); location.reload(); }
            }, 1000);
        }

        function submitWithUTR() {
            const utr = document.getElementById('transNumber').value;
            const amount = document.getElementById('payAmount').value;
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));

            if(utr.length !== 12) return alert("12-digit Transaction ID dalo!");
            if(!userData) return alert("User not logged in!");

            const inputSection = document.getElementById('inputSection');
            const statusMsg = document.getElementById('statusMsg');
            
            inputSection.style.display = "none";
            statusMsg.style.display = "block";

            // 🌟 Folder 'Requests' mein Transaction ID ko key banaya hai
            const requestRef = database.ref('Requests/' + utr);
            
            requestRef.set({
                userId: userData.uid,
                userName: userData.name,
                amount: parseFloat(amount),
                status: "Pending",
                utr: utr,
                time: new Date().toLocaleString()
            }).then(() => {
                // MacroDroid jab ise "Success" karega, ye apne aap detect karega
                requestRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.status === "Success") {
                        clearInterval(timerInterval);
                        alert("Transaction Verified! Coins added. ✅");
                        window.location.href = 'index.html';
                    }
                });
            });
        }
    </script>
</body>
</html>
