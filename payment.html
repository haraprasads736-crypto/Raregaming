<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Rare Gaming</title>
    <style>
        /* Background & Container Styling */
        body {
            background: linear-gradient(to bottom, #1b103c, #a1368b);
            font-family: 'Poppins', sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* Step 1 Elements */
        .input-box {
            background: transparent;
            border: 1px solid #4a3b75;
            border-radius: 8px;
            width: 100%;
            padding: 15px;
            font-size: 20px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }

        .amount-btn {
            background-color: #1a153a;
            border: none;
            color: white;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .continue-btn {
            background: linear-gradient(90deg, #1b3266, #2d559e);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Step 2 (QR & Transaction ID Section) */
        #step2 {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .trans-input {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            outline: none;
            font-weight: bold;
        }

        .verify-btn {
            background: #4caf50;
            color: white;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .hindi-text {
            font-size: 12px;
            color: #444;
            display: block;
            margin-top: 5px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <button class="back-btn" onclick="window.location.href='earn.html'">←</button>
            <h2 style="margin: 0; font-size: 20px; font-weight: normal; margin-left: 20px;">Deposit</h2>
        </div>

        <div id="step1">
            <p style="font-weight: bold; margin-bottom: 10px;">Amount to Deposit</p>
            <input type="number" id="payAmount" class="input-box" placeholder="Enter Amount">

            <div class="grid-container">
                <button class="amount-btn" onclick="setAmount(20)">20</button>
                <button class="amount-btn" onclick="setAmount(50)">50</button>
                <button class="amount-btn" onclick="setAmount(70)">70</button>
                <button class="amount-btn" onclick="setAmount(100)">100</button>
                <button class="amount-btn" onclick="setAmount(200)">200</button>
                <button class="amount-btn" onclick="setAmount(500)">500</button>
                <button class="amount-btn" onclick="setAmount(1000)">1000</button>
                <button class="amount-btn" onclick="setAmount(2000)">2000</button>
            </div>

            <button class="continue-btn" onclick="generateQR()">Continue</button>
        </div>

        <div id="step2" style="display: none;">
            <h2 style="margin-top: 0; font-size: 20px; color: #333;">RareGaming</h2>
            <p style="font-size: 14px; font-weight: bold;">Scan & Pay With Any App</p>
            <p style="font-size: 14px; color: #555;">Transferring ₹<span id="displayAmount"></span> to RareGaming</p>
            
            <img id="qrImage" src="" alt="Loading QR..." style="width: 220px; height: 220px; margin: 15px 0; border: 2px solid #eee; padding: 5px; background: #f9f9f9;">
            
            <p style="color: #d9534f; font-weight: bold; margin: 10px 0;">Expire in <span id="timer">05:00</span></p>

            <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

            <p style="font-size: 14px; font-weight: bold; color: #333; margin-bottom: 2px;">Transaction ID / Ref No.</p>
            <span class="hindi-text">पेमेंट के बाद 12 अंकों का Transaction ID यहाँ डालें</span>
            
            <input type="number" id="transNumber" class="trans-input" placeholder="Example: 4123XXXXXXXX">
            
            <p style="font-size: 10px; color: #ff4d4d; margin-top: 8px; font-weight: bold;">Note: गलत ID डालने पर आपका एकाउंट ब्लॉक हो सकता है।</p>
            
            <button class="verify-btn" onclick="submitPayment()">Submit Transaction ID</button>
        </div>

    </div>

    <script>
        let timerInterval;

        function setAmount(val) {
            document.getElementById('payAmount').value = val;
        }

        function generateQR() {
            let amount = document.getElementById('payAmount').value;
            if(amount < 5 || amount === "") {
                alert("Please enter a valid amount (Min ₹5).");
                return;
            }

            let upiId = "8328875119-3@ybl"; 
            let upiName = "RareGaming";
            let upiLink = `upi://pay?pa=${upiId}&pn=${upiName}&am=${amount}&cu=INR`;
            
            // Using a faster QR API
            let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
            
            document.getElementById('qrImage').src = qrUrl;
            document.getElementById('displayAmount').innerText = amount;
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            startTimer(300);
        }

        function startTimer(duration) {
            clearInterval(timerInterval);
            let timerDisplay = document.getElementById('timer');
            let timer = duration, minutes, seconds;
            
            timerInterval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;
                timerDisplay.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    alert("Session expired! Please start again.");
                    window.location.reload();
                }
            }, 1000);
        }

        function submitPayment() {
            let transId = document.getElementById('transNumber').value;
            let amount = document.getElementById('payAmount').value;
            
            let userStr = localStorage.getItem("rareGamingUser");
            if(!userStr) {
                alert("Error: User session expired. Please login again.");
                return;
            }
            
            let userData = JSON.parse(userStr);
            let playerName = userData.name;
            let uid = userData.uid;

            if(transId.length !== 12) {
                alert("कृपया 12 अंकों का सही Transaction ID डालें।");
                return;
            }

            const scriptURL = "https://script.google.com/macros/s/AKfycbwZQtuhgqNw0VrGBG1fA0-GSGC4Fmeyvi8Fo2xL0F8ngBjmaGNrrbtB88g_J9xu7vnQKw/exec";

            alert("Verifying Transaction ID... कृपया प्रतीक्षा करें।");

            fetch(scriptURL, {
                method: 'POST',
                body: new URLSearchParams({
                    'action': 'submitUTR', // We keep 'submitUTR' for backend logic compatibility
                    'playerName': playerName,
                    'uid': uid,
                    'amount': amount,
                    'utr': transId // transId goes into the 'utr' field in the sheet
                })
            })
            .then(res => res.text())
            .then(data => {
                alert("धन्यवाद! आपका बैलेंस जल्द ही अपडेट हो जाएगा।");
                window.location.href = 'earn.html';
            })
            .catch(err => {
                alert("Network Error! कृपया इंटरनेट कनेक्शन चेक करें और फिर से कोशिश करें।");
            });
        }
    </script>
</body>
</html>
