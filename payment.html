<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Rare Gaming</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tera Pura CSS (No Change) */
        body { background: linear-gradient(to bottom, #1b103c, #a1368b); font-family: 'Poppins', sans-serif; color: white; margin: 0; padding: 0; height: 100vh; }
        .container { padding: 20px; max-width: 400px; margin: 0 auto; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 15px; }
        .input-box { background: transparent; border: 1px solid #4a3b75; border-radius: 8px; width: 100%; padding: 15px; font-size: 20px; color: white; box-sizing: border-box; margin-bottom: 20px; outline: none; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
        .amount-btn { background-color: #1a153a; border: none; color: white; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .continue-btn { background: linear-gradient(90deg, #1b3266, #2d559e); width: 100%; padding: 15px; border: none; border-radius: 30px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        #step2 { background: white; color: black; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .trans-input { width: 95%; padding: 12px; margin-top: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; font-weight: bold; }
        .verify-btn { background: #4caf50; color: white; width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .hindi-text { font-size: 12px; color: #444; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h2 style="margin: 0; font-size: 20px; font-weight: normal; margin-left: 20px;">Deposit Coins</h2>
        </div>

        <div id="step1">
            <p style="font-weight: bold; margin-bottom: 10px;">Amount to Deposit</p>
            <input type="number" id="payAmount" class="input-box" placeholder="Enter Amount">

            <div class="grid-container">
                <button class="amount-btn" onclick="setAmount(20)">20</button>
                <button class="amount-btn" onclick="setAmount(50)">50</button>
                <button class="amount-btn" onclick="setAmount(100)">100</button>
                <button class="amount-btn" onclick="setAmount(200)">200</button>
            </div>
            <button class="continue-btn" onclick="generateQR()">Continue</button>
        </div>

        <div id="step2" style="display: none;">
            <h2 style="margin-top: 0; font-size: 20px; color: #333;">RareGaming Pay</h2>
            <p style="font-size: 14px; color: #555;">Paying ₹<span id="displayAmount"></span></p>
            
            <img id="qrImage" src="" alt="Loading QR..." style="width: 220px; height: 220px; margin: 15px 0; border: 2px solid #eee; padding: 5px;">
            
            <p style="color: #d9534f; font-weight: bold; margin: 10px 0;">Expire in <span id="timer">05:00</span></p>

            <p style="font-size: 14px; font-weight: bold; color: #333; margin-bottom: 2px;">UTR / Transaction ID</p>
            <span class="hindi-text">पेमेंट के बाद 12 अंकों का UTR नंबर यहाँ डालें</span>
            
            <input type="number" id="transNumber" class="trans-input" placeholder="Example: 4123XXXXXXXX">
            <button class="verify-btn" id="subBtn" onclick="submitPayment()">Submit for Approval</button>
        </div>
    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let timerInterval;

        function setAmount(val) { document.getElementById('payAmount').value = val; }

        function generateQR() {
            let amount = document.getElementById('payAmount').value;
            if(amount < 1) return alert("Sahi amount dalo!");

            let upiId = "8328875119-3@ybl"; 
            let upiName = "RareGaming";
            let upiLink = `upi://pay?pa=${upiId}&pn=${upiName}&am=${amount}&cu=INR`;
            
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
            document.getElementById('displayAmount').innerText = amount;
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            startTimer(300);
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            timerInterval = setInterval(() => {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);
                document.getElementById('timer').textContent = `${minutes < 10 ? "0"+minutes : minutes}:${seconds < 10 ? "0"+seconds : seconds}`;
                if (--timer < 0) { clearInterval(timerInterval); location.reload(); }
            }, 1000);
        }

        // 🚀 FIREBASE SUBMISSION
        function submitPayment() {
            const transId = document.getElementById('transNumber').value;
            const amount = document.getElementById('payAmount').value;
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            
            // Referral code capture logic
            const usedReferCode = localStorage.getItem("pendingReferral") || "NONE";

            if(transId.length !== 12) return alert("12-digit UTR number sahi se dalo!");

            const btn = document.getElementById('subBtn');
            btn.disabled = true;
            btn.innerText = "Sending Request...";

            // Push to Firebase payment_requests (Including Refer Code)
            database.ref('payment_requests').push({
                userId: userData.uid,
                userName: userData.name,
                amount: parseFloat(amount),
                utr: transId,
                referUsed: usedReferCode, // Isse admin ko pata chalega ki kisne refer kiya
                time: new Date().toLocaleString(),
                status: "pending"
            }).then(() => {
                alert("Request Sent! Admin verify karke balance add kar dega. ✅");
                window.location.href = 'index.html';
            }).catch(err => {
                alert("Error! Please check internet.");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
