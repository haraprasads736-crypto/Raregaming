<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Quick Share - P2P</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap');
        :root { --neon: #00f2fe; --bg: #030305; }
        body { background: var(--bg); color: white; font-family: 'Poppins'; text-align: center; margin: 0; padding: 20px; }
        
        /* 🌀 Radar Animation */
        .radar { width: 200px; height: 200px; border: 2px solid var(--neon); border-radius: 50%; margin: 50px auto; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
        
        .device-list { background: #0a0a0f; border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid #1f1f25; }
        .device-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; margin-top: 20px; cursor: pointer; }
        .btn-send { background: var(--neon); color: #000; }
        
        /* 🔔 Notification Popup */
        #transferPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 25px; border: 2px solid var(--neon); z-index: 10000; width: 80%; }
    </style>
</head>
<body>

    <h2>RARE QUICK SHARE</h2>
    <p id="status">Bluetooth Scanning Off</p>

    <div class="radar" id="radar"></div>

    <div class="device-list" id="deviceBox">
        <p style="font-size: 10px; color: #666;">NEARBY DEVICES</p>
        <div id="foundDevices">Searching...</div>
    </div>

    <input type="file" id="fileInput" style="display:none" onchange="fileSelected()">
    <button class="btn-action btn-send" onclick="startDiscovery()">FIND NEARBY DEVICES</button>

    <div id="transferPopup">
        <h3 id="senderInfo">Incoming File!</h3>
        <p id="fileDetail">UID: RG_BATTEL_07</p>
        <div style="display:flex; gap:10px;">
            <button onclick="acceptFile()" style="flex:1; background:#39ff14; border:none; padding:10px; border-radius:10px; font-weight:800;">ACCEPT</button>
            <button onclick="declineFile()" style="flex:1; background:#ff3131; border:none; padding:10px; border-radius:10px; font-weight:800; color:white;">DECLINE</button>
        </div>
    </div>

    <script>
        let selectedFile = null;

        // 1. Bluetooth Find Logic
        async function startDiscovery() {
            document.getElementById('status').innerText = "Finding Bluetooth Devices...";
            try {
                // Ye asli Bluetooth menu trigger karega
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['battery_service'] // Sample service
                });
                
                document.getElementById('foundDevices').innerHTML = `
                    <div class="device-item" onclick="prepareTransfer('${device.name}')">
                        <span><i class="fas fa-mobile-alt"></i> ${device.name || 'Unknown Device'}</span>
                        <span style="color:var(--neon)">CONNECT</span>
                    </div>
                `;
            } catch (err) {
                alert("Bluetooth Error: " + err.message);
            }
        }

        // 2. Prepare Transfer (Send Code/UID)
        function prepareTransfer(targetName) {
            document.getElementById('fileInput').click();
        }

        function fileSelected() {
            selectedFile = document.getElementById('fileInput').files[0];
            if(selectedFile) {
                alert("File Ready! Sending Request to Receiver...");
                // Simulated Notification to Receiver
                showReceiverPopup();
            }
        }

        // 3. Receiver Notification Logic
        function showReceiverPopup() {
            // Asli app mein ye Firebase ya WebRTC se jayega
            document.getElementById('transferPopup').style.display = 'block';
            document.getElementById('senderInfo').innerText = "Request from: Rare_Gaming_Admin";
            document.getElementById('fileDetail').innerText = "File: " + selectedFile.name + " (" + (selectedFile.size/1024/1024).toFixed(2) + " MB)";
        }

        async function acceptFile() {
            alert("Transferring File...");
            document.getElementById('transferPopup').style.display = 'none';
            
            // Native Share Trigger
            if (navigator.share) {
                await navigator.share({
                    files: [selectedFile],
                    title: 'Rare Transfer',
                    text: 'Quick Share Successful'
                });
            }
        }

        function declineFile() {
            document.getElementById('transferPopup').style.display = 'none';
            alert("Transfer Declined by User.");
        }
    </script>
</body>
</html>
