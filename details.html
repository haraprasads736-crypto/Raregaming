<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; position: relative; z-index: 1;}
        
        /* 🔥 LIVE ANIMATED BACKGROUND (Energy Orbs) 🔥 */
        .bg-orb-1 { position: fixed; top: -10%; left: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 0, 122, 0.2) 0%, transparent 70%); filter: blur(40px); animation: float1 8s infinite alternate; z-index: -1; }
        .bg-orb-2 { position: fixed; bottom: -10%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(122, 0, 255, 0.2) 0%, transparent 70%); filter: blur(50px); animation: float2 10s infinite alternate; z-index: -1; }
        
        @keyframes float1 { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 30px); } }
        @keyframes float2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-30px, -50px); } }

        /* 🔲 GLASSMORPHISM UI PANEL */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }

        /* NAVBAR */
        .nav-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 100; background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(15px);}
        .back-btn { color: #00f2fe; text-decoration: none; font-weight: 800; font-size: 13px; text-transform: uppercase; border: 1px solid rgba(0, 242, 254, 0.3); padding: 5px 12px; border-radius: 6px; background: rgba(0, 242, 254, 0.05);}
        .logo-circle { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ff007a; overflow: hidden; display: block; box-shadow: 0 0 10px rgba(255, 0, 122, 0.5);}
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .container { padding: 20px; max-width: 450px; margin: auto; }

        /* MATCH DETAILS CONTENT */
        .banner { width: 100%; height: 160px; border-radius: 15px; background-size: cover; background-position: center; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        h2 { font-size: 24px; font-weight: 800; color: #fff; margin: 0 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        .time { font-size: 11px; color: #00f2fe; margin-bottom: 20px; display: block; font-weight: 600; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .info-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .label { font-size: 9px; color: #a0aab2; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .val { font-size: 16px; font-weight: 800; color: #fff; }

        .prize-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .p-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-row:last-child { border-bottom: none; }
        .p-rank { font-weight: 700; color: #ff007a; font-size: 14px; }
        .p-win { font-weight: 800; color: #00f2fe; font-size: 14px; }

        /* ⭐ REGISTRATION BUTTON ⭐ */
        .reg-btn { 
            display: block; width: 100%; background: linear-gradient(90deg, #ff007a, #7a00ff); 
            color: white; padding: 18px; border: none; border-radius: 15px; font-weight: 800; 
            font-size: 16px; text-transform: uppercase; cursor: pointer; text-decoration: none; 
            text-align: center; box-sizing: border-box; box-shadow: 0 0 20px rgba(255, 0, 122, 0.4); 
            transition: 0.3s;
        }
        .reg-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <a href="profile.html" class="logo-circle"><img src="logo.jpg"></a>
    </div>

    <div class="container">
        <div class="glass-panel">
            <div class="banner" id="match-banner"></div>
            <h2 id="mName">MATCH DETAILS</h2>
            <span class="time" id="mTime">🕒 -- DECIDED SOON</span>

            <div class="info-grid">
                <div class="info-box"><div class="label">Entry Fee</div><div class="val" id="mFee">--</div></div>
                <div class="info-box"><div class="label">Map</div><div class="val">Bermuda</div></div>
            </div>

            <div class="prize-box">
                <div class="p-row"><span class="p-rank">🥇 1st Prize</span><span class="p-win">₹150</span></div>
                <div class="p-row"><span class="p-rank">🥈 2nd Prize</span><span class="p-win">₹70</span></div>
            </div>

            <a href="#" id="joinBtn" class="reg-btn">TAP TO REGISTER</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const match = urlParams.get('match') || 'BR';

        // Match config data (taki sahi poster dikhe)
        const matchConfig = {
            "BR": { name: "BR SQUAD YUDH", fee: "FREE", time: "23 MAR | 07:00 PM", poster: "br_poster.jpg" },
            "CS": { name: "CS PRO LEAGUE", fee: "₹50", time: "NOT DECIDED", poster: "cs_poster.jpg" },
            "LW": { name: "LONE WOLF KING", fee: "₹15", time: "SOON", poster: "lw_poster.jpg" },
            "1V1": { name: "1V1 SHOWDOWN", fee: "₹30", time: "SOON", poster: "1v1_poster.jpg" }
        };

        const current = matchConfig[match];

        // PAGE DATA FILL KARNA
        document.getElementById('mName').innerText = current.name;
        document.getElementById('mTime').innerText = "🕒 " + current.time;
        document.getElementById('mFee').innerText = current.fee;
        
        // ⭐ Sahi Poster set karna (image_0.png wala poster complaint fix)
        document.getElementById('match-banner').style.backgroundImage = `url('${current.poster}')`;

        // ⭐ Sabse imp line: Ye register.html par bhejega Duo Details ke liye
        document.getElementById('joinBtn').href = "register.html?match=" + match;
    </script>
</body>
</html>
