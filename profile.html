<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        
        .header-top { padding: 30px 20px; text-align: center; background: linear-gradient(to bottom, #111116, transparent); }
        .user-icon { font-size: 60px; color: #ffd700; margin-bottom: 10px; }
        .username { font-size: 24px; font-weight: 800; text-transform: uppercase; }

        .wallet-panel { 
            background: #111116; border-radius: 20px; padding: 20px; 
            border: 1px solid #1f1f25; margin: 0 20px 20px 20px; 
        }
        .panel-title { font-size: 13px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        
        /* UID Styling */
        #playerUID { font-size: 22px; font-weight: 800; color: #ffd700; letter-spacing: 2px; text-align: center; margin: 10px 0; }

        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; 
            font-size: 14px; font-family: 'Poppins'; outline: none;
        }
        input:focus { border-color: #00f2fe; }
        
        /* Verification Name */
        #verifyName { font-size: 12px; font-weight: 800; margin-top: -5px; margin-bottom: 15px; min-height: 18px; }

        .btn-action { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-size: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-blue { background: #00f2fe; color: #000; }
        .btn-red { background: #ff3131; color: #fff; margin-top: 10px; }
        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; }
    </style>
</head>
<body>

    <div class="header-top">
        <i class="fas fa-user-circle user-icon"></i>
        <div class="username" id="displayUser">PLAYER</div>
    </div>

    <div class="wallet-panel" style="border-color: #ffd700;">
        <div class="panel-title" style="color:#ffd700;"><i class="fas fa-id-badge"></i> Your Unique ID (UID)</div>
        <div id="playerUID">RG000000</div>
        <p style="font-size: 9px; color: #666; text-align: center; margin: 0;">Share this UID to receive money from friends.</p>
    </div>

    <div class="wallet-panel">
        <div class="panel-title" style="color:#00f2fe;"><i class="fas fa-paper-plane"></i> Send Money to Friend</div>
        <input type="text" id="targetUID" placeholder="Enter Friend's UID" oninput="verifyPlayer()">
        <div id="verifyName"></div>
        <input type="number" id="sendAmt" placeholder="Amount (₹)">
        <button class="btn-action btn-blue" id="btnSend" onclick="transferNow()" disabled>SEND MONEY</button>
    </div>

    <div style="padding: 0 20px;">
        <button class="btn-action btn-red" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzPZrXEmFzQYiABm5xeGuRmGfWcZzfe4_YOOKc-WVMDf-fsQs39YhiQAWopkFmvGQSDbw/exec";
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));

        function loadProfile() {
            if(!user) return window.location.href = "login.html";
            document.getElementById('displayUser').innerText = user.name;

            fetch(scriptURL + "?action=getPlayerData&username=" + encodeURIComponent(user.name))
            .then(res => res.json()).then(data => {
                document.getElementById('playerUID').innerText = data.uid || "RG ERROR";
            });
        }

        // 🔍 USERNAME VERIFICATION LOGIC
        function verifyPlayer() {
            let uid = document.getElementById('targetUID').value.trim().toUpperCase();
            let nameBox = document.getElementById('verifyName');
            let btn = document.getElementById('btnSend');

            if(uid.length >= 8) {
                nameBox.innerText = "Checking...";
                nameBox.style.color = "#888";

                fetch(scriptURL + "?action=checkUID&uid=" + uid)
                .then(res => res.text()).then(name => {
                    if(name !== "Not Found") {
                        nameBox.innerHTML = "<i class='fas fa-check-circle'></i> Transfer to: " + name;
                        nameBox.style.color = "#00ff00";
                        btn.disabled = false;
                    } else {
                        nameBox.innerText = "Invalid UID! Player not found.";
                        nameBox.style.color = "#ff3131";
                        btn.disabled = true;
                    }
                });
            } else {
                nameBox.innerText = "";
                btn.disabled = true;
            }
        }

        function transferNow() {
            let target = document.getElementById('targetUID').value.trim();
            let amt = document.getElementById('sendAmt').value;
            let btn = document.getElementById('btnSend');

            if(!amt || amt <= 0) return alert("Sahi amount dalo bhai!");

            btn.innerText = "TRANSFERRING...";
            btn.disabled = true;

            fetch(scriptURL + "?action=transferMoney&senderName=" + encodeURIComponent(user.name) + "&targetUID=" + target + "&amount=" + amt)
            .then(res => res.text()).then(resp => {
                alert(resp);
                location.reload();
            });
        }

        function logout() {
            localStorage.removeItem("rareGamingUser");
            window.location.href = "login.html";
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
