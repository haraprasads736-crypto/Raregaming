<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; text-align: center; }
        .nav-header { background: #15181e; padding: 15px 20px; display: flex; align-items: center; border-bottom: 2px solid #66fcf1; }
        .back-btn { color: #66fcf1; text-decoration: none; font-weight: 800; border: 1px solid #66fcf1; padding: 5px 10px; border-radius: 5px; margin-right: 20px; font-size: 12px; }
        
        .container { padding: 20px; max-width: 400px; margin: auto; }
        
        /* Profile Photo Section */
        .pfp-box { position: relative; width: 100px; height: 100px; margin: 20px auto; }
        #profile-pfp { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #66fcf1; object-fit: cover; }
        .edit-icon { position: absolute; bottom: 0; right: 0; background: #66fcf1; color: #000; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: 2px solid #0c0e12; }

        .user-name { font-weight: 800; font-size: 18px; color: white; text-transform: uppercase; margin-bottom: 30px; }

        /* Input Fields */
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 12px; color: #a0aab2; font-weight: 600; display: block; margin-bottom: 5px; }
        .input-group input { width: 100%; background: #15181e; border: 1px solid #2b303b; color: white; padding: 12px; border-radius: 8px; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        .input-group input:focus { border-color: #66fcf1; outline: none; }

        .save-btn { width: 100%; background: #66fcf1; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .save-btn:active { transform: scale(0.97); }

        .logout-btn { color: #ff4b2b; text-decoration: none; font-size: 12px; font-weight: 600; display: block; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">BACK</a>
        <span style="font-weight:800; letter-spacing:1px; font-size:14px;">PROFILE SETTINGS</span>
    </div>

    <div class="container">
        <div class="pfp-box">
            <img id="profile-pfp" src="logo.jpg" alt="Profile Photo">
            <div class="edit-icon" onclick="document.getElementById('pfp-input-box').style.display='block'">✎</div>
        </div>
        
        <div class="user-name" id="profile-name">GUEST</div>

        <div id="pfp-input-box" class="input-group" style="display:none; background:#1a1d24; padding:15px; border-radius:8px; border:1px solid #2b303b; margin-bottom:30px;">
            <label>Paste Image URL (Link)</label>
            <input type="text" id="pfp-link-input" placeholder="https://example.com/photo.jpg">
            <small style="color:#a0aab2; font-size:10px; display:block; margin-top:5px;">Use sites like ImgBB or postimages.org to get a link.</small>
            <button class="save-btn" style="padding:10px; font-size:12px;" onclick="savePfp()">Apply Photo</button>
        </div>

        <div class="input-group">
            <label>In-Game Name (IGN)</label>
            <input type="text" id="ign-input" placeholder="Enter IGN">
        </div>

        <button class="save-btn" onclick="saveProfile()">Save Changes</button>
        
        <div class="logout-btn" onclick="logout()">Logout Account</div>
    </div>

    <script>
        // Page load hone par user data load karna
        window.onload = function() {
            let savedUser = localStorage.getItem("rareGamingUser");
            if(savedUser) {
                let user = JSON.parse(savedUser);
                document.getElementById("profile-name").innerText = user.name;
                document.getElementById("profile-pfp").src = user.picture || 'logo.jpg';
                document.getElementById("ign-input").value = user.ign || '';
            }
        };

        // Sirf photo link save karne ke liye
        function savePfp() {
            let pfpLink = document.getElementById("pfp-link-input").value;
            if(pfpLink) {
                document.getElementById("profile-pfp").src = pfpLink;
                document.getElementById('pfp-input-box').style.display='none';
            } else {
                alert("Please paste a valid image link!");
            }
        }

        // Pura profile save karne ke liye
        function saveProfile() {
            let currentPfp = document.getElementById("profile-pfp").src;
            let currentIgn = document.getElementById("ign-input").value;
            let currentName = document.getElementById("profile-name").innerText;

            let updatedUser = {
                name: currentName,
                picture: currentPfp,
                ign: currentIgn
            };

            localStorage.setItem("rareGamingUser", JSON.stringify(updatedUser));
            alert("Profile Updated Successfully! 🚀");
            window.location.href = "index.html"; // Go back to dashboard
        }

        function logout() {
            localStorage.removeItem("rareGamingUser");
            localStorage.removeItem("lastRefresh");
            localStorage.removeItem("lastRefreshPoints");
            alert("Logged Out!");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
