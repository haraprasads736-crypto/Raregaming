<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        
        /* Header Section */
        .header-top { padding: 40px 20px; text-align: center; background: #111116; border-bottom: 1px solid #1f1f25; }
        .user-icon { font-size: 70px; color: #ffd700; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        #displayUser { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

        /* Wallet & UID Card */
        .wallet-panel { background: #111116; border-radius: 20px; padding: 25px; border: 1px solid #1f1f25; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .panel-label { font-size: 11px; font-weight: 800; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        #playerUID { font-size: 26px; font-weight: 800; color: #ffd700; text-align: center; letter-spacing: 3px; margin: 10px 0; }
        
        /* Input & Buttons */
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; 
            font-family: 'Poppins'; font-size: 14px;
        }
        .btn-action { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 14px;
            transition: 0.3s;
        }
        .btn-blue { background: #00f2fe; color: #000; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .btn-blue:disabled { background: #333; color: #666; box-shadow: none; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: white; }

        /* 🌟 GREY PROTECTION BAR (SYSTEM NAV) 🌟 */
        .system-nav-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 48px; 
            background-color: #4f515e; 
            z-index: 1001; 
        }
        
        #verifyName { font-weight: 600; margin-bottom: 10px; min-height: 18px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-top">
        <i class="fas fa-user-circle user-icon"></i>
        <div id="displayUser">PLAYER</div>
        <div style="font-size: 10px; color: #00f2fe; margin-top: 5px;">RARE GAMING VERIFIED</div>
    </div>

    <div class="wallet-panel" style="border-color: #ffd700;">
        <div class="panel-label" style="color: #ffd700;">Your Unique ID</div>
        <div id="playerUID">FETCHING...</div>
        <p style="font-size: 9px; color: #666; text-align: center; margin: 0;">Share this ID with friends to receive money</p>
    </div>

    <div class="wallet-panel">
        <div class="panel-label" style="color: #00f2fe;">Quick Transfer</div>
        <input type="text" id="targetUID" placeholder="Friend's UID (e.g. RG123456)" oninput="verifyPlayer()">
        <div id="verifyName"></div>
        <input type="number" id="sendAmt" placeholder="Amount (₹)">
        <button class="btn-action btn-blue" id="btnSend" onclick="transferNow()" disabled>SEND MONEY</button>
    </div>

    <div style="padding: 0 20px;">
        <button onclick="logout()" style="width: 100%; padding: 12px; background: none; border: 1px solid #ff3131; color: #ff3131; border-radius: 10px; font-weight: 800; font-size: 12px;">LOGOUT ACCOUNT</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        // 🔗 APNA MASTER SCRIPT LINK
        const scriptURL = "https://script.google.com/macros/s/AKfycby34-2K5DnslQpxs0_nRw_ZPtsWVLYKJkuZ6RJnqvuzbi6gpmH9kuAI2BsosdkVOVaTLw/exec";
        
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));

        function loadProfile() {
            if(!user) return window.location.href = "login.html";
            document.getElementById('displayUser').innerText = user.name;

            // Sheet se UID fetch kar rahe hain
            fetch(scriptURL + "?action=getPlayerData&username=" + encodeURIComponent(user.name))
            .then(res => res.json())
            .then(data => {
                if(data.uid && data.uid !== "N/A") {
                    document.getElementById('playerUID').innerText = data.uid;
                } else {
                    document.getElementById('playerUID').innerText = "RG-ERROR";
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('playerUID').innerText = "OFFLINE";
            });
        }

        function verifyPlayer() {
            let uid = document.getElementById('targetUID').value.trim().toUpperCase();
            let nameBox = document.getElementById('verifyName');
            let btn = document.getElementById('btnSend');

            if(uid.length >= 8) {
                nameBox.innerText = "Checking...";
                nameBox.style.color = "#888";
                
                fetch(scriptURL + "?action=checkUID&uid=" + uid)
                .then(res => res.text())
                .then(name => {
                    if(name !== "Not Found") {
                        nameBox.innerText = "Target: " + name;
                        nameBox.style.color = "#00ff00";
                        btn.disabled = false;
                    } else {
                        nameBox.innerText = "Player not found!";
                        nameBox.style.color = "#ff3131";
                        btn.disabled = true;
                    }
                });
            } else {
                nameBox.innerText = "";
                btn.disabled = true;
            }
        }

        function transferNow() {
            let target = document.getElementById('targetUID').value.trim().toUpperCase();
            let amt = document.getElementById('sendAmt').value;
            let btn = document.getElementById('btnSend');

            if(!amt || amt <= 0) return alert("Sahi amount dalo!");

            btn.innerText = "SENDING...";
            btn.disabled = true;

            fetch(scriptURL + "?action=transferMoney&senderName=" + encodeURIComponent(user.name) + "&targetUID=" + target + "&amount=" + amt)
            .then(res => res.text())
            .then(resp => {
                alert(resp);
                location.reload();
            })
            .catch(err => {
                alert("Transfer Failed!");
                btn.innerText = "SEND MONEY";
                btn.disabled = false;
            });
        }

        function logout() {
            if(confirm("Logout karna hai?")) {
                localStorage.removeItem("rareGamingUser");
                window.location.href = "login.html";
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
