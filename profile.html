<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        .profile-header { text-align: center; padding: 40px 20px; background: #111116; border-bottom: 1px solid #1f1f25; }
        .user-avatar { font-size: 70px; color: #00f2fe; margin-bottom: 15px; }
        .logout-btn { background: #ff007a; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 800; margin-top: 30px; cursor: pointer; }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>
    <div class="profile-header">
        <i class="fas fa-user-circle user-avatar"></i>
        <h2 id="userName">Gamer</h2>
        <p style="color:#888">Tournament Player</p>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        window.onload = function() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(userData) { document.getElementById('userName').innerText = userData.name; }
        }
        function logout() {
            localStorage.removeItem("rareGamingUser");
            alert("Logged Out!");
            window.location.href = "login.html"; // Agar login page hai toh
        }
    </script>
</body>
</html>
