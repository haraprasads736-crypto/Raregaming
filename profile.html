<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - RARE GAMING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
        :root { --bg: #030305; --neon: #00f2fe; --gold: #ffd700; --panel: #0a0a0f; --green: #39ff14; }
        
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%); }

        .header { padding: 25px; text-align: center; }
        .header h2 { font-size: 20px; color: var(--gold); text-transform: uppercase; margin: 0; letter-spacing: 2px; }

        /* PROFILE TOP CARD */
        .profile-main-card { margin: 15px; padding: 20px; background: var(--panel); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .avatar-wrapper { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; }
        #dpPreview { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; }
        
        .name-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .player-name { font-size: 22px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .verified-badge { color: var(--neon); display: none; }

        /* GENDER SELECTION DROPDOWN */
        .gender-select-box { margin-top: 10px; }
        #genderSelector { background: #111; color: var(--neon); border: 1px solid #333; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: 700; outline: none; cursor: pointer; }

        /* BATTLECARD (Tumhara Maanga Hua Card) */
        .battlecard-mini { margin: 20px 15px; background: linear-gradient(135deg, #0a0a0f 0%, #1a0000 100%); border: 2px solid var(--gold); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .card-stats { width: 100%; display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,215,0,0.2); padding-top: 10px; }
        .stat-item { text-align: center; }
        .stat-item small { font-size: 9px; color: #888; display: block; }
        .stat-item b { font-size: 16px; color: var(--green); }

        /* WALLET STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 15px; }
        .wallet-box { background: var(--panel); padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.03); text-align: center; }
        .wallet-box small { font-size: 10px; color: #666; text-transform: uppercase; }
        .wallet-box h3 { margin: 5px 0 0; font-size: 18px; color: #fff; }

        /* NAVIGATION (Fixed Design for All Pages) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { font-size: 22px; }
        .center-btn .icon-circle { width: 55px; height: 55px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg); margin-top: -35px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }
        .center-btn i { color: #000 !important; font-size: 24px; }
    </style>
</head>
<body>

    <div class="header"><h2>ACCOUNT PROFILE</h2></div>

    <div class="profile-main-card">
        <div class="avatar-wrapper">
            <img id="dpPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <div class="name-row">
            <h1 class="player-name" id="userName">PLAYER</h1>
            <i class="fas fa-check-circle verified-badge" id="vBadge"></i>
        </div>

        <div class="gender-select-box">
            <select id="genderSelector" onchange="updateGender()">
                <option value="Male">♂ MALE</option>
                <option value="Female">♀ FEMALE</option>
                <option value="Other">⚧ OTHER</option>
            </select>
        </div>
        <p style="color: #444; font-size: 10px; margin-top: 10px;" id="userUID">UID: --</p>
    </div>

    <div class="battlecard-mini">
        <small style="color: var(--gold); letter-spacing: 2px; font-weight: 800;">RARE BATTLECARD</small>
        <div class="card-stats">
            <div class="stat-item"><small>K/D</small><b id="statKD">4.2</b></div>
            <div class="stat-item"><small>WIN RATE</small><b id="statWin">85%</b></div>
            <div class="stat-item"><small>TIER</small><b id="statTier">ELITE</b></div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="wallet-box"><small>Cash</small><h3 id="cashVal">₹0</h3></div>
        <div class="wallet-box"><small>Coins</small><h3 id="coinVal" style="color: var(--gold);">0</h3></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top:5px; color:#fff;">SEND</span>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href = "login.html";

        function loadProfileLive() {
            database.ref('players/' + userData.uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('userName').innerText = data.name || "PLAYER";
                    document.getElementById('userUID').innerText = "UID: " + userData.uid;
                    document.getElementById('cashVal').innerText = "₹" + (data.cash || 0);
                    document.getElementById('coinVal').innerText = (data.coins || 0);
                    if(data.dp) document.getElementById('dpPreview').src = data.dp;
                    
                    // Set Gender Dropdown
                    if(data.gender) document.getElementById('genderSelector').value = data.gender;
                    
                    // Set Verification
                    document.getElementById('vBadge').style.display = data.isVerified ? "block" : "none";

                    // Battlecard Stats
                    document.getElementById('statKD').innerText = data.kd || "0.0";
                    document.getElementById('statWin').innerText = (data.winRate || "0") + "%";
                    document.getElementById('statTier').innerText = data.tier || "BRONZE";
                }
            });
        }

        function updateGender() {
            const newGender = document.getElementById('genderSelector').value;
            database.ref('players/' + userData.uid).update({ gender: newGender });
        }

        window.onload = loadProfileLive;
    </script>
</body>
</html>
