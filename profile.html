<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 🔥 BACKGROUND SPARKS */
        .bg-orb-1 { position: fixed; top: -10%; left: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 0, 122, 0.2) 0%, transparent 70%); filter: blur(40px); z-index: -1; }
        .bg-orb-2 { position: fixed; bottom: -10%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(122, 0, 255, 0.2) 0%, transparent 70%); filter: blur(50px); z-index: -1; }

        .nav-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .back-btn { color: #00f2fe; text-decoration: none; font-weight: 800; border: 1px solid #00f2fe; padding: 5px 12px; border-radius: 6px; font-size: 12px; }

        .container { padding: 20px; max-width: 450px; margin: auto; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; text-align: center; }

        /* PROFILE SECTION */
        .profile-header { position: relative; display: inline-block; margin-bottom: 15px; }
        .user-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #ff007a; padding: 4px; box-shadow: 0 0 20px rgba(255,0,122,0.5); }
        .edit-icon { position: absolute; bottom: 5px; right: 5px; background: #00f2fe; color: #000; width: 25px; height: 25px; border-radius: 50%; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 2px solid #050508; }

        .user-name { font-size: 22px; font-weight: 800; color: #fff; margin: 10px 0 2px; text-transform: uppercase; letter-spacing: 1px; }
        .user-uid { font-size: 12px; color: #00f2fe; font-weight: 700; margin-bottom: 20px; display: block; }

        /* STATS BOX */
        .stats-container { display: flex; gap: 15px; justify-content: center; }
        .stat-box { flex: 1; background: rgba(255,255,255,0.05); padding: 15px 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { font-size: 9px; color: #a0aab2; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        .stat-val { font-size: 18px; font-weight: 800; color: #fff; }
        .neon-text { color: #ff007a; text-shadow: 0 0 10px rgba(255,0,122,0.4); }

        /* SETTINGS MENU */
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .menu-item:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
        .item-left { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
        .icon-circle { width: 30px; height: 30px; background: rgba(255,0,122,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #ff007a; }

        .logout-btn { width: 100%; padding: 16px; background: rgba(255, 75, 43, 0.1); border: 1px solid #ff4b2b; color: #ff4b2b; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="bg-orb-1"></div><div class="bg-orb-2"></div>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span style="font-weight: 800; font-size: 16px; letter-spacing: 1px;">MY PROFILE</span>
        <div style="width: 50px;"></div>
    </div>

    <div class="container">
        <div class="glass-panel">
            <div class="profile-header">
                <img src="logo.jpg" class="user-img" id="userPhoto">
                <div class="edit-icon">✎</div>
            </div>
            
            <h3 class="user-name" id="userNameDisplay">PLAYER NAME</h3>
            <span class="user-uid">UID: <span id="userUidDisplay">12345678</span></span>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-label">Total Matches</div>
                    <div class="stat-val" id="matchesCount">24</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Wallet Balance</div>
                    <div class="stat-val neon-text" id="walletBalance">₹100</div>
                </div>
            </div>
        </div>

        <div class="menu-item" onclick="alert('Coming Soon!')">
            <div class="item-left"><div class="icon-circle">💳</div> Transaction History</div>
            <span style="color: #555;">❯</span>
        </div>
        
        <div class="menu-item" onclick="location.href='withdraw.html'">
            <div class="item-left"><div class="icon-circle">💰</div> Withdraw Money</div>
            <span style="color: #555;">❯</span>
        </div>

        <div class="menu-item" onclick="location.href='prizes.html'">
            <div class="item-left"><div class="icon-circle">🏆</div> Prize Details</div>
            <span style="color: #555;">❯</span>
        </div>

        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <script>
        // Data Load Karna
        function initProfile() {
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(userData) {
                document.getElementById('userNameDisplay').innerText = userData.name;
                document.getElementById('userUidDisplay').innerText = userData.uid || "NOT SET";
                document.getElementById('walletBalance').innerText = "₹" + (localStorage.getItem("rareWallet") || 0);
                
                // Demo matches count
                document.getElementById('matchesCount').innerText = localStorage.getItem("matchesPlayed") || "0";
            } else {
                window.location.href = "login.html";
            }
        }

        function logout() {
            localStorage.removeItem("rareGamingUser");
            window.location.href = "login.html";
        }

        initProfile();
    </script>
</body>
</html>
