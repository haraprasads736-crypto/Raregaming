<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; padding-bottom: 140px; }
        
        .profile-card { background: #111116; border: 1px solid #00f2fe; border-radius: 20px; padding: 30px 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }
        .user-avatar { font-size: 60px; color: #00f2fe; margin-bottom: 15px; }
        
        .promo-box { background: #1a1a24; border: 1px dashed #ffaa00; border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        input { width: 90%; background: #050508; border: 1px solid #333; color: white; padding: 12px; border-radius: 10px; margin: 10px 0; text-align: center; font-weight: 600; outline: none; }
        input:focus { border-color: #ffaa00; }
        
        .btn-apply { background: #ffaa00; color: black; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-logout { background: #ff007a; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 800; width: 100%; margin-top: 20px; cursor: pointer; }

        /* Navigation Bar */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; }
    </style>
</head>
<body>

    <div class="profile-card">
        <i class="fas fa-user-circle user-avatar"></i>
        <h2 id="pName" style="margin: 0; text-transform: uppercase; letter-spacing: 1px;">User</h2>
        <p style="color: #666; font-size: 14px;">Member of RARE GAMING</p>
    </div>

    <div class="promo-box">
        <h3 style="color: #ffaa00; margin: 0; font-size: 16px; text-transform: uppercase;">Apply Promo Code</h3>
        <p style="font-size: 11px; color: #ccc; margin-top: 5px;">Enter a code to get instant balance!</p>
        <input type="text" id="promoInput" placeholder="ENTER CODE HERE">
        <button class="btn-apply" onclick="applyPromo()">Apply Now</button>
    </div>

    <button class="btn-logout" onclick="logout()">Logout Account</button>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxav2f0FIc_pmd-ntNG7szqzECf_MXkDSYa0OO5JhTyijFTMEgVgff5cxpBMm8Z9C3H/exec";
        
        // Login status check
        let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) {
            window.location.href = "login.html";
        } else {
            document.getElementById('pName').innerText = userData.name;
        }

        function applyPromo() {
            let code = document.getElementById('promoInput').value;
            if(!code) return alert("Please enter a promo code!");

            let btn = document.querySelector('.btn-apply');
            btn.innerText = "CHECKING...";
            btn.disabled = true;

            fetch(scriptURL + "?action=applyPromo&username=" + encodeURIComponent(userData.name) + "&promo=" + encodeURIComponent(code))
            .then(res => res.text())
            .then(resp => {
                alert(resp);
                document.getElementById('promoInput').value = "";
                btn.innerText = "APPLY NOW";
                btn.disabled = false;
            })
            .catch(e => {
                alert("Error connecting to server!");
                btn.disabled = false;
            });
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
