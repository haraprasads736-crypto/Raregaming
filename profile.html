<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; 
        }
        
        /* Header Section */
        .header-top { padding: 40px 20px; text-align: center; background: #111116; border-bottom: 1px solid #1f1f25; }
        .user-icon { font-size: 70px; color: #ffd700; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        #displayUser { font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

        /* Wallet & UID Card */
        .wallet-panel { background: #111116; border-radius: 20px; padding: 25px; border: 1px solid #1f1f25; margin: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .panel-label { font-size: 11px; font-weight: 800; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        #playerUID { font-size: 26px; font-weight: 800; color: #ffd700; text-align: center; letter-spacing: 3px; margin: 10px 0; }
        
        /* 🌟 NEW 5-BUTTON NAV SYSTEM 🌟 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; 
            background: #111116; display: flex; justify-content: space-between; 
            align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; 
            padding: 0 5px;
        }

        .nav-item { 
            text-decoration: none; color: #666; font-size: 9px; font-weight: 800; 
            display: flex; flex-direction: column; align-items: center; flex: 1; 
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Active Effect (Diamond Shape) */
        .nav-item.active:not(.center-btn) { color: white; position: relative; }
        .nav-item.active:not(.center-btn) i { color: #000; z-index: 2; font-size: 22px; }
        .nav-item.active:not(.center-btn)::before { 
            content: ''; position: absolute; top: -16px; width: 55px; height: 55px; 
            background: #ffffff; border-radius: 16px; transform: rotate(45deg); 
            z-index: -1; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); 
        }

        /* Center Button (Transfer) */
        .nav-item.center-btn { position: relative; color: #666; margin-top: -30px; }
        .nav-item.center-btn .icon-circle { 
            width: 55px; height: 55px; background: #222; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid #050508; transition: 0.3s; 
        }
        .nav-item.center-btn i { color: white; font-size: 22px; margin: 0; }

        .logout-btn { 
            width: calc(100% - 40px); margin: 0 20px; padding: 14px; 
            background: none; border: 1.5px solid #ff3131; color: #ff3131; 
            border-radius: 12px; font-weight: 800; text-transform: uppercase; 
            font-size: 13px; cursor: pointer; transition: 0.3s;
        }
        .logout-btn:active { background: rgba(255, 49, 49, 0.1); }
    </style>
</head>
<body>

    <div class="header-top">
        <i class="fas fa-user-circle user-icon"></i>
        <div id="displayUser">PLAYER</div>
        <div style="font-size: 10px; color: #00f2fe; margin-top: 5px;">RARE GAMING VERIFIED</div>
    </div>

    <div class="wallet-panel" style="border-color: #ffd700;">
        <div class="panel-label" style="color: #ffd700;">Your Unique ID</div>
        <div id="playerUID">FETCHING...</div>
        <p style="font-size: 9px; color: #666; text-align: center; margin-top: 10px;">Unique ID use karein money transfer ke liye.</p>
    </div>

    <button class="logout-btn" onclick="logout()">Logout Account</button>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px;">TRANSFER</span>
        </a>

        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycby34-2K5DnslQpxs0_nRw_ZPtsWVLYKJkuZ6RJnqvuzbi6gpmH9kuAI2BsosdkVOVaTLw/exec";
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));

        function loadProfile() {
            if(!user) return window.location.href = "login.html";
            document.getElementById('displayUser').innerText = user.name;

            fetch(scriptURL + "?action=getPlayerData&username=" + encodeURIComponent(user.name))
            .then(res => res.text())
            .then(text => {
                try {
                    const data = JSON.parse(text);
                    document.getElementById('playerUID').innerText = data.uid || "N/A";
                } catch (e) {
                    document.getElementById('playerUID').innerText = "DATA ERROR";
                }
            })
            .catch(err => {
                document.getElementById('playerUID').innerText = "OFFLINE";
            });
        }

        function logout() {
            if(confirm("Logout karna hai?")) {
                localStorage.removeItem("rareGamingUser");
                window.location.href = "login.html";
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
