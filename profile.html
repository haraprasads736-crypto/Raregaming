<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - RARE GAMING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --rare-gold: #ffd700;
            --transfer-green: #39ff14;
            --panel-color: #0a0a0f;
        }

        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; 
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }
        
        /* Earn Style Header */
        .header-top { padding: 30px 20px; text-align: center; color: var(--rare-gold); font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        /* Profile Main Card */
        .profile-panel { background: var(--panel-color); border-radius: 24px; padding: 25px; border: 1px solid #1f1f25; margin: 0 20px 20px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        #dpPreview { width: 100px; height: 100px; border-radius: 50%; border: 2.5px solid var(--neon-blue); object-fit: cover; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        
        .player-name { font-size: 22px; font-weight: 800; margin: 5px 0; color: #fff; text-transform: uppercase; }
        
        select { width: 100%; padding: 12px; background: #000; border: 1px solid #2a2a30; color: var(--neon-blue); border-radius: 12px; margin-top: 10px; font-family: 'Poppins'; font-weight: 700; outline: none; }

        /* Stats Grid like Earn Balance */
        .balance-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 20px 20px; }
        .bal-card { background: var(--panel-color); border: 1.5px solid var(--rare-gold); border-radius: 20px; padding: 18px; text-align: center; }
        .bal-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .bal-amount { font-size: 20px; font-weight: 800; margin-top: 5px; }

        /* Action Buttons */
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-gold { background: var(--rare-gold); color: #000; }
        .btn-blue { background: var(--neon-blue); color: #000; }
        .btn-red { background: #ff3131; color: #fff; }

        /* Battle Card Overlay */
        #bcOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 5000; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(12px); }
        .bc-card { width: 300px; height: 450px; background: #000; border: 2.5px solid var(--rare-gold); border-radius: 30px; position: relative; overflow: hidden; text-align: center; }
        .bc-back-btn { margin-top: 20px; background: #fff; color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 800; border: none; }

        /* 🟢 NAVIGATION SYSTEM (EXACTLY FROM EARN/INDEX) */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }
        .center-btn .icon-circle { width: 55px; height: 55px; background: var(--transfer-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid #050508; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); margin-top: -35px; }
        .center-btn i { color: #000 !important; font-size: 22px; }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">MY PROFILE</div>

    <div class="profile-panel">
        <div class="avatar-wrapper">
            <img id="dpPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <div class="player-name" id="userName">PLAYER</div>
        <p id="userUID" style="font-size: 11px; color: #555; margin: 0;">UID: --</p>
        
        <select id="genderSelector" onchange="updateGender()">
            <option value="Male">♂ MALE</option>
            <option value="Female">♀ FEMALE</option>
        </select>
    </div>

    <div class="balance-container">
        <div class="bal-card">
            <div class="bal-label">Main Wallet</div>
            <div class="bal-amount" id="cashVal">₹0</div>
        </div>
        <div class="bal-card" style="border-color: var(--rare-gold);">
            <div class="bal-label">Rare Coins</div>
            <div class="bal-amount" id="coinVal" style="color: var(--rare-gold);">0</div>
        </div>
    </div>

    <div style="padding: 0 20px;">
        <button class="btn-action btn-gold" onclick="openBattleCard()">
            <i class="fas fa-id-card"></i> View Battle Card
        </button>
        <button class="btn-action btn-blue" onclick="window.location.href='https://wa.me/917008170291'">
            <i class="fab fa-whatsapp"></i> Customer Support
        </button>
        <button class="btn-action btn-red" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout System
        </button>
    </div>

    <div id="bcOverlay">
        <div class="bc-card" id="bcCard">
            <div style="padding:40px 20px;">
                <h2 id="bcName" style="color:#fff; text-transform:uppercase;">PLAYER</h2>
                <p id="bcGender" style="color:var(--neon-blue); font-weight:bold;">MALE</p>
                <hr style="border:0.5px solid #333; margin:20px 0;">
                <div style="display:flex; justify-content:space-around;">
                    <div><b id="bcKD" style="font-size:20px; color:var(--transfer-green);">0.0</b><br><small style="color:#777;">K/D</small></div>
                    <div><b id="bcWin" style="font-size:20px; color:var(--transfer-green);">0%</b><br><small style="color:#777;">WIN</small></div>
                </div>
            </div>
        </div>
        <button class="bc-back-btn" onclick="closeBattleCard()">BACK TO PROFILE</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>
        <a href="refer.html" class="nav-item"><i class="fas fa-gift"></i><span>REFER</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk", authDomain: "rare-gaming-b8875.firebaseapp.com", projectId: "rare-gaming-b8875", databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href = "login.html";

        function loadProfileLive() {
            database.ref('players/' + userData.uid).on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    window.currentData = data;
                    document.getElementById('userName').innerText = data.name || "PLAYER";
                    document.getElementById('userUID').innerText = "UID: " + userData.uid;
                    document.getElementById('cashVal').innerText = "₹" + (data.cash || 0);
                    document.getElementById('coinVal').innerText = (data.coins || 0);
                    if(data.dp) document.getElementById('dpPreview').src = data.dp;
                    if(data.gender) document.getElementById('genderSelector').value = data.gender;
                }
            });
        }

        function openBattleCard() {
            const d = window.currentData;
            document.getElementById('bcName').innerText = d.name || "PLAYER";
            document.getElementById('bcGender').innerText = (d.gender || "Male").toUpperCase();
            document.getElementById('bcKD').innerText = d.kd || "0.0";
            document.getElementById('bcWin').innerText = (d.winRate || "0") + "%";
            document.getElementById('bcOverlay').style.display = 'flex';
        }

        function closeBattleCard() { document.getElementById('bcOverlay').style.display = 'none'; }
        function updateGender() { database.ref('players/' + userData.uid).update({ gender: document.getElementById('genderSelector').value }); }
        function logout() { if(confirm("Logout System?")) { localStorage.clear(); window.location.href="login.html"; } }
        
        window.onload = loadProfileLive;
    </script>
</body>
</html>
