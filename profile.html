<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - RARE GAMING</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg: #030305; --neon: #00f2fe; --panel: #0a0a0f; }
        
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; }

        /* 📸 DP Section */
        .profile-card { margin: 20px; padding: 25px; background: var(--panel); border-radius: 24px; text-align: center; border: 1px solid #1a1a20; }
        
        .avatar-wrapper { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; }
        #dpPreview { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon); object-fit: cover; background: #111; }
        .edit-icon { position: absolute; bottom: 5px; right: 5px; background: var(--neon); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; border: 3px solid var(--panel); }

        /* ✂️ Crop Modal */
        #cropModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; padding: 20px; box-sizing: border-box; }
        #cropContainer { width: 100%; height: 70vh; margin-top: 30px; }
        .crop-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }

        /* 🧭 Nav Bar (Stable) */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1a1a20; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: var(--neon); }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background: #1a1b22; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrapper" onclick="document.getElementById('uploadInput').click()">
            <img id="dpPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="edit-icon"><i class="fas fa-camera"></i></div>
        </div>
        <input type="file" id="uploadInput" style="display:none;" accept="image/*">
        <h2 id="userName" style="margin:0; text-transform:uppercase;">Player Name</h2>
        <p id="userUID" style="font-size:12px; color:#555; margin:5px 0 0;">UID: RG000000</p>
    </div>

    <div id="cropModal">
        <div id="cropContainer"></div>
        <div class="crop-btns">
            <button class="btn" style="background:#222; color:#fff;" onclick="closeCrop()">CANCEL</button>
            <button class="btn" style="background:var(--neon); color:#000;" onclick="saveCrop()">DONE</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i>HOME</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i>EARN</a>
        <a href="transfer.html" class="nav-item"><div style="width:50px; height:50px; background:#39ff14; border-radius:50%; margin-top:-30px; display:flex; align-items:center; justify-content:center; border:4px solid #030305;"><i class="fas fa-exchange-alt" style="color:#000;"></i></div>SEND</a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i>CHAT</a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-alt"></i>PROFILE</a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let croppieInstance;
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href = "login.html";

        // 1. Firebase se DP Load karna
        function loadDP() {
            document.getElementById('userName').innerText = userData.name;
            database.ref('users/' + userData.uid + '/dp').on('value', (snap) => {
                if(snap.val()) document.getElementById('dpPreview').src = snap.val();
            });
        }

        // 2. Image Select & Open Crop Modal
        document.getElementById('uploadInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('cropModal').style.display = 'block';
                if(croppieInstance) croppieInstance.destroy();
                croppieInstance = new Croppie(document.getElementById('cropContainer'), {
                    viewport: { width: 250, height: 250, type: 'circle' },
                    boundary: { width: 300, height: 400 },
                    showZoomer: true
                });
                croppieInstance.bind({ url: event.target.result });
            };
            reader.readAsDataURL(file);
        };

        function closeCrop() { document.getElementById('cropModal').style.display = 'none'; }

        // 3. Save Cropped Image to Firebase
        function saveCrop() {
            croppieInstance.result({ type: 'base64', size: { width: 300, height: 300 }, circle: false }).then(function(base64) {
                // Firebase mein save karo taaki sabko dikhe
                database.ref('users/' + userData.uid).update({ dp: base64 })
                .then(() => {
                    document.getElementById('dpPreview').src = base64;
                    closeCrop();
                });
            });
        }

        window.onload = loadDP;
    </script>
</body>
</html>
