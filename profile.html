<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - RARE GAMING</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg: #030305; --neon: #00f2fe; --gold: #ffd700; --panel: #0a0a0f; --green: #39ff14; }
        
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 160px; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%); }

        /* 🛡️ Header (Original) */
        .header { padding: 30px 20px; text-align: center; background: rgba(3, 3, 5, 0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .header h2 { font-size: 22px; margin: 0; color: var(--gold); text-transform: uppercase; font-weight: 800; letter-spacing: 2px; }

        /* 👤 Profile Card (Fixed & Smaller) */
        .profile-card { margin: 20px; padding: 25px; background: var(--panel); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; }
        
        .avatar-wrapper { position: relative; width: 90px; height: 90px; margin: 0 auto 15px; cursor: pointer; }
        #dpPreview { width: 90px; height: 90px; border-radius: 50%; border: 2.5px solid var(--neon); object-fit: cover; background: #111; }
        .edit-badge { position: absolute; bottom: 2px; right: 2px; background: var(--neon); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-size: 11px; border: 2px solid var(--panel); }

        .player-name { font-size: 20px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .player-uid { font-size: 12px; color: #666; font-weight: 700; margin-top: 5px; letter-spacing: 1px; }

        /* 📝 About Section (New) */
        .about-box { margin: 0 20px 20px; padding: 15px; background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .about-box h3 { font-size: 10px; color: var(--neon); text-transform: uppercase; margin: 0 0 8px; letter-spacing: 1px; }
        #aboutText { font-size: 13px; color: #bbb; margin: 0; line-height: 1.5; }

        /* 📊 Stats Grid (Original) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 20px; }
        .stat-box { background: var(--panel); padding: 15px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.03); text-align: center; }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 800; color: #fff; margin-top: 5px; }

        /* ⚙️ Options List (Original) */
        .options-container { margin: 0 20px 20px; background: var(--panel); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .option-item { padding: 18px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.03); text-decoration: none; color: #bbb; font-size: 14px; font-weight: 600; }
        .option-item i { width: 20px; color: var(--neon); font-size: 18px; }
        .logout-btn { color: #ff3131 !important; border-bottom: none; }
        .logout-btn i { color: #ff3131 !important; }

        /* ✂️ Crop Modal (WhatsApp Style) */
        #cropModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; padding: 20px; }
        .crop-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; }

        /* 🧭 Nav Bar (Matched to Index) */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { font-size: 20px; }
        .center-btn .icon-circle { width: 55px; height: 55px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); margin-top: -35px; }
        .center-btn i { color: #000 !important; font-size: 22px; }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header"><h2>Account Profile</h2></div>

    <div class="profile-card">
        <div class="avatar-wrapper" onclick="document.getElementById('uploadInput').click()">
            <img id="dpPreview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <div class="edit-badge"><i class="fas fa-camera"></i></div>
        </div>
        <input type="file" id="uploadInput" style="display:none;" accept="image/*">
        <p class="player-name" id="userName">PLAYER_NAME</p>
        <p class="player-uid" id="userUID">UID: RG000000</p>
    </div>

    <div class="about-box">
        <h3>About Me</h3>
        <p id="aboutText">Rare Gaming Member | Esports Enthusiast</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Total Cash</div><div class="stat-value" id="cashVal">₹0</div></div>
        <div class="stat-box"><div class="stat-label">Rare Coins</div><div class="stat-value" id="coinVal" style="color:var(--gold);">0</div></div>
    </div>

    <div class="options-container">
        <a href="earn.html" class="option-item"><i class="fas fa-wallet"></i> Wallet History</a>
        <a href="transfer.html" class="option-item"><i class="fas fa-exchange-alt"></i> Transfer Records</a>
        <a href="https://wa.me/917008170291" class="option-item"><i class="fab fa-whatsapp"></i> Customer Support</a>
        <a href="javascript:void(0)" class="option-item logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout System</a>
    </div>

    <div id="cropModal">
        <div id="cropContainer" style="height: 60vh;"></div>
        <div class="crop-btns">
            <button class="btn" style="background:#222; color:#fff;" onclick="closeCrop()">CANCEL</button>
            <button class="btn" style="background:var(--neon); color:#000;" onclick="saveCrop()">DONE</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn"><div class="icon-circle"><i class="fas fa-exchange-alt"></i></div><span style="margin-top:5px; color:#fff;">SEND</span></a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let croppieInstance;
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href = "login.html";

        function loadProfile() {
            document.getElementById('userName').innerText = userData.name;
            // Load DP & Stats
            database.ref('users/' + userData.uid).on('value', (snap) => {
                const data = snap.val();
                if(data && data.dp) document.getElementById('dpPreview').src = data.dp;
                if(data && data.uid) document.getElementById('userUID').innerText = "UID: " + data.uid;
                if(data && data.cash) document.getElementById('cashVal').innerText = "₹" + data.cash;
                if(data && data.coins) document.getElementById('coinVal').innerText = data.coins;
            });
        }

        document.getElementById('uploadInput').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('cropModal').style.display = 'block';
                if(croppieInstance) croppieInstance.destroy();
                croppieInstance = new Croppie(document.getElementById('cropContainer'), {
                    viewport: { width: 200, height: 200, type: 'circle' },
                    boundary: { width: 300, height: 350 },
                    showZoomer: true
                });
                croppieInstance.bind({ url: event.target.result });
            };
            reader.readAsDataURL(file);
        };

        function saveCrop() {
            croppieInstance.result({ type: 'base64', size: { width: 300, height: 300 }, circle: false }).then(function(base64) {
                database.ref('users/' + userData.uid).update({ dp: base64 }).then(() => {
                    document.getElementById('dpPreview').src = base64;
                    closeCrop();
                });
            });
        }

        function closeCrop() { document.getElementById('cropModal').style.display = 'none'; }
        function logout() { if(confirm("Dost, logout karna chahte ho?")) { localStorage.removeItem("rareGamingUser"); window.location.href = "login.html"; } }

        window.onload = loadProfile;
    </script>
</body>
</html>
