<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Profile - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --rare-gold: #ffd700;
            --transfer-green: #39ff14;
            --panel-bg: #0a0a0f;
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* 🛡️ Header */
        .header { 
            padding: 30px 20px; text-align: center; 
            background: rgba(3, 3, 5, 0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h2 { 
            font-size: 22px; margin: 0; color: var(--rare-gold); 
            text-transform: uppercase; font-weight: 800; letter-spacing: 2px;
        }

        /* 👤 Profile Info Card */
        .profile-card {
            margin: 20px; padding: 25px; background: var(--panel-bg);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .avatar-circle {
            width: 80px; height: 80px; background: rgba(0, 242, 254, 0.1);
            border-radius: 50%; margin: 0 auto 15px; display: flex;
            align-items: center; justify-content: center;
            border: 2px solid var(--neon-blue); color: var(--neon-blue); font-size: 40px;
        }
        .player-name { font-size: 20px; font-weight: 800; margin: 0; text-transform: uppercase; }
        .player-uid { font-size: 12px; color: #666; font-weight: 700; margin-top: 5px; letter-spacing: 1px; }

        /* 📊 Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px; }
        .stat-box {
            background: var(--panel-bg); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03); text-align: center;
        }
        .stat-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 18px; font-weight: 800; color: #fff; margin-top: 5px; }

        /* ⚙️ Options List */
        .options-container { margin: 20px; background: var(--panel-bg); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .option-item {
            padding: 18px 20px; display: flex; align-items: center; gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.03); text-decoration: none; color: #bbb;
            font-size: 14px; font-weight: 600; transition: 0.3s;
        }
        .option-item i { width: 20px; color: var(--neon-blue); font-size: 18px; }
        .option-item:last-child { border-bottom: none; }
        .option-item:active { background: rgba(255,255,255,0.05); color: #fff; }

        /* 🧭 NAVIGATION BAR SYSTEM */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; border-radius: 20px 20px 0 0;
        }

        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; font-weight: 700; 
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }

        /* Green Center Button: Transfer */
        .center-btn .icon-circle { 
            width: 55px; height: 55px; background: var(--transfer-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid #050508; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); 
            margin-top: -35px;
        }
        .center-btn i { color: #000 !important; font-size: 22px; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
        
        .logout-btn { color: #ff3131 !important; }
        .logout-btn i { color: #ff3131 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Account Profile</h2>
    </div>

    <div class="profile-card">
        <div class="avatar-circle">
            <i class="fas fa-user-astronaut"></i>
        </div>
        <p class="player-name" id="userName">PLAYER_NAME</p>
        <p class="player-uid" id="userUID">UID: RG000000</p>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-label">Total Cash</div>
            <div class="stat-value" id="cashVal">₹0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Rare Coins</div>
            <div class="stat-value" id="coinVal" style="color: var(--rare-gold);">0</div>
        </div>
    </div>

    <div class="options-container">
        <a href="earn.html" class="option-item"><i class="fas fa-wallet"></i> Wallet History</a>
        <a href="transfer.html" class="option-item"><i class="fas fa-exchange-alt"></i> Transfer Records</a>
        <a href="https://wa.me/917008170291" class="option-item"><i class="fab fa-whatsapp"></i> Customer Support</a>
        <a href="#" class="option-item logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout System</a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>

        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        
        <a href="profile.html" class="nav-item active"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxkNQ1Zc4mrOV3oAT-FEW7yJbp2c1WL5T80hHa5lTth5K1I5OloyJ3ddbc-pDAl1JHSeQ/exec";
        
        function loadProfile() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) return window.location.href = "login.html";

            document.getElementById('userName').innerText = userData.name;
            
            // Sync Live Data
            fetch(`${scriptURL}?action=getPlayerData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('userUID').innerText = "UID: " + (data.uid || "RGXXXXXX");
                document.getElementById('cashVal').innerText = "₹" + (data.cash || 0);
                document.getElementById('coinVal').innerText = (data.coins || 0);
            }).catch(e => console.log("Profile Sync Error"));
        }

        function logout() {
            if(confirm("Dost, logout karna chahte ho?")) {
                localStorage.removeItem("rareGamingUser");
                window.location.href = "login.html";
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
