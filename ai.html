<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare AI - THE SINGULARITY</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --gold: #ffd700; --bg: #000; --rare: #00ffcc; --gemini: #8e55ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; }
    
    body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- SPACE & STARS --- */
    .space-canvas { position: fixed; inset: 0; background: #000; z-index: -1; }
    .stars { position: absolute; width: 1.5px; height: 1.5px; background: white; border-radius: 50%; opacity: 0.4; animation: twinkle 4s infinite; }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

    /* --- THE CENTER PIECE (AI ORB) --- */
    .orb-container { 
      position: fixed; top: 45%; left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 0; text-align: center; 
    }
    .ai-orb {
      width: 300px; height: 300px;
      background: radial-gradient(circle, var(--gemini) 0%, var(--gold) 40%, var(--rare) 70%, transparent 100%);
      border-radius: 50%; filter: blur(100px);
      animation: pulse 6s infinite alternate; opacity: 0.5;
    }
    @keyframes pulse { from { transform: scale(0.9); opacity: 0.3; } to { transform: scale(1.4); opacity: 0.6; } }

    /* --- YOUR EXPLICIT REQUEST: ASK ME ANYTHING --- */
    .ask-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px; font-weight: 900; letter-spacing: 5px;
      color: #fff; text-shadow: 0 0 20px var(--rare);
      white-space: nowrap; pointer-events: none;
      text-transform: uppercase; z-index: 2;
    }

    /* --- CHAT HUD --- */
    #chat-box { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; z-index: 1; margin-top: 20px; }
    #chat-box::-webkit-scrollbar { width: 0; }

    .msg { max-width: 85%; padding: 18px; border-radius: 10px; backdrop-filter: blur(20px); background: rgba(255,255,255,0.03); border: 1px solid rgba(0, 255, 204, 0.1); animation: teleport 0.3s ease-out; }
    @keyframes teleport { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .bot-msg { align-self: flex-start; border-left: 4px solid var(--gold); }
    .user-msg { align-self: flex-end; background: rgba(142, 85, 255, 0.1); border-right: 4px solid var(--rare); }

    /* --- INPUT AREA --- */
    .input-wrapper { position: fixed; bottom: 85px; width: 100%; padding: 0 20px; z-index: 10; }
    .input-container { background: rgba(10, 10, 15, 0.9); padding: 12px; display: flex; gap: 15px; border: 1px solid var(--rare); border-radius: 5px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
    #msg-input { flex: 1; background: transparent; border: none; color: var(--rare); outline: none; font-size: 16px; font-weight: bold; }
    .btn-send { background: var(--rare); border: none; width: 50px; height: 50px; cursor: pointer; color: #000; border-radius: 5px; }

    /* --- FOOTER --- */
    .navbar { background: #000; position: fixed; bottom: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #222; z-index: 10; }
    .brand-tag { font-size: 10px; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="space-canvas" id="stars-container"></div>

  <div class="orb-container">
    <div class="ai-orb" id="main-orb"></div>
    <div class="ask-text">ASK ME ANYTHING</div>
  </div>

  <div id="chat-box">
    </div>

  <div class="input-wrapper">
    <div class="input-container">
      <input type="text" id="msg-input" placeholder="COMMAND THE SINGULARITY..." autocomplete="off">
      <button class="btn-send" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <div class="navbar">
    <div class="brand-tag">RARE GAMING AI Ω FOUNDER: GURU PRASAD</div>
  </div>

  <script type="module">
    // Star Generator
    const starContainer = document.getElementById('stars-container');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'stars';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      starContainer.appendChild(star);
    }

    const API_KEY = "AIzaSyA__hSyOZ4AdbCjnTy4KjOSK4Pi2gbfcKQ";

    window.askAI = async function() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      appendMsg('user-msg', 'COMMANDER', text);
      input.value = '';

      const tempId = "sync-" + Date.now();
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div id="${tempId}" class="msg bot-msg"><i>Processing...</i></div>`;
      box.scrollTop = box.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "You are the Ultimate Rare AI. Be extremely smart for Guru Prasad: " + text }] }]
          })
        });

        const data = await response.json();
        if (data.candidates) {
          const reply = data.candidates[0].content.parts[0].text;
          document.getElementById(tempId).innerHTML = `<b>Rare AI:</b><br>${reply}`;
        }
      } catch (e) {
        document.getElementById(tempId).innerHTML = "Bhai, server busy hai. Main local brain se try kar raha hoon.";
      }
      box.scrollTop = box.scrollHeight;
    };

    function appendMsg(cls, sender, rel) {
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class="msg ${cls}"><b>${sender}:</b><br>${rel}</div>`;
      box.scrollTop = box.scrollHeight;
    }
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
  </script>
</body>
</html>
