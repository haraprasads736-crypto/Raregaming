<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare AI - Final Fix</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ✨ RARE GAMING STYLE UI ✨ */
    :root { --neon: #00f2fe; --bg: #050508; --card: #111116; --grey-bar: #1c1c21; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 160px; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 1rem; line-height: 1.4; animation: pop 0.3s ease; }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .bot-msg { align-self: flex-start; background: var(--card); color: #fff; border-left: 4px solid var(--neon); }
    .user-msg { align-self: flex-end; background: var(--neon); color: #000; font-weight: 600; border-bottom-right-radius: 2px; }

    .input-wrapper { position: fixed; bottom: 80px; width: 100%; padding: 0 15px; z-index: 10; }
    .input-container { background: var(--grey-bar); padding: 10px; display: flex; gap: 10px; border-radius: 20px; border: 1px solid #333; align-items: center; }
    #msg-input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding-left: 10px; }
    .btn-send { background: var(--neon); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .navbar { background: var(--grey-bar); position: fixed; bottom: 0; width: 100%; height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border-top: 1px solid var(--neon); z-index: 11; }
    .nav-tag { color: var(--neon); font-weight: 900; letter-spacing: 1px; font-size: 1.1rem; }
  </style>
</head>
<body>

  <div id="chat-box">
    <div class="msg bot-msg"><b>Rare AI:</b> System Ready! Guru Prasad bhai, ab error nahi aayega. Kuch bhi puchiye? 🤘</div>
  </div>

  <div class="input-wrapper">
    <div class="input-container">
      <input type="text" id="msg-input" placeholder="Ask Rare AI..." autocomplete="off">
      <button class="btn-send" onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <div class="navbar">
    <div class="nav-tag">RARE GAMING</div>
    <div style="font-size: 12px; color: var(--neon);"><i class="fas fa-shield-alt"></i> SECURE</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ✅ Aapka Fixed Config
    const firebaseConfig = {
      apiKey: "AIzaSyA__hSyOZ4AdbCjnTy4KjOSK4Pi2gbfcKQ", 
      authDomain: "rare-gaming-ai.firebaseapp.com",
      databaseURL: "https://rare-gaming-ai-default-rtdb.firebaseio.com",
      projectId: "rare-gaming-ai",
      storageBucket: "rare-gaming-ai.firebasestorage.app",
      messagingSenderId: "424589932393",
      appId: "1:424589932393:web:4988207761dfe49662aff8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.askAI = async function() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      appendMsg('user-msg', 'Guru', text);
      input.value = '';

      const tempId = "loading-" + Date.now();
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div id="${tempId}" class="msg bot-msg">Typing...</div>`;
      box.scrollTop = box.scrollHeight;

      try {
        // 🔥 LATEST WORKING URL & MODEL
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${firebaseConfig.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
        });

        const data = await response.json();
        
        if(data.error) {
           document.getElementById(tempId).innerHTML = "<b>Error:</b> " + data.error.message;
           return;
        }

        const aiReply = data.candidates[0].content.parts[0].text;
        document.getElementById(tempId).innerHTML = `<b>Rare AI:</b><br>${aiReply}`;
        
        // Firebase Backup
        push(ref(db, 'chats'), { user: text, ai: aiReply, time: Date.now() });

      } catch (e) {
        document.getElementById(tempId).innerHTML = "<b>System:</b> Connection fail!";
      }
      box.scrollTop = box.scrollHeight;
    };

    function appendMsg(cls, sender, txt) {
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class="msg ${cls}"><b>${sender}:</b><br>${txt}</div>`;
      box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') { askAI(); }
    });
  </script>
</body>
</html>
