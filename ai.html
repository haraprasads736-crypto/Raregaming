<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare Gaming AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { 
      --primary: #00ffcc; 
      --bg: #0f0f12; 
      --card: #1e1e26; 
      --grey-bar: #2a2a35; /* Grey Protection Bar Color */
      --text: #ffffff; 
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      overflow: hidden; 
    }

    /* 💬 CHAT BOX (Center Area) */
    #chat-box { 
      flex: 1;
      padding: 20px;
      margin-bottom: 140px; /* Space for Input + Bottom Nav */
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
    }

    .msg { 
      max-width: 85%; 
      padding: 12px 16px; 
      border-radius: 18px; 
      font-size: 0.95rem; 
      word-wrap: break-word;
    }
    
    .bot-msg { align-self: flex-start; background: var(--card); color: var(--primary); border: 1px solid #333; }
    .user-msg { align-self: flex-end; background: var(--primary); color: #000; font-weight: 500; }

    /* ⌨️ MESSAGE INPUT BOX (Ab Upar Hoga) */
    .input-container { 
      background: rgba(15, 15, 18, 0.9);
      padding: 10px 15px; 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      position: fixed; 
      bottom: 65px; /* Nav bar ke theek upar */
      left: 0;
      width: 100%; 
      z-index: 999;
      border-top: 1px solid #333;
    }

    #msg-input { 
      flex: 1; 
      background: #2a2a35; 
      border: 1px solid #444; 
      border-radius: 10px; 
      padding: 12px 15px; 
      color: white; 
      outline: none; 
    }

    .send-btn { 
      background: var(--primary); 
      border: none; 
      width: 45px; 
      height: 45px; 
      border-radius: 10px; 
      color: #000; 
      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    /* 🛡️ NAVIGATION PROTECTION BAR (Ab Niche Hoga - Grey Theme) */
    .navbar { 
      background: var(--grey-bar); 
      padding: 0 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      border-top: 2px solid var(--primary); 
      position: fixed; 
      bottom: 0; 
      left: 0;
      width: 100%; 
      height: 65px;
      z-index: 1000; 
      box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
    }

    .nav-brand { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--primary); font-size: 0.9rem; }
    .nav-user { font-size: 0.7rem; color: #bbb; text-align: right; }

    .typing { font-size: 0.8rem; color: var(--primary); position: fixed; bottom: 120px; left: 20px; display: none; }
  </style>
</head>
<body>

  <div id="chat-box">
    <div class="msg bot-msg">
      <b>Rare AI:</b> Layout Updated! Navigation niche hai aur Input uske upar. Protection active hai.
    </div>
  </div>

  <div class="typing" id="typing-indicator">AI is typing...</div>

  <div class="input-container">
    <input type="text" id="msg-input" placeholder="Enter message..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <div class="navbar">
    <div class="nav-brand">
      <i class="fas fa-shield-alt"></i>
      <span>RARE PROTECTION</span>
    </div>
    <div class="nav-user">
      <div>Rare Gaming User</div>
      <div style="color: var(--primary);"><i class="fas fa-circle"></i> Secure</div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const typingIndicator = document.getElementById('typing-indicator');

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      appendMessage('user-msg', 'You', text);
      msgInput.value = '';
      typingIndicator.style.display = 'block';
      chatBox.scrollTop = chatBox.scrollHeight;

      google.script.run
        .withSuccessHandler((response) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Rare AI', response);
        })
        .withFailureHandler(() => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Error', "Connection slow hai.");
        })
        .askGemini(text); 
    }

    function appendMessage(type, sender, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${type}`;
      msgDiv.innerHTML = `<b>${sender}:</b><br>${text}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
