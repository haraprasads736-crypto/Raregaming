<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare AI - Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --neon-blue: #00f2fe;
            --bg-dark: #030305;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #030305 70%);
            overflow: hidden;
        }

        /* HEADER */
        .ai-header {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            z-index: 10;
        }
        .ai-header i { font-size: 20px; color: var(--neon-blue); cursor: pointer; }
        .ai-header h2 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; color: #fff; }

        /* CHAT AREA */
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 120px; /* Input box ke liye jagah */
        }
        .chat-container::-webkit-scrollbar { display: none; }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-bottom-left-radius: 2px;
            color: #e0faff;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--neon-blue), #00a8ff);
            color: #000;
            font-weight: 600;
            border-bottom-right-radius: 2px;
        }

        /* TYPING INDICATOR */
        .typing {
            font-size: 12px;
            color: var(--neon-blue);
            margin-left: 20px;
            margin-bottom: 10px;
            display: none;
            font-weight: 600;
        }

        /* INPUT AREA */
        .input-wrapper {
            position: fixed;
            bottom: 48px; /* Grey bar ke upar */
            left: 0;
            width: 100%;
            padding: 15px 20px;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            gap: 10px;
            box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 100;
        }

        .input-wrapper input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            padding: 12px 18px;
            border-radius: 50px;
            color: white;
            outline: none;
            font-family: 'Poppins';
        }

        .send-btn {
            background: var(--neon-blue);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* 🌟 NAVIGATION PROTECTION BAR 🌟 */
        .system-nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 48px;
            background-color: #4f515e;
            z-index: 1001;
        }

    </style>
</head>
<body>

    <div class="ai-header">
        <i class="fas fa-arrow-left" onclick="location.href='index.html'"></i>
        <h2>RARE AI 🤖</h2>
    </div>

    <div class="chat-container" id="chatBox">
        <div class="msg ai-msg">
            <b>Rare AI:</b> Salaam Bhai! Main Rare AI hoon. Odisha ka sabse smart assistant. Free Fire ki tips chahiye ya app mein koi help? Poochiye...
        </div>
    </div>

    <div id="typingArea" class="typing">Rare AI is thinking...</div>

    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Type your question..." onkeypress="if(event.key==='Enter') sendToAI()">
        <button class="send-btn" onclick="sendToAI()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="system-nav-bar"></div>

    <script>
        // ✅ AAPKA NAYA UPDATED DEPLOY URL FIXED
        const scriptURL = "https://script.google.com/macros/s/AKfycbxf_OIovH9UIIxEA-20sagy6FVfD-X09fvTpJVA_GC1D8SNEKTVkWwdLkRe1UgkGRZJ/exec";

        async function sendToAI() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const typing = document.getElementById('typingArea');
            const question = input.value.trim();

            if (!question) return;

            // User Message Display
            chatBox.innerHTML += `<div class="msg user-msg">${question}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Show Thinking Loader
            typing.style.display = "block";

            try {
                // Sending Request to Google Script
                const response = await fetch(`${scriptURL}?action=askAI&q=${encodeURIComponent(question)}`);
                const reply = await response.text();
                
                typing.style.display = "none";
                
                // AI Response Display
                chatBox.innerHTML += `<div class="msg ai-msg"><b>Rare AI:</b> ${reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                typing.style.display = "none";
                chatBox.innerHTML += `<div class="msg ai-msg"><b>Rare AI:</b> Bhai connection error aa raha hai!</div>`;
            }
        }
    </script>
</body>
</html>
