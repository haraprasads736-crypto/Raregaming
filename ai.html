<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rare AI Chat</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 95vh; }
    h3 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin-bottom: 10px; }
    #chat { flex-grow: 1; background: #1a1a1a; padding: 15px; border-radius: 15px; overflow-y: auto; text-align: left; border: 1px solid #333; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); margin-bottom: 15px; }
    .input-area { display: flex; gap: 10px; background: #222; padding: 10px; border-radius: 50px; border: 1px solid #444; }
    input { flex-grow: 1; background: transparent; border: none; color: white; padding: 5px 15px; outline: none; font-size: 16px; }
    button { background: #00ffcc; color: black; border: none; border-radius: 50px; padding: 10px 20px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #00cca3; transform: scale(1.05); }
    .bot { color: #00ffcc; margin-bottom: 12px; background: rgba(0,255,204,0.1); padding: 8px; border-radius: 10px; border-left: 3px solid #00ffcc; }
    .user { color: #ffffff; margin-bottom: 12px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; text-align: right; border-right: 3px solid #ffffff; }
    .loading { color: #888; font-style: italic; font-size: 12px; }
  </style>
</head>
<body>
  <h3>Rare AI ⚡ <small style="font-size: 12px; color: #888;">by Haraprasad</small></h3>
  <div id="chat">
    <div class="bot">Rare AI: Namaste Haraprasad bhai! Main kaise madad kar sakta hoon?</div>
  </div>
  
  <div class="input-area">
    <input type="text" id="msg" placeholder="Kuch poochiye..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Bhejo</button>
  </div>

  <script>
    function send() {
      var m = document.getElementById("msg");
      var c = document.getElementById("chat");
      if(!m.value.trim()) return;
      
      var userMsg = m.value;
      c.innerHTML += "<div class='user'>" + userMsg + "</div>";
      var loadingId = "load-" + Date.now();
      c.innerHTML += "<div class='loading' id='"+loadingId+"'>Rare AI soch raha hai...</div>";
      c.scrollTop = c.scrollHeight;
      m.value = "";

      // ⚠️ DHAYAN DEIN: Yahan askGemini hi hona chahiye
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById(loadingId).remove();
        c.innerHTML += "<div class='bot'><b>Rare AI:</b> " + res + "</div>";
        c.scrollTop = c.scrollHeight;
      }).withFailureHandler(function(err) {
        document.getElementById(loadingId).remove();
        c.innerHTML += "<div class='bot' style='color:red;'>Error: Connection fail ho gaya.</div>";
      }).askGemini(userMsg); // <--- Ye line badli gayi hai
    }
  </script>
</body>
</html>
