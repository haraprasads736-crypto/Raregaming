<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare Gaming AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #00ffcc; --bg: #0f0f12; --card: #1e1e26; --text: #ffffff; }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
    }
    
    /* 📱 Fixed Navigation Bar */
    .navbar { 
      background: var(--card); 
      padding: 15px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      border-bottom: 2px solid #333; 
      position: fixed; 
      top: 0; 
      width: 100%; 
      z-index: 1000;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--primary); }
    .nav-user { font-size: 0.8rem; color: #888; text-align: right; }

    /* 💬 Chat Area (Adjusted for Fixed Nav) */
    #chat-box { 
      flex-grow: 1; 
      padding: 80px 15px 100px 15px; /* Top padding for Nav, Bottom for Input */
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
    }

    .msg { 
      max-width: 85%; 
      padding: 12px 15px; 
      border-radius: 18px; 
      font-size: 0.95rem; 
      line-height: 1.4; 
      animation: fadeIn 0.3s ease; 
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    .bot-msg { align-self: flex-start; background: var(--card); color: var(--primary); border-bottom-left-radius: 2px; border: 1px solid #333; }
    .user-msg { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 2px; font-weight: 500; }
    
    /* ⏳ Typing Indicator */
    .typing { font-size: 0.75rem; color: #00ffcc; margin-left: 20px; display: none; margin-bottom: 10px; }

    /* ⌨️ Bottom Fixed Input System */
    .input-container { 
      background: var(--card); 
      padding: 12px 15px; 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      border-top: 1px solid #333; 
      position: fixed; 
      bottom: 0; 
      width: 100%; 
      z-index: 1000;
    }
    #msg-input { 
      flex-grow: 1; 
      background: #2a2a35; 
      border: 1px solid #444; 
      border-radius: 25px; 
      padding: 12px 18px; 
      color: white; 
      outline: none; 
      font-size: 16px; 
    }
    .send-btn { 
      background: var(--primary); 
      border: none; 
      width: 45px; 
      height: 45px; 
      border-radius: 50%; 
      color: #000; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: 0.2s;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="nav-brand">
      <i class="fas fa-gamepad"></i>
      <span>RARE GAMING AI</span>
    </div>
    <div class="nav-user">
      <div id="username-display">Rare Gaming User</div>
      <div style="color: var(--primary); font-size: 10px;"><i class="fas fa-circle"></i> AI Online</div>
    </div>
  </div>

  <div id="chat-box">
    <div class="msg bot-msg">
      <b>Rare AI:</b> Swagat hai! Main Rare Gaming ka official AI hoon. Main aapki kya madad kar sakta hoon?
    </div>
  </div>

  <div class="typing" id="typing-indicator">Rare AI soch raha hai...</div>

  <div class="input-container">
    <input type="text" id="msg-input" placeholder="Type here..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const typingIndicator = document.getElementById('typing-indicator');

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      appendMessage('user-msg', 'You', text);
      msgInput.value = '';
      
      typingIndicator.style.display = 'block';
      window.scrollTo(0, document.body.scrollHeight);

      google.script.run
        .withSuccessHandler((response) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Rare AI', response);
        })
        .withFailureHandler((err) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Error', "Network slow hai, dubara try karein.");
        })
        .askGemini(text); 
    }

    function appendMessage(type, sender, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${type}`;
      msgDiv.innerHTML = `<b>${sender}:</b><br>${text}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
