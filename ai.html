<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare Gaming AI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #00ffcc; --bg: #0f0f12; --card: #1e1e26; --text: #ffffff; --nav-height: 70px; }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      overflow: hidden; /* Screen se bahar na jaye */
    }
    
    /* 🛡️ NAVIGATION PROTECTION BAR (Fixed at Top) */
    .navbar { 
      background: var(--card); 
      padding: 0 20px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      border-bottom: 2px solid var(--primary); 
      position: fixed; 
      top: 0; 
      left: 0;
      width: 100%; 
      height: var(--nav-height);
      z-index: 9999; /* Sabse upar rahega */
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }
    .nav-user { font-size: 0.8rem; color: #888; text-align: right; }

    /* 💬 CHAT BOX (Safety Margin Added) */
    #chat-box { 
      flex-grow: 1; 
      margin-top: var(--nav-height); /* Nav bar ke niche se shuru hoga */
      margin-bottom: 80px; /* Input bar ke liye jagah */
      padding: 20px 15px;
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 15px; 
      background: linear-gradient(to bottom, #0f0f12, #16161d);
    }

    .msg { 
      max-width: 85%; 
      padding: 12px 16px; 
      border-radius: 15px; 
      font-size: 0.95rem; 
      line-height: 1.5; 
      position: relative;
      word-wrap: break-word;
    }
    
    .bot-msg { align-self: flex-start; background: var(--card); color: var(--primary); border-top-left-radius: 2px; border: 1px solid #333; }
    .user-msg { align-self: flex-end; background: var(--primary); color: #000; border-top-right-radius: 2px; font-weight: 500; }
    
    /* ⌨️ BOTTOM INPUT PROTECTION */
    .input-container { 
      background: var(--card); 
      padding: 15px; 
      display: flex; 
      gap: 10px; 
      align-items: center; 
      position: fixed; 
      bottom: 0; 
      left: 0;
      width: 100%; 
      z-index: 9998;
      border-top: 1px solid #333;
    }

    #msg-input { 
      flex-grow: 1; 
      background: #2a2a35; 
      border: 1px solid #444; 
      border-radius: 30px; 
      padding: 12px 20px; 
      color: white; 
      outline: none; 
      font-size: 16px; 
    }

    .send-btn { 
      background: var(--primary); 
      border: none; 
      width: 50px; 
      height: 50px; 
      border-radius: 50%; 
      color: #000; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      box-shadow: 0 0 10px var(--primary);
    }

    .typing { font-size: 0.8rem; color: var(--primary); margin-left: 20px; display: none; position: fixed; bottom: 85px; z-index: 10; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="nav-brand">
      <i class="fas fa-shield-alt"></i>
      <span>RARE GAMING AI</span>
    </div>
    <div class="nav-user">
      <div>Rare Gaming User</div>
      <div style="color: var(--primary); font-size: 10px;"><i class="fas fa-circle"></i> Secure Connection</div>
    </div>
  </div>

  <div id="chat-box">
    <div class="msg bot-msg">
      <b>Rare AI:</b> System Protection Active! Nav bar fix kar diya gaya hai. Ab aap chat kar sakte hain.
    </div>
  </div>

  <div class="typing" id="typing-indicator">Rare AI is thinking...</div>

  <div class="input-container">
    <input type="text" id="msg-input" placeholder="Type your message..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const typingIndicator = document.getElementById('typing-indicator');

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      appendMessage('user-msg', 'You', text);
      msgInput.value = '';
      
      typingIndicator.style.display = 'block';
      chatBox.scrollTop = chatBox.scrollHeight;

      google.script.run
        .withSuccessHandler((response) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Rare AI', response);
        })
        .withFailureHandler((err) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Error', "Response late hai, refresh karein.");
        })
        .askGemini(text); 
    }

    function appendMessage(type, sender, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${type}`;
      msgDiv.innerHTML = `<b>${sender}:</b><br>${text}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
  </script>
</body>
</html>
