<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare AI - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --panel-color: #0a0a0f;
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
        }

        /* HEADER */
        .header { 
            padding: 20px; display: flex; align-items: center; gap: 15px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
        }
        .header i { font-size: 20px; color: var(--neon-blue); cursor: pointer; }
        .ai-info { display: flex; flex-direction: column; }
        .ai-name { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 1px; }
        .ai-status { font-size: 10px; color: #00ff00; display: flex; align-items: center; gap: 5px; }
        .ai-status::before { content: ''; width: 6px; height: 6px; background: #00ff00; border-radius: 50%; display: inline-block; box-shadow: 0 0 5px #00ff00; }

        /* CHAT AREA */
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            background-image: radial-gradient(circle at center, #111 0%, #030305 100%);
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; }
        
        .user-msg { 
            align-self: flex-end; background: linear-gradient(135deg, var(--neon-blue), #00a8ff); 
            color: #000; font-weight: 600; border-bottom-right-radius: 2px;
        }

        .ai-msg { 
            align-self: flex-start; background: #1a1a2e; color: #eee; 
            border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 2px;
        }

        /* LOADING ANIMATION */
        .typing { font-size: 12px; color: var(--neon-blue); margin-left: 5px; display: none; }

        /* INPUT AREA */
        .input-area { 
            padding: 20px; background: #0a0a0f; border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        input { 
            flex: 1; background: #1a1a2e; border: 1px solid rgba(0, 242, 254, 0.3); 
            padding: 12px 18px; border-radius: 50px; color: white; outline: none; font-family: inherit;
        }
        .send-btn { 
            background: var(--neon-blue); border: none; width: 45px; height: 45px; 
            border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="location.href='index.html'"></i>
        <div class="ai-info">
            <span class="ai-name">RARE AI 🤖</span>
            <span class="ai-status">Online & Ready to Assist</span>
        </div>
    </div>

    <div id="chatBox">
        <div class="msg ai-msg">Namaste Bhai! Main Rare AI hoon. Free Fire ki tips chahiye ya app mein koi help? Pooch lo! 🔥</div>
    </div>

    <div id="typingIndicator" class="typing" style="padding-left: 20px; margin-bottom: 10px;">Rare AI is thinking...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything about Free Fire..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <script>
        // ✅ AAPKA NAYA DEPLOY URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbwAG7grJdIMIl0ONqkfUGK0saY8gndcCuno06BVccjWp1l6jT0fP12DHEWTQmBOrnqMDQ/exec";

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const typing = document.getElementById('typingIndicator');
            const question = input.value.trim();

            if (!question) return;

            // User Message dikhao
            chatBox.innerHTML += `<div class="msg user-msg">${question}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loader dikhao
            typing.style.display = 'block';

            try {
                const response = await fetch(`${scriptURL}?action=askAI&q=${encodeURIComponent(question)}`);
                const reply = await response.text();

                // AI Message dikhao
                chatBox.innerHTML += `<div class="msg ai-msg">${reply}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="msg ai-msg">Bhai server down lag raha hai, thodi der mein try kar.</div>`;
            }

            typing.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
