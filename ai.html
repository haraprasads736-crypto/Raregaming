<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rare AI - REALITY BENDER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --neon: #00f2fe; --bg: #000; --rare: #00ffcc; --gemini: #8e55ff; --gold: #ffd700; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    
    body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #0a0212 0%, #000 100%); }

    /* The Reality Bender Orb */
    .orb-container { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; }
    .ai-orb {
      width: 300px; height: 300px;
      background: conic-gradient(from 0deg, #ff0055, var(--gemini), var(--rare), #ff0055);
      border-radius: 50%; filter: blur(100px);
      animation: realityShift 5s infinite alternate, rotate 10s infinite linear;
      opacity: 0.6;
    }
    @keyframes realityShift { 0% { transform: scale(1); filter: blur(100px) hue-rotate(0deg); } 100% { transform: scale(1.5); filter: blur(120px) hue-rotate(360deg); } }
    @keyframes rotate { from { rotate: 0deg; } to { rotate: 360deg; } }

    #chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 180px; z-index: 1; }
    .msg { max-width: 90%; padding: 20px; border-radius: 15px; backdrop-filter: blur(30px); background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); animation: emerge 0.5s ease-out; }
    @keyframes emerge { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .bot-msg { align-self: flex-start; border-left: 4px solid var(--gold); }
    .user-msg { align-self: flex-end; background: linear-gradient(135deg, #111, #000); border-right: 4px solid var(--rare); }

    .input-wrapper { position: fixed; bottom: 85px; width: 100%; padding: 0 15px; z-index: 10; }
    .input-container { background: rgba(5, 5, 5, 0.95); padding: 15px; display: flex; gap: 15px; border-radius: 12px; align-items: center; border: 1px solid var(--gold); box-shadow: 0 0 25px rgba(255, 215, 0, 0.2); }
    #msg-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
    .btn-send { background: var(--gold); color: #000; border: none; width: 50px; height: 50px; border-radius: 8px; cursor: pointer; font-weight: bold; }

    .navbar { background: #000; position: fixed; bottom: 0; width: 100%; height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-top: 1px solid #222; z-index: 10; }
    .brand { font-weight: 900; font-size: 14px; color: var(--gold); letter-spacing: 2px; }
    .motto { font-size: 9px; color: #555; text-transform: uppercase; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="orb-container"><div class="ai-orb" id="main-orb"></div></div>

  <div id="chat-box">
    <div class="msg bot-msg">
      <b style="color:var(--gold)">[ REALITY_BENDER_CORE_v15 ]</b> <br>
      Commander <b>Guru Prasad</b>. <br>
      Mera mission clear hai: <b>Har "Na-Mumkin" ko "Munkin" banana.</b> 🤘👑
    </div>
  </div>

  <div class="input-wrapper">
    <div class="input-container">
      <input type="text" id="msg-input" placeholder="Challenge me with the impossible..." autocomplete="off">
      <button class="btn-send" onclick="askAI()"><i class="fas fa-magic"></i></button>
    </div>
  </div>

  <div class="navbar">
    <div>
      <div class="brand">RARE GAMING AI</div>
      <div class="motto">MAKING IMPOSSIBLE POSSIBLE</div>
    </div>
    <div style="text-align: right;">
      <div style="font-weight: bold; font-size: 10px; color: var(--gemini);">POWERED BY GEMINI PRO</div>
      <div style="font-size: 9px; color: #444;">BENDER CLASS</div>
    </div>
  </div>

  <script type="module">
    const API_KEY = "AIzaSyA__hSyOZ4AdbCjnTy4KjOSK4Pi2gbfcKQ";

    window.askAI = async function() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      const orb = document.getElementById('main-orb');
      if (!text) return;

      appendMsg('user-msg', 'Rare Gaming', text);
      input.value = '';

      orb.style.animation = "realityShift 0.3s infinite alternate, rotate 1s infinite linear";
      
      const tempId = "bender-" + Date.now();
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div id="${tempId}" class="msg bot-msg"><i>Bending reality...</i></div>`;
      box.scrollTop = box.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-pro:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "You are Rare AI Reality Bender. Your goal is to show Guru Prasad how any 'impossible' task can be made 'possible'. If the user asks something difficult, give a highly optimistic and practical solution. Query: " + text }] }]
          })
        });

        const data = await response.json();
        if (data.candidates) {
          const reply = data.candidates[0].content.parts[0].text;
          document.getElementById(tempId).innerHTML = `<b style="color:var(--gold)">Bender Result:</b><br>${reply}`;
        }
      } catch (e) {
        document.getElementById(tempId).innerHTML = "Bhai, servers busy hain par Rare AI ka dimaag hamesha munkin raaste nikalta hai!";
      }

      orb.style.animation = "realityShift 5s infinite alternate, rotate 10s infinite linear";
      box.scrollTop = box.scrollHeight;
    };

    function appendMsg(cls, sender, rel) {
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class="msg ${cls}"><b>${sender}:</b><br>${rel}</div>`;
      box.scrollTop = box.scrollHeight;
    }
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
  </script>
</body>
</html>
