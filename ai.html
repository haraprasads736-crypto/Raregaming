<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rare AI Advance</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #00ffcc; --bg: #0f0f12; --card: #1e1e26; --text: #ffffff; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* 📱 Navigation Bar */
    .navbar { background: var(--card); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.2rem; color: var(--primary); }
    .nav-brand i { font-size: 1.5rem; }
    .nav-user { font-size: 0.8rem; color: #888; text-align: right; }

    /* 💬 Chat Area */
    #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
    .msg { max-width: 80%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; position: relative; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .bot-msg { align-self: flex-start; background: var(--card); border-bottom-left-radius: 2px; border: 1px solid #333; color: var(--primary); }
    .user-msg { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 2px; font-weight: 500; }
    
    /* ⌨️ Input System */
    .input-container { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
    #msg-input { flex-grow: 1; background: #2a2a35; border: 1px solid #444; border-radius: 25px; padding: 12px 20px; color: white; outline: none; transition: 0.3s; }
    #msg-input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }
    .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
    .send-btn:hover { transform: scale(1.1) rotate(-10deg); }

    /* ⏳ Typing Indicator */
    .typing { font-size: 0.8rem; color: #888; margin-left: 10px; display: none; }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="nav-brand">
      <i class="fas fa-robot"></i>
      <span>RARE AI <small style="font-size: 10px; color: white;">v6.0</small></span>
    </div>
    <div class="nav-user">
      <div>Haraprasad Sahoo</div>
      <div style="color: var(--primary);"><i class="fas fa-circle" style="font-size: 8px;"></i> Online</div>
    </div>
  </div>

  <div id="chat-box">
    <div class="msg bot-msg">
      <strong>Rare AI:</strong> Namaste Haraprasad bhai! Rare Gaming app mein aapka swagat hai. Main aapki kya madad kar sakta hoon?
    </div>
  </div>

  <div class="typing" id="typing-indicator">Rare AI soch raha hai...</div>

  <div class="input-container">
    <input type="text" id="msg-input" placeholder="Yahan likhiye..." autocomplete="off">
    <button class="send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const typingIndicator = document.getElementById('typing-indicator');

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;

      // User Message Add
      appendMessage('user-msg', 'Aap', text);
      msgInput.value = '';
      
      // Show Typing
      typingIndicator.style.display = 'block';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Call Google Script
      google.script.run
        .withSuccessHandler((response) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Rare AI', response);
        })
        .withFailureHandler((err) => {
          typingIndicator.style.display = 'none';
          appendMessage('bot-msg', 'Error', "Server se connection toot gaya!");
        })
        .askGemini(text); // Check: Code.gs mein function name askGemini hona chahiye
    }

    function appendMessage(type, sender, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `msg ${type}`;
      msgDiv.innerHTML = `<strong>${sender}:</strong><br>${text}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Enter Key Support
    msgInput.addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
