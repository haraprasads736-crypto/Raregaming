<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wallet - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        .header-top { padding: 15px; text-align: center; }
        .brand-name { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #fff; }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(255,0,122,0.1), rgba(122,0,255,0.1));
            border: 1.5px solid #ff007a; border-radius: 15px;
            margin: 0 20px 15px 20px; padding: 20px; text-align: center;
        }
        .bal-label { font-size: 10px; font-weight: 800; color: #888; }
        .bal-amount { font-size: 35px; font-weight: 800; color: #fff; }

        .wallet-panel { 
            background: #111116; border-radius: 12px; padding: 15px; 
            border: 1px solid #1f1f25; margin: 0 20px 15px 20px; 
        }
        .panel-title { font-size: 13px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        input { 
            width: 100%; padding: 10px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 12px;
        }
        
        .btn-action { 
            width: 100%; padding: 10px; border: none; border-radius: 8px; 
            font-size: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        .btn-yellow { background: #ffd700; color: #000; }
        .btn-blue { background: #00f2fe; color: #000; }
        
        /* 🔥 CHOTA QR & BUTTON 🔥 */
        .qr-img { width: 110px; height: 110px; border-radius: 8px; border: 3px solid #fff; margin: 5px 0; }
        .btn-wa-small { 
            background: #25d366; color: #fff; text-decoration: none; display: inline-flex; 
            align-items: center; justify-content: center; gap: 5px; 
            padding: 8px 15px; width: auto; min-width: 160px; font-size: 11px;
        }

        /* NAVIGATION SYSTEM */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 22px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 54px; height: 54px; background: #ffffff; border-radius: 15px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE WALLET</div>
    </div>

    <div class="balance-card">
        <div class="bal-label">BALANCE</div>
        <div class="bal-amount" id="mainBal">₹...</div>
    </div>

    <div class="wallet-panel" style="border: 1.5px dashed #ffd700; text-align: center; padding: 12px;">
        <div class="panel-title" style="color:#ffd700; justify-content: center; margin-bottom: 5px;"><i class="fas fa-university"></i> DEPOSIT</div>
        <p style="font-size: 10px; color: #888; margin-bottom: 5px;">Scan & send screenshot</p>
        
        <img src="my_qr.jpg" class="qr-img" alt="QR">
        <br>
        <a href="https://wa.me/917008170291?text=Bhai, payment done. Add balance." class="btn-action btn-wa-small">
            <i class="fab fa-whatsapp"></i> SEND SCREENSHOT
        </a>
    </div>

    <div class="wallet-panel">
        <div class="panel-title" style="color:#00f2fe;"><i class="fas fa-money-bill-wave"></i> WITHDRAW</div>
        <input type="number" id="witAmt" placeholder="Amount">
        <input type="text" id="witUpi" placeholder="UPI ID">
        <button class="btn-action btn-blue" id="btnWithdraw" onclick="withdraw()">WITHDRAW</button>
    </div>

    <div class="wallet-panel">
        <div class="panel-title" style="color:#ffd700;"><i class="fas fa-gift"></i> REDEEM CODE</div>
        <input type="text" id="promoCode" placeholder="Enter Promo Code">
        <button class="btn-action btn-yellow" onclick="redeem()">REDEEM</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwND_rIFJw-9MwiRGhOP0_j4mauz8ICSro5e3GbNpWfUW9zDGEHFS8VHeB5Ac35IWQMDw/exec";

        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(user))
            .then(res => res.text()).then(bal => {
                document.getElementById('mainBal').innerText = "₹" + bal;
            });
        }

        function withdraw() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            let amt = Number(document.getElementById('witAmt').value);
            let upi = document.getElementById('witUpi').value.trim();
            let currentBal = Number(document.getElementById('mainBal').innerText.replace('₹', ''));

            if(!amt || !upi) return alert("Fill details!");
            if(amt < 50) return alert("Min ₹50!");
            if(amt > currentBal) return alert("No Balance!");

            fetch(scriptURL + "?action=withdraw&username="+encodeURIComponent(user)+"&amount="+amt+"&upi="+encodeURIComponent(upi), {method:'POST', mode:'no-cors'})
            .then(() => { alert("Sent!"); location.reload(); });
        }

        function redeem() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            let code = document.getElementById('promoCode').value;
            fetch(scriptURL + "?action=redeem&username="+encodeURIComponent(user)+"&code="+encodeURIComponent(code), {method:'POST', mode:'no-cors'})
            .then(() => { alert("Done!"); location.reload(); });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
