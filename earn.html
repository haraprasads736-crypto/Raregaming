<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Earn & Wallet - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
            padding-bottom: 140px; 
        }

        /* Top Header */
        .header-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-name { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Main Balance Card */
        .balance-card {
            background: linear-gradient(135deg, rgba(255,0,122,0.1), rgba(122,0,255,0.1));
            border: 1.5px solid #ff007a;
            border-radius: 20px;
            margin: 0 20px 25px 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,122,0.15);
        }
        .bal-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; }
        .bal-amount { font-size: 45px; font-weight: 800; color: #fff; margin: 5px 0; }

        /* Wallet Sections */
        .wallet-panel { 
            background: #111116; border-radius: 15px; padding: 20px; 
            border: 1px solid #1f1f25; margin: 0 20px 20px 20px; 
        }
        .panel-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; color: #ffd700; }
        .panel-title.pink { color: #00f2fe; }
        
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; 
            font-family: 'Poppins'; font-size: 13px;
        }
        
        .btn-action { 
            width: 100%; padding: 14px; color: #000; border: none; border-radius: 10px; 
            font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .btn-yellow { background: #ffd700; }
        .btn-blue { background: #00f2fe; }

        /* 🔥 NAVIGATION SYSTEM 🔥 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; color: #666; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">WALLET</div>
    </div>

    <div class="balance-card">
        <div class="bal-label">Total Balance</div>
        <div class="bal-amount" id="mainBal">₹...</div>
    </div>

    <div class="wallet-panel">
        <div class="panel-title"><i class="fas fa-gift"></i> REDEEM PROMO CODE</div>
        <input type="text" id="promoCode" placeholder="Enter Promo Code">
        <button class="btn-action btn-yellow" onclick="redeem()">REDEEM CODE</button>
    </div>

    <div class="wallet-panel">
        <div class="panel-title pink"><i class="fas fa-money-bill-wave"></i> WITHDRAW WINNINGS</div>
        <input type="number" id="witAmt" placeholder="Amount (Min ₹50)">
        <input type="text" id="witUpi" placeholder="UPI ID (e.g. name@upi)">
        <button class="btn-action btn-blue" id="btnWithdraw" onclick="withdraw()">REQUEST WITHDRAW</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyxyEAjkJ1iHvxrv-OQbx_W0m3czutHE5ufhunAn1CkF1KtQ9X_7G58kxfJSBFLOe9WjQ/exec";

        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(user))
            .then(res => res.text()).then(bal => {
                document.getElementById('mainBal').innerText = "₹" + bal;
            });
        }

        function redeem() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            let code = document.getElementById('promoCode').value.trim();
            if(!code) return alert("Bhai, pehle code toh daalo!");

            fetch(scriptURL + "?action=redeem&username="+encodeURIComponent(user)+"&code="+encodeURIComponent(code), {method:'POST', mode:'no-cors'})
            .then(() => { alert("Request Sent! Refreshing..."); location.reload(); });
        }

        function withdraw() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            
            let amt = Number(document.getElementById('witAmt').value);
            let upi = document.getElementById('witUpi').value.trim();
            
            // 🔥 SECURITY CHECK: Paisa hai ya nahi?
            let currentBalText = document.getElementById('mainBal').innerText;
            let currentBal = Number(currentBalText.replace('₹', ''));

            if(!amt || !upi) return alert("Sari details bharo!");
            if(amt < 50) return alert("Minimum withdrawal ₹50 hai!");
            
            if(amt > currentBal) {
                alert("❌ Error: Aapke paas utne paise nahi hain jitne aap withdraw kar rahe ho!");
                return;
            }

            const btn = document.getElementById('btnWithdraw');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            fetch(scriptURL + "?action=withdraw&username="+encodeURIComponent(user)+"&amount="+amt+"&upi="+encodeURIComponent(upi), {method:'POST', mode:'no-cors'})
            .then(() => { 
                alert("✅ Withdrawal Success! Paise cut gaye hain."); 
                location.reload(); 
            });
        }

        window.onload = syncBalance;
    </script>
</body>
</html>
