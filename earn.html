<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wallet - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; padding-bottom: 110px; }
        
        .header { padding: 15px; text-align: center; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; letter-spacing: 1px; }
        
        .container { padding: 15px; max-width: 450px; margin: auto; text-align: center; }
        
        /* 💳 WALLET CARD */
        .wallet-card { background: linear-gradient(135deg, #111 0%, #050508 100%); border: 1px solid #00f2fe; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,242,254,0.1); }
        .bal-title { font-size: 12px; color: #a0aab2; text-transform: uppercase; font-weight: 600; }
        .bal-amount { font-size: 45px; font-weight: 800; color: #00f2fe; margin: 10px 0; }

        /* 🔘 TAB SYSTEM */
        .tab-box { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #555; font-weight: 800; cursor: pointer; border-radius: 10px; transition: 0.3s; font-size: 12px; }
        .tab-btn.active { background: #ff007a; color: white; }

        /* FORMS */
        .form-section { display: none; text-align: left; animation: fadeIn 0.3s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; font-size: 10px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; padding-left: 5px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 20px; box-sizing: border-box; font-family: 'Poppins'; }
        
        .action-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 14px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-withdraw { background: linear-gradient(90deg, #ff007a, #7a00ff); color: white; }

        /* 📷 QR AREA (Size Chhota Kiya) */
        .qr-area { background: white; width: 130px; height: 130px; margin: 0 auto 15px auto; border-radius: 15px; padding: 8px; box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .qr-area img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
        .scan-text { font-size: 10px; color: #a0aab2; text-align: center; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; }

        /* 📱 WHATSAPP BUTTON */
        .wa-btn { display: block; width: 100%; background: #25D366; color: white; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; text-decoration: none; font-size: 13px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }
        .wa-btn i { font-size: 18px; margin-right: 8px; vertical-align: middle; }

        /* 🎁 REDEEM CODE BOX */
        .redeem-box { background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.3); padding: 15px; border-radius: 15px; margin-top: 10px; }
        .redeem-flex { display: flex; gap: 10px; }
        .redeem-flex input { margin-bottom: 0; }
        .btn-redeem { background: #ffd700; color: #000; padding: 0 20px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

        /* 🔥 CLEAN BOTTOM NAV BAR 🔥 */
        .bottom-nav-container { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; background: #000; }
        .bottom-nav { position: relative; display: flex; justify-content: space-around; align-items: center; height: 75px; padding-bottom: 12px; background: #000; border-top: 1.5px solid rgba(255, 0, 122, 0.3); }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; position: relative; z-index: 2; flex: 1; transition: 0.3s; }
        .nav-item .nav-icon { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: white; }
        .nav-item.active::before { content: ''; position: absolute; top: -4px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 50px; height: 50px; background: linear-gradient(135deg, #ff007a 0%, #7a00ff 100%); border-radius: 12px; z-index: -1; box-shadow: 0 0 15px rgba(255,0,122,0.5); }
    </style>
</head>
<body>

    <div class="header">WALLET & EARNINGS</div>

    <div class="container">
        <div class="wallet-card">
            <div class="bal-title">Your Balance</div>
            <div class="bal-amount" id="mainBal">₹0</div>
        </div>

        <div class="tab-box">
            <button class="tab-btn active" onclick="openTab('add')">ADD MONEY</button>
            <button class="tab-btn" onclick="openTab('withdraw')">WITHDRAW</button>
        </div>

        <div id="addSection" class="form-section active">
            
            <div class="qr-area">
                <img src="my_qr.jpg" alt="Scan to Pay">
            </div>
            <div class="scan-text">Scan to Pay & Take Screenshot</div>
            
            <a href="https://wa.me/917008170291?text=Hello Admin, I have paid money. Here is my screenshot:" target="_blank" class="wa-btn">
                <i class="fab fa-whatsapp"></i> SEND SCREENSHOT ON WHATSAPP
            </a>

            <div class="redeem-box">
                <label style="color: #ffd700;">HAVE A REDEEM CODE?</label>
                <div class="redeem-flex">
                    <input type="text" id="promoCode" placeholder="Enter Code">
                    <button class="btn-redeem" onclick="redeemCode()">REDEEM</button>
                </div>
            </div>

        </div>

        <div id="withdrawSection" class="form-section">
            <label>Withdraw Amount</label>
            <input type="number" id="witAmt" placeholder="Minimum ₹50">
            
            <label>Your UPI ID / Number</label>
            <input type="text" id="witUpi" placeholder="example@upi">
            
            <button class="action-btn btn-withdraw" onclick="submitWithdraw()">REQUEST WITHDRAW</button>
        </div>
    </div>

    <div class="bottom-nav-container">
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fas fa-home nav-icon"></i>
                <span>HOME</span>
            </a>
            <a href="earn.html" class="nav-item active">
                <i class="fas fa-wallet nav-icon"></i>
                <span>EARN</span>
            </a>
            <a href="winners.html" class="nav-item">
                <i class="fas fa-crown nav-icon"></i>
                <span>WINNERS</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fas fa-user-circle nav-icon"></i>
                <span>PROFILE</span>
            </a>
        </nav>
    </div>

    <script>
        // Set Initial Balance
        document.getElementById('mainBal').innerText = "₹" + (localStorage.getItem("rareWallet") || 0);

        // Tab Switching Logic
        function openTab(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if(type === 'add') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('addSection').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('withdrawSection').classList.add('active');
            }
        }

        // Withdraw Request
        function submitWithdraw() {
            const amt = document.getElementById('witAmt').value;
            const upi = document.getElementById('witUpi').value;
            if(amt < 50) return alert("Minimum ₹50 required for withdraw!");
            if(!upi) return alert("UPI ID enter karo bhai!");
            alert("Withdraw request sent for ₹" + amt);
        }

        // Redeem Code Logic
        function redeemCode() {
            const code = document.getElementById('promoCode').value;
            if(!code) return alert("Pehle code toh daalo!");
            // Demo logic: Agar player "WELCOME50" dalta hai toh ₹50 mil jayenge
            if(code.toUpperCase() === "WELCOME50") {
                let current = parseInt(localStorage.getItem("rareWallet") || 0);
                localStorage.setItem("rareWallet", current + 50);
                document.getElementById('mainBal').innerText = "₹" + (current + 50);
                alert("🎉 Boom! ₹50 Added to your wallet!");
                document.getElementById('promoCode').value = ''; // Input clear karna
            } else {
                alert("❌ Invalid or Expired Code!");
            }
        }
    </script>
</body>
</html>
