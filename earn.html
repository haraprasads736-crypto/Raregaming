<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Earn & Wallet - RARE GAMING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --rare-gold: #ffd700;
            --transfer-green: #39ff14;
            --panel-color: #0a0a0f;
        }

        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; 
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }
        
        .header-top { padding: 30px 20px; text-align: center; color: var(--rare-gold); font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        /* Balance Cards */
        .balance-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 20px 20px; }
        .bal-card { background: var(--panel-color); border: 1.5px solid var(--rare-gold); border-radius: 20px; padding: 18px; text-align: center; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.05); }
        .bal-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .bal-amount { font-size: 22px; font-weight: 800; margin-top: 5px; }

        .wallet-panel { background: var(--panel-color); border-radius: 20px; padding: 20px; border: 1px solid #1f1f25; margin: 0 20px 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .panel-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #2a2a30; color: #fff; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-family: 'Poppins'; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 254, 0.1); }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-blue { background: var(--neon-blue); color: #000; }
        .btn-yellow { background: var(--rare-gold); color: #000; }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 🟢 NAVIGATION SYSTEM (As remembered from index.html) */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }
        
        .center-btn .icon-circle { width: 55px; height: 55px; background: var(--transfer-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-color); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); margin-top: -35px; }
        .center-btn i { color: #000 !important; font-size: 22px; }
        
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">RARE EARN</div>

    <div class="balance-container">
        <div class="bal-card">
            <div class="bal-label">Main Wallet</div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <div class="bal-amount" id="mainBal">₹0</div>
                <div onclick="window.location.href='payment.html'" style="background: var(--transfer-green); color: black; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 5px;">
                    <i class="fas fa-plus"></i>
                </div>
            </div>
        </div>
        <div class="bal-card" style="border-color: var(--rare-gold);">
            <div class="bal-label">Rare Coins</div>
            <div class="bal-amount" id="rareCoins" style="color: var(--rare-gold);">0</div>
        </div>
    </div>

    <div class="wallet-panel">
        <div class="panel-title" style="color:var(--neon-blue);"><i class="fas fa-money-bill-wave"></i> Withdraw Cash</div>
        <input type="number" id="witAmt" placeholder="Amount (Min ₹50)">
        <input type="text" id="witUpi" placeholder="UPI ID (e.g. name@upi)">
        <button class="btn-action btn-blue" id="btnWithdraw" onclick="withdraw()">Withdraw Now</button>
    </div>

    <div class="wallet-panel" style="border: 1px solid var(--rare-gold);">
        <div class="panel-title" style="color:var(--rare-gold);"><i class="fas fa-coins"></i> Redeem Coins</div>
        <p style="font-size: 11px; color: #888; margin-top: -5px;">100 Rare Coins = ₹2 Cash</p>
        <button class="btn-action btn-yellow" id="btnRedeem" onclick="redeemCoins()">Redeem 100 Coins</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>
        <a href="refer.html" class="nav-item"><i class="fas fa-gift"></i><span>REFER</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if (!userData) window.location.href = "login.html";

        function startLiveSync() {
            database.ref('players/' + userData.uid).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('mainBal').innerText = "₹" + (data.cash || 0);
                    document.getElementById('rareCoins').innerText = (data.coins || 0);
                    userData.cash = data.cash;
                    userData.coins = data.coins;
                    localStorage.setItem("rareGamingUser", JSON.stringify(userData));
                }
            });
        }

        async function withdraw() {
            let amt = parseInt(document.getElementById('witAmt').value);
            let upi = document.getElementById('witUpi').value;
            let btn = document.getElementById('btnWithdraw');

            if(!amt || !upi) return alert("Bhai, saari details bhariye!");
            if(amt < 50) return alert("Minimum ₹50 withdraw kar sakte ho!");

            // Live balance check
            const snapshot = await database.ref('players/' + userData.uid + '/cash').get();
            const currentCash = snapshot.val() || 0;

            if (currentCash < amt) return alert("Balance kam hai bhai!");

            btn.innerText = "WAITING..."; btn.disabled = true;

            // 1. Pehle user ka balance kam karo (Security)
            await database.ref('players/' + userData.uid).update({ cash: currentCash - amt });

            // 2. Withdrawal request bhej do
            const withdrawalData = {
                userId: userData.uid,
                userName: userData.name || "Unknown",
                amount: amt,
                upi: upi,
                timestamp: Date.now()
            };

            try {
                await database.ref('withdrawals').push(withdrawalData);
                alert("Request Sent! Admin paise bhejte hi status update kar dega.");
            } catch (e) {
                // Agar fail hua toh balance wapas kar do
                await database.ref('players/' + userData.uid).update({ cash: currentCash });
                alert("Error! Please try again.");
            } finally {
                btn.innerText = "Withdraw Now"; btn.disabled = false;
                document.getElementById('witAmt').value = ""; document.getElementById('witUpi').value = "";
            }
        }

        async function redeemCoins() {
            const playerRef = database.ref('players/' + userData.uid);
            const snapshot = await playerRef.get();
            const data = snapshot.val();
            const currentCoins = data.coins || 0;
            const currentCash = data.cash || 0;

            if(currentCoins < 100) return alert("Minimum 100 Coins chahiye!");

            let btn = document.getElementById('btnRedeem');
            btn.innerText = "WAIT..."; btn.disabled = true;

            try {
                await playerRef.update({
                    coins: currentCoins - 100,
                    cash: currentCash + 2
                });
                alert("Coins Redeemed! ₹2 Cash added.");
            } catch (e) {
                alert("Technical Issue!");
            } finally {
                btn.innerText = "Redeem 100 Coins"; btn.disabled = false;
            }
        }

        window.onload = startLiveSync;
    </script>
</body>
</html>
