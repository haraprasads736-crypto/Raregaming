<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Earn & Wallet - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --rare-gold: #ffd700;
            --transfer-green: #39ff14;
        }

        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; 
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }
        
        .header-top { padding: 25px 20px; text-align: center; color: var(--rare-gold); font-weight: 800; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }

        /* Balance Cards */
        .balance-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 0 20px 20px 20px; }
        .bal-card { background: #0a0a0f; border: 1.5px solid var(--rare-gold); border-radius: 20px; padding: 18px; text-align: center; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.05); }
        .bal-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .bal-amount { font-size: 22px; font-weight: 800; margin-top: 5px; }

        .wallet-panel { background: #0a0a0f; border-radius: 20px; padding: 20px; border: 1px solid #1f1f25; margin: 0 20px 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .panel-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #2a2a30; color: #fff; border-radius: 12px; margin-bottom: 12px; box-sizing: border-box; font-family: 'Poppins'; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 242, 254, 0.1); }
        
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-blue { background: var(--neon-blue); color: #000; }
        .btn-yellow { background: var(--rare-gold); color: #000; }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }

        /* 🌟 NAVIGATION BAR SYSTEM 🌟 */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; border-radius: 20px 20px 0 0;
        }

        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; font-weight: 700; 
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }

        .center-btn .icon-circle { 
            width: 55px; height: 55px; background: var(--transfer-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid #050508; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); 
            margin-top: -35px;
        }
        .center-btn i { color: #000 !important; font-size: 22px; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">RARE EARN</div>

    <div class="balance-container">
        <div class="bal-card">
            <div class="bal-label">Main Wallet</div>
            <div class="bal-amount" id="mainBal">₹0</div>
        </div>
        <div class="bal-card" style="border-color: var(--rare-gold);">
            <div class="bal-label">Rare Coins</div>
            <div class="bal-amount" id="rareCoins" style="color: var(--rare-gold);">0</div>
        </div>
    </div>

    <div class="wallet-panel">
        <div class="panel-title" style="color:var(--neon-blue);"><i class="fas fa-money-bill-wave"></i> Withdraw Cash</div>
        <input type="number" id="witAmt" placeholder="Amount (Min ₹50)">
        <input type="text" id="witUpi" placeholder="UPI ID (e.g. name@upi)">
        <button class="btn-action btn-blue" id="btnWithdraw" onclick="withdraw()">Withdraw Now</button>
    </div>

    <div class="wallet-panel" style="border: 1px solid var(--rare-gold);">
        <div class="panel-title" style="color:var(--rare-gold);"><i class="fas fa-coins"></i> Redeem Coins</div>
        <p style="font-size: 11px; color: #888; margin-top: -5px;">100 Rare Coins = ₹2 Cash</p>
        <button class="btn-action btn-yellow" id="btnRedeem" onclick="redeemCoins()">Redeem 100 Coins</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    
    <div class="system-nav-bar"></div>

    <script>
        // 🔒 SMART SECURITY: Bina login ke entry band
        (function() {
            if (!localStorage.getItem("rareGamingUser")) {
                window.location.href = "login.html";
            }
        })();

        // ✅ NAYA DEPLOY URL CONNECTED
        const scriptURL = "https://script.google.com/macros/s/AKfycbyRd0GE6nGsyE8L_zKol6aIVt6DRoQ3E-FHGlix4REgY3II9eWPYgBFADafIuz8HZZHDA/exec";
        
        let userData = JSON.parse(localStorage.getItem("rareGamingUser"));

        async function sync() {
            if(!userData) return;

            const userId = userData.uid;

            try {
                const response = await fetch(`${scriptURL}?action=getBalance&userId=${userId}`);
                const data = await response.json();
                
                if(data && data.balance !== undefined) {
                    document.getElementById('mainBal').innerText = "₹" + data.balance;
                    document.getElementById('rareCoins').innerText = data.coins || 0;
                    
                    userData.balance = data.balance;
                    localStorage.setItem("rareGamingUser", JSON.stringify(userData));
                }
            } catch (e) {
                console.log("Sync Error");
            }
        }

        async function withdraw() {
            let amt = document.getElementById('witAmt').value;
            let upi = document.getElementById('witUpi').value;
            const userId = userData.uid;

            if(!amt || !upi) return alert("Pura detail bharo bhai!");
            if(amt < 50) return alert("Minimum ₹50 withdraw kar sakte ho!");

            let btn = document.getElementById('btnWithdraw');
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: new URLSearchParams({
                        'action': 'withdraw',
                        'userId': userId,
                        'amount': amt,
                        'upi': upi
                    })
                });
                
                const result = await response.text();
                alert(result === "Success" ? "Withdrawal Request Sent!" : result);
                sync();
            } catch (e) {
                alert("Server Error!");
            } finally {
                btn.innerText = "Withdraw Now"; btn.disabled = false;
                document.getElementById('witAmt').value = ""; 
                document.getElementById('witUpi').value = "";
            }
        }

        async function redeemCoins() {
            const userId = userData.uid;
            let btn = document.getElementById('btnRedeem');
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            try {
                const response = await fetch(`${scriptURL}`, {
                    method: 'POST',
                    body: new URLSearchParams({
                        'action': 'redeemCoins',
                        'userId': userId
                    })
                });
                const result = await response.text();
                alert(result);
                sync();
            } catch (e) {
                alert("Redeem Failed!");
            } finally {
                btn.innerText = "Redeem 100 Coins"; btn.disabled = false;
            }
        }

        window.onload = sync;
        setInterval(sync, 20000);
    </script>
</body>
</html>
