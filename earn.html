<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn - Rare Gaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; padding-bottom: 100px; }
        .box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #050508; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-family: 'Poppins'; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-redeem { background: #ffd700; color: black; }
        .btn-withdraw { background: linear-gradient(90deg, #ff007a, #7a00ff); color: white; }
        .nav-wrapper { position: fixed; bottom: 0; left:0; width: 100%; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; flex: 1; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>
    <h2 style="text-align: center; font-weight: 800;">WALLET</h2>
    
    <div class="box">
        <label style="font-size: 12px; color: #ffd700; font-weight: 800;">PROMO CODE</label>
        <input type="text" id="promoCode" placeholder="Enter Code (e.g. WELCOME50)">
        <button class="btn btn-redeem" onclick="handleRedeem()">REDEEM CODE</button>
    </div>

    <div class="box">
        <label style="font-size: 12px; color: #ff007a; font-weight: 800;">WITHDRAW MONEY</label>
        <input type="number" id="witAmt" placeholder="Min ₹50">
        <input type="text" id="witUpi" placeholder="UPI ID (example@upi)">
        <button class="btn btn-withdraw" onclick="handleWithdraw()">REQUEST WITHDRAW</button>
    </div>

    <div class="nav-wrapper">
        <a href="index.html" class="nav-item"><i class="fas fa-home" style="font-size:20px;"></i><br>HOME</a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet" style="font-size:20px;"></i><br>EARN</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user" style="font-size:20px;"></i><br>PROFILE</a>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx4CbWAB9J5kanfjHZ_odNKtuHcBInFeQWnrFjWlD2-5EBIxmxxnwlIClkbWSZ-moG4kg/exec";

        function handleRedeem() {
            const user = JSON.parse(localStorage.getItem("rareGamingUser")).name;
            const code = document.getElementById('promoCode').value;
            const btn = event.target;
            btn.innerText = "CHECKING..."; btn.disabled = true;

            let fd = new FormData();
            fd.append("action", "redeem");
            fd.append("username", user);
            fd.append("code", code);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(res => res.text())
            .then(data => {
                if(data.includes("Success")) {
                    alert("🎉 ₹50 Added to your Users sheet balance!");
                    location.href = "index.html"; 
                } else {
                    alert("❌ Invalid or Already Used!");
                    btn.innerText = "REDEEM CODE"; btn.disabled = false;
                }
            });
        }

        function handleWithdraw() {
            const user = JSON.parse(localStorage.getItem("rareGamingUser")).name;
            const amt = document.getElementById('witAmt').value;
            const upi = document.getElementById('witUpi').value;
            const currentBal = parseInt(localStorage.getItem("rareWallet") || 0);

            if(amt < 50) return alert("Minimum ₹50 required!");
            if(amt > currentBal) return alert("Low balance in Sheet!");

            const btn = event.target;
            btn.innerText = "SENDING..."; btn.disabled = true;

            let fd = new FormData();
            fd.append("action", "withdraw");
            fd.append("username", user);
            fd.append("amount", amt);
            fd.append("upi", upi);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => {
                alert("✅ Withdraw Request Sent! Balance updated in Users sheet.");
                location.href = "index.html";
            })
            .catch(() => { alert("Error!"); btn.innerText = "REQUEST WITHDRAW"; btn.disabled = false; });
        }
    </script>
</body>
</html>
