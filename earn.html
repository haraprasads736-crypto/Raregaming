<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Earn - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        .balance-card { background: linear-gradient(135deg, #ff007a22, #7a00ff22); border: 1.5px solid #ff007a; border-radius: 20px; margin: 20px; padding: 30px; text-align: center; }
        .bal-amount { font-size: 40px; font-weight: 800; }
        .wallet-panel { background: #111116; border-radius: 15px; padding: 20px; border: 1px solid #1f1f25; margin: 20px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #2a2a30; color: #fff; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-yellow { background: #ffd700; color: #000; }
        .btn-blue { background: #00f2fe; color: #000; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>
    <div class="balance-card">
        <div>Total Balance</div>
        <div class="bal-amount" id="mainBal">₹...</div>
    </div>
    <div class="wallet-panel">
        <div style="color:#ffd700; margin-bottom:10px;">REDEEM CODE</div>
        <input type="text" id="promoCode" placeholder="Enter Promo Code">
        <button class="btn-action btn-yellow" onclick="redeem()">REDEEM</button>
    </div>
    <div class="wallet-panel">
        <div style="color:#00f2fe; margin-bottom:10px;">WITHDRAW (Min ₹50)</div>
        <input type="number" id="witAmt" placeholder="Amount">
        <input type="text" id="witUpi" placeholder="UPI ID">
        <button class="btn-action btn-blue" onclick="withdraw()">WITHDRAW</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item active"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyVPA7IWkzt7njCMsq3dGhuNgc2h06maeULsvUCJsM8-WZLGepfQ4_wRLXAo1L396V2Sg/exec";
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(user))
            .then(res => res.text()).then(bal => { document.getElementById('mainBal').innerText = "₹" + bal; });
        }
        function redeem() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            let code = document.getElementById('promoCode').value;
            fetch(scriptURL + "?action=redeem&username="+user+"&code="+code, {method:'POST', mode:'no-cors'})
            .then(() => { alert("Request Sent! Checking sheet..."); location.reload(); });
        }
        function withdraw() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            let amt = document.getElementById('witAmt').value;
            let upi = document.getElementById('witUpi').value;
            fetch(scriptURL + "?action=withdraw&username="+user+"&amount="+amt+"&upi="+upi, {method:'POST', mode:'no-cors'})
            .then(() => { alert("Withdraw Request Sent!"); location.reload(); });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
