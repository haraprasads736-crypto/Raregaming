<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        .nav-header { background: #15181e; padding: 15px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid #66fcf1; }
        .back-btn { color: #66fcf1; text-decoration: none; font-weight: 800; border: 1px solid #66fcf1; padding: 5px 10px; border-radius: 5px; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .detail-card { background: #15181e; border-radius: 12px; border: 1.5px solid #2b303b; overflow: hidden; }
        .d-banner { height: 130px; background-size: cover; background-position: center; position: relative; }
        .d-body { padding: 15px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .info-box { background: #1a1d24; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #2b303b; }
        .i-label { font-size: 9px; color: #a0aab2; text-transform: uppercase; }
        .i-val { font-size: 14px; font-weight: 800; }
        .register-btn { display: block; width: 100%; background: #66fcf1; color: #000; padding: 15px; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .disabled-btn { background: #333 !important; color: #888 !important; pointer-events: none; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-btn">BACK</a>
        <span style="font-weight:800;">DETAILS</span>
        <div style="width:50px;"></div>
    </div>
    <div class="container" id="main-content">
        <div style="text-align:center; margin-top:50px;">Loading Match Data...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('match') || 'BR';
        const scriptURL = 'https://script.google.com/macros/s/AKfycbweiFB-PavZXtVn0bGUIT6pzV2UuKp4fcQA36pJ270oNreoEVbVB27xL9jghN5_sf2xxA/exec';

        fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                const m = data.MatchConfig[matchId];
                const status = m.status ? m.status.toLowerCase() : "";
                const isClosed = status.includes('closed') || status.includes('full');
                
                document.getElementById('main-content').innerHTML = `
                    <div class="detail-card">
                        <div class="d-banner" style="background-image: url('${m.banner}');"></div>
                        <div class="d-body">
                            <h2 style="color:#66fcf1; margin:0;">${m.title}</h2>
                            <p style="font-size:11px; color:#a0aab2;">🕒 ${m.time}</p>
                            <div class="info-grid">
                                <div class="info-box"><div class="i-label">Prize</div><div class="i-val" style="color:#4de2d6;">${m.prize}</div></div>
                                <div class="info-box"><div class="i-label">Kill</div><div class="i-val">${m.perKill}</div></div>
                                <div class="info-box"><div class="i-label">Entry</div><div class="i-val" style="color:#ff4b2b;">${m.entry}</div></div>
                            </div>
                            <a href="register.html?type=${matchId}" class="register-btn ${isClosed ? 'disabled-btn' : ''}">
                                ${isClosed ? 'REGISTRATION CLOSED' : 'REGISTER NOW'}
                            </a>
                        </div>
                    </div>`;
            });
    </script>
</body>
</html>
