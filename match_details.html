<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RG ADMIN PRO - MASTER CONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background: #030305; color: white; font-family: 'Poppins', sans-serif; padding: 15px; }
        .admin-box { max-width: 450px; margin: auto; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; min-width: 80px; padding: 12px; border-radius: 12px; border: none; background: #1a1a2e; color: #888; font-weight: 700; font-size: 10px; cursor: pointer; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: #00f2fe; color: #000; }
        .card { background: #0a0a0f; padding: 20px; border-radius: 20px; border: 1px solid #1a1a2e; display: none; }
        .card.active { display: block; }
        h3 { margin-top: 0; font-size: 16px; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 9px; color: #00f2fe; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; color: white; outline: none; font-size: 13px; box-sizing: border-box; }
        .btn-post { width: 100%; background: #39ff14; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; margin-top: 10px; cursor: pointer; text-transform: uppercase; }
        .list-container { max-height: 250px; overflow-y: auto; background: #050505; border-radius: 10px; padding: 10px; border: 1px solid #111; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; color: #00f2fe; padding: 5px; border-bottom: 1px solid #222; }
        td { padding: 8px 5px; border-bottom: 1px solid #111; }
        .approve-btn { background: #39ff14; color: #000; border: none; padding: 4px 8px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="admin-box">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('matchTab', this)">MATCH</button>
        <button class="tab-btn" onclick="switchTab('roomTab', this)">ROOM</button>
        <button class="tab-btn" onclick="switchTab('playerTab', this)">PLAYERS</button>
        <button class="tab-btn" onclick="switchTab('payTab', this)">PAYMENTS</button>
        <button class="tab-btn" onclick="switchTab('walletTab', this)">WALLETS</button>
        <button class="tab-btn" onclick="switchTab('userTab', this)">ADD USER</button>
    </div>

    <div id="matchTab" class="card active">
        <h3>🏆 Create Dynamic Match</h3>
        <div class="grid">
            <div class="input-group"><label>Match ID</label><input type="number" id="m_id" placeholder="101"></div>
            <div class="input-group"><label>Category</label><input type="text" id="m_cat" placeholder="BR/CS"></div>
        </div>
        <div class="input-group"><label>Match Title</label><input type="text" id="m_title" placeholder="BR Squad Pro"></div>
        
        <div class="grid">
            <div class="input-group"><label>Entry Fee</label><input type="text" id="m_fee" value="₹"></div>
            <div class="input-group"><label>Win Prize</label><input type="text" id="m_prize" value="₹"></div>
            <div class="input-group"><label>Per Kill</label><input type="text" id="m_kill" value="₹"></div>
            <div class="input-group"><label>Map Name</label><input type="text" id="m_map" value="BERMUDA"></div>
        </div>

        <div class="grid">
            <div class="input-group"><label>Type (Solo/Duo)</label><input type="text" id="m_type" placeholder="SOLO"></div>
            <div class="input-group"><label>Image URL (GitHub)</label><input type="text" id="m_img" placeholder="Paste link here"></div>
        </div>

        <div class="grid">
            <div class="input-group"><label>Date</label><input type="date" id="m_date"></div>
            <div class="input-group"><label>Time</label><input type="time" id="m_time"></div>
        </div>
        <button class="btn-post" onclick="postMatch()">Post Dynamic Match 🚀</button>
    </div>

    <div id="roomTab" class="card">
        <h3>🔑 Room Access</h3>
        <input type="number" id="r_match_id" placeholder="Match ID">
        <input type="text" id="r_id" placeholder="Room ID">
        <input type="text" id="r_pass" placeholder="Password">
        <select id="r_status">
            <option value="upcoming">UPCOMING</option>
            <option value="ongoing">LIVE NOW</option>
            <option value="result">MATCH ENDED</option>
        </select>
        <button class="btn-post" style="background:#f1c40f" onclick="updateRoom()">Update Room ⚡</button>
    </div>

    <div id="playerTab" class="card">
        <h3>👥 Joined Players</h3>
        <div class="input-group">
            <label>Check by Match ID</label>
            <div style="display: flex; gap: 5px;">
                <input type="number" id="p_id" placeholder="Ex: 101">
                <button onclick="loadJoined()" style="width: 80px; padding: 0; background: #00f2fe; border:none; border-radius:10px;">VIEW</button>
            </div>
        </div>
        <div class="list-container">
            <table><thead><tr><th>Name</th><th>Game UID</th><th>Time</th></tr></thead><tbody id="joinedList"></tbody></table>
        </div>
    </div>

    <div id="payTab" class="card">
        <h3>💰 Deposit Requests</h3>
        <p style="font-size: 10px; color: #888;">UTR verify karke Approve button dabayein.</p>
        <div class="list-container">
            <table><thead><tr><th>User</th><th>Amount</th><th>UTR</th><th>Action</th></tr></thead><tbody id="payReqList"></tbody></table>
        </div>
    </div>

    <div id="walletTab" class="card">
        <h3>💰 Live Balances</h3>
        <div class="list-container">
            <table><thead><tr><th>Name</th><th>Cash</th><th>UID</th></tr></thead><tbody id="walletList"></tbody></table>
        </div>
    </div>

    <div id="userTab" class="card">
        <h3>👤 Manual Entry</h3>
        <input type="text" id="u_name" placeholder="Name">
        <input type="text" id="u_pass" placeholder="Password">
        <input type="number" id="u_cash" placeholder="Balance">
        <input type="text" id="u_uid" placeholder="Rare UID">
        <button class="btn-post" style="background:#ff3131; color:white;" onclick="manualUser()">ADD USER 📥</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
        authDomain: "rare-gaming-b8875.firebaseapp.com",
        projectId: "rare-gaming-b8875",
        databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function switchTab(tabId, btn) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btn.classList.add('active');
        if(tabId === 'walletTab') loadWallets();
        if(tabId === 'payTab') loadPaymentRequests();
    }

    // 🔥 FIX: Added Dynamic Fields (imgUrl, type)
    function postMatch() {
        const id = document.getElementById('m_id').value;
        if(!id) return alert("ID dalo!");

        database.ref('matches/' + id).update({
            title: document.getElementById('m_title').value,
            fee: document.getElementById('m_fee').value,
            prize: document.getElementById('m_prize').value,
            perkill: document.getElementById('m_kill').value,
            map: document.getElementById('m_map').value,
            category: document.getElementById('m_cat').value,
            date: document.getElementById('m_date').value,
            time: document.getElementById('m_time').value,
            
            // 🔥 The missing links
            type: document.getElementById('m_type').value || "SOLO",
            imgUrl: document.getElementById('m_img').value || "https://i.imgur.com/uR1Y6T2.jpeg", 
            
            status: "upcoming"
        }).then(() => {
            alert("Perfect! Match details with dynamic map/image posted! 🔥");
        }).catch((error) => {
            alert("Error: " + error.message);
        });
    }

    function updateRoom() {
        const id = document.getElementById('r_match_id').value;
        database.ref('matches/' + id).update({
            roomId: document.getElementById('r_id').value || "WAIT",
            password: document.getElementById('r_pass').value || "WAIT",
            status: document.getElementById('r_status').value
        }).then(() => alert("Room ID/Pass Updated! ✅"));
    }

    function loadJoined() {
        const id = document.getElementById('p_id').value;
        const list = document.getElementById('joinedList');
        database.ref('matches/' + id + '/participants').on('value', (snap) => {
            const data = snap.val(); list.innerHTML = "";
            if(!data) { list.innerHTML = "<tr><td colspan='3'>No players</td></tr>"; return; }
            Object.keys(data).forEach(key => {
                const p = data[key]; list.innerHTML += `<tr><td>${p.name}</td><td>${p.uid}</td><td>${p.time}</td></tr>`;
            });
        });
    }

    function loadPaymentRequests() {
        const list = document.getElementById('payReqList');
        database.ref('payment_requests').on('value', (snap) => {
            const reqs = snap.val(); list.innerHTML = "";
            if(!reqs) { list.innerHTML = "<tr><td colspan='4'>No pending requests</td></tr>"; return; }
            Object.keys(reqs).forEach(id => {
                const r = reqs[id];
                list.innerHTML += `<tr><td>${r.userName}<br><small>${r.userId.substring(0,6)}</small></td><td style="color:#39ff14">₹${r.amount}</td><td>${r.utr}</td><td><button class="approve-btn" onclick="approveDeposit('${id}', '${r.userId}', ${r.amount})">APPROVE</button></td></tr>`;
            });
        });
    }

    function approveDeposit(reqId, uid, amt) {
        if(!confirm("Approve ₹" + amt + "?")) return;
        const userRef = database.ref('players/' + uid);
        userRef.child('cash').once('value', (snap) => {
            let currentBal = parseFloat(snap.val() || 0);
            userRef.update({ cash: currentBal + amt }).then(() => {
                database.ref('payment_requests/' + reqId).remove();
                alert("Success!");
            });
        });
    }

    function loadWallets() {
        const list = document.getElementById('walletList');
        database.ref('players').on('value', (snap) => {
            const data = snap.val(); list.innerHTML = "";
            if(!data) return;
            Object.keys(data).forEach(uid => {
                const p = data[uid];
                list.innerHTML += `<tr><td>${p.name}</td><td style="color:#39ff14">₹${p.cash}</td><td>${uid.substring(0,6)}</td></tr>`;
            });
        });
    }

    function manualUser() {
        const uid = document.getElementById('u_uid').value;
        database.ref('players/' + uid).set({
            name: document.getElementById('u_name').value, password: document.getElementById('u_pass').value,
            cash: parseFloat(document.getElementById('u_cash').value || 0), uid: uid
        }).then(() => alert("User Added!"));
    }
</script>
</body>
</html>
