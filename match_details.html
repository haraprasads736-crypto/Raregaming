<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        body { background: #0F041C; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Header & Tabs */
        .header { display: flex; align-items: center; padding: 15px 20px; background: #160826; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2D1B44; }
        .back-btn { font-size: 18px; color: #fff; cursor: pointer; }
        .title { font-size: 14px; font-weight: 800; flex: 1; text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-right: 20px; }
        .tab-container { display: flex; justify-content: space-around; background: #1A0A2D; margin: 15px; border-radius: 50px; padding: 5px; border: 1px solid #2D1B44; }
        .tab { padding: 8px 20px; border-radius: 50px; font-size: 11px; font-weight: 700; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #8B3EEB; color: #fff; }

        /* BATTLE OP CARD DESIGN */
        .match-list { padding: 0 15px; }
        .card { background: #FFFFFF; border-radius: 15px; margin-bottom: 25px; color: #000; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-top { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .match-logo { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #8B3EEB; }
        .match-info-main { flex: 1; }
        .match-name { font-size: 13px; font-weight: 900; text-transform: uppercase; margin: 0; display: block; }
        .match-dt { font-size: 10px; color: #666; font-weight: 600; }
        .view-btn { font-size: 12px; font-weight: 800; color: #8B3EEB; text-decoration: underline; cursor: pointer; }

        /* Stats Grid (3x2 format like photo) */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 15px; }
        .stat-box { background: #8B3EEB; border-radius: 10px; padding: 8px 5px; text-align: center; color: white; display: flex; flex-direction: column; justify-content: center; }
        .stat-box.light { background: #F3EEFF; color: #000; }
        .stat-label { font-size: 8px; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-size: 11px; font-weight: 900; }

        /* Progress Bar */
        .progress-container { padding: 15px; }
        .progress-bar-bg { width: 100%; height: 16px; background: #E0D4FF; border-radius: 20px; position: relative; overflow: hidden; border: 1.5px solid #8B3EEB; }
        .progress-fill { height: 100%; background: #8B3EEB; width: 0%; transition: 1s; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 9px; font-weight: 900; line-height: 16px; color: #fff; z-index: 2; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .card-footer { padding: 0 15px 15px; display: flex; justify-content: flex-end; }
        .btn-join { background: #160826; color: #fff; border: none; padding: 10px 35px; border-radius: 8px; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        /* Modal Overlay (Professional Full Screen) */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F041C; z-index: 1000; display: none; overflow-y: auto; padding-bottom: 50px; }
        .overlay-header { padding: 20px; background: #160826; display: flex; justify-content: space-between; align-items: center; }
        .overlay-body { padding: 20px; }
        .rules-box { background: rgba(255,255,255,0.05); border: 1px solid #2D1B44; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .rule-item { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
        .rule-num { background: #8B3EEB; width: 25px; height: 25px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; }
        .rule-txt { font-size: 11px; color: #ccc; line-height: 1.5; }

        /* Join Form Modal */
        .mini-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .mini-card { background: #1A0A2D; width: 100%; max-width: 320px; border-radius: 20px; padding: 25px; border: 1px solid #8B3EEB; text-align: center; }
        .mini-card input { width: 100%; padding: 12px; background: #000; border: 1px solid #8B3EEB; border-radius: 8px; color: #fff; margin: 10px 0; text-align: center; font-family: 'Poppins'; }
        
        .list-box { background: #fff; color: #000; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
        <div class="title" id="pageTitle">LOADING...</div>
    </div>
    <div class="tab-container">
        <div class="tab active" onclick="switchTab('upcoming', this)">Upcoming</div>
        <div class="tab" onclick="switchTab('ongoing', this)">Ongoing</div>
        <div class="tab" onclick="switchTab('result', this)">Result</div>
    </div>
    <div class="match-list" id="matchList"></div>

    <div id="viewOverlay" class="overlay">
        <div class="overlay-header">
            <i class="fas fa-arrow-left" onclick="closeOverlay()" style="cursor:pointer"></i>
            <b id="vMatchTitle">MATCH RULES</b>
            <div></div>
        </div>
        <div class="overlay-body">
            <div style="text-align:center; padding: 20px 0;">
                <h3 id="vMatchName" style="margin:0">FREE FIRE MATCH</h3>
                <span id="vMatchTime" style="color:#888; font-size:12px;">--:-- AM</span>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="showRuleTab('rules')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#8B3EEB; color:#fff; font-weight:800;">RULES</button>
                <button onclick="showRuleTab('entry')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#2D1B44; color:#fff; font-weight:800;">MY ENTRY</button>
                <button onclick="showRuleTab('parts')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#2D1B44; color:#fff; font-weight:800;">PARTICIPANTS</button>
            </div>

            <div id="ruleContent" class="rules-box">
                </div>
        </div>
    </div>

    <div id="joinModal" class="mini-modal">
        <div class="mini-card">
            <h3>Player Details</h3>
            <input type="text" id="gName" placeholder="Game Name">
            <input type="number" id="gID" placeholder="Game UID">
            <button onclick="confirmMatchJoin()" style="background:#39ff14; color:#000; width:100%; padding:12px; border-radius:8px; border:none; font-weight:900; margin-top:10px;">JOIN ARENA</button>
            <p onclick="closeJoinModal()" style="margin-top:15px; color:#aaa; font-size:12px;">Cancel</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href="login.html";

        let currentMatches = {};
        let activeMatchId = null;
        const matchType = new URLSearchParams(window.location.search).get('type') || "BR";
        document.getElementById('pageTitle').innerText = matchType + " TOURNAMENTS";

        function loadMatches(status = 'upcoming') {
            const container = document.getElementById('matchList');
            container.innerHTML = `<center style="padding:50px; color:#8B3EEB;"><i class="fas fa-spinner fa-spin"></i> Loading Matches...</center>`;
            
            database.ref('matches').on('value', (snap) => {
                currentMatches = snap.val() || {};
                container.innerHTML = "";
                let found = false;
                Object.keys(currentMatches).forEach(id => {
                    const m = currentMatches[id];
                    if(m.category === matchType && m.status === status) {
                        found = true;
                        const pCount = m.participants ? Object.keys(m.participants).length : 0;
                        const maxP = 48;
                        const percent = (pCount / maxP) * 100;

                        container.innerHTML += `
                        <div class="card">
                            <div class="card-top">
                                <img src="br_poster.jpg" class="match-logo" onerror="this.src='icon.png'">
                                <div class="match-info-main">
                                    <p class="match-name">${m.title} #${id}</p>
                                    <span class="match-dt">${m.date} ${m.time}</span>
                                </div>
                                <span class="view-btn" onclick="openOverlay('${id}')">view</span>
                            </div>
                            <div class="stats-grid">
                                <div class="stat-box"><span class="stat-label">Prize Pool</span><span class="stat-value">${m.prize}</span></div>
                                <div class="stat-box"><span class="stat-label">Per Kill</span><span class="stat-value">${m.perkill || '₹3'}</span></div>
                                <div class="stat-box"><span class="stat-label">Entry Fee</span><span class="stat-value">${m.fee}</span></div>
                                <div class="stat-box light"><span class="stat-label">Type</span><span class="stat-value">${m.category}</span></div>
                                <div class="stat-box light"><span class="stat-label">Version</span><span class="stat-value">TPP</span></div>
                                <div class="stat-box light"><span class="stat-label">Map</span><span class="stat-value">${m.map || 'Bermuda'}</span></div>
                            </div>
                            <div class="progress-container">
                                <div class="progress-bar-bg">
                                    <div class="progress-text">${pCount}/${maxP} Players Joined</div>
                                    <div class="progress-fill" style="width:${percent}%"></div>
                                </div>
                            </div>
                            <div class="card-footer">
                                ${localStorage.getItem('joined_'+id) 
                                ? `<button class="btn-join" style="background:#444">JOINED</button>` 
                                : `<button class="btn-join" onclick="openJoinModal('${id}', '${m.fee}')">JOIN</button>`}
                            </div>
                        </div>`;
                    }
                });
                if(!found) container.innerHTML = `<center style="padding:50px; color:#888;">No matches available here.</center>`;
            });
        }

        // Overlay Functions (Photo 2,3,4 Style)
        function openOverlay(id) {
            activeMatchId = id;
            const m = currentMatches[id];
            document.getElementById('vMatchName').innerText = m.title;
            document.getElementById('vMatchTime').innerText = m.date + " " + m.time;
            showRuleTab('rules');
            document.getElementById('viewOverlay').style.display = "block";
        }

        function showRuleTab(type) {
            const content = document.getElementById('ruleContent');
            const m = currentMatches[activeMatchId];
            
            if(type === 'rules') {
                content.innerHTML = `
                    <div class="rule-item"><div class="rule-num">1</div><div class="rule-txt">You will get room ID & password 10 to 5 minutes before match time.</div></div>
                    <div class="rule-item"><div class="rule-num">2</div><div class="rule-txt">Team-up and Hacking is not allowed. / टीमअप और हैकिंग की अनुमति नहीं है।</div></div>
                    <div class="rule-item"><div class="rule-num">3</div><div class="rule-txt">Always keep screen recording on.</div></div>
                `;
            } else if(type === 'entry') {
                const myEntry = m.participants ? m.participants[userData.uid] : null;
                content.innerHTML = myEntry ? 
                `<div class="list-box"><b>NAME:</b> ${myEntry.name}<br><b>UID:</b> ${myEntry.uid}</div>` : 
                `<center style="color:#888">You have not joined this match yet.</center>`;
            } else if(type === 'parts') {
                let listHTML = `<div class="list-box">`;
                if(m.participants) {
                    Object.values(m.participants).forEach(p => {
                        listHTML += `<div class="list-item"><span>${p.name}</span> <span style="color:#8B3EEB">Joined</span></div>`;
                    });
                } else { listHTML += `<center>No players joined.</center>`; }
                listHTML += `</div>`;
                content.innerHTML = listHTML;
            }
        }

        function closeOverlay() { document.getElementById('viewOverlay').style.display = "none"; }

        function openJoinModal(id, fee) {
            activeMatchId = id;
            selectedFee = parseFloat(fee.replace('₹',''));
            document.getElementById('joinModal').style.display = "flex";
        }

        function closeJoinModal() { document.getElementById('joinModal').style.display = "none"; }

        function confirmMatchJoin() {
            const name = document.getElementById('gName').value.trim();
            const uid = document.getElementById('gID').value.trim();
            if(!name || !uid) return alert("Pura dalo!");

            database.ref('players/' + userData.uid).once('value', (snap) => {
                const bal = snap.val().cash || 0;
                if(bal < selectedFee) return alert("Low Balance!");

                database.ref('players/' + userData.uid).update({ cash: bal - selectedFee });
                database.ref('matches/' + activeMatchId + '/participants/' + userData.uid).set({
                    name: name, uid: uid, time: new Date().toLocaleTimeString()
                }).then(() => {
                    localStorage.setItem('joined_' + activeMatchId, "true");
                    alert("Joined Arena!");
                    location.reload();
                });
            });
        }

        function switchTab(t, el) { 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            loadMatches(t);
        }

        window.onload = () => loadMatches('upcoming');
    </script>
</body>
</html>
