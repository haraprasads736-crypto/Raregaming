<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        body { background-color: #0F041C; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .header { display: flex; align-items: center; padding: 15px 20px; background: #160826; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2D1B44; }
        .back-btn { font-size: 18px; color: #fff; cursor: pointer; }
        .title { font-size: 15px; font-weight: 700; flex: 1; text-align: center; margin-right: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-container { display: flex; justify-content: space-around; background: #1A0A2D; margin: 15px; border-radius: 8px; padding: 4px; border: 1px solid #2D1B44; }
        .tab { padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #8B3EEB; color: #fff; }
        .match-list { padding: 0 12px; }
        .card { background: #FFFFFF; border-radius: 12px; padding: 0; margin-bottom: 20px; color: #000; position: relative; border-left: 6px solid #8B3EEB; box-shadow: 0 6px 20px rgba(0,0,0,0.5); overflow: hidden; }
        .card-inner { padding: 15px; }
        .card-header { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #F0F0F0; padding-bottom: 10px; margin-bottom: 12px; }
        .match-logo { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #eee; }
        .header-text { flex: 1; }
        .match-title { font-size: 13px; font-weight: 800; color: #111; display: flex; justify-content: space-between; align-items: center; }
        .match-time { font-size: 9px; font-weight: 700; color: #666; display: block; margin-top: 2px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .stat-box { background: #8B3EEB; border-radius: 4px; padding: 8px 2px; text-align: center; color: white; }
        .stat-label { font-size: 7px; font-weight: 600; text-transform: uppercase; display: block; opacity: 0.9; }
        .stat-value { font-size: 10px; font-weight: 800; display: block; margin-top: 1px; }
        .progress-section { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 14px; background: #E0D4FF; border-radius: 50px; overflow: hidden; position: relative; border: 1px solid #8B3EEB; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #160826, #8B3EEB); width: 0%; transition: 0.5s ease-in-out; }
        .player-count { position: absolute; width: 100%; text-align: center; font-size: 9px; font-weight: 800; line-height: 14px; color: #fff; z-index: 2; text-shadow: 1px 1px 2px #000; }
        .join-btn { background: #160826; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .joined-footer { background: #eaffea; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #2ecc71; }
        .status-text { font-size: 10px; font-weight: 800; color: #2ecc71; text-transform: uppercase; }
        .btn-action { background: #00f2fe; color: #000; border: none; padding: 6px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-card { background: #1A0A2D; width: 100%; max-width: 310px; border-radius: 12px; padding: 30px; text-align: center; color: white; border: 1px solid #2D1B44; }
        .modal-card input { width: 100%; background: #0F041C; border: 1px solid #8B3EEB; padding: 12px; margin: 10px 0; border-radius: 8px; color: #fff; text-align: center; outline: none; box-sizing: border-box; }
        .btn-confirm { background: #39ff14; color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header">
            <i class="fas fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
            <div class="title" id="pageTitle">LOADING...</div>
        </div>
        
        <div class="tab-container">
            <div class="tab active" onclick="switchTab('upcoming', this)">Upcoming</div>
            <div class="tab" onclick="switchTab('ongoing', this)">Ongoing</div>
            <div class="tab" onclick="switchTab('result', this)">Result</div>
        </div>

        <div class="match-list" id="matchList"></div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin-top:0;">Player Details</h3>
            <input type="text" id="gameName" placeholder="In-Game Name">
            <input type="number" id="gameId" placeholder="In-Game UID">
            <button class="btn-confirm" id="submitBtn" onclick="finalJoin()">Confirm & Join</button>
            <p onclick="closeModals()" style="color:#ff4d4d; cursor:pointer; margin-top:15px; font-size:12px; font-weight:600;">CANCEL</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if(!userData) window.location.href = "login.html";

        let selectedMatch = null;
        const urlParams = new URLSearchParams(window.location.search);
        let matchKey = urlParams.get('type') || localStorage.getItem("lastType") || "BR";

        function loadMatches(status = 'upcoming') {
            const container = document.getElementById('matchList');
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#8B3EEB;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>`;
            
            localStorage.setItem("lastType", matchKey);
            document.getElementById('pageTitle').innerText = matchKey + " TOURNAMENTS";

            database.ref('matches').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    container.innerHTML = `<div style="text-align:center; padding:50px; color:#888;">No matches found.</div>`;
                    return;
                }
                
                container.innerHTML = ""; 
                Object.keys(data).forEach(id => {
                    const m = data[id];
                    if (m.category === matchKey && m.status === status) {
                        renderCard(m, id, container);
                    }
                });
            });
        }

        function renderCard(m, id, container) {
            let isJoined = localStorage.getItem("joined_" + id);
            
            // 🚀 DYNAMIC LOGO SYSTEM
            let logoSrc = matchKey.toLowerCase() + "_poster.jpg"; 

            // 🚀 DYNAMIC PROGRESS BAR CALCULATION
            let participants = m.participants ? Object.keys(m.participants).length : 0;
            let maxPlayers = 48; // Default limit, aap admin se bhi bhej sakte hain
            let progressWidth = (participants / maxPlayers) * 100;

            container.innerHTML += `
            <div class="card">
                <div class="card-inner">
                    <div class="card-header">
                        <img src="${logoSrc}" class="match-logo" onerror="this.src='https://i.imgur.com/uR1Y6T2.jpeg'">
                        <div class="header-text">
                            <div class="match-title">${m.title} #${id}</div>
                            <span class="match-time">${m.date} | ${m.time}</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box"><span class="stat-label">Prize</span><span class="stat-value">${m.prize}</span></div>
                        <div class="stat-box"><span class="stat-label">Fee</span><span class="stat-value">${m.fee}</span></div>
                        <div class="stat-box" style="background:#2D1B44"><span class="stat-label">Per Kill</span><span class="stat-value">${m.perkill || '₹0'}</span></div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar">
                            <div class="player-count">${participants} / ${maxPlayers} Joined</div>
                            <div class="progress-fill" style="width:${progressWidth}%"></div>
                        </div>
                        ${!isJoined ? `<button class="join-btn" onclick="openJoinModal('${id}', '${m.fee}')">Join</button>` : `<button class="join-btn" style="background:#444; color:#888;" disabled>Joined</button>`}
                    </div>
                </div>
                ${isJoined ? `<div class="joined-footer"><span class="status-text">✅ Joined Successfully</span><button class="btn-action" onclick="window.location.href='room_details.html?matchId=${id}'">ROOM ID</button></div>` : ''}
            </div>`;
        }

        function openJoinModal(id, fee) {
            selectedMatch = { id, fee: parseFloat(fee.replace('₹', '')) };
            document.getElementById('inputModal').style.display = 'flex';
        }

        function finalJoin() {
            const gName = document.getElementById('gameName').value.trim();
            const gUID = document.getElementById('gameId').value.trim();
            if(!gName || !gUID) return alert("Details bharo!");

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Processing...";

            database.ref('matches/' + selectedMatch.id + '/participants/' + userData.uid).once('value', (cSnap) => {
                if(cSnap.exists()) { alert("Aap pehle se join hain!"); location.reload(); return; }

                database.ref('players/' + userData.uid).once('value', (snap) => {
                    const pData = snap.val();
                    const currentCash = parseFloat(pData.cash || 0);

                    if (currentCash < selectedMatch.fee) {
                        alert("Insufficient Balance!");
                        btn.disabled = false; btn.innerText = "Confirm Join";
                    } else {
                        database.ref('players/' + userData.uid).update({ cash: currentCash - selectedMatch.fee });
                        database.ref('matches/' + selectedMatch.id + '/participants/' + userData.uid).set({
                            name: gName, uid: gUID, time: new Date().toLocaleTimeString()
                        }).then(() => {
                            localStorage.setItem("joined_" + selectedMatch.id, "true");
                            alert("Match Joined! ✅");
                            location.reload();
                        });
                    }
                });
            });
        }

        function closeModals() { document.getElementById('inputModal').style.display = 'none'; }
        function switchTab(t, el) { document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active')); el.classList.add('active'); loadMatches(t); }
        window.onload = () => loadMatches('upcoming');
    </script>
</body>
</html>
