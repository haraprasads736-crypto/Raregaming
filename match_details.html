<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 100px; }
        
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .header i { font-size: 20px; color: #00f2fe; }
        .header span { font-size: 18px; font-weight: 800; text-transform: uppercase; }

        .banner-container { width: 100%; height: 200px; position: relative; overflow: hidden; }
        .banner-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        
        .info-card { 
            background: #111116; margin: -30px 20px 20px 20px; border-radius: 20px; 
            padding: 20px; border: 1px solid #1f1f25; position: relative; z-index: 10;
        }

        .match-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; color: #00f2fe; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #000; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #2a2a30; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: 800; color: #fff; }

        .rules-panel { padding: 20px; }
        .rules-title { font-size: 14px; font-weight: 800; margin-bottom: 10px; color: #ffd700; }
        .rule-item { font-size: 12px; color: #aaa; margin-bottom: 8px; display: flex; gap: 10px; }

        .btn-join { 
            position: fixed; bottom: 30px; left: 20px; right: 20px; 
            background: #00f2fe; color: #000; padding: 15px; text-align: center;
            border-radius: 15px; font-weight: 800; text-decoration: none; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color: inherit;"><i class="fas fa-arrow-left"></i></a>
        <span id="headerTitle">MATCH DETAILS</span>
    </div>

    <div class="banner-container">
        <img id="matchBanner" src="br_poster.jpg" alt="Poster">
    </div>

    <div class="info-card">
        <div class="match-title" id="displayMatchTitle">LOADING...</div>
        <div id="matchMap" style="font-size: 12px; color: #888;">Map: Bermuda</div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Win Prize</div>
                <div class="stat-val" id="winPrize">₹--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Per Kill</div>
                <div class="stat-val" id="perKill">₹--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Entry Fee</div>
                <div class="stat-val" id="entryFee">₹--</div>
            </div>
        </div>
    </div>

    <div class="rules-panel">
        <div class="rules-title">MATCH RULES & INFO</div>
        <div class="rule-item"><i class="fas fa-check-circle"></i> No hacking allowed.</div>
        <div class="rule-item"><i class="fas fa-check-circle"></i> Room ID & Pass will be sent via WhatsApp.</div>
        <div class="rule-item"><i class="fas fa-check-circle"></i> Match starts on time. Be ready.</div>
    </div>

    <a href="register.html" class="btn-join" id="joinBtn">JOIN MATCH</a>

    <script>
        // URL se Match Name nikalna
        const urlParams = new URLSearchParams(window.location.search);
        const matchType = urlParams.get('match');

        // Match ki list aur unka data
        const matchData = {
            "BR SQUAD": {
                prize: "₹100",
                kill: "₹5",
                fee: "₹20",
                map: "Bermuda",
                img: "br_poster.jpg"
            },
            "CS SQUAD": {
                prize: "₹80",
                kill: "₹0",
                fee: "₹30",
                map: "Nextra (4v4)",
                img: "cs_poster.jpg"
            },
            "LONE WOLF": {
                prize: "₹20",
                kill: "₹0",
                fee: "₹10",
                map: "Iron Cage",
                img: "lw_poster.jpg"
            },
            "1V1 BATTLE": {
                prize: "₹50",
                kill: "₹0",
                fee: "₹25",
                map: "Custom Map",
                img: "1v1_poster.jpg"
            }
        };

        // Page ko update karna
        if (matchType && matchData[matchType]) {
            const data = matchData[matchType];
            document.getElementById('displayMatchTitle').innerText = matchType;
            document.getElementById('headerTitle').innerText = matchType;
            document.getElementById('winPrize').innerText = data.prize;
            document.getElementById('perKill').innerText = data.kill;
            document.getElementById('entryFee').innerText = data.fee;
            document.getElementById('matchMap').innerText = "Map: " + data.map;
            document.getElementById('matchBanner').src = data.img;
            
            // Join link mein bhi naam pass karna
            document.getElementById('joinBtn').href = "register.html?match=" + encodeURIComponent(matchType);
        } else {
            document.getElementById('displayMatchTitle').innerText = "Match Not Found";
        }
    </script>
</body>
</html>
