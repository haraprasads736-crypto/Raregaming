<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        .match-header { position: relative; width: 100%; height: 250px; }
        .match-header img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .header-text { position: absolute; bottom: 30px; left: 20px; }
        .match-title { font-size: 28px; font-weight: 800; text-transform: uppercase; color: #00f2fe; }
        .status-text { font-size: 12px; color: #ff007a; font-weight: 800; text-transform: uppercase; }

        .details-container { padding: 20px; }
        .info-card { 
            background: #111116; border: 1px solid #1f1f25; border-radius: 20px; 
            padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 30px;
        }
        .info-item { text-align: left; }
        .info-label { font-size: 11px; color: #666; text-transform: uppercase; font-weight: 600; }
        .info-value { font-size: 16px; font-weight: 800; color: #fff; margin-top: 5px; }

        .btn-join { 
            width: 100%; padding: 18px; background: #333; color: #666; border: none; 
            border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase;
            cursor: not-allowed;
        }

        /* NAVIGATION SYSTEM */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>
    <div class="match-header">
        <img id="matchImg" src="br_poster.jpg" alt="Poster">
        <div class="header-text">
            <div id="matchNameDisplay" class="match-title">BR MATCH</div>
            <div class="status-text">STATUS: CLOSED</div>
        </div>
    </div>
    <div class="details-container">
        <div class="info-card">
            <div class="info-item"><div class="info-label">Date</div><div class="info-value">23 March 2026</div></div>
            <div class="info-item"><div class="info-label">Time</div><div class="info-value">09:00 PM</div></div>
            <div class="info-item"><div class="info-label">Entry Fee</div><div class="info-value">₹20</div></div>
            <div class="info-item"><div class="info-label">Map</div><div class="info-value">Bermuda</div></div>
        </div>
        <button class="btn-join" disabled>REGISTRATION CLOSED</button>
    </div>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>
</body>
</html>
