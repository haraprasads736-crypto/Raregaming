<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap');
        body { background-color: #090a0f; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .nav-header { background: rgba(21, 24, 30, 0.9); padding: 15px; border-bottom: 1px solid rgba(255, 0, 127, 0.3); text-align: left; position: sticky; top: 0;}
        .back-btn { color: #00f2fe; text-decoration: none; font-weight: 800; font-size: 14px; text-transform: uppercase; border: 1px solid #00f2fe; padding: 5px 10px; border-radius: 5px;}
        
        .container { padding: 20px; max-width: 400px; margin: auto; }
        
        .match-card { background: linear-gradient(135deg, #12141d 0%, #0b0c10 100%); border-radius: 16px; border: 1px solid rgba(122, 0, 255, 0.3); padding: 25px 20px; box-shadow: 0 8px 20px rgba(122, 0, 255, 0.15); margin-top: 20px;}
        
        .title { font-size: 26px; font-weight: 800; margin-bottom: 5px; background: linear-gradient(90deg, #ff007a, #7a00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;}
        .fee-box { display: inline-block; background: rgba(0, 242, 254, 0.1); border: 1px solid #00f2fe; color: #00f2fe; font-size: 14px; font-weight: 800; padding: 5px 15px; border-radius: 20px; margin-bottom: 25px; }
        
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 0; font-size: 12px; color: #a0aab2; font-weight: 600;}
        .info-row span { color: #fff; font-weight: 700; }

        .join-btn { background: linear-gradient(90deg, #ff007a, #ff4b2b); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-top: 25px; box-shadow: 0 4px 15px rgba(255, 0, 122, 0.4); letter-spacing: 1px;}
        .join-btn:active { transform: scale(0.96); }
        .join-btn:disabled { background: #2b303b; color: #6e7681; box-shadow: none; cursor: not-allowed; }
        
        #statusMsg { margin-top: 15px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
    </div>

    <div class="container">
        <div class="match-card">
            <h1 class="title" id="m-name">LOADING...</h1>
            <div class="fee-box" id="m-fee">ENTRY: ₹0</div>
            
            <div class="info-row">MAP <span>BERMUDA / PURGATORY</span></div>
            <div class="info-row">MODE <span>CUSTOM ROOM</span></div>
            <div class="info-row">PRIZE <span>CHECK PRIZE POOL</span></div>

            <button class="join-btn" id="joinBtn" onclick="joinMatch()">PAY & JOIN MATCH</button>
            <div id="statusMsg"></div>
        </div>
    </div>

    <script>
        // 👇 TUMHARA NAYA DEPLOY KIYA HUA SCRIPT URL YAHAN HAI 👇
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx2z4GZ8uIyKH9yTQqD_n3XBYEQe3_3k2YyQobq5ucoguHkYu3kwCZer3qYlOR1bstAlA/exec';

        // URL se check karna ki player ne kaunsa match click kiya hai
        const urlParams = new URLSearchParams(window.location.search);
        const matchID = urlParams.get('match');
        
        let matchName = "Unknown Match";
        let entryFee = 0;

        if(matchID === "BR") { matchName = "BR MATCH"; entryFee = 0; }
        else if(matchID === "CS") { matchName = "CS MATCH"; entryFee = 50; }
        else if(matchID === "LW") { matchName = "LONE WOLF"; entryFee = 15; }
        else if(matchID === "1V1") { matchName = "1V1 MATCH"; entryFee = 30; }

        document.getElementById("m-name").innerText = matchName;
        document.getElementById("m-fee").innerText = entryFee === 0 ? "ENTRY: FREE" : "ENTRY: ₹" + entryFee;
        
        let joinBtn = document.getElementById("joinBtn");
        joinBtn.innerText = entryFee === 0 ? "JOIN FOR FREE" : "PAY ₹" + entryFee + " & JOIN";

        let username = "Player";
        let savedUser = localStorage.getItem("rareGamingUser");
        if(savedUser) {
            username = JSON.parse(savedUser).name;
        }

        function joinMatch() {
            joinBtn.disabled = true;
            joinBtn.innerText = "⏳ PROCESSING...";
            document.getElementById("statusMsg").innerText = "Cloud se connect kar raha hai...";
            document.getElementById("statusMsg").style.color = "#00f2fe";

            fetch(`${scriptURL}?action=joinMatch&username=${encodeURIComponent(username)}&matchName=${encodeURIComponent(matchID)}&fee=${entryFee}`)
            .then(res => res.text())
            .then(status => {
                if(status === "Success") {
                    document.getElementById("statusMsg").innerHTML = "✅ SUCCESS! Match Joined. <br>Ab Room ID page par jao.";
                    document.getElementById("statusMsg").style.color = "#00e676";
                    joinBtn.innerText = "JOINED SUCESSFULLY";
                    // Wallet balance update karne ke liye local cache clear karo
                    localStorage.removeItem("lastRefresh"); 
                } 
                else if(status === "Low Balance") {
                    document.getElementById("statusMsg").innerHTML = "🚫 FAILED! Wallet mein paise kam hain. Pehle Add Funds karo.";
                    document.getElementById("statusMsg").style.color = "#ff007a";
                    joinBtn.innerText = "PAY ₹" + entryFee + " & JOIN";
                    joinBtn.disabled = false;
                }
                else if(status === "Already Joined") {
                    document.getElementById("statusMsg").innerHTML = "⚠️ Tum pehle se hi is match mein ho!";
                    document.getElementById("statusMsg").style.color = "#ffea00";
                    joinBtn.innerText = "ALREADY JOINED";
                }
                else {
                    document.getElementById("statusMsg").innerText = "❌ Error: " + status;
                    document.getElementById("statusMsg").style.color = "#ff007a";
                    joinBtn.innerText = "TRY AGAIN";
                    joinBtn.disabled = false;
                }
            })
            .catch(err => {
                document.getElementById("statusMsg").innerText = "⚠️ Network Error! Internet check karo.";
                document.getElementById("statusMsg").style.color = "#ff007a";
                joinBtn.disabled = false;
                joinBtn.innerText = "PAY ₹" + entryFee + " & JOIN";
            });
        }
    </script>
</body>
</html>
