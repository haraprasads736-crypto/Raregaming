<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Match Details</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        .nav-header { background: #15181e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #66fcf1; }
        .back-btn { color: #66fcf1; text-decoration: none; font-weight: 800; font-size: 14px; background: rgba(102, 252, 241, 0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid #66fcf1; }
        .nav-title { font-weight: 800; font-size: 18px; color: white; letter-spacing: 1px; text-transform: uppercase; }
        
        .container { padding: 15px; max-width: 480px; margin: auto; }

        .tabs-container { display: flex; background: #1a1d24; border-radius: 8px; margin-bottom: 20px; padding: 5px; border: 1px solid #2b303b; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 800; color: #a0aab2; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { background: #66fcf1; color: #000; box-shadow: 0 0 10px rgba(102, 252, 241, 0.4); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .detail-card { background: #15181e; border-radius: 12px; border: 1.5px solid #2b303b; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .d-banner { height: 130px; background-size: cover; background-position: center; position: relative; }
        .d-badge { position: absolute; top: 10px; left: 10px; background: #ff4b2b; color: white; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        
        .d-body { padding: 15px; }
        .d-title { font-size: 18px; font-weight: 800; color: #66fcf1; margin-bottom: 5px; }
        .d-time { font-size: 11px; color: #a0aab2; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 5px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .info-box { background: #1a1d24; border: 1px solid #2b303b; padding: 10px 5px; border-radius: 8px; text-align: center; }
        .i-label { font-size: 9px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }
        .i-val { font-size: 14px; font-weight: 800; color: white; }
        .i-val.green { color: #4de2d6; }
        .i-val.free { color: #ff4b2b; font-size: 16px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .prize-dist { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 20px; border: 1px dashed #2b303b; }
        .p-row { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; padding: 4px 0; border-bottom: 1px solid #1a1d24; }
        .p-row:last-child { border-bottom: none; }
        .p-row span:nth-child(2) { color: #66fcf1; }

        .register-btn { display: block; width: 100%; background: #66fcf1; color: #000; padding: 15px; text-align: center; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 800; text-transform: uppercase; box-shadow: 0 4px 10px rgba(102, 252, 241, 0.3); transition: 0.3s; box-sizing: border-box; }
        .register-btn:active { transform: scale(0.97); background: #4de2d6; }

        .empty-state { text-align: center; padding: 40px 20px; background: #15181e; border-radius: 12px; border: 1.5px dashed #2b303b; color: #a0aab2; }
        .empty-icon { font-size: 40px; margin-bottom: 10px; }
        .empty-text { font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span class="nav-title">MATCH DETAILS</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <div class="tabs-container">
            <div class="tab-btn active" onclick="switchTab('upcoming')">Upcoming</div>
            <div class="tab-btn" onclick="switchTab('ongoing')">Ongoing</div>
            <div class="tab-btn" onclick="switchTab('result')">Result</div>
        </div>

        <div id="upcoming" class="tab-content active">
            <div class="detail-card">
                <div class="d-banner" id="match-banner">
                    <div class="d-badge" id="match-badge">Loading...</div>
                </div>
                <div class="d-body">
                    <div class="d-title" id="match-title">Loading...</div>
                    <div class="d-time" id="match-time">🕒 Loading...</div>
                    
                    <div class="info-grid" id="match-info-grid">
                        <div class="info-box"><div class="i-label">Prize Pool</div><div class="i-val green" id="prize-pool">--</div></div>
                        <div class="info-box"><div class="i-label">Per Kill</div><div class="i-val" id="per-kill">--</div></div>
                        <div class="info-box"><div class="i-label">Entry Fee</div><div id="entry-fee-box">--</div></div>
                    </div>

                    <div class="prize-dist" id="prize-dist-box">
                        <div class="p-row"><span>🏆 1st Prize</span><span>₹80</span></div>
                        <div class="p-row"><span>🥈 2nd Prize</span><span>₹40</span></div>
                        <div class="p-row"><span>🥉 3rd Prize</span><span>₹30</span></div>
                    </div>

                    <a href="register.html" class="register-btn" id="register-btn">REGISTER NOW</a>
                </div>
            </div>
        </div>

        <div id="ongoing" class="tab-content">
            <div class="empty-state">
                <div class="empty-icon">🎮</div>
                <div class="empty-text">No matches are currently ongoing. Check the Upcoming tab!</div>
            </div>
        </div>

        <div id="result" class="tab-content">
            <div class="empty-state">
                <div class="empty-icon">🏆</div>
                <div class="empty-text">Results will be updated here after the match ends.</div>
            </div>
        </div>
    </div>

    <script>
        // 1. URL se pata lagana kaunsa match click hua hai
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('match') || 'BR'; // Agar kuch nahi mila toh BR

        // 2. Har match ka alag data
        const matchConfig = {
            "BR": {
                title: "BR SQUAD BATTLE",
                time: "🕒 23 MAR 2026 | 07:00 PM",
                prize: "₹150",
                perKill: "₹0",
                entry: '<div class="i-val free">FREE</div>',
                banner: "br_poster.jpg",
                badge: "Special Free Entry",
                available: true // Match chalu hai!
            },
            "CS": {
                title: "CLASH SQUAD MATCH",
                time: "🕒 NOT DECIDED",
                banner: "cs_poster.jpg",
                badge: "Upcoming",
                available: false // Match band hai
            },
            "LW": {
                title: "LONE WOLF 1",
                time: "🕒 DECIDING SOON",
                banner: "lw_poster.jpg",
                badge: "Upcoming",
                available: false // Match band hai
            },
            "1V1": {
                title: "1V1 MATCH",
                time: "🕒 DECIDING SOON",
                banner: "1v1_poster.jpg",
                badge: "Upcoming",
                available: false // Match band hai
            }
        };

        const data = matchConfig[matchId];

        // 3. Page par data set karna
        document.getElementById('match-title').innerText = data.title;
        document.getElementById('match-time').innerText = data.time;
        document.getElementById('match-banner').style.backgroundImage = `url('${data.banner}')`;
        document.getElementById('match-badge').innerText = data.badge;

        const regBtn = document.getElementById('register-btn');

        if (data.available) {
            document.getElementById('prize-pool').innerHTML = data.prize;
            document.getElementById('per-kill').innerHTML = data.perKill;
            document.getElementById('entry-fee-box').innerHTML = data.entry;
            // Register form ka link theek karna (Match ke hisaab se)
            regBtn.href = "register.html?type=" + matchId; 
        } else {
            // Agar match available nahi hai toh boxes chhupa do
            document.getElementById('match-info-grid').style.display = 'none';
            document.getElementById('prize-dist-box').style.display = 'none';
            
            // Button ko lock kar do aur text badal do
            regBtn.innerText = "REGISTRATION NOT AVAILABLE";
            regBtn.style.background = "#333";
            regBtn.style.color = "#888";
            regBtn.style.pointerEvents = "none"; // Click nahi hoga
            regBtn.href = "#";
        }

        // Tabs badalne ka code
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
    </script>
</body>
</html>
