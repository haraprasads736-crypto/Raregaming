<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Lobby - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        
        /* 🛠️ DARK PREMIUM THEME (BATTLE OP STYLE) */
        body { background: #0b0214; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { display: flex; align-items: center; padding: 15px 20px; background: #120422; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(139, 62, 235, 0.2); }
        .back-btn { font-size: 20px; color: #8B3EEB; cursor: pointer; }
        .title { font-size: 16px; font-weight: 700; flex: 1; text-align: center; text-transform: uppercase; letter-spacing: 1.5px; }

        /* 🛠️ SLICK TABS */
        .tab-container { display: flex; background: #1A0A2D; margin: 15px; border-radius: 12px; padding: 5px; border: 1px solid #2D1B44; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { background: linear-gradient(90deg, #8B3EEB, #6a11cb); color: #fff; box-shadow: 0 4px 10px rgba(139, 62, 235, 0.3); }

        /* 🚀 TOP GLOBAL ROOM BOX */
        #topGlobalRoomBox {
            display: none;
            margin: 0 15px 20px;
            background: rgba(139, 62, 235, 0.1);
            border: 1px solid #00f2fe;
            border-radius: 15px;
            padding: 15px;
            position: relative;
        }
        .top-room-val { font-size: 16px; font-weight: 800; color: #fff; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 6px; }

        /* 🛠️ COMPACT MATCH CARD */
        .match-list { padding: 0 15px; }
        .card { 
            background: linear-gradient(145deg, #1e0a3d, #120422); 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .match-logo { width: 50px; height: 50px; border-radius: 12px; border: 2px solid #8B3EEB; object-fit: cover; }
        .match-title { font-size: 14px; font-weight: 700; color: #fff; margin: 0; }
        .match-time { font-size: 10px; color: #aaa; }
        .view-link { color: #00f2fe; font-size: 11px; font-weight: 600; cursor:pointer; border: 1px solid #00f2fe; padding: 2px 8px; border-radius: 20px; }

        /* 🛠️ PREMIUM STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(139, 62, 235, 0.2); border-radius: 10px; padding: 8px 4px; text-align: center; }
        .stat-label { font-size: 8px; color: #8B3EEB; text-transform: uppercase; font-weight: 700; display: block; }
        .stat-value { font-size: 11px; font-weight: 700; color: #fff; margin-top: 2px; }

        /* 🛠️ PROGRESS & JOIN */
        .progress-container { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; }
        .progress-bar-bg { flex: 1; height: 8px; background: #333; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8B3EEB, #00f2fe); border-radius: 10px; transition: 1s; }
        .p-text { font-size: 10px; font-weight: 600; color: #ccc; }
        
        .join-btn { 
            background: linear-gradient(90deg, #8B3EEB, #6a11cb); 
            color: white; border: none; 
            padding: 10px 20px; border-radius: 10px; 
            font-weight: 700; font-size: 12px; 
            cursor: pointer;
        }
        .join-btn:disabled { background: #333; color: #666; }

        /* 🛠️ OVERLAY / MODALS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0214; display: none; flex-direction: column; z-index: 2000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-card { background: #1A0A2D; width: 100%; max-width: 310px; border-radius: 12px; padding: 30px; text-align: center; border: 1px solid #2D1B44; }
        .modal-card input { width: 100%; background: #0F041C; border: 1px solid #8B3EEB; padding: 12px; margin: 10px 0; border-radius: 8px; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left back-btn" onclick="location.href='index.html'"></i>
        <div class="title">Match Lobby</div>
    </div>
    
    <div class="tab-container">
        <div class="tab active" onclick="switchTab('upcoming', this)">Upcoming</div>
        <div class="tab" onclick="switchTab('ongoing', this)">Ongoing</div>
        <div class="tab" onclick="switchTab('result', this)">Result</div>
    </div>

    <div id="topGlobalRoomBox">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span style="color:#00f2fe; font-size: 11px; font-weight: 800;"><i class="fas fa-broadcast-tower"></i> LIVE ROOM DETAILS</span>
            <i class="fas fa-sync-alt" style="color:#00f2fe; font-size: 12px;" onclick="checkGlobalRoomAlert()"></i>
        </div>
        <p id="topMatchName" style="font-size: 10px; color:#aaa; margin: 5px 0;">--</p>
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <div><span style="font-size: 8px; color:#8B3EEB; font-weight: 700;">ROOM ID</span><div id="topRoomID" class="top-room-val">Wait...</div></div>
            <div><span style="font-size: 8px; color:#8B3EEB; font-weight: 700;">PASSWORD</span><div id="topRoomPass" class="top-room-val">Wait...</div></div>
        </div>
    </div>

    <div class="match-list" id="matchList"></div>

    <div id="viewOverlay" class="overlay">
        <div class="header">
            <i class="fas fa-chevron-left back-btn" onclick="closeView()"></i>
            <div class="title">Match Details</div>
        </div>
        <div class="overlay-content" style="padding: 20px;">
            <div class="detail-row" style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #333;"><span>Type</span><span id="detType" style="color:#00f2fe;"></span></div>
            <div class="detail-row" style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #333;"><span>Map</span><span id="detMap" style="color:#00f2fe;"></span></div>
            <div class="detail-row" style="display:flex; justify-content:space-between; padding: 10px 0; border-bottom: 1px solid #333;"><span>Fee</span><span id="detFee" style="color:#00f2fe;"></span></div>
            <button class="join-btn" style="width:100%; margin-top:20px;" onclick="startFromOverlay()">Join Now</button>
        </div>
    </div>

    <div id="walletModal" class="modal-overlay">
        <div class="modal-card">
            <h3 id="deductText" style="color:#fff;">₹ -- will be deduct</h3>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeModals()" style="flex:1; background:#333; color:#fff; border:none; padding:10px; border-radius:8px;">Cancel</button>
                <button onclick="showInputModal()" style="flex:1; background:#8B3EEB; color:#fff; border:none; padding:10px; border-radius:8px;">Join</button>
            </div>
        </div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-card">
            <h3>Player Details</h3>
            <input type="text" id="gameName" placeholder="In-Game Name">
            <input type="number" id="gameId" placeholder="In-Game UID">
            <button id="submitBtn" onclick="finalJoin()" style="width:100%; background:#39ff14; color:#000; padding:12px; border:none; border-radius:8px; font-weight:800; margin-top:10px;">Confirm</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyRd0GE6nGsyE8L_zKol6aIVt6DRoQ3E-FHGlix4REgY3II9eWPYgBFADafIuz8HZZHDA/exec";
        const matchKey = new URLSearchParams(window.location.search).get('type') || 'LW';
        let currentMatch = null;
        let allMatches = [];

        async function checkGlobalRoomAlert() {
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const alertBox = document.getElementById('topGlobalRoomBox');
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key.startsWith("joined_")) {
                    let mId = key.split("_")[1];
                    try {
                        const res = await fetch(`${scriptURL}?action=getRoomDetails&matchId=${mId}&userId=${user.uid}`);
                        const data = await res.json();
                        if (data.status === "Success" && data.roomId && data.roomId !== "TBD") {
                            alertBox.style.display = 'block';
                            document.getElementById('topRoomID').innerText = data.roomId;
                            document.getElementById('topRoomPass').innerText = data.password || "N/A";
                            document.getElementById('topMatchName').innerText = "Active Match ID: #" + mId;
                            return;
                        }
                    } catch (e) {}
                }
            }
            alertBox.style.display = 'none';
        }

        async function loadMatches(status = 'upcoming') {
            checkGlobalRoomAlert();
            const container = document.getElementById('matchList');
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#8B3EEB;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>`;
            try {
                const response = await fetch(`${scriptURL}?action=getMatches`);
                allMatches = await response.json();
                const filtered = allMatches.filter(m => m.category === matchKey && m.status === status);
                container.innerHTML = ""; 
                filtered.forEach(m => {
                    let isJoined = localStorage.getItem("joined_"+m.id);
                    container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="https://i.imgur.com/uR1Y6T2.jpeg" class="match-logo">
                            <div style="flex:1;">
                                <div style="display:flex; justify-content:space-between;">
                                    <p class="match-title">${m.title} #${m.id}</p>
                                    <span class="view-link" onclick="openView('${m.id}')">INFO</span>
                                </div>
                                <span class="match-time">${m.date || 'TBD'} | ${m.time || ''}</span>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-label">Prize</span><span class="stat-value">₹${m.prize}</span></div>
                            <div class="stat-box"><span class="stat-label">Per Kill</span><span class="stat-value">₹${m.perkill || '0'}</span></div>
                            <div class="stat-box"><span class="stat-label">Fee</span><span class="stat-value">₹${m.fee}</span></div>
                            <div class="stat-box"><span class="stat-label">Type</span><span class="stat-value">${m.type}</span></div>
                            <div class="stat-box"><span class="stat-label">Map</span><span class="stat-value">${m.map}</span></div>
                            <div class="stat-box"><span class="stat-label">Version</span><span class="stat-value">${m.version || 'TPP'}</span></div>
                        </div>
                        <div class="progress-container">
                            <div style="flex:1;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                                    <span class="p-text">Filled</span><span class="p-text">${m.joined}/${m.max}</span>
                                </div>
                                <div class="progress-bar-bg"><div class="progress-fill" style="width:${(m.joined/m.max)*100}%"></div></div>
                            </div>
                            <button class="join-btn" ${isJoined ? 'disabled' : ''} onclick="openWalletModal('${m.id}')">${isJoined ? 'JOINED' : 'JOIN'}</button>
                        </div>
                    </div>`;
                });
            } catch (e) { container.innerHTML = "Error loading matches!"; }
        }

        function openView(id) {
            currentMatch = allMatches.find(x => x.id == id);
            document.getElementById('detType').innerText = currentMatch.type;
            document.getElementById('detMap').innerText = currentMatch.map;
            document.getElementById('detFee').innerText = "₹ " + currentMatch.fee;
            document.getElementById('viewOverlay').style.display = 'flex';
        }
        function closeView() { document.getElementById('viewOverlay').style.display = 'none'; }
        function openWalletModal(id) { currentMatch = allMatches.find(x => x.id == id); document.getElementById('deductText').innerText = `₹ ${currentMatch.fee} will be deduct`; document.getElementById('walletModal').style.display = 'flex'; }
        function showInputModal() { closeModals(); document.getElementById('inputModal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function startFromOverlay() { closeView(); openWalletModal(currentMatch.id); }

        async function finalJoin() {
            const name = document.getElementById('gameName').value.trim();
            const uid = document.getElementById('gameId').value.trim();
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!name || !uid) return alert("Fill details!");
            document.getElementById('submitBtn').innerText = "Joining...";
            try {
                const res = await fetch(scriptURL, { method:'POST', body: new URLSearchParams({'action': 'registerMatch','matchId': currentMatch.id,'matchFee': currentMatch.fee,'userId': user.uid,'playerName': name,'playerId': uid})});
                const result = await res.text();
                if (result.includes("Success")) {
                    localStorage.setItem("joined_"+currentMatch.id, "true");
                    alert("Joined!"); closeModals(); loadMatches('upcoming');
                } else { alert(result); }
            } catch (e) { alert("Error!"); }
            finally { document.getElementById('submitBtn').innerText = "Confirm"; }
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active'); loadMatches(t);
        }

        window.onload = () => loadMatches('upcoming');
    </script>
</body>
</html>
