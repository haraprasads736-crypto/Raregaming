<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        /* 1. RESET & BASE */
        body { background-color: #120524; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 2. HEADER */
        .header { display: flex; align-items: center; padding: 20px; background: #1A0A2D; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 20px; color: #fff; margin-right: 20px; cursor: pointer; }
        .title { font-size: 18px; font-weight: 700; flex: 1; text-align: center; margin-right: 40px; }
        
        /* 3. TABS */
        .tab-container { display: flex; justify-content: space-around; background: #2D1B44; margin: 15px 20px; border-radius: 50px; padding: 5px; }
        .tab { padding: 10px 20px; border-radius: 50px; font-size: 14px; font-weight: 600; color: #AAA; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #8B3EEB; color: #fff; }
        
        /* 4. CARDS */
        .match-list { padding: 0 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; color: #000; position: relative; box-sizing: border-box; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .match-info { display: flex; align-items: center; gap: 10px; }
        .match-info img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .match-title-text { font-size: 13px; font-weight: 800; color: #111; }
        .view-link { color: #8B3EEB; font-weight: 700; font-size: 13px; text-decoration: underline; cursor: pointer; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #F2F2F2; border-radius: 12px; padding: 8px; text-align: center; }
        .stat-label { background: #8B3EEB; color: white; font-size: 8px; padding: 2px 5px; border-radius: 5px; display: inline-block; margin-bottom: 5px; }
        .stat-value { font-size: 11px; font-weight: 800; display: block; }

        /* 5. PROGRESS BAR */
        .progress-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .progress-bar { flex: 1; height: 18px; background: #E0D4FF; border-radius: 20px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: #8B3EEB; transition: 0.8s ease-in-out; width: 0%; }
        .player-count { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: 800; line-height: 18px; color: #120524; z-index: 2; }
        .join-btn { background: #1A0A2D; color: white; border: none; padding: 8px 25px; border-radius: 50px; font-weight: 700; font-size: 12px; cursor: pointer; }

        /* 6. INFO OVERLAY */
        .info-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1A0A2D 0%, #120524 100%); display: none; flex-direction: column; z-index: 3000; overflow-y: auto; box-sizing: border-box; }
        .info-header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .info-content { padding: 20px; box-sizing: border-box; }
        .info-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: block;}
        
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .detail-label { color: #AAA; }
        .detail-value { font-weight: 700; color: #00f2fe; }

        .room-details-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-top: 25px; text-align: center; border: 1px solid rgba(139, 62, 235, 0.2); }
        .room-btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .room-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-weight: 800; font-size: 13px; color: white; cursor: pointer; }
        .btn-participants { background: #8B3EEB; width: 100%; margin-top: 15px; }

        .rules-box { background: #000; color: #fff; padding: 15px; border-radius: 15px; margin-top: 20px; font-size: 11px; line-height: 1.5; text-align: left; opacity: 0.8;}

        /* 7. MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; box-sizing: border-box; }
        .modal-card { background: #2D1B44; width: 100%; max-width: 320px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
        
        .modal-card input { 
            width: 100%; background: #1A0A2D; border: 1px solid #382A4D; padding: 12px; margin-bottom: 10px; 
            border-radius: 12px; color: #fff; font-family: 'Poppins'; font-size: 13px; box-sizing: border-box;
        }

        .btn-submit { 
            background: #39ff14; color: #000; width: 100%; padding: 12px; border-radius: 12px; 
            font-weight: 800; border: none; margin-top: 10px; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header"><i class="fas fa-arrow-left back-btn" onclick="location.href='index.html'"></i><div class="title" id="pageTitle">LOADING...</div></div>
        <div class="tab-container">
            <div class="tab" id="tab-ongoing" onclick="switchTab('ongoing')">Ongoing</div>
            <div class="tab active" id="tab-upcoming" onclick="switchTab('upcoming')">Upcoming</div>
            <div class="tab" id="tab-result" onclick="switchTab('result')">Result</div>
        </div>
        <div class="match-list" id="matchList"></div>
    </div>

    <div id="infoOverlay" class="info-overlay">
        <div class="info-header"><i class="fas fa-arrow-left back-btn" onclick="closeInfo()"></i></div>
        <div class="info-content">
            <span id="infoMatchTitle" class="info-title">MATCH TITLE</span>
            <div style="font-size: 12px; color: #8B3EEB; margin-top: -10px;">2026-04-11</div>
            <div style="margin-top: 30px;">
                <div class="detail-row"><span class="detail-label">Type :</span><span id="infoType" class="detail-value">Duo</span></div>
                <div class="detail-row"><span class="detail-label">Version :</span><span class="detail-value">TPP</span></div>
                <div class="detail-row"><span class="detail-label">Map :</span><span id="infoMap" class="detail-value">BERMUDA</span></div>
                <div class="detail-row"><span class="detail-label">Entry Fee :</span><span id="infoFee" class="detail-value">5</span></div>
            </div>
            <div class="room-details-box">
                <div style="font-size: 14px; font-weight: 700; color: #AAA;">Room Details</div>
                <div style="color: #00f2fe; font-size: 13px; margin-top: 15px;">id show before 10 minutes</div>
                <div class="room-btn-group">
                    <button class="room-btn" style="background: rgba(255,255,255,0.1); border: 1px solid #AAA;" onclick="showMyEntries()">My Entries</button>
                    <button class="room-btn" style="background: #8B3EEB;" onclick="triggerJoinFromInfo()">Join</button>
                </div>
                <button class="room-btn btn-participants" onclick="showParticipants()">Participants</button>
            </div>
            <div class="rules-box"><b>RULES:</b> 1. ID/Pass will be shared 10m before match. 2. No hacking.</div>
        </div>
    </div>

    <div id="confirmModal" class="modal-overlay">
        <div class="modal-card">
            <div id="confirmText" style="font-weight:800; margin-bottom:15px; color: white;">₹ 5 will be deduct</div>
            <div style="display:flex; gap:10px;">
                <button style="flex:1; padding:10px; border-radius:10px; border:none;" onclick="closeModals()">Cancel</button>
                <button style="flex:1; padding:10px; border-radius:10px; border:none; background:#8B3EEB; color:#fff;" onclick="showForm()">Join</button>
            </div>
        </div>
    </div>

    <div id="formModal" class="modal-overlay">
        <div class="modal-card">
            <div style="font-weight:800; margin-bottom:15px; color: white;">Enter Details</div>
            <input type="text" id="gameName" placeholder="FF User Name">
            <input type="number" id="gameId" placeholder="FF User ID">
            <button class="btn-submit" id="submitBtn" onclick="submitJoin()">Submit</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycby_03noxKUZPJCpPb2f7f5IRCTAvKdzqvX9HmuCL3RyRmGeGIY8D_0tYDUF6RVWQiXFpg/exec";

        // Yahan joined 0 hai taaki tumhara logic sahi se chale
        const allMatchData = {
            "BR": [{ id: "BR-50", title: "BR DUO BATTLE", prize: "380", fee: "5", type: "Duo", map: "Bermuda", joined: 0, max: 50 }],
            "CS": [{ id: "CS-01", title: "CS SQUAD RANKED", prize: "160", fee: "40", type: "Squad", map: "Kalahari", joined: 0, max: 8 }],
            "LW": [{ id: "LW-01", title: "LONE WOLF 1V1", prize: "40", fee: "25", type: "Solo", map: "Lone Wolf", joined: 0, max: 2 }],
            "1V1": [{ id: "V1-PRO", title: "1V1 ULTRA BATTLE", prize: "25", fee: "15", type: "Solo", map: "Custom", joined: 0, max: 2 }],
            "LW2": [{ id: "LW2-PRO", title: "LONE WOLF 2.0", prize: "40", fee: "25", type: "Solo", map: "Iron Cage", joined: 0, max: 2 }],
            "FREE": [{ id: "FR-100", title: "FREE ENTRY MATCH", prize: "2000", fee: "0", type: "Duo", map: "Bermuda", joined: 0, max: 100 }],
            "1V1HS": [{ id: "HS-KING", title: "1V1 ONLY HEADSHOT", prize: "20", fee: "15", type: "Solo", map: "Red Map", joined: 0, max: 2 }],
            "CSHS": [{ id: "CSHS-HS", title: "CS HEADSHOT BATTLE", prize: "30", fee: "20", type: "Solo", map: "Store", joined: 0, max: 2 }]
        };

        const params = new URLSearchParams(window.location.search);
        const matchKey = params.get('type') || 'LW';
        let currentMatch = null;

        function displayMatches(status) {
            const container = document.getElementById('matchList');
            const matches = allMatchData[matchKey] || [];
            document.getElementById('pageTitle').innerText = matchKey.toUpperCase();
            container.innerHTML = (status !== 'upcoming') ? `<div style="text-align:center; padding:50px; color:#AAA;">No matches!</div>` : "";
            
            if(status === 'upcoming') {
                matches.forEach(m => {
                    // ✅ YE HAI AUTO-FILL LOGIC: (Bande joined / Max Limit) * 100
                    let fillPercentage = (m.joined / m.max) * 100;
                    
                    let btnText = localStorage.getItem("joined_" + m.id) ? (m.type === "Solo" ? "Joined" : "Join Friend") : "Join";
                    
                    container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <div class="match-info">
                                <img src="${matchKey.toLowerCase()}_poster.jpg" onerror="this.src='lw2_poster.jpg'">
                                <div class="match-title-text">${m.title} #${m.id}</div>
                            </div>
                            <div class="view-link" onclick="openInfo('${m.id}')">view</div>
                        </div>
                        <div class="stats-row">
                            <div class="stat-box"><span class="stat-label">Prize</span><span class="stat-value">₹${m.prize}</span></div>
                            <div class="stat-box"><span class="stat-label">Fee</span><span class="stat-value">₹${m.fee}</span></div>
                            <div class="stat-box"><span class="stat-label">Map</span><span class="stat-value">${m.map}</span></div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="player-count">${m.joined}/${m.max}</div>
                                <div class="progress-fill" style="width:${fillPercentage}%"></div>
                            </div>
                            <button class="join-btn" onclick="startJoin('${m.id}', ${m.fee})">${btnText}</button>
                        </div>
                    </div>`;
                });
            }
        }

        function openInfo(id) {
            currentMatch = allMatchData[matchKey].find(x => x.id === id);
            document.getElementById('infoMatchTitle').innerText = currentMatch.title + " #" + currentMatch.id;
            document.getElementById('infoType').innerText = currentMatch.type;
            document.getElementById('infoMap').innerText = currentMatch.map;
            document.getElementById('infoFee').innerText = currentMatch.fee;
            document.getElementById('infoOverlay').style.display = 'flex';
        }

        function closeInfo() { document.getElementById('infoOverlay').style.display = 'none'; }
        function startJoin(id, fee) {
            currentMatch = allMatchData[matchKey].find(x => x.id === id);
            document.getElementById('confirmText').innerText = fee == 0 ? "FREE ENTRY!" : `₹ ${fee} will be deduct`;
            document.getElementById('confirmModal').style.display = 'flex';
        }
        function triggerJoinFromInfo() { startJoin(currentMatch.id, currentMatch.fee); }
        function showForm() { document.getElementById('confirmModal').style.display = 'none'; document.getElementById('formModal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function showMyEntries() { alert("Your Entries are saved locally."); }
        function showParticipants() { alert("Coming Soon!"); }

        function submitJoin() {
            const name = document.getElementById('gameName').value.trim();
            const gId = document.getElementById('gameId').value.trim();
            if(!name || !gId) return alert("Enter Name and ID!");

            const btn = document.getElementById('submitBtn');
            btn.innerText = "Joining...";
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append("action", "registerMatch");
            formData.append("matchId", currentMatch.id);
            formData.append("playerName", name);
            formData.append("playerId", gId);
            formData.append("matchType", currentMatch.type);

            fetch(scriptURL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            })
            .then(() => {
                // UI Update: Joined badha do taaki bar bhare
                currentMatch.joined++; 
                
                let entries = JSON.parse(localStorage.getItem("my_registrations_" + currentMatch.id)) || [];
                entries.push({name: name, id: gId});
                localStorage.setItem("my_registrations_" + currentMatch.id, JSON.stringify(entries));
                localStorage.setItem("joined_" + currentMatch.id, "true");

                alert("Successfully Joined!");
                closeModals(); closeInfo(); displayMatches('upcoming');
            })
            .catch(err => {
                alert("Error connecting to server!");
            })
            .finally(() => {
                btn.innerText = "Submit";
                btn.disabled = false;
            });
        }

        function switchTab(t) { 
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); 
            document.getElementById('tab-'+t).classList.add('active'); 
            displayMatches(t); 
        }
        window.onload = () => displayMatches('upcoming');
    </script>
</body>
</html>
