<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Details - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; position: relative; }
        
        /* 🔥 HYBRID BACKGROUND SPARKS 🔥 */
        .bg-orb-1 { position: fixed; top: -10%; left: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 0, 122, 0.2) 0%, transparent 70%); filter: blur(40px); animation: float1 8s infinite alternate; z-index: -1; }
        .bg-orb-2 { position: fixed; bottom: -10%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(122, 0, 255, 0.2) 0%, transparent 70%); filter: blur(50px); animation: float2 10s infinite alternate; z-index: -1; }
        @keyframes float1 { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 30px); } }
        @keyframes float2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-30px, -50px); } }

        /* 🔲 GLASS UI PANELS 🔲 */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }

        .nav-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 100; }
        .back-btn { color: #00f2fe; text-decoration: none; font-weight: 800; font-size: 13px; text-transform: uppercase; border: 1px solid rgba(0, 242, 254, 0.3); padding: 5px 12px; border-radius: 6px; }
        .nav-title { font-weight: 800; font-size: 16px; background: linear-gradient(90deg, #ff007a, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }

        .container { padding: 15px; max-width: 480px; margin: auto; }

        /* TABS (Hacker Style) */
        .tabs-container { display: flex; border-radius: 12px; margin-bottom: 20px; padding: 5px; gap: 5px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 11px; font-weight: 800; color: #a0aab2; cursor: pointer; border-radius: 10px; text-transform: uppercase; transition: 0.3s; background: rgba(255, 255, 255, 0.05); }
        .tab-btn.active { background: linear-gradient(90deg, #ff007a, #7a00ff); color: #fff; box-shadow: 0 0 15px rgba(255, 0, 122, 0.4); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* MATCH CARD */
        .detail-card { border-radius: 20px; overflow: hidden; margin-top: 10px; }
        .d-banner { height: 180px; background-size: cover; background-position: center; position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .d-badge { position: absolute; top: 12px; left: 12px; background: #ff007a; color: white; font-size: 9px; font-weight: 800; padding: 5px 12px; border-radius: 6px; box-shadow: 0 0 10px rgba(255,0,122,0.5); }
        
        .d-body { padding: 20px; }
        .d-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .d-time { font-size: 11px; color: #00f2fe; font-weight: 600; margin-bottom: 20px; display: block; }
        
        /* INFO GRID */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .info-box { padding: 15px 5px; border-radius: 15px; text-align: center; }
        .i-label { font-size: 9px; color: #a0aab2; font-weight: 600; text-transform: uppercase; margin-bottom: 5px; }
        .i-val { font-size: 16px; font-weight: 800; color: #fff; }
        .neon-text { color: #ff007a; text-shadow: 0 0 10px rgba(255,0,122,0.3); }

        /* PRIZE LIST */
        .prize-dist { padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .p-row { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .p-row:last-child { border-bottom: none; }
        .rank-gold { color: #ff007a; }
        .rank-silver { color: #00f2fe; }

        /* NEON REGISTER BUTTON */
        .register-btn { display: block; width: 100%; background: linear-gradient(90deg, #ff007a, #7a00ff); color: #fff; padding: 18px; border: none; text-align: center; text-decoration: none; border-radius: 15px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-sizing: border-box; letter-spacing: 1px; box-shadow: 0 0 20px rgba(255, 0, 122, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 15px rgba(255,0,122,0.4); } 50% { box-shadow: 0 0 30px rgba(255,0,122,0.7); } 100% { box-shadow: 0 0 15px rgba(255,0,122,0.4); } }
        .register-btn:active { transform: scale(0.96); }
        .register-btn:disabled { background: #222; color: #555; animation: none; box-shadow: none; cursor: not-allowed; }

        #statusMsg { margin-top: 15px; font-size: 12px; font-weight: 700; text-align: center; }
        .empty-state { text-align: center; padding: 60px 20px; color: #555; font-size: 12px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>
    
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span class="nav-title">MATCH DETAILS</span>
        <div style="width: 50px;"></div>
    </div>

    <div class="container">
        <div class="tabs-container glass-panel">
            <div class="tab-btn active" onclick="switchTab(event, 'upcoming')">Upcoming</div>
            <div class="tab-btn" onclick="switchTab(event, 'ongoing')">Ongoing</div>
            <div class="tab-btn" onclick="switchTab(event, 'result')">Result</div>
        </div>

        <div id="upcoming" class="tab-content active">
            <div class="detail-card glass-panel">
                <div class="d-banner" id="match-banner" style="background-image: url('logo.jpg');">
                    <div class="d-badge" id="match-badge">REGISTRATION OPEN</div>
                </div>
                <div class="d-body">
                    <div class="d-title" id="match-title">BR SQUAD BATTLE</div>
                    <span class="d-time" id="match-time">🕒 23 MAR 2026 | 07:00 PM</span>
                    
                    <div class="info-grid">
                        <div class="info-box glass-panel"><div class="i-label">Prize Pool</div><div class="i-val neon-text" id="prize-pool">₹220</div></div>
                        <div class="info-box glass-panel"><div class="i-label">Per Kill</div><div class="i-val">₹0</div></div>
                        <div class="info-box glass-panel"><div class="i-label">Entry</div><div class="i-val neon-text" id="entry-fee">FREE</div></div>
                    </div>

                    <div class="prize-dist glass-panel">
                        <div class="p-row"><span class="rank-gold">🥇 1st Prize</span><span id="p1">₹150</span></div>
                        <div class="p-row"><span class="rank-silver">🥈 2nd Prize</span><span id="p2">₹70</span></div>
                        </div>

                    <button class="register-btn" id="joinBtn" onclick="joinMatch()">REGISTER NOW</button>
                    <div id="statusMsg"></div>
                </div>
            </div>
        </div>

        <div id="ongoing" class="tab-content"><div class="empty-state glass-panel">No Live Matches Right Now</div></div>
        <div id="result" class="tab-content"><div class="empty-state glass-panel">Results Updating Soon...</div></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx2z4GZ8uIyKH9yTQqD_n3XBYEQe3_3k2YyQobq5ucoguHkYu3kwCZer3qYlOR1bstAlA/exec';

        const urlParams = new URLSearchParams(window.location.search);
        const matchID = urlParams.get('match') || 'BR';

        const matchConfig = {
            "BR": { name: "BR SQUAD BATTLE", fee: 0, time: "23 MAR 2026 | 07:00 PM", banner: "br_poster.jpg" },
            "CS": { name: "CS PRO LEAGUE", fee: 50, time: "NOT DECIDED", banner: "cs_poster.jpg" },
            "LW": { name: "LONE WOLF 1", fee: 15, time: "DECIDING SOON", banner: "lw_poster.jpg" },
            "1V1": { name: "1V1 SHOWDOWN", fee: 30, time: "DECIDING SOON", banner: "1v1_poster.jpg" }
        };

        const current = matchConfig[matchID];
        document.getElementById('match-title').innerText = current.name;
        document.getElementById('match-time').innerText = "🕒 " + current.time;
        document.getElementById('entry-fee').innerText = current.fee === 0 ? "FREE" : "₹" + current.fee;
        document.getElementById('match-banner').style.backgroundImage = `url('${current.banner}')`;

        let joinBtn = document.getElementById('joinBtn');
        joinBtn.innerText = current.fee === 0 ? "JOIN FOR FREE" : `PAY ₹${current.fee} & JOIN`;

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function joinMatch() {
            let savedUser = localStorage.getItem("rareGamingUser");
            if(!savedUser) return alert("Pehle login karo!");
            let username = JSON.parse(savedUser).name;

            joinBtn.disabled = true;
            joinBtn.innerText = "⏳ PROCESSING...";
            
            fetch(`${scriptURL}?action=joinMatch&username=${encodeURIComponent(username)}&matchName=${encodeURIComponent(matchID)}&fee=${current.fee}`)
            .then(res => res.text())
            .then(status => {
                let msg = document.getElementById('statusMsg');
                if(status === "Success") {
                    msg.innerHTML = "✅ JOINED SUCCESSFULLY!";
                    msg.style.color = "#00e676";
                    joinBtn.innerText = "ALREADY JOINED";
                } else if(status === "Low Balance") {
                    msg.innerHTML = "🚫 LOW BALANCE! Add money first.";
                    msg.style.color = "#ff4b2b";
                    joinBtn.disabled = false;
                    joinBtn.innerText = `PAY ₹${current.fee} & JOIN`;
                } else if(status === "Already Joined") {
                    msg.innerHTML = "⚠️ You are already registered!";
                    msg.style.color = "#ffea00";
                    joinBtn.innerText = "ALREADY JOINED";
                } else {
                    msg.innerHTML = "❌ " + status;
                    joinBtn.disabled = false;
                    joinBtn.innerText = "TRY AGAIN";
                }
            });
        }
    </script>
</body>
</html>
