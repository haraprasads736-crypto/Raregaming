<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { background-color: #120524; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER */
        .header { display: flex; align-items: center; padding: 15px 20px; background: #1A0A2D; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 20px; color: #fff; cursor: pointer; }
        .title { font-size: 18px; font-weight: 700; flex: 1; text-align: center; margin-right: 20px; text-transform: uppercase; }

        /* TABS */
        .tab-container { display: flex; justify-content: space-around; background: #2D1B44; margin: 15px 20px; border-radius: 50px; padding: 5px; }
        .tab { padding: 8px 15px; border-radius: 50px; font-size: 13px; font-weight: 600; color: #AAA; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #8B3EEB; color: #fff; }

        /* MATCH CARD (BATTLEOP STYLE) */
        .match-list { padding: 0 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; color: #000; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .match-logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #8B3EEB; }
        .header-text { flex: 1; }
        .match-title { font-size: 13px; font-weight: 800; color: #111; display: flex; justify-content: space-between; align-items: center; }
        .match-time { font-size: 10px; font-weight: 700; color: #444; display: block; margin-top: 2px; }
        .view-link { color: #8B3EEB; font-weight: 800; font-size: 12px; text-decoration: none; cursor: pointer; }

        /* 6-SLOT GRID (EXACTLY LIKE PHOTO) */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .stat-box { background: #8B3EEB; border-radius: 8px; padding: 5px; text-align: center; color: white; }
        .stat-label { font-size: 8px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .stat-value { font-size: 11px; font-weight: 800; display: block; margin-top: 2px; }

        /* PROGRESS BAR */
        .progress-section { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 14px; background: #E0D4FF; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid #8B3EEB; }
        .progress-fill { height: 100%; background: #2D1B44; width: 0%; transition: 0.5s; }
        .player-count { position: absolute; width: 100%; text-align: center; font-size: 9px; font-weight: 800; line-height: 14px; color: #fff; z-index: 2; }
        
        .join-btn { background: #1A0A2D; color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; cursor: pointer; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; }
        .modal-card { background: #2D1B44; width: 100%; max-width: 320px; border-radius: 20px; padding: 25px; text-align: center; color: white; }
        .modal-card input { width: 100%; background: #1A0A2D; border: 1px solid #8B3EEB; padding: 12px; margin-bottom: 10px; border-radius: 10px; color: #fff; box-sizing: border-box; font-family: 'Poppins'; }
        .btn-submit { background: #39ff14; color: #000; width: 100%; padding: 12px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header">
            <i class="fas fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
            <div class="title" id="pageTitle">FREE FIRE MAXX</div>
        </div>
        
        <div class="tab-container">
            <div class="tab active" onclick="switchTab('upcoming', this)">Upcoming</div>
            <div class="tab" onclick="switchTab('ongoing', this)">Ongoing</div>
            <div class="tab" onclick="switchTab('result', this)">Result</div>
        </div>
        
        <div class="match-list" id="matchList"></div>
    </div>

    <div id="formModal" class="modal-overlay">
        <div class="modal-card">
            <h3>Enter Your Details</h3>
            <input type="text" id="gameName" placeholder="In-Game Name">
            <input type="number" id="gameId" placeholder="In-Game UID">
            <button class="btn-submit" id="submitBtn" onclick="submitJoin()">Confirm Join</button>
            <p onclick="closeModals()" style="color:#aaa; cursor:pointer; font-size:12px; margin-top:10px;">Cancel</p>
        </div>
    </div>

    <script>
        // ✅ TERA NAYA DEPLOY URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbys-5KtuK__rMMOX-lvPZn4d6UFo_ZBNq4fuvTBpH28kIZXwcLVo63tVyiW4TlMazAkJw/exec";
        
        const params = new URLSearchParams(window.location.search);
        const matchKey = params.get('type') || 'LW';
        let currentMatchId = null;

        async function loadMatches(status = 'upcoming') {
            const container = document.getElementById('matchList');
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#8B3EEB;">Loading Live Matches...</div>`;

            try {
                const response = await fetch(`${scriptURL}?action=getMatches`);
                const allMatches = await response.json();
                const filtered = allMatches.filter(m => m.category === matchKey && m.status === status);

                container.innerHTML = ""; 
                if (filtered.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:50px; color:#AAA;">No matches available!</div>`;
                    return;
                }

                filtered.forEach(m => {
                    let fill = (m.joined / m.max) * 100;
                    let isJoined = localStorage.getItem("joined_" + m.id);
                    
                    container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="${matchKey.toLowerCase()}_poster.jpg" class="match-logo" onerror="this.src='https://i.imgur.com/uR1Y6T2.jpeg'">
                            <div class="header-text">
                                <div class="match-title">
                                    ${m.title} #${m.id}
                                    <span class="view-link" onclick="alert('Match details coming soon!')">view</span>
                                </div>
                                <span class="match-time">${m.date || 'TBD'} ${m.time || ''}</span>
                            </div>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-label"><i class="fas fa-trophy"></i> Prize Pool</span><span class="stat-value">₹${m.prize}</span></div>
                            <div class="stat-box"><span class="stat-label"><i class="fas fa-crosshairs"></i> Per Kill</span><span class="stat-value">₹${m.perkill || '0'}</span></div>
                            <div class="stat-box"><span class="stat-label"><i class="fas fa-sign-in-alt"></i> Entry Fee</span><span class="stat-value">₹${m.fee}</span></div>
                            <div class="stat-box"><span class="stat-label">Type</span><span class="stat-value">${m.type}</span></div>
                            <div class="stat-box"><span class="stat-label">Version</span><span class="stat-value">${m.version || 'TPP'}</span></div>
                            <div class="stat-box"><span class="stat-label">Map</span><span class="stat-value">${m.map}</span></div>
                        </div>

                        <div class="progress-section">
                            <div class="progress-bar">
                                <div class="player-count">${m.joined}/${m.max}</div>
                                <div class="progress-fill" style="width:${fill}%"></div>
                            </div>
                            <button class="join-btn" onclick="openForm('${m.id}')">${isJoined ? 'Joined' : 'Join'}</button>
                        </div>
                    </div>`;
                });
            } catch (e) { container.innerHTML = "<p style='text-align:center;'>Server Error!</p>"; }
        }

        function openForm(id) { currentMatchId = id; document.getElementById('formModal').style.display = 'flex'; }
        function closeModals() { document.getElementById('formModal').style.display = 'none'; }

        async function submitJoin() {
            const name = document.getElementById('gameName').value;
            const uid = document.getElementById('gameId').value;
            if(!name || !uid) return alert("Fill all details!");
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing..."; btn.disabled = true;

            try {
                await fetch(scriptURL, {
                    method: 'POST', mode: 'no-cors',
                    body: new URLSearchParams({'action':'registerMatch', 'matchId':currentMatchId, 'playerName':name, 'playerId':uid, 'matchType':matchKey})
                });
                localStorage.setItem("joined_" + currentMatchId, "true");
                alert("Match Joined!"); closeModals(); loadMatches('upcoming');
            } catch (e) { alert("Error!"); }
            finally { btn.innerText = "Confirm Join"; btn.disabled = false; }
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active');
            loadMatches(t);
        }

        window.onload = () => loadMatches('upcoming');
    </script>
</body>
</html>
