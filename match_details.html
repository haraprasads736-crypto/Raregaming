<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Match Details - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        /* 🛠️ DARK THEME BASE */
        body { background-color: #0F041C; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* 🛠️ HEADER */
        .header { display: flex; align-items: center; padding: 15px 20px; background: #160826; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #2D1B44; }
        .back-btn { font-size: 18px; color: #fff; cursor: pointer; }
        .title { font-size: 15px; font-weight: 700; flex: 1; text-align: center; margin-right: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* 🛠️ TABS */
        .tab-container { display: flex; justify-content: space-around; background: #1A0A2D; margin: 15px; border-radius: 8px; padding: 4px; border: 1px solid #2D1B44; }
        .tab { padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #8B3EEB; color: #fff; }

        /* 🚀 LOBBY ROOM BOX (Jo tab ke niche dikhega) */
        #topGlobalRoomBox {
            display: none; 
            margin: 0 15px 15px 15px;
            background: linear-gradient(135deg, #1A0A2D 0%, #2D1B44 100%);
            border: 1px dashed #00f2fe;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        .room-header { color: #00f2fe; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .room-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .room-label { color: #aaa; font-size: 11px; }
        .room-val { color: #fff; font-weight: 800; font-family: monospace; letter-spacing: 1px; }

        /* 🛠️ CARD STYLE */
        .match-list { padding: 0 12px; }
        .card { background: #FFFFFF; border-radius: 8px; padding: 15px; margin-bottom: 20px; color: #000; position: relative; border-left: 5px solid #8B3EEB; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        .card-header { display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #F0F0F0; padding-bottom: 10px; margin-bottom: 12px; }
        .match-logo { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .header-text { flex: 1; }
        .match-title { font-size: 13px; font-weight: 800; color: #111; display: flex; justify-content: space-between; align-items: center; }
        .match-time { font-size: 9px; font-weight: 700; color: #666; display: block; margin-top: 2px; }
        .view-link { color: #8B3EEB; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; border-bottom: 1px solid #8B3EEB; }

        /* 🛠️ STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .stat-box { background: #8B3EEB; border-radius: 4px; padding: 6px 2px; text-align: center; color: white; }
        .stat-label { font-size: 7px; font-weight: 600; text-transform: uppercase; display: block; opacity: 0.9; }
        .stat-value { font-size: 10px; font-weight: 800; display: block; margin-top: 1px; }

        /* 🛠️ PROGRESS & JOIN */
        .progress-section { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .progress-bar { flex: 1; height: 12px; background: #E0D4FF; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #8B3EEB; }
        .progress-fill { height: 100%; background: #2D1B44; width: 0%; transition: 0.5s ease-in-out; }
        .player-count { position: absolute; width: 100%; text-align: center; font-size: 8.5px; font-weight: 800; line-height: 12px; color: #fff; z-index: 2; }
        
        .join-btn { background: #160826; color: white; border: none; padding: 8px 18px; border-radius: 4px; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; }

        /* 🛠️ VIEW OVERLAY */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0F041C; display: none; flex-direction: column; z-index: 2000; overflow-y: auto; }
        .overlay-content { padding: 25px; padding-bottom: 50px; }
        .detail-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .detail-label { color: #AAA; font-size: 14px; }
        .detail-value { font-weight: 700; color: #00f2fe; }

        .view-room-box { display: none; margin-bottom: 25px; text-align: center; border: 1px dashed #8B3EEB; padding: 15px; border-radius: 10px; background: rgba(139, 62, 235, 0.05); }

        /* 🛠️ MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 4000; padding: 20px; box-sizing: border-box; }
        .modal-card { background: #1A0A2D; width: 100%; max-width: 310px; border-radius: 12px; padding: 30px; text-align: center; color: white; border: 1px solid #2D1B44; }
        .modal-card input { width: 100%; background: #0F041C; border: 1px solid #8B3EEB; padding: 12px; margin: 10px 0; border-radius: 8px; color: #fff; text-align: center; font-size: 14px; box-sizing: border-box; }
        .btn-confirm { background: #39ff14; color: #000; width: 100%; padding: 12px; border-radius: 8px; font-weight: 800; border: none; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="mainPage">
        <div class="header">
            <i class="fas fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
            <div class="title">FREE FIRE MAXX</div>
        </div>
        
        <div class="tab-container">
            <div class="tab active" onclick="switchTab('upcoming', this)">Upcoming</div>
            <div class="tab" onclick="switchTab('ongoing', this)">Ongoing</div>
            <div class="tab" onclick="switchTab('result', this)">Result</div>
        </div>

        <div id="topGlobalRoomBox">
            <div class="room-header"><i class="fas fa-key"></i> Joined Match Access</div>
            <div class="room-row"><span class="room-label">Room Id:</span><span id="topRoomID" class="room-val">Wait...</span></div>
            <div class="room-row"><span class="room-label">Password:</span><span id="topRoomPass" class="room-val">Wait...</span></div>
        </div>

        <div class="match-list" id="matchList"></div>
    </div>

    <div id="viewOverlay" class="overlay">
        <div class="header">
            <i class="fas fa-arrow-left back-btn" onclick="closeView()"></i>
            <div class="title" id="viewTitle">MATCH DETAILS</div>
        </div>
        <div class="overlay-content">
            
            <div id="joinedRoomBox" class="view-room-box">
                <h4 style="margin:0 0 10px; color:#00f2fe; font-size:12px; font-weight:800; text-transform: uppercase;">Room Access Granted</h4>
                <div class="room-row"><span class="room-label">RoomId:</span><span id="roomID" class="room-val" style="font-size:18px;">Wait...</span></div>
                <div class="room-row"><span class="room-label">RoomPassword:</span><span id="roomPass" class="room-val" style="font-size:18px;">Wait...</span></div>
            </div>

            <div class="detail-row"><span class="detail-label">Match Type :</span><span id="detType" class="detail-value"></span></div>
            <div class="detail-row"><span class="detail-label">Version :</span><span id="detVer" class="detail-value"></span></div>
            <div class="detail-row"><span class="detail-label">Map :</span><span id="detMap" class="detail-value"></span></div>
            <div class="detail-row"><span class="detail-label">Entry Fee :</span><span id="detFee" class="detail-value"></span></div>
            
            <div style="margin: 25px 0; background: rgba(139, 62, 235, 0.1); padding: 15px; border-radius: 8px;">
                <p style="margin:0; font-size:14px; color:#8B3EEB; font-weight:800;">About This Match</p>
                <p style="margin:10px 0 5px; font-size:13px; color:#aaa;">WINNER : ₹ 20</p>
                <p style="margin:5px 0; font-size:13px; color:#aaa;">2nd : ₹ 10</p>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="join-btn" style="background:#2D1B44; padding:12px;">My Entries</button>
                <button class="join-btn" style="background:#2D1B44; padding:12px;">Participants</button>
            </div>

            <button class="join-btn" id="overlayJoinBtn" style="width:100%; padding: 15px; background:#8B3EEB;" onclick="startFromOverlay()">Join Now</button>
        </div>
    </div>

    <div id="walletModal" class="modal-overlay">
        <div class="modal-card">
            <i class="fas fa-wallet" style="font-size:35px; color:#8B3EEB; margin-bottom:15px;"></i>
            <h3 id="deductText">₹ -- will be deduct</h3>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="closeModals()" style="flex:1; background:none; border:1px solid #444; color:#AAA; border-radius:8px;">Cancel</button>
                <button onclick="showInputModal()" style="flex:1; background:#fff; color:#000; font-weight:800; border-radius:8px;">Join</button>
            </div>
        </div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="font-size:18px;">Player Details</h3>
            <input type="text" id="gameName" placeholder="In-Game Name">
            <input type="number" id="gameId" placeholder="In-Game UID">
            <button class="btn-confirm" id="submitBtn" onclick="finalJoin()">Confirm Join</button>
            <p onclick="closeModals()" style="color:#aaa; cursor:pointer; font-size:12px; margin-top:15px;">Back</p>
        </div>
    </div>

    <script>
        (function() { if (!localStorage.getItem("rareGamingUser")) { window.location.href = "login.html"; } })();

        const scriptURL = "https://script.google.com/macros/s/AKfycbzur5avygfhOIRnRfgnVH_q5cjU3beaWN6zywqlZi7revoJeqSZuVcB0u_nvmT-MoTOiQ/exec";
        
        let allMatches = [];
        let currentMatch = null;

        async function syncRoomDetails() {
            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const topBox = document.getElementById('topGlobalRoomBox');
            const viewBox = document.getElementById('joinedRoomBox');
            if(!user) return;

            let joinedId = null;
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key.startsWith("joined_")) { joinedId = key.split("_")[1]; break; }
            }

            if (joinedId) {
                topBox.style.display = 'block';
                viewBox.style.display = 'block';
                try {
                    const res = await fetch(`${scriptURL}?action=getRoomDetails&matchId=${joinedId}&userId=${user.uid}`);
                    const data = await res.json();
                    if (data.status === "Success" && data.roomId && data.roomId !== "Wait...") {
                        document.getElementById('topRoomID').innerText = data.roomId;
                        document.getElementById('topRoomPass').innerText = data.password;
                        document.getElementById('roomID').innerText = data.roomId;
                        document.getElementById('roomPass').innerText = data.password;
                    } else {
                        document.getElementById('topRoomID').innerText = "Wait...";
                        document.getElementById('topRoomPass').innerText = "Wait...";
                        document.getElementById('roomID').innerText = "Wait...";
                        document.getElementById('roomPass').innerText = "Wait...";
                    }
                } catch (e) { console.log("Sync error"); }
            }
        }

        async function loadMatches(status = 'upcoming') {
            const container = document.getElementById('matchList');
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#8B3EEB;">Loading matches...</div>`;
            syncRoomDetails();
            
            try {
                const response = await fetch(`${scriptURL}?action=getMatches`);
                allMatches = await response.json();
                const matchKey = new URLSearchParams(window.location.search).get('type') || 'LW';
                const filtered = allMatches.filter(m => m.category === matchKey && m.status === status);
                container.innerHTML = ""; 
                
                filtered.forEach(m => {
                    let isJoined = localStorage.getItem("joined_"+m.id);
                    let d = m.date ? new Date(m.date).toLocaleDateString('en-GB') : 'TBD';

                    container.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <img src="${matchKey.toLowerCase()}_poster.jpg" class="match-logo" onerror="this.src='https://i.imgur.com/uR1Y6T2.jpeg'">
                            <div style="flex:1;">
                                <div style="display:flex; justify-content:space-between;">
                                    <p class="match-title" style="margin:0">${m.title} #${m.id}</p>
                                    <span class="view-link" onclick="openView('${m.id}')">view</span>
                                </div>
                                <span class="match-time">${d} | ${m.time || ''}</span>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-label">Prize</span><span class="stat-value">₹${m.prize}</span></div>
                            <div class="stat-box"><span class="stat-label">Per Kill</span><span class="stat-value">₹${m.perkill || '0'}</span></div>
                            <div class="stat-box"><span class="stat-label">Fee</span><span class="stat-value">₹${m.fee}</span></div>
                            <div class="stat-box" style="background:#2D1B44"><span class="stat-label">Type</span><span class="stat-value">${m.type}</span></div>
                            <div class="stat-box" style="background:#2D1B44"><span class="stat-label">Map</span><span class="stat-value">${m.map}</span></div>
                            <div class="stat-box" style="background:#2D1B44"><span class="stat-label">Mode</span><span class="stat-value">${m.version || 'TPP'}</span></div>
                        </div>
                        <div class="progress-section">
                            <div class="progress-bar"><div class="player-count">${m.joined}/${m.max}</div><div class="progress-fill" style="width:${(m.joined/m.max)*100}%"></div></div>
                            <button class="join-btn" ${isJoined ? 'disabled style="background:#444"' : ''} onclick="openWalletModal('${m.id}')">${isJoined ? 'Joined' : 'Join'}</button>
                        </div>
                    </div>`;
                });
            } catch (e) { container.innerHTML = "Error loading matches!"; }
        }

        function openView(id) {
            currentMatch = allMatches.find(x => x.id == id);
            document.getElementById('viewTitle').innerText = currentMatch.title;
            document.getElementById('detType').innerText = currentMatch.type;
            document.getElementById('detVer').innerText = currentMatch.version || 'TPP';
            document.getElementById('detMap').innerText = currentMatch.map;
            document.getElementById('detFee').innerText = "₹ " + currentMatch.fee;
            
            const overlayBtn = document.getElementById('overlayJoinBtn');
            const isJoined = localStorage.getItem("joined_"+id);
            if(isJoined){
                overlayBtn.innerText = "ALREADY JOINED ✅";
                overlayBtn.disabled = true;
            } else {
                overlayBtn.innerText = "Join Now";
                overlayBtn.disabled = false;
            }
            
            document.getElementById('viewOverlay').style.display = 'flex';
            syncRoomDetails();
        }

        function openWalletModal(id) {
            currentMatch = allMatches.find(x => x.id == id);
            document.getElementById('deductText').innerText = `₹ ${currentMatch.fee} will be deduct`;
            document.getElementById('walletModal').style.display = 'flex';
        }

        function showInputModal() { closeModals(); document.getElementById('inputModal').style.display = 'flex'; }
        function startFromOverlay() { closeView(); openWalletModal(currentMatch.id); }
        function closeView() { document.getElementById('viewOverlay').style.display = 'none'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        async function finalJoin() {
            const name = document.getElementById('gameName').value.trim();
            const uid = document.getElementById('gameId').value.trim();
            let userStr = localStorage.getItem("rareGamingUser");
            let userData = JSON.parse(userStr);
            if(!name || !uid) return alert("Fill details!");
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing..."; btn.disabled = true;
            try {
                const response = await fetch(scriptURL, { method:'POST', body: new URLSearchParams({'action': 'registerMatch','matchId': currentMatch.id,'matchFee': currentMatch.fee,'userId': userData.uid,'playerName': name,'playerId': uid,'matchType': currentMatch.type})});
                const result = await response.json();
                if (result.status === "Success") {
                    localStorage.setItem("joined_"+currentMatch.id, "true");
                    alert("Joined Match Successfully!"); closeModals(); loadMatches('upcoming');
                } else { alert(result.message || "Failed"); }
            } catch (e) { alert("Error!"); }
            finally { btn.innerText = "Confirm Join"; btn.disabled = false; }
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            el.classList.add('active'); loadMatches(t);
        }

        window.onload = () => loadMatches('upcoming');
    </script>
</body>
</html>
