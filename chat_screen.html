<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Fast Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { background: #0b141a; font-family: 'Poppins', sans-serif; margin: 0; color: #fff; }
        
        /* 📱 WhatsApp Style Header */
        .chat-header { background: #202c33; padding: 15px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; gap: 15px; }
        .back-btn { font-size: 20px; color: #8696a0; }
        .user-info h4 { margin: 0; font-size: 16px; color: #e9edef; }
        .user-info p { margin: 0; font-size: 11px; color: #8696a0; }

        /* 💬 Chat Area */
        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://i.pinimg.com/originals/79/5c/36/795c367505b3ef3bc324d6fd2ad59096.png'); background-blend-mode: overlay; background-color: #0b141a; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; line-height: 1.5; }
        .sent { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .time { font-size: 9px; color: rgba(255,255,255,0.5); display: block; text-align: right; margin-top: 4px; }

        /* ⌨️ Input Bar */
        .input-area { background: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .input-area input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: #fff; outline: none; font-size: 14px; }
        .send-btn { background: #00a884; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="user-info">
            <h4>Rare Gaming Support</h4>
            <p>online</p>
        </div>
    </div>

    <div id="chatBox">
        <div class="msg received">Bhai, message bhej ke dekho kitna fast hai!<span class="time">10:00 PM</span></div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');

        function sendMsg() {
            const text = msgInput.value.trim();
            if(!text) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // 🟢 WHATSAPP LOGIC: Pehle screen par dikhao (Fast Feel)
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg sent';
            msgDiv.innerHTML = `${text}<span class="time">${time}</span>`;
            chatBox.appendChild(msgDiv);
            
            msgInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // ☁️ Ab Background mein server (Google Sheet/Firebase) par bhejo
            saveToDatabase(text);
        }

        function saveToDatabase(msg) {
            // Yahan tera fetch logic aayega
            console.log("Saving to server in background...");
        }
    </script>
</body>
</html>
