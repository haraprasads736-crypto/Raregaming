<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Vault - Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        :root { --bg: #030305; --neon: #00f2fe; --sent-bg: linear-gradient(135deg, #00f2fe, #0062ff); }
        
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }

        /* 🔔 NOTIFICATION DOT STYLE */
        .unread-dot { width: 10px; height: 10px; background: #39ff14; border-radius: 50%; box-shadow: 0 0 10px #39ff14; display: inline-block; margin-left: 8px; }

        .chat-header { background: rgba(10, 10, 15, 0.95); padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--neon); z-index: 100; }
        #chatBox { height: calc(100vh - 180px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050508; }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; word-wrap: break-word; user-select: none; -webkit-user-select: none; }
        .sent { background: var(--sent-bg); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        .received { background: #111; border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .time { font-size: 8px; opacity: 0.6; display: block; margin-top: 5px; text-align: right; }

        .input-area { background: #0a0a0f; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 35px; width: 100%; box-sizing: border-box; z-index: 100; }
        #msgInput { flex: 1; background: #151520; border: 1px solid #2a2a30; padding: 12px 18px; border-radius: 50px; color: #fff; outline: none; }
        .send-btn { background: var(--neon); width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon); }
        
        .system-nav-protection { position: fixed; bottom: 0; width: 100%; height: 35px; background: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-user-shield" style="color: var(--neon); font-size: 20px;"></i>
            <div>
                <div style="font-weight: 800; font-size: 14px;">RARE VAULT</div>
                <div id="statusText" style="font-size: 9px; color: #39ff14;">SECURE & LIVE</div>
            </div>
        </div>
        <button onclick="requestNotify()" style="background:none; border:none; color:var(--neon);"><i class="fas fa-bell"></i></button>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Secure message..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="send-btn" onclick="handleSend()"><i class="fas fa-paper-plane" style="color: #000;"></i></button>
    </div>

    <div class="system-nav-protection"></div>

    <script>
        const SECRET_KEY = "RareGaming_9thClass_Security"; 
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            storageBucket: "rare-gaming-b8875.firebasestorage.app",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const user = JSON.parse(localStorage.getItem("rareGamingUser")) || { name: "Player_" + Math.floor(Math.random()*100) };

        function encrypt(text) { return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
        function decrypt(ciphertext) {
            try { return CryptoJS.AES.decrypt(ciphertext, SECRET_KEY).toString(CryptoJS.enc.Utf8); }
            catch(e) { return "--- Encrypted ---"; }
        }

        // 🔔 NOTIFICATION PERMISSION
        function requestNotify() {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') alert("Notifications Enabled! 🔔");
            });
        }

        function handleSend() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;
            database.ref('messages').push({
                sender: user.name,
                text: encrypt(text),
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                seen: false // 🆕 Naya message 'unseen' hoga
            });
            document.getElementById('msgInput').value = "";
        }

        database.ref('messages').on('value', (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const isMe = data.sender === user.name;
                const unlockedText = decrypt(data.text);

                // 🆕 Notification Logic
                if(!isMe && data.seen === false && document.hidden) {
                    new Notification("New Message from " + data.sender, { body: unlockedText });
                }

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
                
                // 🟢 Dot Logic: Agar receiver ne nahi dekha toh dot dikhao
                let dot = (!isMe && data.seen === false) ? '<span class="unread-dot"></span>' : '';
                
                msgDiv.innerHTML = `${unlockedText}${dot}<span class="time">${new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Sabhi messages ko 'seen' mark kar do jab chat khuli ho
            if(!document.hidden) {
                database.ref('messages').once('value', (snap) => {
                    snap.forEach(c => { if(c.val().sender !== user.name) c.ref.update({seen: true}); });
                });
            }
        });
    </script>
</body>
</html>
