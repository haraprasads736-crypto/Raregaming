<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chats - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 160px; }
        .header { padding: 20px; background: #111116; border-bottom: 1px solid #1f1f25; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 20px; margin: 0; color: #ffd700; text-transform: uppercase; }
        
        .section-label { padding: 10px 20px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .add-box { padding: 15px; background: #111116; margin: 15px; border-radius: 15px; border: 1px solid #1f1f25; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #2a2a30; color: #fff; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-add { width: 100%; padding: 12px; background: #00f2fe; color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        .contact-list { padding: 0 15px; }
        .contact-card { background: #111116; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: white; position: relative; }
        .contact-card i { font-size: 35px; color: #ffd700; }
        .contact-info b { font-size: 14px; display: block; text-transform: uppercase; }
        .contact-info span { font-size: 10px; color: #888; }
        .new-msg-tag { position: absolute; right: 15px; background: #00a884; color: white; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 800; }

        /* Nav Bar Niche ka fixed */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1f1f25; z-index: 1000; padding: 0 5px; }
        .nav-item { text-decoration: none; color: #666; font-size: 9px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: white; }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Rare Chat</h2>
        <i class="fas fa-comments" style="color: #00f2fe;"></i>
    </div>

    <div class="add-box">
        <input type="text" id="newUID" placeholder="Enter Friend's UID (RGXXXXXX)">
        <button class="btn-add" onclick="addNewChat()">Start Chatting</button>
    </div>

    <div class="section-label">Recent Messages</div>
    <div class="contact-list" id="contactList">
        <p style='text-align:center;color:#666;padding:20px;'>Fetching chats...</p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar">RARE GAMING PROTECTION ACTIVE</div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyVD1mbzYVVY0gyv5fai_i2ST744bYOTvb_s2AvxGibfpvMkCM-4iz3IebpeTLPWfxuJw/exec";
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));

        // 1. Naya Chat Start Karna
        function addNewChat() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            if(uid.length < 5) return alert("Sahi UID dalo!");
            
            // Name fetch karna server se
            fetch(`${scriptURL}?action=checkUID&uid=${uid}`)
            .then(res => res.text()).then(name => {
                if(name === "Not Found") return alert("UID galat hai!");
                window.location.href = `chat_screen.html?uid=${uid}&name=${encodeURIComponent(name)}`;
            });
        }

        // 2. SMART FETCH: Jo messages aaye hain unke contacts dikhana
        function loadRecentChats() {
            if(!user) return;
            // Hum saare messages mangwayenge ye dekhne ke liye ki kisne msg bheja hai
            fetch(`${scriptURL}?action=getMessages&user1=${user.uid}&user2=ALL`)
            .then(res => res.json()).then(data => {
                let list = document.getElementById('contactList');
                list.innerHTML = "";
                
                let uniqueContacts = {};
                // Messages se contacts nikalna
                data.forEach(m => {
                    let otherUser = (m.sender == user.uid) ? m.receiver : m.sender;
                    uniqueContacts[otherUser] = true;
                });

                let contactArray = Object.keys(uniqueContacts);
                if(contactArray.length === 0) {
                    list.innerHTML = "<p style='text-align:center;color:#666;padding:20px;'>No chats found.</p>";
                    return;
                }

                contactArray.forEach(uid => {
                    fetch(`${scriptURL}?action=checkUID&uid=${uid}`)
                    .then(res => res.text()).then(name => {
                        list.innerHTML += `
                            <a href="chat_screen.html?uid=${uid}&name=${encodeURIComponent(name)}" class="contact-card">
                                <i class="fas fa-user-circle"></i>
                                <div class="contact-info">
                                    <b>${name}</b>
                                    <span>UID: ${uid}</span>
                                </div>
                                <div class="new-msg-tag">Message</div>
                            </a>
                        `;
                    });
                });
            });
        }

        window.onload = loadRecentChats;
    </script>
</body>
</html>
