<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Vault - Secure Chat</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        :root { --bg: #030305; --neon: #00f2fe; --sent-bg: linear-gradient(135deg, #00f2fe, #0062ff); }
        
        html, body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            overscroll-behavior-y: contain; 
        }
        
        .chat-header { background: rgba(10, 10, 15, 0.95); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--neon); z-index: 100; }
        
        /* Back Button Style */
        .back-btn { font-size: 20px; color: var(--neon); margin-right: 15px; cursor: pointer; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; transition: 0.3s; }
        .online-dot { background: #39ff14; box-shadow: 0 0 8px #39ff14; }
        .offline-dot { background: #ff4444; box-shadow: 0 0 8px #ff4444; }

        #chatBox { height: calc(100vh - 180px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #050508; }
        
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; position: relative; word-wrap: break-word; }
        .sent { background: var(--sent-bg); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 600; }
        .received { background: #111; border: 1px solid rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .time { font-size: 8px; opacity: 0.6; display: block; margin-top: 5px; text-align: right; }
        
        .input-area { background: #0a0a0f; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 35px; width: 100%; box-sizing: border-box; }
        #msgInput { flex: 1; background: #151520; border: 1px solid #2a2a30; padding: 12px 18px; border-radius: 50px; color: #fff; outline: none; }
        .send-btn { background: var(--neon); width: 45px; height: 45px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--neon); }
        
        .system-nav-protection { position: fixed; bottom: 0; width: 100%; height: 35px; background: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="chat-header">
        <div style="display:flex; align-items:center;">
            <i class="fas fa-arrow-left back-btn" onclick="window.location.href='index.html'"></i>
            
            <div style="display:flex; align-items:center; gap:12px;">
                <i class="fas fa-user-lock" style="color: var(--neon); font-size: 18px;"></i>
                <div>
                    <div id="chatPartner" style="font-weight: 800; font-size: 14px;">Loading...</div>
                    <div id="partnerStatus" style="font-size: 9px; display: flex; align-items: center;">
                        <span id="friendDot" class="status-dot offline-dot"></span>
                        <span id="friendText" style="color: #ff4444;">OFFLINE</span>
                    </div>
                </div>
            </div>
        </div>
        <div id="myNetStatus" style="font-size: 8px; color: #666;">
            <i class="fas fa-wifi"></i> <span id="myNetText">CHECKING...</span>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Secure message..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="send-btn" onclick="handleSend()"><i class="fas fa-paper-plane" style="color:#000;"></i></button>
    </div>

    <div class="system-nav-protection"></div>

    <script>
        const SECRET_KEY = "RareGaming_9thClass_Security"; 
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const user = JSON.parse(localStorage.getItem("rareGamingUser")) || { 
            name: "Player_" + Math.floor(Math.random()*100),
            uid: "RG" + Math.floor(Math.random()*999999)
        };

        const urlParams = new URLSearchParams(window.location.search);
        const friendName = urlParams.get('name') || "Friend";
        const friendUID = urlParams.get('uid') || "UNKNOWN";
        document.getElementById('chatPartner').innerText = friendName;

        const chatRoomID = [user.uid, friendUID].sort().join("_");
        const chatRef = database.ref('private_chats/' + chatRoomID);

        function encrypt(text) { return CryptoJS.AES.encrypt(text, SECRET_KEY).toString(); }
        function decrypt(ciphertext) {
            try { return CryptoJS.AES.decrypt(ciphertext, SECRET_KEY).toString(CryptoJS.enc.Utf8); }
            catch(e) { return "--- Locked ---"; }
        }

        function checkMyNet() {
            const netText = document.getElementById('myNetText');
            if(navigator.onLine) { netText.innerText = "STABLE"; netText.style.color = "#39ff14"; }
            else { netText.innerText = "NO INTERNET"; netText.style.color = "#ff4444"; }
        }
        window.addEventListener('online', checkMyNet);
        window.addEventListener('offline', checkMyNet);
        checkMyNet();

        const myStatusRef = database.ref('status/' + user.uid);
        database.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                myStatusRef.onDisconnect().set({ state: 'offline' });
                myStatusRef.set({ state: 'online' });
            }
        });

        const friendStatusRef = database.ref('status/' + friendUID);
        friendStatusRef.on('value', (snap) => {
            const data = snap.val();
            const dot = document.getElementById('friendDot');
            const text = document.getElementById('friendText');
            if(data && data.state === 'online') {
                dot.className = "status-dot online-dot";
                text.innerText = "ONLINE";
                text.style.color = "#39ff14";
            } else {
                dot.className = "status-dot offline-dot";
                text.innerText = "OFFLINE";
                text.style.color = "#ff4444";
            }
        });

        const cacheKey = "rareCache_" + chatRoomID;
        const cachedMsgs = JSON.parse(localStorage.getItem(cacheKey)) || [];
        renderMessages(cachedMsgs);

        function handleSend() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;
            chatRef.push({
                sender: user.name,
                senderUID: user.uid,
                text: encrypt(text),
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            document.getElementById('msgInput').value = "";
        }

        chatRef.limitToLast(100).on('value', (snapshot) => {
            const messages = [];
            snapshot.forEach((child) => {
                messages.push(child.val());
            });
            localStorage.setItem(cacheKey, JSON.stringify(messages));
            renderMessages(messages);
        });

        function renderMessages(messages) {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            messages.forEach((data) => {
                const isMe = data.senderUID === user.uid;
                const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isMe ? 'sent' : 'received'}`;
                msgDiv.innerHTML = `${decrypt(data.text)}<span class="time">${time}</span>`;
                chatBox.appendChild(msgDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
