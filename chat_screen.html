<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        body { background-color: #0b141a; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .chat-header { background: #111b21; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222d34; }
        .chat-header i { font-size: 20px; color: #8696a0; cursor: pointer; }
        .user-info b { font-size: 16px; display: block; text-transform: uppercase; }
        .user-info span { font-size: 11px; color: #00a884; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }
        .time { font-size: 9px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; display: block; }
        .input-area { background: #111b21; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: white; outline: none; }
        .send-btn { width: 45px; height: 45px; background: #00a884; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <div class="user-info">
            <b id="chatTitle">Loading...</b>
            <span id="status">Online</span>
        </div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxkNQ1Zc4mrOV3oAT-FEW7yJbp2c1WL5T80hHa5lTth5K1I5OloyJ3ddbc-pDAl1JHSeQ/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const targetUID = urlParams.get('uid');
        const targetName = urlParams.get('name');
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));
        
        document.getElementById('chatTitle').innerText = targetName;

        function fetchMessages() {
            fetch(`${scriptURL}?action=getMessages&user1=${user.uid}&user2=${targetUID}`)
            .then(res => res.json()).then(data => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                data.forEach(m => {
                    let type = (m.sender == user.uid) ? 'sent' : 'received';
                    box.innerHTML += `<div class="msg ${type}">${m.text}<span class="time">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            let text = document.getElementById('msgInput').value;
            if(!text) return;
            document.getElementById('msgInput').value = "";
            fetch(`${scriptURL}?action=sendMessage&sender=${user.uid}&receiver=${targetUID}&msg=${encodeURIComponent(text)}`)
            .then(() => fetchMessages());
        }

        setInterval(fetchMessages, 3000);
        window.onload = fetchMessages;
    </script>
</body>
</html>
