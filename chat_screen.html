<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #07080a; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* 📱 Futuristic Header */
        .chat-header { 
            background: rgba(17, 27, 33, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; align-items: center; gap: 15px; 
            border-bottom: 1px solid rgba(0, 242, 254, 0.2); z-index: 100;
        }
        .chat-header i.back-btn { font-size: 18px; color: #00f2fe; cursor: pointer; }
        
        .header-info { flex: 1; }
        .header-info b { font-size: 14px; display: block; letter-spacing: 1px; text-transform: uppercase; }
        .status-dot { font-size: 10px; color: #8696a0; display: flex; align-items: center; gap: 5px; }
        .status-dot.online { color: #00e676; font-weight: 600; }
        .status-dot.online::before { content: ''; width: 6px; height: 6px; background: #00e676; border-radius: 50%; box-shadow: 0 0 5px #00e676; }

        /* 💬 Modern Chat Area */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; 
            background: radial-gradient(circle at top, #111b21 0%, #07080a 100%);
            scrollbar-width: none;
        }
        
        /* Message Bubbles - FIX: user-select none taaki copy na ho */
        .msg { 
            max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 13.5px; 
            position: relative; animation: slideIn 0.3s ease-out; line-height: 1.4;
            user-select: none; -webkit-user-select: none; /* Text selection band */
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .sent { align-self: flex-end; background: linear-gradient(135deg, #005c4b, #00a884); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        
        .deleted-msg { font-style: italic; opacity: 0.5; font-size: 12px; }
        .time { font-size: 9px; opacity: 0.6; display: block; text-align: right; margin-top: 5px; }

        /* ⌨️ Futuristic Input Area */
        .input-wrapper { background: #111b21; padding: 12px 15px; display: flex; align-items: center; gap: 10px; }
        .input-container {
            flex: 1; background: #2a3942; border-radius: 25px; padding: 0 15px; 
            border: 1px solid transparent; display: flex; align-items: center;
        }
        .input-container input { 
            flex: 1; background: none; border: none; padding: 12px 0; color: white; 
            outline: none; font-size: 14px; font-family: 'Poppins';
        }

        .send-btn { 
            width: 48px; height: 48px; background: #00f2fe; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; border: none; 
            color: #000; font-size: 18px; cursor: pointer; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        /* 🛡️ System Bar */
        .system-nav-bar { height: 48px; background-color: #4f515e; display: flex; justify-content: center; align-items: center; font-size: 10px; color: #ccc; font-weight: 600; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-chevron-left back-btn" onclick="history.back()"></i>
        <div class="header-info">
            <b id="chatTitle">Rare Player</b>
            <span id="statusText" class="status-dot">Offline</span>
        </div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        </div>
        <button class="send-btn" onclick="sendMsg()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div class="system-nav-bar">RARE GAMING PROTECTION ACTIVE</div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzrboeZs3AgsuTaMS3TGE9kBFhrW394FRq9rNnVQ9vjMj2k434OhvS3JC59j5LG49pFEw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const targetUID = urlParams.get('uid');
        const targetName = urlParams.get('name');
        let user = JSON.parse(localStorage.getItem("rareGamingUser"));
        
        document.getElementById('chatTitle').innerText = targetName || "Unknown";

        function checkOnline() {
            if(!targetName) return;
            fetch(`${scriptURL}?action=getStatus&username=${encodeURIComponent(targetName)}`)
            .then(res => res.text()).then(status => {
                const sText = document.getElementById('statusText');
                sText.innerText = status;
                sText.className = "status-dot " + (status === "Online" ? "online" : "");
            });
            if(user) fetch(`${scriptURL}?action=updateStatus&username=${encodeURIComponent(user.name)}`);
        }

        function fetchMessages() {
            if(!user || !targetUID) return;
            fetch(`${scriptURL}?action=getMessages&user1=${user.uid}&user2=${targetUID}`)
            .then(res => res.json()).then(data => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                data.forEach(m => {
                    let type = (m.sender == user.uid) ? 'sent' : 'received';
                    let isDeleted = m.text.includes("🚫 This message was deleted");
                    let msgContent = isDeleted ? `<span class="deleted-msg">${m.text}</span>` : m.text;
                    
                    // Click ya Long Press se Delete confirm hoga
                    let deleteAction = (type === 'sent' && !isDeleted) ? 
                        `onclick="confirmDelete('${new Date(m.time).getTime()}')" oncontextmenu="event.preventDefault(); confirmDelete('${new Date(m.time).getTime()}')"` : "";
                    
                    box.innerHTML += `
                        <div class="msg ${type}" ${deleteAction}>
                            ${msgContent}
                            <span class="time">${new Date(m.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function confirmDelete(timestamp) {
            if(confirm("Delete this message for everyone?")) {
                fetch(`${scriptURL}?action=deleteMessage&sender=${user.uid}&timestamp=${timestamp}`)
                .then(res => res.text()).then(resp => {
                    if(resp === "Deleted") fetchMessages();
                });
            }
        }

        function sendMsg() {
            let text = document.getElementById('msgInput').value.trim();
            if(!text || !user) return;
            document.getElementById('msgInput').value = "";
            fetch(`${scriptURL}?action=sendMessage&sender=${user.uid}&receiver=${targetUID}&msg=${encodeURIComponent(text)}`)
            .then(() => fetchMessages());
        }

        document.getElementById('msgInput').addEventListener("keyup", (e) => { if (e.keyCode === 13) sendMsg(); });

        setInterval(fetchMessages, 4000);
        setInterval(checkOnline, 10000);
        
        window.onload = () => { 
            if(!user) window.location.href = "login.html";
            fetchMessages(); 
            checkOnline(); 
        };
    </script>
</body>
</html>
