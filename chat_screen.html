<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Live</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { background: #0b141a; font-family: 'Poppins', sans-serif; margin: 0; color: #fff; overflow: hidden; }
        .chat-header { background: #202c33; padding: 15px 20px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { font-size: 20px; color: #8696a0; cursor: pointer; }
        .user-info h4 { margin: 0; font-size: 16px; color: #e9edef; }
        .user-info p { margin: 0; font-size: 11px; color: #00a884; font-weight: 600; }

        #chatBox { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: #0b141a; }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; word-wrap: break-word; }
        .sent { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
        .received { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
        .time { font-size: 9px; color: rgba(255,255,255,0.5); display: block; text-align: right; margin-top: 4px; }

        .input-area { background: #202c33; padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .input-area input { flex: 1; background: #2a3942; border: none; padding: 12px 15px; border-radius: 25px; color: #fff; outline: none; font-size: 14px; }
        .send-btn { background: #00a884; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <i class="fas fa-arrow-left back-btn" onclick="history.back()"></i>
        <div class="user-info">
            <h4>RARE SUPPORT</h4>
            <p>online</p>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMsg()">
        <button class="send-btn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        // 1. 🟢 TERA FIREBASE CONFIG (FIT KAR DIYA HAI)
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            storageBucket: "rare-gaming-b8875.firebasestorage.app",
            messagingSenderId: "679728435115",
            appId: "1:679728435115:web:7d51e5fe0e9147b34dccee",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com" // Automatic Guess
        };

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatBox = document.getElementById('chatBox');
        const user = JSON.parse(localStorage.getItem("rareGamingUser")) || { name: "Guest" };

        // 3. Message Bhejne ka Logic
        function sendMsg() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;

            database.ref('messages').push({
                sender: user.name,
                text: text,
                timestamp: Date.now()
            });

            document.getElementById('msgInput').value = "";
        }

        // 4. Real-time Receive karne ka Logic
        database.ref('messages').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const time = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${data.sender === user.name ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `${data.text}<span class="time">${time}</span>`;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
