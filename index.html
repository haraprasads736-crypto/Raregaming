<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>RARE GAMING-FF eSports</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #0c0e12; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }

        .header { 
            background: #15181e; 
            padding: 20px; 
            border-bottom: 2px solid #66fcf1; 
            font-weight: 800; 
            font-size: 20px; 
            color: #66fcf1;
            letter-spacing: 2px;
        }

        /* --- Compact & Professional Menu Grid --- */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Do buttons ek line mein */
            gap: 12px; 
            max-width: 400px; 
            margin: 30px auto;
            padding: 0 15px;
        }

        .menu-item {
            background: #15181e; 
            padding: 18px 5px; 
            border-radius: 12px; 
            border: 1.5px solid #2b303b;
            text-decoration: none; 
            color: #66fcf1; /* Neon Blue Theme */
            font-size: 11px; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .menu-item:active {
            transform: scale(0.95);
            background: #1f232b;
            border-color: #66fcf1;
        }

        .menu-item span { 
            font-size: 26px; 
            margin-bottom: 2px;
        }

        /* Schedule button ko center mein set karne ke liye */
        .full-width {
            grid-column: span 2;
            max-width: 60%;
            margin: 0 auto;
        }

        .footer {
            margin-top: 50px;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">RARE GAMING-FF</div>

    <div class="menu-grid">
        <a href="prizes.html" class="menu-item">
            <span>🏆</span>PRIZE POOL
        </a>

        <a href="teams.html" class="menu-item">
            <span>🛡️</span>TEAMS INFO
        </a>

        <a href="points.html" class="menu-item">
            <span>📊</span>POINTS
        </a>

        <a href="https://wa.me/qr/J6HUB4OMBTXHJ1" class="menu-item">
            <span>💬</span>CONTACT
        </a>

        <a href="schedule.html" class="menu-item full-width">
            <span>📅</span>SCHEDULE
        </a>
    </div>

    <div class="footer">DEVELOPED BY RARE GAMING © 2026</div>

</body>
</html>
