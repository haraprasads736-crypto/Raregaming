<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --panel-color: #0a0a0f;
            --neon-blue: #00f2fe;
            --neon-purple: #9d00ff;
            --text-color: #ffffff;
            --text-muted: #888888;
            --accent-glow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 120px; 
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER AREA */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { 
            font-size: 24px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; color: var(--text-color);
            background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); 
            padding: 10px 18px; border-radius: 50px; color: var(--neon-blue); 
            font-weight: 700; font-size: 15px; display: flex; 
            align-items: center; gap: 10px; box-shadow: var(--accent-glow);
            transition: 0.3s;
        }
        .wallet-pill:active { transform: scale(0.95); background: rgba(0, 242, 254, 0.1); }

        /* BANNER AREA */
        .promo-banner {
            margin: 10px 20px 25px 20px; height: 130px; 
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; box-sizing: border-box; position: relative;
            overflow: hidden;
        }
        .promo-banner::after {
            content: ''; position: absolute; top: -50px; right: -50px;
            width: 150px; height: 150px; background: var(--neon-purple);
            border-radius: 50%; filter: blur(70px); opacity: 0.3;
        }
        .promo-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .promo-subtitle { font-size: 12px; color: var(--text-muted); margin: 5px 0 15px 0; max-width: 70%; }
        .promo-btn {
            background: var(--neon-purple); color: white; border: none;
            padding: 8px 18px; border-radius: 50px; font-size: 11px;
            font-weight: 700; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 10px rgba(157, 0, 255, 0.4);
        }

        /* SECTION TITLES */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin: 20px 20px 15px 20px;
        }
        .section-title { 
            font-size: 19px; font-weight: 700; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
            position: relative; padding-left: 15px;
        }
        .section-title::before {
            content: ''; position: absolute; left: 0; top: 50%;
            transform: translateY(-50%); width: 4px; height: 18px;
            background: var(--neon-blue); border-radius: 2px;
            box-shadow: var(--accent-glow);
        }
        .view-all { font-size: 12px; color: var(--neon-blue); text-decoration: none; font-weight: 600; }

        /* MATCH GRID */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 0 20px; }
        
        .match-card { 
            position: relative; border-radius: 24px; overflow: hidden; 
            aspect-ratio: 1/1.1; border: 1px solid rgba(255, 255, 255, 0.03); 
            text-decoration: none; display: block;
            transition: 0.4s ease; background: #0a0a0f;
        }
        .match-card:active { transform: scale(0.96); border-color: rgba(0, 242, 254, 0.2); }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.4s; }
        .match-card:hover img { opacity: 0.7; transform: scale(1.05); }

        .card-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(to top, rgba(3, 3, 5, 0.95) 0%, rgba(3, 3, 5, 0.6) 60%, transparent 100%); 
            padding: 20px 15px; text-align: center; box-sizing: border-box; 
        }
        .match-info { margin-bottom: 8px; }
        .match-name { font-size: 14px; font-weight: 700; color: #fff; text-transform: uppercase; margin: 0; }
        .match-fee { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        
        .entry-pill {
            background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-size: 10px; font-weight: 700;
            padding: 5px 12px; border-radius: 50px; text-transform: uppercase;
            display: inline-block; box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        /* Status: Closed */
        .match-card.closed img { filter: grayscale(100%); opacity: 0.3; }
        .match-card.closed .entry-pill {
            background: rgba(255, 49, 49, 0.1); border: 1px solid #ff3131;
            color: #ff3131; box-shadow: none;
        }

        /* QUICK ACTIONS */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .action-card { 
            background: var(--panel-color); border: 1px solid rgba(255, 255, 255, 0.03); 
            border-radius: 18px; padding: 15px 5px; text-align: center; 
            text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: 0.3s;
        }
        .action-card:active { transform: scale(0.92); background: rgba(255, 255, 255, 0.02); }
        .action-card i { font-size: 20px; color: var(--neon-blue); }
        .action-card span { font-size: 10px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.3px; }

        /* NAVIGATION BAR */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.03); 
            z-index: 1000; padding: 0 10px; box-sizing: border-box;
            border-radius: 25px 25px 0 0; box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
        }
        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; font-weight: 700; 
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            position: relative; width: 60px; transition: 0.3s;
        }
        .nav-item i { font-size: 20px; transition: 0.3s; }
        
        /* Active Effect */
        .nav-item.active { color: var(--neon-blue); }
        .nav-item.active i { transform: translateY(-3px); color: var(--neon-blue); filter: drop-shadow(0 0 5px var(--neon-blue)); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: -10px; width: 15px; height: 3px;
            background: var(--neon-blue); border-radius: 10px; box-shadow: var(--accent-glow);
        }

        /* Center Button */
        .nav-item.center-btn { margin-top: -35px; }
        .nav-item.center-btn .icon-circle { 
            width: 60px; height: 60px; background: #111; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 5px solid var(--bg-color); box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
            transition: 0.3s;
        }
        .nav-item.center-btn .icon-circle i { font-size: 24px; color: #fff; margin: 0; }
        .nav-item.center-btn:active .icon-circle { transform: scale(0.9) translateY(3px); box-shadow: 0 2px 10px rgba(0, 242, 254, 0.2); }

    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <a href="earn.html" class="wallet-pill" id="walletBal">
            <i class="fas fa-coins"></i> ₹...
        </a>
    </div>

    <div class="promo-banner">
        <p class="promo-title">Rare AI is coming!</p>
        <p class="promo-subtitle">24/7 Smart Support & Game Tips. Get ready.</p>
        <button class="promo-btn">Learn More</button>
    </div>

    <div class="section-header">
        <div class="section-title">Live Matches</div>
        <a href="#" class="view-all">View All</a>
    </div>
    
    <div class="match-grid">
        <a href="#" class="match-card closed">
            <img src="br_poster.jpg" alt="BR">
            <div class="card-overlay">
                <div class="match-info">
                    <p class="match-name">BR SQUAD</p>
                    <p class="match-fee">Fee: ₹20</p>
                </div>
                <div class="entry-pill">CLOSED</div>
            </div>
        </a>
        <a href="#" class="match-card closed">
            <img src="cs_poster.jpg" alt="CS">
            <div class="card-overlay">
                <div class="match-info">
                    <p class="match-name">CS SQUAD</p>
                    <p class="match-fee">Fee: ₹20</p>
                </div>
                <div class="entry-pill">CLOSED</div>
            </div>
        </a>
        <a href="#" class="match-card closed">
            <img src="lw_poster.jpg" alt="LW">
            <div class="card-overlay">
                <div class="match-info">
                    <p class="match-name">LONE WOLF</p>
                    <p class="match-fee">Fee: ₹10</p>
                </div>
                <div class="entry-pill">CLOSED</div>
            </div>
        </a>
        <a href="#" class="match-card closed">
            <img src="1v1_poster.jpg" alt="1V1">
            <div class="card-overlay">
                <div class="match-info">
                    <p class="match-name">1V1 BATTLE</p>
                    <p class="match-fee">Fee: ₹50</p>
                </div>
                <div class="entry-pill">CLOSED</div>
            </div>
        </a>
    </div>

    <div class="section-header">
        <div class="section-title">Explore</div>
    </div>
    <div class="action-grid">
        <a href="teams.html" class="action-card"><i class="fas fa-shield-alt"></i><span>Teams</span></a>
        <a href="https://wa.me/917008170291" class="action-card"><i class="fab fa-whatsapp"></i><span>Contact</span></a>
        <a href="prizes.html" class="action-card"><i class="fas fa-trophy"></i><span>Prizes</span></a>
        <a href="profile.html" class="action-card"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-grid-2"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">TRANSFER</span>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <script>
        // ✅ AAPKA UPDATED URL YAHAN DALEIN
        const scriptURL = "https://script.google.com/macros/s/AKfycbwOkgiMlegqp1-dU4JLLk7oOjMxpQhweDVjLfr3ETbuEuvKlZs41KMQJei_6JAb5ctC6A/exec";
        
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            // 🛡️ Safety: Agar bacha login nahi hai
            if(!userData || !userData.name) {
                window.location.href = "login.html";
                return;
            }

            // Backend se live balance mango
            fetch(`${scriptURL}?action=getUserData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => { 
                if(data && data.balance !== undefined) {
                    document.getElementById('walletBal').innerHTML = `<i class="fas fa-coins"></i> ₹${data.balance}`; 
                } else {
                    document.getElementById('walletBal').innerHTML = `<i class="fas fa-coins"></i> ₹0`; 
                }
            }).catch(e => {
                console.log("Sync Error:", e);
                document.getElementById('walletBal').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error`;
            });
        }

        // Page load par balance dikhao
        window.onload = syncBalance;
    </script>
</body>
</html>
