<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Gaming - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #222; font-weight: 800; }
        .balance-card { background: linear-gradient(90deg, #ff007a, #7a00ff); margin: 15px; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(255,0,122,0.3); }
        .match-card { background: #111; margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .join-btn { background: #00f2fe; color: black; border: none; padding: 12px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; }
        .nav-wrapper { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; flex: 1; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>
    <div class="header">RARE GAMING</div>
    
    <div class="balance-card">
        <div style="font-size: 12px; opacity: 0.8;">Your Secure Balance</div>
        <div id="mainBal" style="font-size: 35px; font-weight: 800;">₹...</div>
    </div>

    <div class="match-card">
        <h3 style="margin-top:0;">BR SQUAD - MATCH #101</h3>
        <p style="font-size: 13px; color: #aaa;">Entry: ₹20 | Prize: ₹500</p>
        <button class="join-btn" onclick="joinMatch('BR SQUAD #101')">JOIN MATCH</button>
    </div>

    <div class="nav-wrapper">
        <a href="index.html" class="nav-item active"><i class="fas fa-home" style="font-size:20px;"></i><br>HOME</a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet" style="font-size:20px;"></i><br>EARN</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user" style="font-size:20px;"></i><br>PROFILE</a>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx4CbWAB9J5kanfjHZ_odNKtuHcBInFeQWnrFjWlD2-5EBIxmxxnwlIClkbWSZ-moG4kg/exec";

        // 1. ASLI BALANCE SYNC (Jhoot pakadne ke liye)
        function syncBalance() {
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) return;
            
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(userData.name))
            .then(res => res.text())
            .then(bal => {
                localStorage.setItem("rareWallet", bal);
                document.getElementById('mainBal').innerText = "₹" + bal;
            })
            .catch(() => { document.getElementById('mainBal').innerText = "Offline"; });
        }

        // 2. MATCH JOIN (Sheet1 mein entry)
        function joinMatch(matchName) {
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            const btn = event.target;
            btn.innerText = "JOINING..."; btn.disabled = true;

            let fd = new FormData();
            fd.append("username", userData.name);
            fd.append("uid", userData.uid || "N/A");
            fd.append("match", matchName);

            fetch(scriptURL, { method: 'POST', body: fd })
            .then(() => {
                alert("Match Joined Successfully! Details saved in Sheet1.");
                btn.innerText = "JOINED";
            })
            .catch(() => { alert("Error joining match!"); btn.innerText = "JOIN MATCH"; btn.disabled = false; });
        }

        window.onload = syncBalance;
    </script>
</body>
</html>
