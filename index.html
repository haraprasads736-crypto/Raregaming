<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --neon-green: #39ff14;
            --panel-color: #0a0a0f;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { 
            font-size: 22px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); 
            padding: 8px 15px; border-radius: 50px; color: var(--neon-blue); 
            font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
        }

        /* BANNER & GRID STYLES (Tera purana design) */
        .money-banner { margin: 20px; padding: 20px; background: linear-gradient(135deg, #0a0a0f 0%, #1a2e1a 100%); border-radius: 24px; border: 1px solid rgba(57, 255, 20, 0.2); }
        .money-title { font-size: 18px; font-weight: 800; margin: 0; }
        .money-btn { background: #39ff14; color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; margin-top: 15px; }
        
        .match-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .match-card { position: relative; border-radius: 15px; overflow: hidden; aspect-ratio: 1/1.2; background: #0a0a0f; border: 1px solid var(--border-color); }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .match-label { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 8px; font-weight: 700; text-transform: uppercase; }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; border-radius: 20px 20px 0 0; z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--neon-blue); }
        .icon-circle { width: 55px; height: 55px; background: #39ff14; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -35px; border: 4px solid var(--bg-color); }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="wallet-pill" id="walletBal"><i class="fas fa-coins"></i> ₹--</div>
            <div onclick="window.location.href='payment.html'" style="background: var(--neon-green); color: black; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                <i class="fas fa-plus"></i>
            </div>
        </div>
    </div>

    <div class="money-banner">
        <p class="money-title">Transfer Earnings</p>
        <button class="money-btn" onclick="location.href='transfer.html'">Send Money Now</button>
    </div>

    <div class="match-grid">
        <a href="match_details.html?type=BR" class="match-card"><img src="br_poster.jpg"><div class="match-label">BR SQUAD</div></a>
        <a href="match_details.html?type=CS" class="match-card"><img src="cs_poster.jpg"><div class="match-label">CS SQUAD</div></a>
        <a href="match_details.html?type=LW" class="match-card"><img src="lw_poster.jpg"><div class="match-label">LONE WOLF</div></a>
        <a href="match_details.html?type=1V1" class="match-card"><img src="1v1_poster.jpg"><div class="match-label">1V1 BATTLE</div></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item">
            <div class="icon-circle"><i class="fas fa-exchange-alt" style="color: #000;"></i></div>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <script>
        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Auth Check
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        if (!userData) { window.location.href = "login.html"; }

        // 3. 🚀 LIVE WALLET SYNC LOGIC
        function syncLiveBalance() {
            const userId = userData.uid;
            const walletEl = document.getElementById('walletBal');

            // Firebase Listener: Jab bhi balance badlega, ye apne aap chalega
            database.ref('players/' + userId + '/cash').on('value', (snapshot) => {
                const balance = snapshot.val();
                if (balance !== null) {
                    walletEl.innerHTML = `<i class="fas fa-coins"></i> ₹${balance}`;
                } else {
                    walletEl.innerHTML = `<i class="fas fa-coins"></i> ₹0`;
                }
            });
        }

        window.onload = syncLiveBalance;
    </script>
</body>
</html>
