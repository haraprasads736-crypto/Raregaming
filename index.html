<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --neon-purple: #9d00ff;
            --panel-color: #0a0a0f;
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { 
            font-size: 24px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); 
            padding: 10px 18px; border-radius: 50px; color: var(--neon-blue); 
            font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px;
        }

        /* 🤖 RARE AI SMART BANNER (Active on Front Page) */
        .ai-banner {
            margin: 15px 20px 25px 20px; padding: 20px;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            border-radius: 24px; border: 1px solid rgba(0, 242, 254, 0.2);
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ai-banner::after {
            content: '🤖'; position: absolute; right: -10px; bottom: -10px;
            font-size: 100px; opacity: 0.1; transform: rotate(-15deg);
        }
        .ai-tag { background: var(--neon-blue); color: #000; font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .ai-title { font-size: 18px; font-weight: 800; margin: 0; color: #fff; }
        .ai-desc { font-size: 11px; color: #aaa; margin: 5px 0 15px 0; }
        .ai-btn { background: #fff; color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* MATCH GRID */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 20px 15px 20px; }
        .section-title { font-size: 18px; font-weight: 700; text-transform: uppercase; border-left: 4px solid var(--neon-blue); padding-left: 12px; }
        
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .match-card { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1.1; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 15px; text-align: center; box-sizing: border-box; }
        .match-name { font-size: 12px; font-weight: 700; color: #fff; margin: 0; text-transform: uppercase; }
        .match-fee { font-size: 10px; color: #00f2fe; font-weight: 600; margin-bottom: 4px; }
        .match-status { background: rgba(255, 49, 49, 0.1); border: 1px solid #ff3131; color: #ff3131; font-size: 9px; padding: 4px 10px; border-radius: 50px; display: inline-block; font-weight: 700; }

        /* NAVIGATION (Middle Button: Transfer/Transaction) */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; border-radius: 20px 20px 0 0;
        }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; width: 60px; }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }
        .nav-item.active i { filter: drop-shadow(0 0 5px var(--neon-blue)); }

        .center-btn { margin-top: -35px; }
        .center-btn .icon-circle { width: 55px; height: 55px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-color); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .center-btn i { color: #fff; font-size: 22px; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div class="wallet-pill" id="walletBal"><i class="fas fa-coins"></i> ₹...</div>
    </div>

    <div class="ai-banner">
        <div class="ai-tag">Exclusive</div>
        <p class="ai-title">Talk to Rare AI</p>
        <p class="ai-desc">Pro Free Fire tips & instant support bot.</p>
        <button class="ai-btn" onclick="location.href='ai.html'">
            <i class="fas fa-robot"></i> ASK AI
        </button>
    </div>

    <div class="section-header">
        <div class="section-title">Live Matches</div>
    </div>
    
    <div class="match-grid">
        <a href="match_details.html?type=BR" class="match-card">
            <img src="br_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">BR SQUAD</p>
                <p class="match-fee">Fee: ₹20</p>
                <div class="match-status">CLOSED</div>
            </div>
        </a>
        <a href="match_details.html?type=CS" class="match-card">
            <img src="cs_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">CS SQUAD</p>
                <p class="match-fee">Fee: ₹20</p>
                <div class="match-status">CLOSED</div>
            </div>
        </a>
        <a href="match_details.html?type=LW" class="match-card">
            <img src="lw_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">LONE WOLF</p>
                <p class="match-fee">Fee: ₹10</p>
                <div class="match-status">CLOSED</div>
            </div>
        </a>
        <a href="match_details.html?type=1V1" class="match-card">
            <img src="1v1_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">1V1 BATTLE</p>
                <p class="match-fee">Fee: ₹50</p>
                <div class="match-status">CLOSED</div>
            </div>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">TRANSFER</span>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwOkgiMlegqp1-dU4JLLk7oOjMxpQhweDVjLfr3ETbuEuvKlZs41KMQJei_6JAb5ctC6A/exec";
        
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) { window.location.href = "login.html"; return; }
            fetch(`${scriptURL}?action=getUserData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => { 
                if(data && data.balance !== undefined) {
                    document.getElementById('walletBal').innerHTML = `<i class="fas fa-coins"></i> ₹${data.balance}`; 
                }
            }).catch(e => { console.log("Sync Error"); });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
