<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; padding-bottom: 140px; }
        .header-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-name { font-size: 22px; font-weight: 800; text-transform: uppercase; }
        .wallet-pill { background: rgba(0, 242, 254, 0.1); border: 1.5px solid #00f2fe; padding: 6px 15px; border-radius: 10px; color: #00f2fe; font-weight: 800; }
        .section-title { font-size: 18px; font-weight: 800; margin: 15px 20px; text-transform: uppercase; }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .match-card { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 4/5; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; }
        .match-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 15px 10px; text-align: center; box-sizing: border-box; }
        .match-name { font-size: 13px; font-weight: 800; color: #fff; margin: 0; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .action-card { background: #111116; border: 1px solid #1f1f25; border-radius: 15px; padding: 20px 10px; text-align: center; text-decoration: none; }
        .action-card i { font-size: 28px; margin-bottom: 10px; display: block; color: #00f2fe; }
        .action-card span { font-size: 11px; font-weight: 800; color: #fff; }

        /* NAVIGATION DESIGN */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>
    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div class="wallet-pill" id="walletBal">₹...</div>
    </div>
    <div class="section-title">E-sports Matches</div>
    <div class="match-grid">
        <a href="match_details.html?match=BR" class="match-card">
            <img src="https://via.placeholder.com/300x400/111/fff?text=BR+SQUAD" alt="BR">
            <div class="card-overlay"><p class="match-name">BR SQUAD</p></div>
        </a>
        <a href="match_details.html?match=CS" class="match-card">
            <img src="https://via.placeholder.com/300x400/111/fff?text=CLASH+SQUAD" alt="CS">
            <div class="card-overlay"><p class="match-name">CLASH SQUAD</p></div>
        </a>
    </div>
    <div class="action-grid">
        <a href="#" class="action-card"><i class="fas fa-shield-alt"></i><span>Teams Info</span></a>
        <a href="#" class="action-card"><i class="fas fa-trophy"></i><span>Prize Pool</span></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbyVPA7IWkzt7njCMsq3dGhuNgc2h06maeULsvUCJsM8-WZLGepfQ4_wRLXAo1L396V2Sg/exec";
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            let user = userData ? userData.name : "TestUser";
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(user))
            .then(res => res.text()).then(bal => {
                document.getElementById('walletBal').innerText = "₹" + bal;
            });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
