<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding-bottom: 140px; overflow-x: hidden;
        }

        /* Header Section */
        .app-header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #fff; text-transform: uppercase; }
        .logo-text span { color: #ff007a; }

        /* Match Cards Container */
        .container { padding: 0 15px; }
        .section-title { font-size: 14px; font-weight: 800; color: #888; text-transform: uppercase; margin: 20px 0 15px 5px; letter-spacing: 1px; }

        .match-card { 
            position: relative; width: 100%; height: 180px; border-radius: 15px; 
            overflow: hidden; margin-bottom: 20px; border: 1px solid #1f1f25; cursor: pointer;
        }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .match-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to top, rgba(5,5,8,1), transparent);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box;
        }
        .match-title { font-size: 20px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .match-status { font-size: 12px; letter-spacing: 1px; margin-top: 5px; }

        /* 🔥 NAVIGATION SYSTEM 🔥 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; transition: 0.3s; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; color: #666; }
        
        /* White Diamond Active State */
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { 
            content: ''; position: absolute; top: -16px; width: 58px; height: 58px; 
            background: #ffffff; border-radius: 16px; transform: rotate(45deg); 
            z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); 
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="logo-text">RARE<span>GAMING</span></div>
        <i class="fas fa-bell" style="font-size: 20px; color: #444;"></i>
    </div>

    <div class="container">
        <div class="section-title">Active Tournaments</div>

        <div class="match-card" onclick="window.location.href='match_detail.html?match=BR'">
            <img src="br_poster.jpg" alt="BR Squad">
            <div class="match-overlay">
                <div class="match-info">
                    <div class="match-title">BR SQUAD</div>
                    <div class="match-status" style="color: #ff007a; font-weight: 800;">CLOSED</div>
                </div>
            </div>
        </div>

        <div class="match-card" onclick="window.location.href='match_detail.html?match=CS'">
            <img src="cs_poster.jpg" alt="CS Squad">
            <div class="match-overlay">
                <div class="match-info">
                    <div class="match-title">CS SQUAD</div>
                    <div class="match-status" style="color: #ff007a; font-weight: 800;">CLOSED</div>
                </div>
            </div>
        </div>

        <div class="match-card" onclick="window.location.href='match_detail.html?match=1V1'">
            <img src="1v1_poster.jpg" alt="1V1 Battle">
            <div class="match-overlay">
                <div class="match-info">
                    <div class="match-title">1V1 BATTLE</div>
                    <div class="match-status" style="color: #ff007a; font-weight: 800;">CLOSED</div>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

</body>
</html>
