<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Gaming | Elite Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;700;900&display=swap');
        
        :root {
            --primary: #ffd700;
            --secondary: #00f2fe;
            --danger: #ff3131;
            --bg-dark: #050508;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden; 
            padding-bottom: 150px; 
            background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050508 100%);
        }

        /* HEADER & WALLET */
        .header-top { 
            padding: 25px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1100;
        }
        .brand-name { 
            font-family: 'Syncopate', sans-serif;
            font-size: 20px; font-weight: 900; 
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .wallet-pill { 
            background: linear-gradient(135deg, rgba(0, 242, 254, 0.1), rgba(0, 242, 254, 0.05)); 
            border: 1px solid var(--secondary); 
            padding: 10px 18px; border-radius: 50px; 
            color: var(--secondary); font-weight: 800; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .section-title { 
            font-family: 'Syncopate', sans-serif;
            font-size: 14px; font-weight: 800; 
            margin: 30px 20px 15px; color: #888;
            letter-spacing: 3px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::after { content: ""; height: 1px; flex: 1; background: #222; }

        /* MATCH GRID */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .match-card { 
            position: relative; border-radius: 24px; overflow: hidden; aspect-ratio: 4/5; 
            border: 1px solid var(--glass-border); text-decoration: none; display: block;
            background: var(--card-bg); transition: 0.3s;
        }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; filter: grayscale(100%); }
        
        .card-overlay { 
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, transparent 100%); 
            padding: 20px 12px; text-align: center; box-sizing: border-box; 
        }
        .match-name { font-size: 12px; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        
        .status-closed { 
            color: #fff; font-size: 8px; font-weight: 800; 
            margin-top: 8px; 
            background: var(--danger);
            padding: 5px 10px; border-radius: 50px; display: inline-block;
            box-shadow: 0 5px 15px rgba(255, 49, 49, 0.3);
        }

        /* QUICK ACTIONS */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .action-card { 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 25px 15px; 
            text-align: center; text-decoration: none; 
            display: block; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .action-card i { font-size: 24px; margin-bottom: 12px; display: block; color: var(--primary); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .action-card span { font-size: 10px; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }

        /* NAV BAR REDESIGN */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 50%; 
            transform: translateX(-50%); width: 90%; 
            height: 70px; background: rgba(17, 17, 22, 0.9); 
            display: flex; justify-content: space-around; align-items: center; 
            border-radius: 25px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); z-index: 1000; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .nav-item { text-decoration: none; color: #555; font-size: 9px; font-weight: 800; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-5px); filter: drop-shadow(0 0 8px var(--primary)); }
