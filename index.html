<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RARE GAMING - COMMAND CENTER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { --glow: #00f2fe; --bg: #000; --border: #1a1a1a; --terminal: #0a0a0a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Syncopate', sans-serif; letter-spacing: 2px; }
    body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- THE BRAND CORE --- */
    .center-container { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 1; }
    .brand-pulse { font-size: 8px; font-weight: 900; letter-spacing: 15px; color: #fff; text-transform: uppercase; opacity: 0.1; animation: pulseBrand 6s infinite ease-in-out; }
    @keyframes pulseBrand { 0%, 100% { opacity: 0.05; } 50% { opacity: 0.15; } }

    /* --- GAME MODES SELECTION (BR, CS, LW, 1v1) --- */
    .mode-container { position: fixed; top: 80px; width: 100%; display: flex; justify-content: center; gap: 15px; padding: 0 20px; z-index: 10; }
    .mode-btn { background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 8px 12px; font-size: 7px; color: #666; cursor: pointer; transition: 0.3s; }
    .mode-btn:hover, .mode-btn.active { border-color: var(--glow); color: var(--glow); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

    /* --- CHAT TERMINAL --- */
    #chat-box { flex: 1; padding: 140px 25px 250px 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; z-index: 2; }
    #chat-box::-webkit-scrollbar { width: 0; }
    .msg { max-width: 95%; padding: 10px 0; line-height: 2; font-size: 0.7rem; animation: terminalFade 0.5s ease; text-transform: uppercase; }
    @keyframes terminalFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .bot-msg { align-self: flex-start; border-left: 2px solid var(--glow); padding-left: 20px; }
    .user-msg { align-self: flex-end; color: var(--glow); text-align: right; border-right: 2px solid #222; padding-right: 20px; }

    /* --- TEAM SQUAD STATUS (Niche Charon Teams) --- */
    .team-grid { position: fixed; bottom: 155px; width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; z-index: 10; }
    .team-box { background: rgba(10,10,10,0.8); border: 1px solid #1a1a1a; padding: 10px 5px; text-align: center; }
    .team-name { font-size: 6px; color: var(--glow); margin-bottom: 5px; }
    .team-status { font-size: 5px; color: #444; }

    /* --- COMMAND INPUT --- */
    .input-zone { position: fixed; bottom: 85px; width: 100%; padding: 0 30px; z-index: 10; }
    .input-bar { background: transparent; padding: 15px 0; display: flex; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    #msg-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 11px; text-transform: uppercase; }

    /* --- NAVBAR --- */
    .nav-brand { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--terminal); display: flex; align-items: center; justify-content: space-between; padding: 0 35px; border-top: 1px solid var(--border); z-index: 15; }
    .brand-main { font-size: 14px; font-weight: 900; color: #fff; letter-spacing: 5px; }
    .brand-owner { font-size: 7px; color: #333; margin-top: 6px; letter-spacing: 4px; }
  </style>
</head>
<body>

  <div class="center-container"><div class="brand-pulse">LOBBY_READY</div></div>

  <div class="mode-container">
    <div class="mode-btn">BR_RANKED</div>
    <div class="mode-btn active">CS_RANKED</div>
    <div class="mode-btn">LONE_WOLF</div>
    <div class="mode-btn">1V1_ARENA</div>
  </div>

  <div id="chat-box"></div>

  <div class="team-grid">
    <div class="team-box"><div class="team-name">TEAM_ALPHA</div><div class="team-status">WAITING...</div></div>
    <div class="team-box"><div class="team-name">TEAM_BETA</div><div class="team-status">WAITING...</div></div>
    <div class="team-box"><div class="team-name">TEAM_GAMMA</div><div class="team-status">WAITING...</div></div>
    <div class="team-box"><div class="team-name">TEAM_DELTA</div><div class="team-status">WAITING...</div></div>
  </div>

  <div class="input-zone"><div class="input-bar"><input type="text" id="msg-input" placeholder="SEND DATA TO SQUAD..." autocomplete="off"></div></div>

  <nav class="nav-brand">
    <div style="font-size: 10px; color: var(--glow);"><i class="fas fa-crosshairs"></i> STABLE</div>
    <div style="text-align: right;">
      <div class="brand-main">RARE GAMING</div>
      <div class="brand-owner">OFFICIAL WAR ROOM</div>
    </div>
  </nav>

  <script type="module">
    const API_KEY = "AIzaSyA__hSyOZ4AdbCjnTy4KjOSK4Pi2gbfcKQ";

    window.askAI = async function() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      appendMsg('user-msg', text);
      input.value = '';

      const tempId = "node-" + Date.now();
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div id="${tempId}" class="msg bot-msg">UPLINKING TO SQUAD...</div>`;
      box.scrollTop = box.scrollHeight;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "Respond as an elite Gaming Command Terminal. Focus on Free Fire strategies and brand 'RARE GAMING'. No AI mentions: " + text }] }]
          })
        });

        const data = await response.json();
        if (data.candidates) {
          const reply = data.candidates[0].content.parts[0].text;
          document.getElementById(tempId).innerHTML = reply;
        }
      } catch (e) { document.getElementById(tempId).innerHTML = "CONNECTION_FAIL."; }
      box.scrollTop = box.scrollHeight;
    };

    function appendMsg(cls, rel) {
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class="msg ${cls}">${rel}</div>`;
      box.scrollTop = box.scrollHeight;
    }
    document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
  </script>
</body>
</html>
