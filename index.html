<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rare Gaming-FF</title>
    <style>
        body { background-color: #0b0c10; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background-color: #1f2833; padding: 15px; border-bottom: 2px solid #66fcf1; }
        
        /* Logo placeholder agar photo na mile */
        .logo-box { 
            width: 150px; height: 150px; margin: 20px auto; 
            border: 3px solid #66fcf1; border-radius: 20px;
            background: url('logo.jpg'), url('https://i.imgur.com/8K0S8qS.png'); /* Backup image link */
            background-size: cover; background-position: center;
            box-shadow: 0px 0px 20px #66fcf1;
        }

        h1 { color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; }
        .btn { background-color: #66fcf1; color: #0b0c10; padding: 15px; text-decoration: none; font-size: 18px; font-weight: bold; border-radius: 10px; display: block; width: 80%; margin: 15px auto; border: none; }
        .btn-sec { background-color: transparent; color: #66fcf1; border: 2px solid #66fcf1; }
    </style>
</head>
<body>
    <div class="header"><h2>🎮 RARE GAMING 🎮</h2></div>
    
    <div class="logo-box"></div>

    <h1>Rare Gaming-FF</h1>
    <p>GAME IS PEACE</p>

    <button class="btn" onclick="window.location.href='register.html'">📝 Register</button>
    <button class="btn btn-sec" onclick="window.location.href='schedule.html'">⏰ Schedule</button>
    <button class="btn btn-sec" onclick="window.location.href='points.html'">🏆 Points Table</button>
</body>
</html>
