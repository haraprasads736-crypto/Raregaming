<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --neon-purple: #9d00ff;
            --panel-color: #0a0a0f;
            --rare-gold: #ffd700;
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 180px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .wallet-pill { background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); padding: 10px 18px; border-radius: 50px; color: var(--neon-blue); font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px; }

        /* BANNER & ADS */
        .money-banner { margin: 15px 20px; padding: 20px; background: linear-gradient(135deg, #0a0a0f 0%, #1a2e1a 100%); border-radius: 24px; border: 1px solid rgba(57, 255, 20, 0.2); position: relative; overflow: hidden; }
        .money-tag { background: #39ff14; color: #000; font-size: 9px; font-weight: 800; padding: 3px 10px; border-radius: 50px; display: inline-block; margin-bottom: 10px; text-transform: uppercase; }
        .money-title { font-size: 18px; font-weight: 800; margin: 0; color: #fff; }
        .money-btn { background: #39ff14; color: #000; border: none; padding: 10px 20px; border-radius: 12px; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-top: 15px; }

        .ad-container { margin: 10px 20px; height: 60px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; position: relative; }
        .ad-label { position: absolute; top: 2px; left: 5px; font-size: 7px; color: #333; }

        /* SECTION TITLES */
        .section-header { margin: 25px 20px 15px 20px; }
        .section-title { font-size: 16px; font-weight: 700; text-transform: uppercase; border-left: 4px solid var(--neon-blue); padding-left: 12px; letter-spacing: 1px; }
        
        /* MATCH GRID */
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .match-card { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1.1; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 12px; text-align: center; }
        .match-name { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .match-status { background: rgba(255, 49, 49, 0.1); border: 1px solid #ff3131; color: #ff3131; font-size: 8px; padding: 3px 8px; border-radius: 50px; font-weight: 800; }

        /* 🚀 QUICK ACTIONS GRID (NEW) */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 30px 20px; }
        .action-card { background: #0a0a0f; border: 1px solid #1f1f25; border-radius: 18px; padding: 20px 10px; text-align: center; text-decoration: none; transition: 0.3s; }
        .action-card:active { transform: scale(0.95); background: #111116; }
        .action-card i { font-size: 24px; margin-bottom: 10px; display: block; color: var(--rare-gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .action-card span { font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: rgba(10, 10, 15, 0.95); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;}
        .nav-item.active { color: var(--neon-blue); }
        .nav-item i { font-size: 20px; }
        .center-btn .icon-circle { width: 55px; height: 55px; background: #39ff14; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid var(--bg-color); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); margin-top: -35px; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div class="wallet-pill" id="walletBal"><i class="fas fa-coins"></i> ₹0</div>
    </div>

    <div class="money-banner">
        <div class="money-tag">Fast & Secure</div>
        <p class="money-title">Transfer Earnings</p>
        <button class="money-btn" onclick="location.href='transfer.html'">
            <i class="fas fa-paper-plane"></i> Send Money
        </button>
    </div>

    <div class="ad-container">
        <div class="ad-label">ADVERTISEMENT</div>
        <div id="rare-banner-ad"></div>
    </div>

    <div class="section-header">
        <div class="section-title">Tournament Matches</div>
    </div>
    
    <div class="match-grid">
        <a href="match_details.html?type=BR" class="match-card">
            <img src="br_poster.jpg">
            <div class="card-overlay"><p class="match-name">BR SQUAD</p><div class="match-status">CLOSED</div></div>
        </a>
        <a href="match_details.html?type=CS" class="match-card">
            <img src="cs_poster.jpg">
            <div class="card-overlay"><p class="match-name">CS SQUAD</p><div class="match-status">CLOSED</div></div>
        </a>
    </div>

    <div class="section-header">
        <div class="section-title">Quick Actions</div>
    </div>
    <div class="action-grid">
        <a href="teams.html" class="action-card">
            <i class="fas fa-shield-halved"></i>
            <span>Teams Info</span>
        </a>
        <a href="https://wa.me/917008170291" class="action-card">
            <i class="fab fa-whatsapp"></i>
            <span>Contact Admin</span>
        </a>
        <a href="prizes.html" class="action-card">
            <i class="fas fa-trophy"></i>
            <span>Prize Pool</span>
        </a>
        <a href="profile.html" class="action-card">
            <i class="fas fa-user-gear"></i>
            <span>My Account</span>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt" style="color: #000;"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwOkgiMlegqp1-dU4JLLk7oOjMxpQhweDVjLfr3ETbuEuvKlZs41KMQJei_6JAb5ctC6A/exec";
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) { window.location.href = "login.html"; return; }
            fetch(`${scriptURL}?action=getUserData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => { 
                if(data && data.balance !== undefined) {
                    document.getElementById('walletBal').innerHTML = `<i class="fas fa-coins"></i> ₹${data.balance}`; 
                }
            }).catch(e => { console.log("Sync Error"); });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
