<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --panel-color: #0a0a0f;
            --neon-blue: #00f2fe;
            --neon-purple: #9d00ff;
            --text-color: #ffffff;
            --text-muted: #888888;
        }

        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px; /* Space for dual bars */
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { 
            font-size: 24px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); 
            padding: 10px 18px; border-radius: 50px; color: var(--neon-blue); 
            font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px;
        }

        /* BANNER */
        .promo-banner {
            margin: 10px 20px 25px 20px; height: 130px; 
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            border-radius: 20px; padding: 20px; box-sizing: border-box; position: relative; overflow: hidden;
        }
        .promo-title { font-size: 18px; font-weight: 800; text-transform: uppercase; margin: 0; }
        .promo-subtitle { font-size: 12px; color: var(--text-muted); margin: 5px 0 15px 0; }
        .promo-btn {
            background: var(--neon-purple); color: white; border: none;
            padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: 700;
        }

        /* MATCH GRID */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 20px 15px 20px; }
        .section-title { font-size: 19px; font-weight: 700; text-transform: uppercase; padding-left: 15px; position: relative; }
        .section-title::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 4px; height: 18px; background: var(--neon-blue); }
        
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 0 20px; }
        .match-card { position: relative; border-radius: 24px; overflow: hidden; aspect-ratio: 1/1.1; background: #0a0a0f; border: 1px solid rgba(255,255,255,0.03); }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px; text-align: center; box-sizing: border-box; }
        .match-name { font-size: 13px; font-weight: 700; margin: 0; }
        .entry-pill { background: rgba(255, 49, 49, 0.1); border: 1px solid #ff3131; color: #ff3131; font-size: 9px; padding: 4px 10px; border-radius: 50px; margin-top: 5px; display: inline-block; }

        /* ACTION GRID */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .action-card { background: var(--panel-color); border-radius: 18px; padding: 15px 5px; text-align: center; text-decoration: none; color: white; display: flex; flex-direction: column; gap: 8px; }
        .action-card i { font-size: 20px; color: var(--neon-blue); }
        .action-card span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* 🌟 DUAL NAVIGATION SYSTEM 🌟 */
        .system-nav-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; 
            background-color: #4f515e; z-index: 1001; 
        }
        
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; padding: 0 5px; box-sizing: border-box;
            border-radius: 20px 20px 0 0;
        }

        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; font-weight: 700; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: 0.3s; width: 60px;
        }
        .nav-item i { font-size: 20px; }
        
        .nav-item.active { color: var(--neon-blue); }
        /* Home Icon Fix: Isse icon dikhne lagega */
        .nav-item.active i { color: var(--neon-blue); filter: drop-shadow(0 0 5px var(--neon-blue)); }

        .nav-item.center-btn { margin-top: -35px; }
        .nav-item.center-btn .icon-circle { 
            width: 55px; height: 55px; background: #111; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid var(--bg-color); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        .nav-item.center-btn i { color: white; font-size: 22px; }

    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <a href="earn.html" class="wallet-pill" id="walletBal">
            <i class="fas fa-coins"></i> ₹...
        </a>
    </div>

    <div class="promo-banner">
        <p class="promo-title">Rare AI is coming!</p>
        <p class="promo-subtitle">24/7 Smart Support & Game Tips.</p>
        <button class="promo-btn">Learn More</button>
    </div>

    <div class="section-header">
        <div class="section-title">Live Matches</div>
    </div>
    
    <div class="match-grid">
        <div class="match-card">
            <img src="br_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">BR SQUAD (₹20)</p>
                <div class="entry-pill">CLOSED</div>
            </div>
        </div>
        <div class="match-card">
            <img src="cs_poster.jpg">
            <div class="card-overlay">
                <p class="match-name">CS SQUAD (₹20)</p>
                <div class="entry-pill">CLOSED</div>
            </div>
        </div>
    </div>

    <div class="action-grid">
        <a href="teams.html" class="action-card"><i class="fas fa-shield-alt"></i><span>Teams</span></a>
        <a href="https://wa.me/917008170291" class="action-card"><i class="fab fa-whatsapp"></i><span>Contact</span></a>
        <a href="prizes.html" class="action-card"><i class="fas fa-trophy"></i><span>Prizes</span></a>
        <a href="profile.html" class="action-card"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i> <span>HOME</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>EARN</span>
        </a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">TRANSFER</span>
        </a>
        <a href="chat_list.html" class="nav-item">
            <i class="fas fa-comments"></i>
            <span>CHAT</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-alt"></i>
            <span>PROFILE</span>
        </a>
    </nav>

    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwOkgiMlegqp1-dU4JLLk7oOjMxpQhweDVjLfr3ETbuEuvKlZs41KMQJei_6JAb5ctC6A/exec";
        
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) { window.location.href = "login.html"; return; }

            fetch(`${scriptURL}?action=getUserData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => { 
                if(data && data.balance !== undefined) {
                    document.getElementById('walletBal').innerHTML = `<i class="fas fa-coins"></i> ₹${data.balance}`; 
                }
            }).catch(e => {
                document.getElementById('walletBal').innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error`;
            });
        }
        window.onload = syncBalance;
    </script>
</body>
</html>
