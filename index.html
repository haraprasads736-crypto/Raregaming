<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 120px;
        }

        /* Top Header */
        .header-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-name { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.1); border: 1.5px solid #00f2fe; 
            padding: 6px 15px; border-radius: 10px; color: #00f2fe; font-weight: 800; font-size: 14px;
        }

        .section-title { font-size: 18px; font-weight: 800; margin: 15px 20px; text-transform: uppercase; }

        /* 1. MATCH GRID (Matches Cards) */
        .match-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; 
        }
        .match-card { 
            position: relative; border-radius: 20px; overflow: hidden; 
            aspect-ratio: 4/5; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; display: block;
        }
        .match-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { 
            position: absolute; bottom: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            padding: 15px 10px; text-align: center; box-sizing: border-box;
        }
        .match-name { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; margin: 0; }
        .match-status { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 5px; }
        .status-open { color: #00e676; }
        .status-soon { color: #ff007a; }

        /* 2. QUICK ACTIONS GRID */
        .action-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;
        }
        .action-card {
            background: #111116; border: 1px solid #1f1f25; border-radius: 15px;
            padding: 20px 10px; text-align: center; text-decoration: none;
            transition: 0.3s; display: block;
        }
        .action-card:active { transform: scale(0.95); background: #1a1a20; }
        .action-card i { font-size: 28px; margin-bottom: 10px; display: block; }
        .action-card span { font-size: 11px; font-weight: 800; color: #00f2fe; text-transform: uppercase; }
        
        .icon-teams { color: #a2b2c8; }
        .icon-contact { color: #ffffff; }
        .icon-prize { color: #ffd700; }
        .icon-points { color: #ffffff; }

        /* 3. GLOWING BOTTOM NAVIGATION */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px; 
            background: #000; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1.5px solid rgba(255,0,122,0.2); z-index: 1000;
        }
        .nav-item { 
            text-decoration: none; color: #555; font-size: 10px; font-weight: 800; 
            display: flex; flex-direction: column; align-items: center; transition: 0.3s;
            flex: 1;
        }
        .nav-item i { font-size: 20px; margin-bottom: 5px; }
        
        .nav-item.active { color: white; position: relative; }
        .nav-item.active::before { 
            content: ''; position: absolute; top: -18px; 
            width: 55px; height: 55px; background: linear-gradient(135deg, #ff007a, #7a00ff); 
            border-radius: 15px; transform: rotate(45deg); z-index: -1;
            box-shadow: 0 0 20px rgba(255,0,122,0.6);
        }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div class="wallet-pill" id="walletBal">₹...</div>
    </div>

    <div class="section-title">E-sports Matches</div>
    <div class="match-grid">
        <a href="match_details.html?match=BR" class="match-card">
            <img src="br_poster.jpg" alt="BR Squad">
            <div class="card-overlay">
                <p class="match-name">BR SQUAD</p>
                <div class="match-status status-open">OPEN</div>
            </div>
        </a>

        <a href="match_details.html?match=CS" class="match-card">
            <img src="cs_poster.jpg" alt="CS Squad">
            <div class="card-overlay">
                <p class="match-name">CLASH SQUAD</p>
                <div class="match-status status-soon">SOON</div>
            </div>
        </a>
        
        <a href="match_details.html?match=LW" class="match-card">
            <img src="lw_poster.jpg" alt="Lone Wolf">
            <div class="card-overlay">
                <p class="match-name">LONE WOLF</p>
                <div class="match-status status-soon">SOON</div>
            </div>
        </a>

        <a href="match_details.html?match=1V1" class="match-card">
            <img src="1v1_poster.jpg" alt="1v1">
            <div class="card-overlay">
                <p class="match-name">1V1 BATTLE</p>
                <div class="match-status status-soon">SOON</div>
            </div>
        </a>
    </div>

    <div class="section-title">Quick Actions</div>
    <div class="action-grid">
        <a href="teams.html" class="action-card">
            <i class="fas fa-shield-alt icon-teams"></i>
            <span>Teams Info</span>
        </a>
        <a href="https://wa.me/91XXXXXXXXXX" class="action-card"> 
            <i class="fas fa-comment-dots icon-contact"></i>
            <span>Contact</span>
        </a>
        <a href="prizes.html" class="action-card">
            <i class="fas fa-trophy icon-prize"></i>
            <span>Prize Pool</span>
        </a>
        <a href="points.html" class="action-card">
            <i class="fas fa-chart-bar icon-points"></i>
            <span>Points</span>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>HOME</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>EARN</span>
        </a>
        <a href="winners.html" class="nav-item">
            <i class="fas fa-crown"></i>
            <span>WINNERS</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>PROFILE</span>
        </a>
    </nav>

    <script>
        // AAPKA MASTER SCRIPT URL (Sirf Balance Sync ke liye)
        const scriptURL = "https://script.google.com/macros/s/AKfycbytPupu39uc5DU1CgPi4dDTp30pGyplUR4kDGAvmKfwLhlIhoptQsPgrKzIYzJpFpir2Q/exec";

        function syncBalance() {
            // Check if user is logged in
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) return;
            
            fetch(scriptURL + "?action=getBal&username=" + encodeURIComponent(userData.name))
            .then(res => res.text())
            .then(bal => {
                localStorage.setItem("rareWallet", bal);
                document.getElementById('walletBal').innerText = "₹" + bal;
            })
            .catch(() => {
                // If offline, show last saved balance
                document.getElementById('walletBal').innerText = "₹" + (localStorage.getItem("rareWallet") || "0");
            });
        }
        
        // Load balance on startup
        window.onload = syncBalance;
    </script>
</body>
</html>
