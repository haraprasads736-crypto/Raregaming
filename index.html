<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - RARE GAMING</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-5695800911065486" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --neon-green: #39ff14;
            --panel-color: #0a0a0f;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
        }

        /* HEADER */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
        }
        .brand-name { 
            font-size: 22px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .wallet-pill { 
            background: rgba(0, 242, 254, 0.05); border: 1.5px solid var(--neon-blue); 
            padding: 8px 15px; border-radius: 50px; color: var(--neon-blue); 
            font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px;
            cursor: pointer;
        }

        /* 📸 SLIDING BANNER SYSTEM */
        .slider-container {
            margin: 15px 20px;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            aspect-ratio: 16/8;
        }
        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slide {
            min-width: 100%;
            height: 100%;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Dots Navigation */
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transition: 0.3s;
        }
        .dot.active {
            background: var(--neon-blue);
            width: 20px;
            border-radius: 10px;
        }

        /* MATCH GRID */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 20px 15px 20px; }
        .section-title { font-size: 16px; font-weight: 700; text-transform: uppercase; border-left: 4px solid var(--neon-blue); padding-left: 12px; }
        
        .match-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .match-card { position: relative; border-radius: 15px; overflow: hidden; aspect-ratio: 1/1.2; background: #0a0a0f; border: 1px solid var(--border-color); text-decoration: none; }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .match-label { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 8px; font-weight: 700; color: #fff; text-shadow: 0 0 5px #000; text-transform: uppercase; }

        /* NAVIGATION */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; border-radius: 20px 20px 0 0; 
        }
        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; font-weight: 700; 
            display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;
        }
        .nav-item.active { color: var(--neon-blue); }
        .nav-item i { font-size: 20px; }
        
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div class="wallet-pill" id="walletBal"><i class="fas fa-coins"></i> ₹--</div>
            <div onclick="window.location.href='payment.html'" style="background: var(--neon-green); color: black; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                <i class="fas fa-plus"></i>
            </div>
        </div>
    </div>

    <div class="slider-container">
        <div class="slides" id="slider">
            <div class="slide"><img src="banner1.jpg" alt="Banner 1"></div>
            <div class="slide" onclick="window.location.href='https://t.me/Raregaming_7'">
                <img src="banner2.jpg" alt="Banner 2">
            </div>
            <div class="slide"><img src="banner3.jpg" alt="Banner 3"></div>
            <div class="slide"><img src="banner4.jpg" alt="Banner 4"></div>
        </div>
        <div class="slider-dots" id="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="section-header">
        <div class="section-title">Live Tournaments</div>
    </div>
    
    <div class="match-grid">
        <a href="match_details.html?type=BR" class="match-card"><img src="br_poster.jpg"><div class="match-label">BR SQUAD</div></a>
        <a href="match_details.html?type=CS" class="match-card"><img src="cs_poster.jpg"><div class="match-label">CS SQUAD</div></a>
        <a href="match_details.html?type=LW" class="match-card"><img src="lw_poster.jpg"><div class="match-label">LONE WOLF</div></a>
        <a href="match_details.html?type=1V1" class="match-card"><img src="1v1_poster.jpg"><div class="match-label">1V1 BATTLE</div></a>
        <a href="match_details.html?type=LW2" class="match-card"><img src="lw2_poster.jpg"><div class="match-label">LONE WOLF 2.0</div></a>
        <a href="match_details.html?type=FREE" class="match-card"><img src="free_poster.jpg"><div class="match-label">FREE MATCH</div></a>
        <a href="match_details.html?type=1V1HS" class="match-card"><img src="1v1hs_poster.jpg"><div class="match-label">1V1 HEADSHOT</div></a>
        <a href="match_details.html?type=CSHS" class="match-card"><img src="cshs_poster.jpg"><div class="match-label">CS HEADSHOT</div></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>HOME</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>EARN</span>
        </a>
        <a href="refer.html" class="nav-item">
            <i class="fas fa-gift"></i>
            <span>REFER</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user-alt"></i>
            <span>PROFILE</span>
        </a>
    </nav>

    <div class="system-nav-bar"></div>

    <script>
        // ⚡ SLIDER LOGIC
        let currentIndex = 0;
        const slider = document.getElementById('slider');
        const dots = document.querySelectorAll('.dot');
        const totalSlides = 4;

        function updateSlider() {
            slider.style.transform = `translateX(-${currentIndex * 100}%)`;
            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateSlider();
        }

        // Auto slide every 3 seconds
        setInterval(nextSlide, 3000);

        // 🔗 FIREBASE & DASHBOARD
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
        const userUID = localStorage.getItem("userUID") || (userData ? userData.uid : null);

        if (!userUID) {
            window.location.href = "login.html";
        }

        function startLiveDashboard() {
            const balEl = document.getElementById('walletBal');
            database.ref('players/' + userUID).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    balEl.innerHTML = `<i class="fas fa-coins"></i> ₹${data.cash || 0}`;
                } else {
                    balEl.innerHTML = `<i class="fas fa-coins"></i> ₹0`;
                }
            });
        }

        window.onload = startLiveDashboard;
    </script>
</body>
</html>
