<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Home - RARE GAMING</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 160px; }
        .header-top { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-name { font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #66fcf1; }
        .wallet-pill { background: rgba(102, 252, 241, 0.1); border: 1.5px solid #66fcf1; padding: 8px 15px; border-radius: 12px; color: #66fcf1; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 0 10px rgba(102, 252, 241, 0.2); }
        .section-title { font-size: 18px; font-weight: 800; margin: 15px 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .match-card { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 4/5; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; display: block; }
        .match-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 15px 10px; text-align: center; box-sizing: border-box; }
        .match-name { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; margin: 0; }
        .status-closed { color: #ff3131; font-size: 9px; font-weight: 800; text-transform: uppercase; margin-top: 5px; background: rgba(255, 49, 49, 0.1); border: 1px solid #ff3131; padding: 3px 6px; border-radius: 4px; display: inline-block; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .action-card { background: #111116; border: 1px solid #1f1f25; border-radius: 15px; padding: 15px 10px; text-align: center; text-decoration: none; display: block; }
        .action-card i { font-size: 24px; margin-bottom: 8px; display: block; color: #66fcf1; }
        .action-card span { font-size: 10px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; padding: 0 5px; }
        .nav-item { text-decoration: none; color: #666; font-size: 9px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: #66fcf1; }
        .nav-item.center-btn { position: relative; color: #666; margin-top: -30px; }
        .nav-item.center-btn .icon-circle { width: 55px; height: 55px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 4px solid #050508; box-shadow: 0 0 15px rgba(102, 252, 241, 0.3); }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE GAMING</div>
        <div class="wallet-pill" id="walletBal">₹...</div>
    </div>

    <div class="section-title">E-sports Matches</div>
    <div class="match-grid">
        <div class="match-card"><img src="br_poster.jpg"><div class="card-overlay"><p class="match-name">BR SQUAD (₹20)</p><div class="status-closed">CLOSED</div></div></div>
        <div class="match-card"><img src="cs_poster.jpg"><div class="card-overlay"><p class="match-name">CS SQUAD (₹20)</p><div class="status-closed">CLOSED</div></div></div>
        <div class="match-card"><img src="lw_poster.jpg"><div class="card-overlay"><p class="match-name">LONE WOLF (₹10)</p><div class="status-closed">CLOSED</div></div></div>
        <div class="match-card"><img src="1v1_poster.jpg"><div class="card-overlay"><p class="match-name">1V1 BATTLE (₹50)</p><div class="status-closed">CLOSED</div></div></div>
    </div>

    <div class="section-title">Quick Actions</div>
    <div class="action-grid">
        <a href="teams.html" class="action-card"><i class="fas fa-shield-alt"></i><span>Teams</span></a>
        <a href="https://wa.me/917008170291" class="action-card"><i class="fab fa-whatsapp"></i><span>Contact</span></a>
        <a href="prizes.html" class="action-card"><i class="fas fa-trophy"></i><span>Prizes</span></a>
        <a href="profile.html" class="action-card"><i class="fas fa-user-circle"></i><span>Profile</span></a>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn"><div class="icon-circle"><i class="fas fa-exchange-alt"></i></div><span>TRANSFER</span></a>
        <a href="chat_list.html" class="nav-item"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        // ✅ NAYA UPDATED URL
        const scriptURL = "https://script.google.com/macros/s/AKfycbylRDpKROBiNqgOihC6EG-DVa1wjgSX-dKS-h04cENYlP2qDttsSWHZfbVhD3vm4zpWgg/exec";
        
        function syncBalance() {
            let userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            
            // Safety Check: Agar bacha login nahi hai
            if(!userData || !userData.name) {
                window.location.href = "login.html";
                return;
            }

            // ✅ USERNAME se balance khichna (Taki ₹1000 dikhe)
            fetch(`${scriptURL}?action=getUserData&username=${encodeURIComponent(userData.name)}`)
            .then(res => res.json())
            .then(data => { 
                if(data && data.balance !== undefined) {
                    document.getElementById('walletBal').innerText = "₹" + data.balance; 
                } else {
                    document.getElementById('walletBal').innerText = "₹0"; 
                }
            }).catch(e => {
                console.log("Balance Sync Error:", e);
                document.getElementById('walletBal').innerText = "₹Error";
            });
        }

        // Page load par balance dikhao
        window.onload = syncBalance;
    </script>
</body>
</html>
