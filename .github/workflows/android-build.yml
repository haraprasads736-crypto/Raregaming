name: Build Rare Gaming APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Yahan folder ka naam 'www' kar diya taaki error na aaye
          mkdir -p www
          cp index.html www/
          npx cap init "Rare Gaming" com.raregaming.app --web-dir www
          npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RareGaming-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
