name: Build Rare Gaming Pro APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Project
        run: |
          cordova create build com.raregaming.app "Rare Gaming"
          cp index.html build/www/
          mkdir -p build/res/icon build/res/screen
          cp icon.png build/res/icon/android-icon.png || echo "no icon"
          cp splash.png build/res/screen/android-splash.png || echo "no splash"

      - name: Add Android Platform
        run: |
          cd build
          # Hum specifically version 10 use karenge jo stable hai
          cordova platform add android@10.1.1

      - name: Build APK
        run: |
          cd build
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: RareGaming-Final-App
          path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
