name: Build Rare Gaming APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor (Modern Tool)
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Rare Gaming" com.raregaming.app --web-dir .
          npx cap add android

      - name: Copy Assets
        run: |
          mkdir -p android/app/src/main/res/drawable
          [ -f icon.png ] && cp icon.png android/app/src/main/res/drawable/ic_launcher.png
          
      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RareGaming-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
