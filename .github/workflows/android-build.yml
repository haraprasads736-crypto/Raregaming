name: Build Rare Gaming APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare Project
        run: |
          cordova create build com.raregaming.app "Rare Gaming"
          cp index.html build/www/
          mkdir -p build/res/icon build/res/screen
          [ -f icon.png ] && cp icon.png build/res/icon/android-icon.png || echo "No icon"
          [ -f splash.png ] && cp splash.png build/res/screen/android-splash.png || echo "No splash"

      - name: Build Android
        run: |
          cd build
          cordova platform add android@10.1.1
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: RareGaming-App
          path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
