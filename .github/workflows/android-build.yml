name: Build Rare Gaming APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Ab Java 21 use karenge, error nahi aayega
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App & Remove Splash
        run: |
          cordova create myapp com.raregaming.app "Rare Gaming"
          cp index.html myapp/www/
          # Splash screen ko disable karne ki setting
          echo '<widget id="com.raregaming.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets"><name>Rare Gaming</name><content src="index.html" /><preference name="ShowSplashScreen" value="false" /><preference name="SplashScreenDelay" value="0" /></widget>' > myapp/config.xml
          
          cd myapp
          cordova platform add android@12.0.0 # Naya version taki Java 21 support kare
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RareGaming-Final-APK
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
