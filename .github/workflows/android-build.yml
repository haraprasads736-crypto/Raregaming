name: Build Rare Gaming APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          cordova create build com.raregaming.app "Rare Gaming"
          cp index.html build/www/
          cd build
          cordova platform add android@10.1.1
          cordova build android

      - name: Get APK
        uses: actions/upload-artifact@v3
        with:
          name: RareGaming-App
          path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
