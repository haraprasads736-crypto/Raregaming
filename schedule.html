<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Schedule</title>
    <style>
        body {
            background-color: #0b0c10;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h2 {
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        p {
            color: #c5c6c7;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .schedule-box {
            background-color: #1f2833;
            padding: 25px;
            margin: 20px auto;
            border-radius: 12px;
            width: 85%;
            border: 2px solid #66fcf1;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(102, 252, 241, 0.3);
        }
        .match-title {
            color: #66fcf1;
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .match-details {
            color: #c5c6c7;
            font-size: 18px;
            line-height: 2;
        }
        .highlight {
            color: #66fcf1;
            font-weight: bold;
        }
        .back-btn {
            background-color: transparent;
            color: #c5c6c7;
            border: none;
            margin-top: 30px;
            font-size: 16px;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>⏰ Tournament Schedule</h2>
    <p>Rare Gaming-FF Official Match</p>

    <div class="schedule-box">
        <div class="match-title">MONDAY NIGHT BATTLE</div>
        <div class="match-details">
            📅 <b>Date:</b> <span class="highlight">23 March 2026</span><br>
            🗓️ <b>Day:</b> Monday<br>
            ⏰ <b>Time:</b> <span class="highlight">07:00 PM (Night)</span>
