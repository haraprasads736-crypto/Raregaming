<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Match Schedule</title>
    <style>
        body { background-color: #0b0c10; color: white; font-family: Arial, sans-serif; text-align: center; padding: 15px; margin: 0; }
        h2 { color: #66fcf1; text-transform: uppercase; margin-top: 20px; text-shadow: 0px 0px 10px #66fcf1; }
        .schedule-box { background-color: #1f2833; border: 2px solid #45a29e; border-radius: 10px; margin: 15px auto; padding: 20px; width: 90%; max-width: 400px; text-align: left; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); }
        .match-title { color: #66fcf1; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .match-time { color: #c5c6c7; font-size: 16px; margin-bottom: 15px; line-height: 1.5; }
        .map-name { display: inline-block; background-color: #45a29e; color: #0b0c10; padding: 8px 15px; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .back-btn { background-color: transparent; color: #66fcf1; border: 2px solid #66fcf1; padding: 12px; margin: 30px auto; border-radius: 8px; cursor: pointer; width: 90%; max-width: 400px; font-weight: bold; display: block; text-decoration: none; text-align: center; }
    </style>
</head>
<body>

    <h2>📅 Match Schedule</h2>

    <div class="schedule-box">
        <div class="match-title">Match 1: Bermuda (Classic)</div>
        <div class="match-time">
            🗓 Date: 23 March 2026 <br> 
            ⏰ Time: 7:00 PM
        </div>
        <div class="map-name">Map: Bermuda</div>
    </div>

    <a href="index.html" class="back-btn">⬅ BACK TO HOME</a>

</body>
</html>
