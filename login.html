<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RARE GAMING</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tera purana CSS yahan rahega (No change) */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background: linear-gradient(180deg, #1A0A2D 0%, #000000 100%); color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { width: 85%; max-width: 380px; text-align: center; padding: 20px; }
        .logo-img { width: 140px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #8B3EEB); border-radius: 20px; }
        .welcome-text h2 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: 2px; color: #fff; }
        .welcome-text p { font-size: 12px; color: #AAA; margin-bottom: 30px; }
        .input-group { background: #2D1B44; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid #443355; }
        .input-group i { color: #8B3EEB; margin-right: 15px; font-size: 18px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; }
        .btn-main { width: 100%; padding: 15px; background: linear-gradient(90deg, #8B3EEB 0%, #6F24A5 100%); border: none; border-radius: 30px; color: white; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; box-shadow: 0 5px 15px rgba(139, 62, 235, 0.4); }
        .btn-main:disabled { background: #444; box-shadow: none; }
        .divider { margin: 25px 0; color: #555; font-size: 12px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: #333; }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .btn-google { width: 100%; padding: 12px; background: #FFF; border-radius: 30px; color: #000; font-weight: 600; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .footer-links { margin-top: 20px; font-size: 13px; }
        .footer-links span { color: #8B3EEB; font-weight: 700; cursor: pointer; }
        #statusMsg { margin-top: 15px; font-size: 12px; font-weight: 600; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" class="logo-img" alt="Rare Gaming" onerror="this.src='https://via.placeholder.com/140?text=LOGO'">
    <div class="welcome-text">
        <h2 id="title">WELCOME</h2>
        <p id="subtitle">Convert your skill to money</p>
    </div>
    <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" id="userInput" placeholder="Username or Rare UID">
    </div>
    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="passInput" placeholder="Password">
    </div>
    <div style="text-align: right; margin-bottom: 20px;">
        <span onclick="forgetPassword()" style="color: #888; font-size: 12px; cursor: pointer;">Forgot Password?</span>
    </div>
    <button class="btn-main" id="authBtn" onclick="processAuth()">ENTER DASHBOARD</button>
    <div class="divider">OR</div>
    <button class="btn-google" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Continue with Google
    </button>
    <div class="footer-links">
        <div id="toggleBtn" onclick="toggleMode()">New Player? <span>SIGN UP</span></div>
    </div>
    <div id="statusMsg"></div>
</div>

<script>
    // 🏁 FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
        authDomain: "rare-gaming-b8875.firebaseapp.com",
        projectId: "rare-gaming-b8875",
        databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const scriptURL = "https://script.google.com/macros/s/AKfycbw3smBpQJocPYYE7bYsSpp171Cw_wPoQuBQ9MqWC5Criomvxo6bSJGay_FvnWL2778AaA/exec";
    let isLoginMode = true;

    window.onload = () => {
        if(localStorage.getItem("rareGamingUser")) {
            window.location.href = "index.html";
        }
    }

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "WELCOME" : "JOIN US";
        document.getElementById('subtitle').innerText = isLoginMode ? "Convert your skill to money" : "Create an account to start earning";
        document.getElementById('authBtn').innerText = isLoginMode ? "ENTER DASHBOARD" : "REGISTER NOW";
        document.getElementById('toggleBtn').innerHTML = isLoginMode ? "New Player? <span>SIGN UP</span>" : "Already a Player? <span>LOGIN</span>";
        document.getElementById('userInput').placeholder = isLoginMode ? "Username or Rare UID" : "Choose Username";
    }

    // 🚀 ASLI JADU: WALLET CHECK & SYNC
    async function syncUserWallet(data) {
        const playerRef = database.ref('players/' + data.uid);
        const snapshot = await playerRef.once('value');
        
        if (!snapshot.exists()) {
            // Agar user purana hai ya naya, aur wallet nahi hai, toh create karo
            // Purane user ka balance Google Sheet se utha kar Firebase mein dalo
            await playerRef.set({
                name: data.name,
                cash: parseFloat(data.coins || 0), // Google Sheet se aaya balance
                uid: data.uid,
                joinedMatches: 0
            });
            console.log("Firebase Wallet Created/Synced!");
        }
    }

    async function processAuth() {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('authBtn');

        if(!user || !pass) {
            status.innerHTML = "<span style='color:#FF4D4D'>Dono box bharo, bhai!</span>";
            return;
        }

        btn.disabled = true;
        status.innerText = isLoginMode ? "Connecting to Arena..." : "Creating Account...";

        try {
            if (isLoginMode) {
                const url = `${scriptURL}?action=login&username=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;
                const response = await fetch(url);
                const data = await response.json();

                if(data.status === "Success") {
                    // 💸 Yahan balance sync hoga
                    await syncUserWallet(data);
                    
                    localStorage.setItem("rareGamingUser", JSON.stringify(data));
                    localStorage.setItem("userUID", data.uid);
                    status.innerHTML = "<span style='color:#00FF00'>Success! Entering Dashboard...</span>";
                    setTimeout(() => window.location.href = "index.html", 800);
                } else {
                    status.innerHTML = `<span style='color:#FF4D4D'>${data.message}</span>`;
                }
            } else {
                // Register logic (POST request)
                const res = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: new URLSearchParams({'action': 'registerUser','name': user,'pass': pass})
                });
                alert("Account created! Now login.");
                toggleMode();
            }
        } catch (err) {
            status.innerHTML = "<span style='color:#FF4D4D'>Error! Check connection.</span>";
        }
        btn.disabled = false;
    }

    function signInWithGoogle() { alert("Google Login coming soon!"); }
    function forgetPassword() { alert("Contact Guru Prasad for Reset!"); }
</script>
</body>
</html>
