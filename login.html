<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Fast Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #030305; --panel: #0a0a0f; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 30px; border-radius: 24px; border: 1px solid #1a1a2e; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--neon); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--neon); color: #000; }
        .toggle-txt { text-align: center; font-size: 13px; color: #888; margin-top: 20px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="formTitle">Login</h2>

        <div id="loginForm">
            <div class="input-group">
                <input type="text" id="loginId" placeholder="Phone Number or UID">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Enter Password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Login Now</button>
            <p class="toggle-txt" onclick="showSection('signup')">New here? Create Account</p>
        </div>

        <div id="signupForm" class="hidden">
            <input type="text" id="sName" placeholder="Full Name" style="margin-bottom:12px;">
            <input type="number" id="sPhone" placeholder="Phone Number" style="margin-bottom:12px;">
            <input type="text" id="sUID" placeholder="Create Unique UID" style="margin-bottom:12px;">
            <input type="password" id="sPass" placeholder="Set Password" style="margin-bottom:12px;">
            
            <input type="text" id="sRefer" placeholder="Referral Code (Optional)" onblur="verifyReferral()" style="margin-bottom:5px;">
            <span id="referStatus" style="font-size:10px; display:block; margin-bottom:15px;"></span>

            <button class="btn btn-primary" onclick="handleSignup()">Create Account</button>
            <p class="toggle-txt" onclick="showSection('login')">Already have an account? Login</p>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showSection(type) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            if(type === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Login"; }
            if(type === 'signup') { document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Signup"; }
        }

        // ✅ VERIFY REFERRAL
        async function verifyReferral() {
            const code = document.getElementById('sRefer').value.trim();
            if(!code) return;
            const snap = await database.ref('players/' + code).once('value');
            if(snap.exists()) {
                document.getElementById('referStatus').innerText = "✅ Valid: " + snap.val().name;
                document.getElementById('referStatus').style.color = "#39ff14";
            } else {
                document.getElementById('referStatus').innerText = "❌ Invalid Referral Code";
                document.getElementById('referStatus').style.color = "#ff3131";
            }
        }

        // 📝 SIGNUP LOGIC (No OTP)
        async function handleSignup() {
            const name = document.getElementById('sName').value.trim();
            const phone = document.getElementById('sPhone').value.trim();
            const uid = document.getElementById('sUID').value.trim();
            const pass = document.getElementById('sPass').value.trim();

            if(!name || !phone || !uid || !pass) return alert("Pura dabba bharo bhai!");
            if(phone.length < 10) return alert("Sahi Phone number dalo!");

            // Check if UID or Phone already exists
            const uidSnap = await database.ref('players/' + uid).once('value');
            const phoneSnap = await database.ref('players').orderByChild('phone').equalTo(phone).once('value');

            if(uidSnap.exists()) return alert("Ye UID pehle se koi le chuka hai!");
            if(phoneSnap.exists()) return alert("Ye Phone number pehle se registered hai!");

            const userData = {
                name: name,
                phone: phone,
                uid: uid,
                pass: pass,
                cash: 0,
                coins: 0,
                dp: ""
            };

            await database.ref('players/' + uid).set(userData);
            alert("Account Created! 🚀 Ab Login karo.");
            showSection('login');
        }

        // 🔑 LOGIN LOGIC (UID or Phone)
        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value;

            let foundUser = null;

            // Try UID login
            const uidSnap = await database.ref('players/' + id).once('value');
            if(uidSnap.exists() && uidSnap.val().pass === pass) {
                foundUser = uidSnap.val();
            } else {
                // Try Phone login
                const phoneSnap = await database.ref('players').orderByChild('phone').equalTo(id).once('value');
                if(phoneSnap.exists()) {
                    const data = Object.values(phoneSnap.val())[0];
                    if(data.pass === pass) foundUser = data;
                }
            }

            if(foundUser) {
                localStorage.setItem("rareGamingUser", JSON.stringify(foundUser));
                window.location.href = "index.html";
            } else {
                alert("Galat Password ya ID! ❌");
            }
        }
    </script>
</body>
</html>
