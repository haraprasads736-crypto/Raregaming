<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { width: 85%; max-width: 350px; background: #111116; padding: 25px; border-radius: 20px; border: 1.5px solid #1f1f25; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .brand { font-size: 26px; font-weight: 800; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 600; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #1a1a21; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #66fcf1; }
        .btn { width: 100%; padding: 12px; background: #66fcf1; border: none; border-radius: 10px; color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); }
        .toggle { margin-top: 15px; font-size: 12px; color: #666; cursor: pointer; }
        .toggle span { color: #66fcf1; font-weight: 800; }
        #statusMsg { margin-top: 10px; font-size: 12px; min-height: 18px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand">RARE GAMING</div>
    <h3 id="title">PLAYER LOGIN</h3>
    
    <div class="input-group">
        <label id="userLabel">Username or Rare UID</label>
        <input type="text" id="userInput" placeholder="Enter here...">
    </div>
    
    <div class="input-group">
        <label>Security Password</label>
        <input type="password" id="passInput" placeholder="••••••••">
    </div>

    <button class="btn" id="authBtn" onclick="processAuth()">ENTER DASHBOARD</button>
    
    <div class="toggle" onclick="toggleMode()" id="toggleBtn">New Player? <span>Sign Up</span></div>
    <div id="statusMsg"></div>
</div>

<script>
    // ✅ AAPKA NAYA DEPLOY URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbylRDpKROBiNqgOihC6EG-DVa1wjgSX-dKS-h04cENYlP2qDttsSWHZfbVhD3vm4zpWgg/exec";
    
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "PLAYER LOGIN" : "CREATE ACCOUNT";
        document.getElementById('authBtn').innerText = isLoginMode ? "ENTER DASHBOARD" : "REGISTER NOW";
        document.getElementById('toggleBtn').innerHTML = isLoginMode ? "New Player? <span>Sign Up</span>" : "Already a Player? <span>Login</span>";
        document.getElementById('userLabel').innerText = isLoginMode ? "Username or Rare UID" : "Choose Username";
    }

    function processAuth() {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('authBtn');

        if(!user || !pass) {
            status.innerHTML = "<span style='color:red'>Bhai, dono box bharo!</span>";
            return;
        }

        btn.disabled = true;
        status.style.color = "#66fcf1";
        status.innerText = isLoginMode ? "Checking Database..." : "Registering...";

        // Action aur Parameters decide karna
        let url = isLoginMode ? 
            `${scriptURL}?action=login&username=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}` :
            `${scriptURL}?action=register&name=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            btn.disabled = false;
            if(isLoginMode) {
                if(data.status === "Success") {
                    // Sab kuch sahi hai! Save data and teleport
                    localStorage.setItem("rareGamingUser", JSON.stringify({
                        name: data.name,
                        uid: data.uid
                    }));
                    status.innerText = "Success! Redirecting...";
                    setTimeout(() => window.location.href = "index.html", 800);
                } else {
                    status.innerHTML = "<span style='color:red'>ID ya Pass galat hai, bhai!</span>";
                    btn.innerText = "RETRY";
                }
            } else {
                // Register Success
                if(data && data.toString().includes("RG")) {
                    alert("Account Created! Your Rare ID: " + data);
                    location.reload();
                } else {
                    status.innerHTML = "<span style='color:red'>" + data + "</span>";
                }
            }
        })
        .catch(err => {
            btn.disabled = false;
            status.innerHTML = "<span style='color:red'>Server Error! Deploy Check karo.</span>";
            console.error(err);
        });
    }
</script>

</body>
</html>
