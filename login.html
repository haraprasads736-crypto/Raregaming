<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #030305; --panel: #0a0a0f; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 30px; border-radius: 24px; border: 1px solid #1a1a2e; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--neon); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--neon); color: #000; }
        .btn-otp { background: #1a1a2e; color: var(--neon); font-size: 11px; padding: 8px; margin-top: 5px; }
        .toggle-txt { text-align: center; font-size: 13px; color: #888; margin-top: 20px; cursor: pointer; }
        .hidden { display: none; }
        .verify-badge { color: #39ff14; font-size: 11px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="formTitle">Login</h2>

        <div id="loginForm">
            <div class="input-group">
                <input type="text" id="loginId" placeholder="Enter Email or UID">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Enter Password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Login Now</button>
            <p class="toggle-txt" onclick="showSection('forgot')">Forgot Password?</p>
            <p class="toggle-txt" onclick="showSection('signup')">New here? Create Account</p>
        </div>

        <div id="signupForm" class="hidden">
            <input type="text" id="sName" placeholder="Full Name" style="margin-bottom:10px;">
            <div class="input-group">
                <input type="email" id="sEmail" placeholder="Gmail ID">
                <button class="btn btn-otp" id="sendOtpBtn" onclick="sendVerificationCode()">Verify Gmail</button>
            </div>
            <div id="otpSection" class="hidden">
                <input type="number" id="sOtp" placeholder="Enter 6-Digit OTP" style="margin-bottom:10px;">
            </div>
            <input type="text" id="sUID" placeholder="Create Unique UID" style="margin-bottom:10px;">
            <input type="password" id="sPass" placeholder="Set Password" style="margin-bottom:10px;">
            <input type="text" id="sRefer" placeholder="Referral Code (Optional)" onblur="verifyReferral()">
            <span id="referStatus" style="font-size:10px; display:block; margin-bottom:10px;"></span>

            <button class="btn btn-primary" id="signupBtn" onclick="handleSignup()">Complete Signup</button>
            <p class="toggle-txt" onclick="showSection('login')">Already have an account? Login</p>
        </div>

        <div id="forgotForm" class="hidden">
            <input type="email" id="fEmail" placeholder="Your Registered Gmail">
            <button class="btn btn-otp" onclick="sendForgotOTP()">Get Reset Code</button>
            <div id="forgotVerifySection" class="hidden">
                <input type="number" id="fOtp" placeholder="Enter OTP" style="margin-top:10px;">
                <input type="password" id="fNewPass" placeholder="New Password" style="margin-top:10px;">
                <button class="btn btn-primary" onclick="resetPassword()">Update Password</button>
            </div>
            <p class="toggle-txt" onclick="showSection('login')">Back to Login</p>
        </div>
    </div>

    <script>
        // 🏁 CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // ❗ EmailJS me account banakar yahan public key dalen

        let generatedOTP = null;
        let isVerified = false;

        function showSection(type) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.add('hidden');
            if(type === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Login"; }
            if(type === 'signup') { document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Signup"; }
            if(type === 'forgot') { document.getElementById('forgotForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Reset"; }
        }

        // 📧 SEND OTP (EmailJS)
        function sendVerificationCode() {
            const email = document.getElementById('sEmail').value;
            if(!email.includes("@gmail.com")) return alert("Sahi Gmail dalo!");
            
            generatedOTP = Math.floor(100000 + Math.random() * 900000);
            alert("Developing Mode: Your OTP is " + generatedOTP); // Production me ise hata dena
            document.getElementById('otpSection').classList.remove('hidden');
            document.getElementById('sendOtpBtn').innerText = "OTP Sent!";
            
            // EmailJS Logic yahan aayega
        }

        // ✅ VERIFY REFERRAL
        async function verifyReferral() {
            const code = document.getElementById('sRefer').value.trim();
            if(!code) return;
            const snap = await database.ref('players').orderByChild('uid').equalTo(code).once('value');
            if(snap.exists()) {
                document.getElementById('referStatus').innerText = "✅ Valid Code (Rare User)";
                document.getElementById('referStatus').style.color = "#39ff14";
            } else {
                document.getElementById('referStatus').innerText = "❌ Invalid Referral Code";
                document.getElementById('referStatus').style.color = "#ff3131";
            }
        }

        // 📝 SIGNUP LOGIC
        async function handleSignup() {
            const name = document.getElementById('sName').value;
            const email = document.getElementById('sEmail').value;
            const uid = document.getElementById('sUID').value;
            const pass = document.getElementById('sPass').value;
            const otp = document.getElementById('sOtp').value;

            if(otp != generatedOTP) return alert("OTP galat hai!");

            // Check if user already exists
            const emailSnap = await database.ref('players').orderByChild('email').equalTo(email).once('value');
            const uidSnap = await database.ref('players/' + uid).once('value');

            if(emailSnap.exists() || uidSnap.exists()) return alert("Gmail or UID already use ho chuka hai!");

            const userData = {
                name: name, email: email, uid: uid, pass: pass,
                cash: 0, coins: 0, dp: ""
            };

            await database.ref('players/' + uid).set(userData);
            alert("Account Created! Now Login.");
            showSection('login');
        }

        // 🔑 LOGIN LOGIC (Double Check Email & UID)
        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value;

            let foundUser = null;

            // Check if UID
            const uidSnap = await database.ref('players/' + id).once('value');
            if(uidSnap.exists() && uidSnap.val().pass === pass) {
                foundUser = uidSnap.val();
            } else {
                // Check if Email
                const emailSnap = await database.ref('players').orderByChild('email').equalTo(id).once('value');
                if(emailSnap.exists()) {
                    const data = Object.values(emailSnap.val())[0];
                    if(data.pass === pass) foundUser = data;
                }
            }

            if(foundUser) {
                localStorage.setItem("rareGamingUser", JSON.stringify(foundUser));
                window.location.href = "index.html";
            } else {
                alert("Galat Password ya ID!");
            }
        }
        
        // ❗ Forgot Pass functionality similar to signup OTP...
    </script>
</body>
</html>
