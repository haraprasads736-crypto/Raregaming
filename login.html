<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Player Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        
        .logo-container { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #66fcf1; overflow: hidden; margin-bottom: 15px; box-shadow: 0 0 15px rgba(102, 252, 241, 0.4); }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-title { font-weight: 800; font-size: 24px; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: #a0aab2; margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; }

        .login-box { background: #1a1d24; padding: 25px; border-radius: 12px; border: 1.5px solid #2b303b; box-shadow: 0 5px 15px rgba(0,0,0,0.5); width: 85%; max-width: 320px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: #a0aab2; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: #15181e; border: 1px solid #2b303b; border-radius: 8px; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: #66fcf1; }
        
        .submit-btn { width: 100%; background: #66fcf1; color: #000; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        .register-link { margin-top: 15px; font-size: 12px; color: #888; cursor: pointer; }
        .register-link span { color: #66fcf1; font-weight: 800; }
        
        /* Success Alert Box */
        #regAlert { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1d24; padding: 25px; border-radius: 15px; border: 2px solid #66fcf1; z-index: 1000; width: 280px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.jpg" alt="Rare Gaming Logo">
    </div>
    
    <div class="app-title" id="mainTitle">RARE GAMING</div>
    <div class="subtitle" id="mainSubtitle">PLAYER AUTHENTICATION</div>

    <div class="login-box">
        <form id="customLoginForm">
            <div class="input-group">
                <label id="label1">Rare UID (RGXXXXXX)</label>
                <input type="text" id="userInput" placeholder="Enter UID" required>
            </div>
            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="userPass" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="submit-btn" id="actionBtn">ENTER DASHBOARD</button>
            <div class="register-link" id="toggleMode" onclick="toggleMode()">
                Don't have an account? <span>Sign Up</span>
            </div>
        </form>
    </div>

    <div id="regAlert">
        <h3 style="color:#66fcf1; margin-top:0;">Account Created!</h3>
        <p style="font-size:12px; color:#ccc;">Take a screenshot of your Rare ID:</p>
        <h2 id="newIdShow" style="color:white; letter-spacing:2px; background:#000; padding:10px; border-radius:8px;">RG123456</h2>
        <button onclick="location.reload()" style="width:100%; padding:10px; background:#66fcf1; border:none; border-radius:5px; font-weight:800; cursor:pointer;">GOT IT! LOGIN NOW</button>
    </div>

    <script>
        // ⚠️ APNA NAYA DEPLOY URL YAHAN DALO
        const scriptURL = "https://script.google.com/macros/s/AKfycbzGe-aPxYAJCCu6gdB2TYsjyaqhyb_Z_f3fjXsFVWQ0IeH5do-mASoJlcsGVOhhqi0mzw/exec";
        
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('mainTitle').innerText = isLogin ? "RARE GAMING" : "JOIN COMMUNITY";
            document.getElementById('actionBtn').innerText = isLogin ? "ENTER DASHBOARD" : "CREATE ACCOUNT";
            document.getElementById('label1').innerText = isLogin ? "Rare UID (RGXXXXXX)" : "Your Full Name";
            document.getElementById('userInput').placeholder = isLogin ? "Enter UID" : "Enter Your Name";
            document.getElementById('toggleMode').innerHTML = isLogin ? "Don't have an account? <span>Sign Up</span>" : "Already a player? <span>Login</span>";
        }

        document.getElementById('customLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const val1 = document.getElementById('userInput').value.trim();
            const pass = document.getElementById('userPass').value.trim();
            const btn = document.getElementById('actionBtn');

            btn.innerText = "Processing...";
            btn.disabled = true;

            let finalURL = isLogin ? 
                `${scriptURL}?action=login&uid=${encodeURIComponent(val1)}&pass=${encodeURIComponent(pass)}` :
                `${scriptURL}?action=register&name=${encodeURIComponent(val1)}&pass=${encodeURIComponent(pass)}`;

            fetch(finalURL)
            .then(res => res.text())
            .then(data => {
                btn.disabled = false;
                btn.innerText = isLogin ? "ENTER DASHBOARD" : "CREATE ACCOUNT";

                if (isLogin) {
                    if (data === "Failed" || data === "Wrong") {
                        alert("Bhai, UID ya Password galat hai!");
                    } else {
                        // Success: Save both Name and UID
                        localStorage.setItem("rareGamingUser", JSON.stringify({
                            name: data, 
                            uid: val1,
                            picture: "logo.jpg"
                        }));
                        window.location.href = "index.html";
                    }
                } else {
                    // Register Success: Show New UID
                    if (data === "User Exists") {
                        alert("Bhai, ye naam pehle se hai!");
                    } else {
                        document.getElementById('newIdShow').innerText = data;
                        document.getElementById('regAlert').style.display = 'block';
                    }
                }
            })
            .catch(err => {
                alert("Network Error! Check your data.");
                btn.disabled = false;
                btn.innerText = "RETRY";
            });
        });

        window.onload = function() {
            if (localStorage.getItem("rareGamingUser")) {
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
