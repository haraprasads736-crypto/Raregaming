<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { width: 85%; max-width: 350px; background: #111116; padding: 25px; border-radius: 20px; border: 1.5px solid #1f1f25; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .brand { font-size: 26px; font-weight: 800; color: #66fcf1; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: 600; margin-left: 5px; }
        input { width: 100%; padding: 12px; margin-top: 5px; background: #1a1a21; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #66fcf1; }
        .btn { width: 100%; padding: 12px; background: #66fcf1; border: none; border-radius: 10px; color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-google { width: 100%; padding: 12px; background: #ffffff; border: none; border-radius: 10px; color: #000; font-weight: 600; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; }
        .divider { margin: 20px 0; color: #444; font-size: 12px; position: relative; }
        .divider::before, .divider::after { content: ""; position: absolute; top: 50%; width: 40%; height: 1px; background: #222; }
        .divider::before { left: 0; } .divider::after { right: 0; }
        .toggle { margin-top: 15px; font-size: 12px; color: #666; cursor: pointer; }
        .toggle span { color: #66fcf1; font-weight: 800; }
        #statusMsg { margin-top: 10px; font-size: 12px; min-height: 18px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand">RARE GAMING</div>
    
    <button class="btn-google" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
        Continue with Google
    </button>

    <div class="divider">OR USE ID/PASS</div>

    <h3 id="title" style="font-size: 14px; margin-bottom: 15px; color: #888;">PLAYER LOGIN</h3>
    
    <div class="input-group">
        <label id="userLabel">Username or Rare UID</label>
        <input type="text" id="userInput" placeholder="Enter here...">
    </div>
    
    <div class="input-group">
        <label>Security Password</label>
        <input type="password" id="passInput" placeholder="••••••••">
    </div>

    <button class="btn" id="authBtn" onclick="processAuth()">ENTER DASHBOARD</button>
    
    <div class="toggle" onclick="toggleMode()" id="toggleBtn">New Player? <span>Sign Up</span></div>
    <div id="statusMsg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>

<script>
    // ✅ TERI FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyA6GgehsphLSUJ8jfEwwTT-DD7GMRO28AA",
        authDomain: "rare-gaming-6b29a.firebaseapp.com",
        projectId: "rare-gaming-6b29a",
        storageBucket: "rare-gaming-6b29a.firebasestorage.app",
        messagingSenderId: "1048932406330",
        appId: "1:1048932406330:web:7b67f288b95e62f0001103"
    };
    firebase.initializeApp(firebaseConfig);

    // ✅ NAYA APPS SCRIPT URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbxGySusVnUw7aID7sGrfK0eSX0k7l47GZc5qJ0ogQGokqZQJH_MK9JOUesvvsFneoo8FA/exec";
    
    let isLoginMode = true;

    // --- GOOGLE LOGIN ---
    function signInWithGoogle() {
        const status = document.getElementById('statusMsg');
        status.innerText = "Connecting Google...";
        const provider = new firebase.auth.GoogleAuthProvider();
        
        firebase.auth().signInWithPopup(provider).then((result) => {
            const user = result.user;
            status.innerText = "Verifying with Sheets...";
            
            fetch(`${scriptURL}?action=firebase_login&email=${encodeURIComponent(user.email)}&name=${encodeURIComponent(user.displayName)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "Success") {
                    localStorage.setItem("rareGamingUser", JSON.stringify(data));
                    status.innerText = "Welcome Boss! Redirecting...";
                    setTimeout(() => window.location.href = "index.html", 800);
                }
            });
        }).catch(err => {
            status.innerHTML = "<span style='color:red'>Google Login Failed!</span>";
            console.error(err);
        });
    }

    // --- ID/PASS LOGIN & REGISTER ---
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "PLAYER LOGIN" : "CREATE ACCOUNT";
        document.getElementById('authBtn').innerText = isLoginMode ? "ENTER DASHBOARD" : "REGISTER NOW";
        document.getElementById('toggleBtn').innerHTML = isLoginMode ? "New Player? <span>Sign Up</span>" : "Already a Player? <span>Login</span>";
        document.getElementById('userLabel').innerText = isLoginMode ? "Username or Rare UID" : "Choose Username";
        document.getElementById('statusMsg').innerText = "";
    }

    function processAuth() {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('authBtn');

        if(!user || !pass) {
            status.innerHTML = "<span style='color:red'>Dono box bharo, bhai!</span>";
            return;
        }

        btn.disabled = true;
        status.innerText = isLoginMode ? "Checking..." : "Registering...";

        let url = isLoginMode ? 
            `${scriptURL}?action=login&username=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}` :
            `${scriptURL}?action=register&name=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;

        fetch(url)
        .then(res => res.json())
        .then(data => {
            btn.disabled = false;
            if(data.status === "Success") {
                localStorage.setItem("rareGamingUser", JSON.stringify(data));
                status.innerText = "Success! Redirecting...";
                setTimeout(() => window.location.href = "index.html", 800);
            } else {
                status.innerHTML = "<span style='color:red'>" + (data.message || "Fail!") + "</span>";
            }
        })
        .catch(err => {
            btn.disabled = false;
            status.innerHTML = "<span style='color:red'>Server Error!</span>";
        });
    }
</script>

</body>
</html>
