<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Unified Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        :root { --neon: #00f2fe; --gold: #ffd700; --bg: #030305; --panel: #0a0a0f; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 90%; max-width: 400px; background: var(--panel); padding: 30px; border-radius: 24px; border: 1px solid #1a1a2e; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #222; border-radius: 12px; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--neon); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-primary { background: var(--neon); color: #000; }
        .toggle-txt { text-align: center; font-size: 13px; color: #888; margin-top: 20px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="formTitle">Login</h2>

        <div id="loginForm">
            <div class="input-group">
                <input type="text" id="loginId" placeholder="UID (RG...), Phone or Email">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Enter Password">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">Login Now</button>
            <p class="toggle-txt" onclick="showSection('signup')">New here? Create Account</p>
        </div>

        <div id="signupForm" class="hidden">
            <input type="text" id="sName" placeholder="Full Name" style="margin-bottom:12px;">
            <input type="number" id="sPhone" placeholder="Phone Number" style="margin-bottom:12px;">
            <input type="text" id="sUID" placeholder="Create UID (Example: RG123)" style="margin-bottom:12px;">
            <input type="password" id="sPass" placeholder="Set Password" style="margin-bottom:12px;">
            <button class="btn btn-primary" onclick="handleSignup()">Create Account</button>
            <p class="toggle-txt" onclick="showSection('login')">Already have an account? Login</p>
        </div>
    </div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function showSection(type) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            if(type === 'login') { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Login"; }
            if(type === 'signup') { document.getElementById('signupForm').classList.remove('hidden'); document.getElementById('formTitle').innerText = "Signup"; }
        }

        async function handleLogin() {
            const inputId = document.getElementById('loginId').value.trim();
            const inputPass = document.getElementById('loginPass').value.trim();

            if(!inputId || !inputPass) return alert("Bhai, ID aur Password dono dalo!");

            let foundUser = null;

            // 1. Sabse pehle UID se check karo (Direct path: players/RG...)
            const uidSnap = await database.ref('players/' + inputId).once('value');
            if(uidSnap.exists()) {
                const data = uidSnap.val();
                if(String(data.pass) === String(inputPass)) {
                    foundUser = data;
                }
            }

            // 2. Agar UID se nahi mila, toh Phone Number se search karo
            if(!foundUser) {
                const phoneSnap = await database.ref('players').orderByChild('phone').equalTo(inputId).once('value');
                if(phoneSnap.exists()) {
                    const snapVal = phoneSnap.val();
                    const key = Object.keys(snapVal)[0];
                    if(String(snapVal[key].pass) === String(inputPass)) {
                        foundUser = snapVal[key];
                    }
                }
            }

            // 3. Agar abhi bhi nahi mila, toh Email se search karo (Purane users)
            if(!foundUser) {
                const emailSnap = await database.ref('players').orderByChild('email').equalTo(inputId).once('value');
                if(emailSnap.exists()) {
                    const snapVal = emailSnap.val();
                    const key = Object.keys(snapVal)[0];
                    if(String(snapVal[key].pass) === String(inputPass)) {
                        foundUser = snapVal[key];
                    }
                }
            }

            // --- Authentication Check ---
            if(foundUser) {
                localStorage.setItem("rareGamingUser", JSON.stringify(foundUser));
                alert("Welcome back, " + foundUser.name + "!");
                window.location.href = "index.html";
            } else {
                alert("Login Fail! ❌\nSahi UID (RG...) aur Password check karein.");
            }
        }

        async function handleSignup() {
            const name = document.getElementById('sName').value.trim();
            const phone = document.getElementById('sPhone').value.trim();
            const uid = document.getElementById('sUID').value.trim();
            const pass = document.getElementById('sPass').value.trim();

            if(!name || !phone || !uid || !pass) return alert("Bhai, saare dabbe bharo!");

            // Check if UID exists
            const checkUid = await database.ref('players/' + uid).once('value');
            if(checkUid.exists()) return alert("Ye UID pehle se hai, kuch aur try karo!");

            const userData = {
                name: name,
                phone: phone,
                uid: uid,
                pass: pass,
                cash: 0,
                coins: 0,
                dp: ""
            };

            await database.ref('players/' + uid).set(userData);
            alert("Account Ban Gaya! ✅ Ab Login Karo.");
            showSection('login');
        }
    </script>
</body>
</html>
