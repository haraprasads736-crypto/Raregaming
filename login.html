<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { width: 90%; max-width: 400px; background: #111116; padding: 30px; border-radius: 20px; border: 1px solid #1f1f25; text-align: center; }
        .brand { font-size: 28px; font-weight: 800; color: #66fcf1; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a21; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #66fcf1; border: none; border-radius: 10px; color: #000; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .toggle-link { margin-top: 15px; font-size: 14px; color: #888; cursor: pointer; display: block; }
        #msg { margin-top: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="brand">RARE GAMING</div>
    <h2 id="formTitle">Login</h2>
    
    <input type="text" id="userInput" placeholder="Enter Username or Rare UID">
    <input type="password" id="passInput" placeholder="Enter Password">
    
    <button onclick="handleAuth()" id="authBtn">LOGIN NOW</button>
    
    <span class="toggle-link" onclick="toggleForm()" id="toggleTxt">Don't have an account? Sign Up</span>
    <div id="msg"></div>
</div>

<script>
    // ✅ AAPKA NAYA DEPLOY URL
    const scriptURL = "https://script.google.com/macros/s/AKfycbzGxO5tMrKQgOJXuvzaYWPcwUfcW03xLLKZuc3QZgpJUV-XWNXL5z_4jHE5y9hIjsKU_w/exec";
    
    let isLogin = true;

    function toggleForm() {
        isLogin = !isLogin;
        document.getElementById('formTitle').innerText = isLogin ? "Login" : "Sign Up";
        document.getElementById('authBtn').innerText = isLogin ? "LOGIN NOW" : "CREATE ACCOUNT";
        document.getElementById('toggleTxt').innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login";
        document.getElementById('userInput').placeholder = isLogin ? "Enter Username or Rare UID" : "Choose Username";
    }

    function handleAuth() {
        const val1 = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const msgDiv = document.getElementById('msg');

        if(!val1 || !pass) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Bhai, dono box bharo!";
            return;
        }

        msgDiv.style.color = "#66fcf1";
        msgDiv.innerText = isLogin ? "Logging in..." : "Creating account...";

        // Naya logic: login ke liye 'username' parameter bhej rahe hain (Script ise UID se bhi check kar legi)
        let finalURL = isLogin ? 
            `${scriptURL}?action=login&username=${encodeURIComponent(val1)}&pass=${encodeURIComponent(pass)}` :
            `${scriptURL}?action=register&name=${encodeURIComponent(val1)}&pass=${encodeURIComponent(pass)}`;

        fetch(finalURL)
        .then(res => res.json())
        .then(data => {
            if (isLogin) {
                if (data.status === "Success") {
                    // Memory mein bache ka Name aur UID save kar lo
                    localStorage.setItem("rareGamingUser", JSON.stringify({
                        name: data.name,
                        uid: data.uid
                    }));
                    msgDiv.innerText = "Sahi hai! Redirecting...";
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    msgDiv.style.color = "red";
                    msgDiv.innerText = "Galti hai! Name/UID ya Password check karo.";
                }
            } else {
                // Registration Success (Nayi UID mil gayi)
                if(data && data.length > 5) {
                    alert("Account Ban Gaya! Aapki UID: " + data);
                    toggleForm();
                } else {
                    alert("Galti: " + data);
                }
            }
        })
        .catch(e => {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Server Error! Internet check karo.";
            console.error(e);
        });
    }
</script>

</body>
</html>
