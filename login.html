<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Rare Gaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body { 
            background: #000; color: white; font-family: 'Poppins', sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        .box { 
            background: #111; padding: 35px 25px; border-radius: 25px; 
            width: 90%; max-width: 360px; text-align: center; 
            border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 24px; margin-bottom: 5px; color: #fff; letter-spacing: 1px; }
        p.subtitle { color: #888; font-size: 12px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; color: #555; margin-left: 10px; text-transform: uppercase; font-weight: 600; }
        
        input { 
            width: 100%; padding: 14px; margin-top: 5px; background: #000; 
            border: 1px solid #333; color: white; border-radius: 12px; 
            box-sizing: border-box; outline: none; font-family: 'Poppins';
            transition: 0.3s;
        }
        input:focus { border-color: #3797f0; }

        button { 
            width: 100%; padding: 14px; background: #3797f0; border: none; 
            color: white; border-radius: 12px; font-weight: 600; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        button:active { transform: scale(0.98); }

        .toggle-link { color: #888; font-size: 13px; margin-top: 20px; display: block; cursor: pointer; }
        .toggle-link span { color: #3797f0; font-weight: 600; }

        /* Welcome Alert Box */
        #customAlert {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #222; padding: 25px; border-radius: 20px; border: 1px solid #3797f0;
            z-index: 1000; width: 80%; max-width: 300px; text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2 id="title">Rare Gaming</h2>
    <p class="subtitle" id="subtitle">Enter your details to continue</p>
    
    <div class="input-group">
        <label id="label1">Your Rare ID</label>
        <input type="text" id="val1" placeholder="RGXXXX">
    </div>
    
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="val2" placeholder="••••••••">
    </div>

    <button onclick="handleAction()" id="mainBtn">Login Now</button>
    
    <p class="toggle-link" id="toggleText" onclick="toggleMode()">
        Don't have an account? <span>Sign Up</span>
    </p>
</div>

<div id="customAlert">
    <h3 style="color: #00e676; margin-top: 0;">Success!</h3>
    <p style="font-size: 13px; color: #ccc;">Account created. Your Rare ID is:</p>
    <h1 id="newIDDisplay" style="color: #fff; margin: 10px 0;">RG0000</h1>
    <p style="font-size: 11px; color: #888;">Please take a screenshot of this ID!</p>
    <button onclick="location.reload()" style="background: #333;">Login Now</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxeFzlXtyA4jEOvOIQG20kMvsa0pab51QcOA7qQadk39a8zAeIh6oMgdXhAlkYEo2Bbww/exec";
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "Rare Gaming" : "Join Community";
        document.getElementById('subtitle').innerText = isLoginMode ? "Enter your details to continue" : "Create a new account for free";
        document.getElementById('mainBtn').innerText = isLoginMode ? "Login Now" : "Register Now";
        document.getElementById('label1').innerText = isLoginMode ? "Your Rare ID" : "Full Name";
        document.getElementById('val1').placeholder = isLoginMode ? "RGXXXX" : "Enter Name";
        document.getElementById('toggleText').innerHTML = isLoginMode ? 
            "Don't have an account? <span>Sign Up</span>" : "Already have an account? <span>Login</span>";
    }

    function handleAction() {
        let v1 = document.getElementById('val1').value.trim();
        let v2 = document.getElementById('val2').value.trim();

        if(!v1 || !v2) return alert("Fill all details!");

        if(isLoginMode) {
            // --- LOGIN SYSTEM ---
            fetch(`${scriptURL}?action=login&uid=${v1}&pass=${v2}`)
            .then(res => res.text()).then(name => {
                if(name === "Wrong" || name === "Not Found") return alert("Wrong ID or Password!");
                localStorage.setItem("rareGamingUser", JSON.stringify({uid: v1, name: name}));
                window.location.href = "index.html";
            });
        } else {
            // --- REGISTER SYSTEM (For New Users) ---
            document.getElementById('mainBtn').innerText = "Registering...";
            fetch(`${scriptURL}?action=register&name=${encodeURIComponent(v1)}&pass=${v2}`)
            .then(res => res.text()).then(newID => {
                document.getElementById('newIDDisplay').innerText = newID;
                document.getElementById('customAlert').style.display = 'block';
            });
        }
    }
</script>
</body>
</html>
