<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; }
        .header i { font-size: 20px; color: #00f2fe; }

        .reg-card { background: #111116; margin: 20px; border-radius: 20px; padding: 25px; border: 1px solid #1f1f25; }
        .reg-title { font-size: 20px; font-weight: 800; color: #00f2fe; margin-bottom: 5px; text-transform: uppercase; }
        .reg-sub { font-size: 11px; color: #666; margin-bottom: 20px; }

        label { display: block; font-size: 10px; font-weight: 800; color: #888; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; 
            font-size: 13px; font-family: 'Poppins';
        }

        .btn-confirm { 
            width: 100%; padding: 16px; background: #00f2fe; color: #000; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 14px; margin-top: 20px;
        }

        /* 🌟 NAVIGATION SYSTEM 🌟 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: white; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color: inherit;"><i class="fas fa-arrow-left"></i></a>
        <span style="font-weight: 800;">TOURNAMENT ENTRY</span>
    </div>

    <div class="reg-card">
        <div class="reg-title" id="matchLabel">LOADING...</div>
        <div class="reg-sub" id="matchRules">Please fill your game details</div>

        <div id="playerInputs"></div>

        <label>Game UID (Leader)</label>
        <input type="number" id="mainUid" placeholder="Enter FF UID">

        <button class="btn-confirm" id="btnConfirm" onclick="submitRegistration()">CONFIRM JOIN</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        // 🔗 APNA MASTER SCRIPT LINK
        const scriptURL = "https://script.google.com/macros/s/AKfycby34-2K5DnslQpxs0_nRw_ZPtsWVLYKJkuZ6RJnqvuzbi6gpmH9kuAI2BsosdkVOVaTLw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const matchName = urlParams.get('match') || "TOURNAMENT";
        const entryFee = urlParams.get('fee') || 10; // Default ₹10 fee
        
        document.getElementById('matchLabel').innerText = matchName;
        const inputArea = document.getElementById('playerInputs');
        const user = JSON.parse(localStorage.getItem("rareGamingUser"));

        if(!user) window.location.href = "login.html";

        // 🔥 MATCH LOGIC 🔥
        if (matchName.includes("CS")) {
            document.getElementById('matchRules').innerText = "Squad Entry: ₹" + entryFee + " required";
            inputArea.innerHTML = `
                <label>Team Name</label>
                <input type="text" id="teamName" placeholder="Enter Team Name">
                <label>Players IGN (Comma separated)</label>
                <input type="text" id="p_all" placeholder="P1, P2, P3, P4">
            `;
        } else if (matchName.includes("BR")) {
            document.getElementById('matchRules').innerText = "Duo Entry: ₹" + entryFee + " required";
            inputArea.innerHTML = `
                <label>Team Name</label>
                <input type="text" id="teamName" placeholder="Enter Duo Name">
                <label>Players IGN</label>
                <input type="text" id="p_all" placeholder="Player 1, Player 2">
            `;
        } else {
            document.getElementById('matchRules').innerText = "Solo Entry: ₹" + entryFee + " required";
            inputArea.innerHTML = `
                <label>In-Game Name (IGN)</label>
                <input type="text" id="p_all" placeholder="Your FF Name">
            `;
        }

        function submitRegistration() {
            const uid = document.getElementById('mainUid').value;
            const players = document.getElementById('p_all').value;
            const btn = document.getElementById('btnConfirm');
            
            if(!uid || !players) return alert("Bhai, saari details dalo!");

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            // 💸 SCRIPT KO REQUEST BHEJ RAHE HAIN PAISA KAATNE KE LIYE
            fetch(scriptURL + "?action=registerMatch&username=" + encodeURIComponent(user.name) + "&matchType=" + encodeURIComponent(matchName + " - " + players) + "&fee=" + entryFee)
            .then(res => res.text()).then(resp => {
                if(resp === "Success") {
                    alert("✅ " + matchName + " Joined Successfully!");
                    window.location.href = "index.html";
                } else {
                    alert("❌ Error: " + resp); // Low Balance ya koi aur error
                    btn.innerText = "CONFIRM JOIN";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Network Error!");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
