<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Tournament Registration</title>
    <style>
        body { background-color: #0b0c10; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; margin: 0; }
        h2 { color: #66fcf1; text-transform: uppercase; letter-spacing: 1px; margin-top: 20px; }
        p { color: #c5c6c7; font-size: 14px; margin-bottom: 25px; }
        
        /* Form Styling */
        form { max-width: 400px; margin: 0 auto; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 10px; 
            border: 2px solid #45a29e; 
            background-color: #1f2833; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box; /* Isse width ekdum sahi rehti hai */
        }
        input:focus { border-color: #66fcf1; outline: none; }

        .submit-btn { 
            background-color: #66fcf1; 
            color: #0b0c10; 
            padding: 15px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 10px; 
            border: none; 
            margin-top: 20px; 
            width: 100%; 
            cursor: pointer; 
            box-shadow: 0px 4px 15px rgba(102, 252, 241, 0.4); 
        }
        .submit-btn:hover { background-color: #45a29e; }
        
        .back-btn { 
            background-color: transparent; 
            color: #c5c6c7; 
            border: none; 
            margin-top: 30px; 
            font-size: 16px; 
            text-decoration: underline; 
            cursor: pointer; 
            display: block; 
            width: 100%; 
        }
    </style>
</head>
<body>

    <h2>📝 REGISTER SQUAD</h2>
    <p>Saare details bharna zaroori hai!</p>

    <form onsubmit="event.preventDefault(); alert('Registration Successful! 🔥 Ab admin ko WhatsApp par message karein.'); window.location.href='index.html';">
        
        <input type="text" placeholder="Squad Name" required>
        <input type="text" placeholder="Leader In-Game Name" required>
        <input type="number" placeholder="Leader UID" required>
        <input type="number" placeholder="WhatsApp Number" required>
        
        <button type="submit" class="submit-btn">SUBMIT ENTRY</button>
    </form>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

</body>
</html>
