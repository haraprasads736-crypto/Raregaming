<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - RARE GAMING</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        /* 🔥 HEADER INFO */
        .status-bar { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.3); margin: 15px; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; font-size: 12px; }
        .fee-tag { color: #ff007a; font-weight: 800; }
        .wallet-tag { color: #00f2fe; font-weight: 800; }

        .container { padding: 15px; max-width: 450px; margin: auto; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        h2 { text-align: center; color: #fff; text-transform: uppercase; font-size: 18px; margin-bottom: 20px; letter-spacing: 1px; }
        
        .match-badge { background: #ff007a; color: white; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 800; display: inline-block; margin-bottom: 10px; }

        label { display: block; font-size: 10px; color: #a0aab2; margin-top: 15px; text-transform: uppercase; font-weight: 600; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-family: 'Poppins'; box-sizing: border-box; margin-top: 5px; }

        .player-section { border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-top: 15px; background: rgba(255,255,255,0.02); }
        .section-title { color: #00f2fe; font-size: 11px; font-weight: 800; margin-bottom: 10px; display: block; }

        .submit-btn { width: 100%; background: linear-gradient(90deg, #ff007a, #7a00ff); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: 800; font-size: 15px; text-transform: uppercase; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 15px rgba(255, 0, 122, 0.3); }
        .submit-btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; }

        #msg { text-align: center; margin-top: 15px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div>ENTRY: <span class="fee-tag" id="feeVal">FREE</span></div>
        <div>WALLET: <span class="wallet-tag" id="walletVal">₹0</span></div>
    </div>

    <div class="container">
        <div class="glass-card">
            <div class="match-badge" id="mBadge">BR MATCH</div>
            <h2 id="formTitle">DUO REGISTRATION</h2>
            
            <div id="formFields">
                <label>Team Name</label>
                <input type="text" id="tName" placeholder="Enter Team Name">

                <div class="player-section">
                    <span class="section-title">PLAYER 1 (Leader)</span>
                    <input type="text" id="p1Name" placeholder="IGN (Name)">
                    <input type="text" id="p1Uid" placeholder="Game UID (Number)">
                </div>

                <div class="player-section">
                    <span class="section-title">PLAYER 2</span>
                    <input type="text" id="p2Name" placeholder="IGN (Name)">
                </div>

                <button class="submit-btn" id="regBtn" onclick="sendData()">CONFIRM & JOIN</button>
            </div>
            
            <div id="msg"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchID = urlParams.get('match') || 'BR';
        
        // ⭐ CEO'S LOGIC SETTINGS ⭐
        let fee = 0;
        let isStarted = false;

        if (matchID === "BR") {
            fee = 0; // BR Match is FREE
            isStarted = true; // BR is Active
        } else {
            isStarted = false; // CS, LW, 1V1 are NOT STARTED
        }

        // Update UI
        document.getElementById('mBadge').innerText = matchID + " MATCH";
        document.getElementById('feeVal').innerText = fee === 0 ? "FREE" : "₹" + fee;
        document.getElementById('walletVal').innerText = "₹" + (localStorage.getItem("rareWallet") || 0);

        if (!isStarted) {
            document.getElementById('formFields').innerHTML = "<h3 style='color:#ffea00; text-align:center;'>REGISTRATION NOT STARTED YET</h3><p style='text-align:center; font-size:11px; color:#a0aab2;'>Please wait for the admin to open this match.</p>";
            document.getElementById('formTitle').innerText = "CLOSED";
        }

        function sendData() {
            const btn = document.getElementById('regBtn');
            const team = document.getElementById('tName').value;
            const p1 = document.getElementById('p1Name').value;
            const p1u = document.getElementById('p1Uid').value;
            const p2 = document.getElementById('p2Name').value;

            if(!team || !p1 || !p1u || !p2) return alert("Bhai, saari details bharo!");

            btn.disabled = true;
            btn.innerText = "⏳ PROCESSING...";

            const user = JSON.parse(localStorage.getItem("rareGamingUser"));
            const duoInfo = `DUO | Team: ${team} | Ldr: ${p1}(${p1u}) | P2: ${p2}`;
            const scriptURL = 'https://script.google.com/macros/s/AKfycbx2z4GZ8uIyKH9yTQqD_n3XBYEQe3_3k2YyQobq5ucoguHkYu3kwCZer3qYlOR1bstAlA/exec';

            fetch(`${scriptURL}?action=joinMatch&username=${encodeURIComponent(user.name)}&matchName=${encodeURIComponent(matchID)}&fee=${fee}&squad=${encodeURIComponent(duoInfo)}`)
            .then(res => res.text())
            .then(status => {
                const m = document.getElementById('msg');
                if(status === "Success") {
                    m.innerHTML = "✅ SUCCESS! Duo Registered.";
                    m.style.color = "#00e676";
                    setTimeout(() => { window.location.href="index.html"; }, 2000);
                } else {
                    m.innerHTML = "❌ " + status;
                    m.style.color = "#ff4b2b";
                    btn.disabled = false;
                    btn.innerText = "CONFIRM & JOIN";
                }
            });
        }
    </script>
</body>
</html>
