<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background-color: #0c0e12; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        /* Top Header with Back Button */
        .nav-header { 
            background: #15181e; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #66fcf1; 
        }
        .back-btn { 
            color: #66fcf1; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 14px; 
            background: rgba(102, 252, 241, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #66fcf1;
        }
        .nav-title { font-weight: 800; font-size: 18px; color: white; letter-spacing: 1px; }

        .container { padding: 20px; max-width: 480px; margin: auto; }

        /* Form Card Styling */
        .form-card {
            background: #1a1d24;
            border-radius: 12px;
            border: 1.5px solid #2b303b;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .form-title {
            font-size: 16px;
            font-weight: 800;
            color: #66fcf1;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Input Fields */
        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #a0aab2;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background: #15181e;
            border: 1px solid #2b303b;
            border-radius: 8px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #66fcf1;
            box-shadow: 0 0 8px rgba(102, 252, 241, 0.3);
        }

        /* Player Section Divider */
        .player-divider {
            font-size: 12px;
            font-weight: 800;
            color: #66fcf1;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px dashed #2b303b;
            padding-bottom: 5px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: #66fcf1;
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(102, 252, 241, 0.3);
        }
        .submit-btn:active {
            transform: scale(0.97);
            background: #4de2d6;
        }

    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span class="nav-title">MATCH ENTRY</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        
        <div class="form-card">
            <div class="form-title">📝 Register Your Team</div>

            <form action="#" method="POST">
                
                <div class="input-group">
                    <label>Select Match Category</label>
                    <select id="matchType" required onchange="generatePlayerFields()">
                        <option value="" disabled selected>-- Choose Match --</option>
                        <option value="BR">🎮 BATTLE ROYALE (BR - Duo)</option>
                        <option value="CS">⚔️ CLASH SQUAD (CS - Squad)</option>
                        <option value="LW">🐺 LONE WOLF 1 (Solo)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Team Name</label>
                    <input type="text" placeholder="Enter Team Name" required>
                </div>

                <div id="dynamic-players">
                    </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label>WhatsApp Number (For Updates)</label>
                    <input type="number" placeholder="Enter 10-digit number" required>
                </div>

                <button type="submit" class="submit-btn">SUBMIT REGISTRATION</button>
            </form>
        </div>

    </div>

    <script>
        function generatePlayerFields() {
            const matchType = document.getElementById("matchType").value;
            const playersContainer = document.getElementById("dynamic-players");
            
            // Purana data saaf karo
            playersContainer.innerHTML = "";

            let playerCount = 0;

            // Decide karo kitne players chahiye
            if (matchType === "BR") {
                playerCount = 2; // BR ke liye 2 players
            } else if (matchType === "CS") {
                playerCount = 4; // CS ke liye 4 players
            } else if (matchType === "LW") {
                playerCount = 1; // Lone Wolf ke liye 1 player
            }

            // Loop lagakar dabbe banao
            for (let i = 1; i <= playerCount; i++) {
                let playerTitle = i === 1 ? "Captain" : "Player " + i;

                let htmlCode = `
                    <div class="player-divider">${playerTitle} Details</div>
                    <div class="input-group">
                        <label>${playerTitle} In-Game Name (IGN)</label>
                        <input type="text" placeholder="Enter ${playerTitle} IGN" required>
                    </div>
                    <div class="input-group">
                        <label>${playerTitle} UID</label>
                        <input type="number" placeholder="Enter ${playerTitle} UID" required>
                    </div>
                `;
                
                // HTML ko container mein daal do
                playersContainer.innerHTML += htmlCode;
            }
        }
    </script>
</body>
</html>
