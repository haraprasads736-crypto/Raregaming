<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register Match - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .reg-box { 
            background: #111116; padding: 30px 20px; border-radius: 25px; 
            border: 1.5px solid #ff007a; width: 100%; max-width: 350px; 
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.2); text-align: center;
        }

        .icon-header { font-size: 50px; color: #ffd700; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
        
        h2 { font-weight: 800; text-transform: uppercase; margin: 0; font-size: 22px; letter-spacing: 1px; }
        .match-display { color: #00f2fe; font-weight: 800; font-size: 16px; margin: 10px 0 25px 0; background: rgba(0, 242, 254, 0.1); padding: 5px; border-radius: 8px; }

        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; margin-left: 5px; }
        
        input { 
            width: 100%; padding: 14px; margin-top: 5px; background: #000; 
            border: 1px solid #222; color: #fff; border-radius: 12px; 
            box-sizing: border-box; font-family: 'Poppins'; font-size: 14px;
            transition: 0.3s;
        }
        input:focus { border-color: #ff007a; outline: none; background: #08080a; }

        .btn-confirm { 
            width: 100%; padding: 16px; margin-top: 10px;
            background: linear-gradient(90deg, #ff007a, #7a00ff); 
            border: none; color: white; font-weight: 800; font-size: 15px;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255, 0, 122, 0.4);
        }
        .btn-confirm:active { transform: scale(0.98); }

        #msg { margin-top: 20px; font-weight: 600; font-size: 13px; min-height: 20px; }
        
        .back-link { margin-top: 20px; color: #555; text-decoration: none; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="reg-box">
        <i class="fas fa-trophy icon-header"></i>
        <h2>Join Match</h2>
        <div class="match-display" id="matchName">Loading Match...</div>
        
        <div class="input-group">
            <label>In-Game UID</label>
            <input type="number" id="gameId" placeholder="Example: 123456789">
        </div>

        <div class="input-group">
            <label>In-Game Name</label>
            <input type="text" id="gameName" placeholder="Example: RARE_GAMER">
        </div>
        
        <button class="btn-confirm" id="submitBtn" onclick="submitRegistration()">Confirm & Register</button>
        
        <div id="msg"></div>
        <a href="index.html" class="back-link">Cancel and Go Back</a>
    </div>

    <script>
        // URL se Match ka naam nikalna (index.html se jo aaya hai)
        const urlParams = new URLSearchParams(window.location.search);
        const match = urlParams.get('match') || "BR SQUAD BATTLE";
        document.getElementById('matchName').innerText = match;

        // 🔥 AAPKA MASTER SCRIPT URL 🔥
        const scriptURL = "https://script.google.com/macros/s/AKfycbytPupu39uc5DU1CgPi4dDTp30pGyplUR4kDGAvmKfwLhlIhoptQsPgrKzIYzJpFpir2Q/exec";

        function submitRegistration() {
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            const gid = document.getElementById('gameId').value;
            const gname = document.getElementById('gameName').value;
            const btn = document.getElementById('submitBtn');
            const msgDiv = document.getElementById('msg');

            // Verification
            if(!userData) { alert("Pehle login karo bhai!"); return; }
            if(!gid || !gname) { alert("Sari details bharo!"); return; }

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            // URLSearchParams method (Best for Google Script Apps)
            const params = new URLSearchParams();
            params.append("action", "register"); 
            params.append("username", userData.name); // App Username
            params.append("gameUid", gid);            // Game ID
            params.append("gameName", gname);        // In-game Name
            params.append("match", match);           // Match Name

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: params 
            })
            .then(() => {
                msgDiv.innerHTML = "<span style='color: #00e676;'>✅ Registration Successful!</span>";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            })
            .catch(() => {
                alert("Network Error! Check internet connection.");
                btn.disabled = false;
                btn.innerText = "Confirm & Register";
            });
        }
    </script>
</body>
</html>
