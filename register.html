<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Registration</title>
    <style>
        body {
            background-color: #0b0c10;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h2 {
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        p {
            color: #c5c6c7;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 2px solid #45a29e;
            background-color: #1f2833;
            color: white;
            font-size: 15px;
        }
        .submit-btn {
            background-color: #66fcf1;
            color: #0b0c10;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            width: 85%;
            cursor: pointer;
            box-shadow: 0px 0px 15px #66fcf1;
        }
        .back-btn {
            background-color: transparent;
            color: #c5c6c7;
            border: none;
            margin-top: 25px;
            font-size: 16px;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            width: 100%;
        }
    </style>
</head>
<body>

    <h2>📝 Register Squad</h2>
    <p>Enter your Free Fire details below</p>

    <form>
        <input type="text" placeholder="Squad / Team Name" required>
        <input type="text" placeholder="Leader In-Game Name (IGN)" required>
        <input type="number" placeholder="Leader UID" required>
        <input type="number" placeholder="WhatsApp Number" required>
        
        <button type="button" class="submit-btn" onclick="alert('Registration Successful! 🔥 Tumhari squad tournament mein add ho gayi hai.')">Submit Entry</button>
    </form>

    <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

</body>
</html>
