<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Register Match - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { 
            background: #050508; color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .reg-box { 
            background: #111116; padding: 25px 20px; border-radius: 25px; 
            border: 1.5px solid #ff007a; width: 100%; max-width: 350px; 
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.2); text-align: center;
        }

        .icon-header { font-size: 40px; color: #ffd700; margin-bottom: 10px; }
        
        h2 { font-weight: 800; text-transform: uppercase; margin: 0; font-size: 20px; }
        .match-display { color: #00f2fe; font-weight: 800; font-size: 14px; margin: 10px 0 20px 0; background: rgba(0, 242, 254, 0.1); padding: 5px; border-radius: 8px; }

        .player-title { font-size: 12px; font-weight: 800; color: #ff007a; text-align: left; margin-top: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;}

        input { 
            width: 100%; padding: 12px; margin-top: 10px; background: #000; 
            border: 1px solid #222; color: #fff; border-radius: 10px; 
            box-sizing: border-box; font-family: 'Poppins'; font-size: 12px;
        }

        .btn-confirm { 
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(90deg, #ff007a, #7a00ff); 
            border: none; color: white; font-weight: 800; font-size: 14px;
            border-radius: 12px; cursor: pointer; text-transform: uppercase;
        }
        .btn-confirm:disabled { background: #555; cursor: not-allowed; }

        #msg { margin-top: 15px; font-weight: 600; font-size: 13px; min-height: 20px; }
        .back-link { display: inline-block; margin-top: 15px; color: #555; text-decoration: none; font-size: 12px; font-weight: 600; }
        
        /* Dynamic container for inputs */
        #dynamic-players { text-align: left; }
    </style>
</head>
<body>

    <div class="reg-box">
        <i class="fas fa-trophy icon-header"></i>
        <h2>Join Match</h2>
        <div class="match-display" id="matchName">Loading Match...</div>
        
        <div id="dynamic-players"></div>
        
        <button class="btn-confirm" id="submitBtn" onclick="submitRegistration()">Confirm & Register</button>
        
        <div id="msg"></div>
        <a href="index.html" class="back-link">Cancel and Go Back</a>
    </div>

    <script>
        // 1. MATCH KA NAAM AUR PLAYERS KI GINTI NIKALNA
        const urlParams = new URLSearchParams(window.location.search);
        const match = urlParams.get('match') || "UNKNOWN MATCH";
        document.getElementById('matchName').innerText = match;

        let totalPlayers = 1; // Default 1 player
        const matchUpper = match.toUpperCase();

        // Rules jo aapne bataye hain:
        if (matchUpper.includes("BR")) {
            totalPlayers = 2; // BR = 2 Players
        } else if (matchUpper.includes("CLASH SQUAD") || matchUpper.includes("CS")) {
            totalPlayers = 4; // CS = 4 Players
        } else if (matchUpper.includes("LONE WOLF") || matchUpper.includes("1V1")) {
            totalPlayers = 1; // Lone Wolf / 1V1 = 1 Player
        }

        // 2. AUTO HTML GENERATE KARNA
        let htmlContent = "";
        for (let i = 1; i <= totalPlayers; i++) {
            htmlContent += `
                <div class="player-title">PLAYER ${i} DETAILS</div>
                <input type="number" id="p${i}Uid" placeholder="Player ${i} UID (e.g. 12345678)">
                <input type="text" id="p${i}Name" placeholder="Player ${i} In-Game Name">
            `;
        }
        document.getElementById('dynamic-players').innerHTML = htmlContent;

        // 🔥 AAPKA MASTER SCRIPT URL 🔥
        const scriptURL = "https://script.google.com/macros/s/AKfycbytPupu39uc5DU1CgPi4dDTp30pGyplUR4kDGAvmKfwLhlIhoptQsPgrKzIYzJpFpir2Q/exec";

        // 3. SUBMIT KARNE KA FUNCTION
        function submitRegistration() {
            const userData = JSON.parse(localStorage.getItem("rareGamingUser"));
            if(!userData) { alert("Pehle app mein login karo!"); return; }

            const btn = document.getElementById('submitBtn');
            let uids = [];
            let names = [];

            // Sabhi players ka data check karna aur nikalna
            for (let i = 1; i <= totalPlayers; i++) {
                let uid = document.getElementById(`p${i}Uid`).value.trim();
                let name = document.getElementById(`p${i}Name`).value.trim();
                
                if (!uid || !name) {
                    alert(`Player ${i} ki details missing hai. Pura form bharo!`);
                    return;
                }
                uids.push(uid);
                names.push(name);
            }

            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            // Data ko combine karna (Ex: "UID1 & UID2" | "NAME1 & NAME2")
            const finalUid = uids.join(" & ");
            const finalName = names.join(" & ");

            const params = new URLSearchParams();
            params.append("action", "register"); 
            params.append("username", userData.name); 
            params.append("gameUid", finalUid);            
            params.append("gameName", finalName);        
            params.append("match", match);           

            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: params 
            })
            .then(() => {
                document.getElementById('msg').innerHTML = "<span style='color: #00e676;'>✅ Registration Successful!</span>";
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            })
            .catch(() => {
                alert("Network Error! Try again.");
                btn.disabled = false;
                btn.innerText = "Confirm & Register";
            });
        }
    </script>
</body>
</html>
