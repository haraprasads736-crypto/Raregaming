<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Registration - RARE GAMING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { background-color: #050508; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 140px; }
        .reg-container { padding: 20px; }
        .section-header { font-size: 20px; font-weight: 800; color: #00f2fe; margin-bottom: 20px; text-transform: uppercase; text-align: center; }
        
        .form-card { background: #111116; border: 1px solid #1f1f25; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .player-title { font-size: 13px; font-weight: 800; color: #ffd700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #2a2a30; 
            color: #fff; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; 
            font-family: 'Poppins'; font-size: 13px;
        }

        .btn-submit { 
            width: 100%; padding: 15px; background: #00f2fe; color: #000; border: none; 
            border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }

        /* Closed Message Style */
        .closed-box { text-align: center; padding: 40px 20px; background: #111116; border: 1px solid #ff007a; border-radius: 15px; }
        .closed-box i { font-size: 50px; color: #ff007a; margin-bottom: 15px; }

        /* 🔥 NAVIGATION 🔥 */
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #4f515e; z-index: 1001; }
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; background: #111116; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000; }
        .nav-item { text-decoration: none; color: #666; font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; flex: 1; }
        .nav-item.active { color: white; position: relative; }
        .nav-item.active i { color: #000; z-index: 2; font-size: 24px; }
        .nav-item.active::before { content: ''; position: absolute; top: -16px; width: 58px; height: 58px; background: #ffffff; border-radius: 16px; transform: rotate(45deg); z-index: -1; box-shadow: 0 0 25px rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body>

    <div class="reg-container" id="mainContainer">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="winners.html" class="nav-item"><i class="fas fa-crown"></i><span>WINNERS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwND_rIFJw-9MwiRGhOP0_j4mauz8ICSro5e3GbNpWfUW9zDGEHFS8VHeB5Ac35IWQMDw/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const match = urlParams.get('match') || ""; // URL se match name liya

        const container = document.getElementById('mainContainer');

        // 🔥 FIX: Check agar match name mein "BR" likha hai (chahe BR ho ya BR SQUAD)
        if (match.includes("BR")) {
            container.innerHTML = `
                <div class="section-header">BR DUO REGISTRATION</div>
                <div class="form-card">
                    <div class="player-title"><i class="fas fa-users"></i> TEAM INFO</div>
                    <input type="text" id="teamName" placeholder="Team Name">
                    <input type="text" id="whatsapp" placeholder="WhatsApp Number">
                </div>
                <div class="form-card">
                    <div class="player-title"><i class="fas fa-user"></i> PLAYER 1 (Leader)</div>
                    <input type="text" id="p1Name" placeholder="IGN (Name)">
                    <input type="text" id="p1Uid" placeholder="Game UID">
                </div>
                <div class="form-card">
                    <div class="player-title"><i class="fas fa-user"></i> PLAYER 2</div>
                    <input type="text" id="p2Name" placeholder="IGN (Name)">
                    <input type="text" id="p2Uid" placeholder="Game UID">
                </div>
                <button class="btn-submit" id="regBtn" onclick="submitReg()">JOIN MATCH</button>
            `;
        } else {
            container.innerHTML = `
                <div class="closed-box">
                    <i class="fas fa-lock"></i>
                    <h2>REGISTRATION CLOSED</h2>
                    <p style="color: #666; font-size: 13px;">Is match ka registration abhi band hai.</p>
                    <button class="btn-submit" style="margin-top:20px; background:#444; color:#fff;" onclick="window.location.href='index.html'">GO BACK</button>
                </div>
            `;
        }

        function submitReg() {
            const btn = document.getElementById('regBtn');
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const params = new URLSearchParams();
            params.append("action", "register");
            params.append("match", match); 
            params.append("teamName", document.getElementById('teamName').value);
            params.append("whatsapp", document.getElementById('whatsapp').value);
            params.append("p1Name", document.getElementById('p1Name').value);
            params.append("p1Uid", document.getElementById('p1Uid').value);
            params.append("p2Name", document.getElementById('p2Name').value);
            params.append("p2Uid", document.getElementById('p2Uid').value);
            params.append("p3Name", ""); params.append("p3Uid", "");
            params.append("p4Name", ""); params.append("p4Uid", "");

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: params })
            .then(() => {
                alert("✅ Registration Done for BR Duo!");
                window.location.href = "index.html";
            })
            .catch(() => {
                alert("Error!");
                btn.innerText = "JOIN MATCH";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
