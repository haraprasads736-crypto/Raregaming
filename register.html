<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RARE GAMING - Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        body { background-color: #0c0e12; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        .nav-header { background: #15181e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #66fcf1; }
        .back-btn { color: #66fcf1; text-decoration: none; font-weight: 800; font-size: 14px; background: rgba(102, 252, 241, 0.1); padding: 5px 10px; border-radius: 5px; border: 1px solid #66fcf1; }
        .nav-title { font-weight: 800; font-size: 18px; color: white; letter-spacing: 1px; }
        
        .container { padding: 20px; max-width: 480px; margin: auto; }
        .form-card { background: #1a1d24; border-radius: 12px; border: 1.5px solid #2b303b; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .form-title { font-size: 16px; font-weight: 800; color: #66fcf1; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: #a0aab2; margin-bottom: 5px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; padding: 12px; background: #15181e; border: 1px solid #2b303b; border-radius: 8px; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: #66fcf1; box-shadow: 0 0 8px rgba(102, 252, 241, 0.3); }
        
        .player-divider { font-size: 12px; font-weight: 800; color: #66fcf1; margin-top: 20px; margin-bottom: 10px; border-bottom: 1px dashed #2b303b; padding-bottom: 5px; }
        
        .submit-btn { width: 100%; background: #66fcf1; color: #000; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 15px; transition: 0.3s; box-shadow: 0 4px 10px rgba(102, 252, 241, 0.3); }
        .submit-btn:active { transform: scale(0.97); background: #4de2d6; }
        .submit-btn:disabled { background: #333; color: #888; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn">⬅ BACK</a>
        <span class="nav-title">MATCH ENTRY</span>
        <div style="width: 60px;"></div>
    </div>

    <div class="container">
        <div class="form-card">
            <div class="form-title">📝 Register Your Team</div>

            <form id="registrationForm">
                <div class="input-group">
                    <label>Select Match Category</label>
                    <select name="matchType" id="matchType" required onchange="generatePlayerFields()">
                        <option value="" disabled selected>-- Choose Match --</option>
                        <option value="BR">🎮 BATTLE ROYALE (BR - Duo)</option>
                        <option value="CS">⚔️ CLASH SQUAD (CS - Squad)</option>
                        <option value="LW">🐺 LONE WOLF 1 (Solo)</option>
                        <option value="1V1">🔥 1v1 MATCH (Solo)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Team Name</label>
                    <input type="text" name="teamName" placeholder="Enter Team Name" required>
                </div>

                <div id="dynamic-players"></div>

                <div class="input-group" style="margin-top: 20px;">
                    <label>WhatsApp Number (For Updates)</label>
                    <input type="number" name="whatsapp" placeholder="Enter 10-digit number" required>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">SUBMIT REGISTRATION</button>
            </form>
        </div>
    </div>

    <script>
        function generatePlayerFields() {
            const matchType = document.getElementById("matchType").value;
            const playersContainer = document.getElementById("dynamic-players");
            
            playersContainer.innerHTML = "";
            let playerCount = 0;

            if (matchType === "BR") { playerCount = 2; } 
            else if (matchType === "CS") { playerCount = 4; } 
            else if (matchType === "LW" || matchType === "1V1") { playerCount = 1; }

            for (let i = 1; i <= playerCount; i++) {
                let playerTitle = i === 1 ? "Captain" : "Player " + i;

                let htmlCode = `
                    <div class="player-divider">${playerTitle} Details</div>
                    <div class="input-group">
                        <label>${playerTitle} In-Game Name (IGN)</label>
                        <input type="text" name="p${i}ign" placeholder="Enter ${playerTitle} IGN" required>
                    </div>
                    <div class="input-group">
                        <label>${playerTitle} UID</label>
                        <input type="number" name="p${i}uid" placeholder="Enter ${playerTitle} UID" required>
                    </div>
                `;
                playersContainer.innerHTML += htmlCode;
            }
        }

        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        
        // YAHAN TUMHARA NAYA WEB APP URL DAAL DIYA HAI 👇
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxWtwQoqAY-rt4yRNZ_msxOOjlxXCERU9eEZ2sMExHaJgzrW9CopAn9jVfIbBwmL7UWdw/exec';

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            
            submitBtn.innerText = "CHECKING DETAILS...";
            submitBtn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form) })
                .then(response => response.text()) 
                .then(result => {
                    if (result === "Duplicate") {
                        alert("❌ Arey Bhai! Is UID ne is match ke liye pehle hi registration kar liya hai!");
                    } else {
                        alert("✅ Registration Successful! Welcome to Rare Gaming Esports!");
                        form.reset(); 
                        document.getElementById("dynamic-players").innerHTML = ""; 
                    }
                    submitBtn.innerText = "SUBMIT REGISTRATION";
                    submitBtn.disabled = false;
                })
                .catch(error => {
                    alert("Error! Registration failed. Please check your internet connection.");
                    console.error('Error!', error);
                    submitBtn.innerText = "SUBMIT REGISTRATION";
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
