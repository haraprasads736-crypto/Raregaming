<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f2fe;
            --neon-red: #ff4444;
            --dark-bg: #050508;
            --card-bg: #111116;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding-bottom: 160px; 
            letter-spacing: 0.8px;
            overflow-x: hidden;
        }

        /* 🛡️ Header */
        .header { 
            padding: 25px 20px; 
            background: var(--card-bg); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .header h2 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 19px; 
            margin: 0; 
            color: var(--neon-cyan); 
            text-transform: uppercase;
            font-weight: 900;
        }

        /* ➕ Add Contact Section */
        .add-box { 
            padding: 20px; 
            background: var(--glass); 
            margin: 20px 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(0, 242, 254, 0.15);
            backdrop-filter: blur(10px);
        }
        input { 
            width: 100%; 
            padding: 14px; 
            background: #000; 
            border: 1px solid #2a2a30; 
            color: #fff; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--neon-cyan); }
        
        .btn-add { 
            width: 100%; 
            padding: 14px; 
            background: var(--neon-cyan); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-weight: 800; 
            font-family: 'Orbitron', sans-serif;
            cursor: pointer; 
            text-transform: uppercase;
        }

        /* 👥 Contact List */
        .contact-list { padding: 0 15px; }
        .contact-card { 
            background: var(--card-bg);
            padding: 16px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s;
        }
        .contact-card:active { transform: scale(0.98); }
        
        .user-icon { 
            width: 50px; height: 50px; 
            background: rgba(0, 242, 254, 0.1); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-cyan);
            font-size: 24px;
            border: 1px solid var(--neon-cyan);
        }
        
        .contact-info { flex-grow: 1; }
        .contact-info b { font-size: 17px; display: block; font-family: 'Orbitron', sans-serif; color: #fff; text-transform: uppercase; }
        .contact-info span { font-size: 11px; color: #888; }

        /* 🗑️ Delete Button */
        .delete-btn {
            background: rgba(255, 68, 68, 0.1);
            color: var(--neon-red);
            border: none;
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        /* 🧭 FIXED BOTTOM NAVIGATION (Icon Fix) */
        .bottom-nav { 
            position: fixed; 
            bottom: 48px; 
            left: 0; 
            width: 100%; 
            height: 70px; 
            background: #111116; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 1px solid #1f1f25; 
            z-index: 1000; 
        }
        .nav-item { 
            text-decoration: none; 
            color: #666; 
            font-size: 10px; 
            font-weight: 800; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: 0.3s; 
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: white; }
        .nav-item.active i { color: var(--neon-cyan); }
        
        /* Protection Bar */
        .system-nav-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 48px; 
            background-color: #4f515e; /* Wahi Grey Color Jo Aapne Manga Tha */
            z-index: 1001; 
        }
        
        .empty-text { text-align: center; color: #444; margin-top: 40px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Rare Chat Pro</h2>
        <i class="fas fa-comments" style="color: var(--neon-cyan);"></i>
    </div>

    <div class="add-box">
        <input type="text" id="newUID" placeholder="Friend's UID (RGXXXXXX)">
        <input type="text" id="newName" placeholder="Friend's Name">
        <button class="btn-add" onclick="saveContact()">Add Contact</button>
    </div>

    <div class="contact-list" id="contactList"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item"><i class="fas fa-exchange-alt"></i><span>TRANSFER</span></a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(!uid || !name) return alert("Details bhariye!");

            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            contacts.push({uid: uid, name: name});
            localStorage.setItem("rareContacts", JSON.stringify(contacts));
            
            document.getElementById('newUID').value = "";
            document.getElementById('newName').value = "";
            renderContacts();
        }

        // 🔥 DELETE WITH YOUR MESSAGE
        function deleteContact(index) {
            if(confirm("are you sure for delete")) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts.splice(index, 1);
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                renderContacts();
            }
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = contacts.length ? "" : "<p class='empty-text'>No contacts yet.</p>";
            
            contacts.forEach((c, index) => {
                list.innerHTML += `
                    <div class="contact-card">
                        <a href="chat_screen.html?uid=${c.uid}&name=${encodeURIComponent(c.name)}" style="text-decoration:none; display:flex; align-items:center; gap:15px; flex-grow:1;">
                            <div class="user-icon">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <div class="contact-info">
                                <b>${c.name}</b>
                                <span>${c.uid}</span>
                            </div>
                        </a>
                        <button class="delete-btn" onclick="deleteContact(${index})">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
            });
        }
        window.onload = renderContacts;
    </script>
</body>
</html>
