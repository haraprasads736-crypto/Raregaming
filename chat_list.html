<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Messages</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #000000;
            --surface: #121212;
            --accent: #00f2fe;
            --text-main: #ffffff;
            --text-dim: #888888;
            --unread: #39ff14;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden;
        }

        /* 📱 Top Bar */
        .top-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .add-icon { color: var(--accent); font-size: 22px; cursor: pointer; }

        /* 🔍 Search Box */
        .search-container { padding: 0 20px 15px; }
        .search-box {
            background: var(--surface);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input {
            background: transparent; border: none; color: white;
            width: 100%; outline: none; font-size: 15px;
        }
        .search-box i { color: var(--text-dim); }

        /* 👥 Chat List Container */
        .chat-container { padding-bottom: 150px; }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            transition: background 0.2s;
            border-bottom: 0.5px solid #1a1a1a;
        }
        .chat-item:active { background: #1a1a1a; }

        /* 👤 Avatar System */
        .avatar {
            width: 55px; height: 55px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #333;
            position: relative;
        }
        .avatar i { font-size: 24px; color: var(--accent); }

        .chat-details { flex: 1; }
        .chat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .user-name { font-weight: 600; font-size: 16px; color: white; }
        .last-time { font-size: 11px; color: var(--text-dim); }
        
        .chat-preview { 
            font-size: 13px; color: var(--text-dim); 
            display: flex; justify-content: space-between; align-items: center;
        }

        /* 🟢 The Notification Dot */
        .unread-dot {
            width: 10px; height: 10px;
            background: var(--unread);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--unread);
            display: none; /* JS control karega */
        }

        /* 🧭 System Navigation */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 70px; 
            background: rgba(10, 10, 15, 0.98); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(20px); border-top: 1px solid #222; 
            z-index: 1000;
        }
        .nav-item { 
            text-decoration: none; color: #555; font-size: 10px; 
            font-weight: 600; display: flex; flex-direction: column; 
            align-items: center; gap: 5px;
        }
        .nav-item i { font-size: 22px; }
        .nav-item.active { color: var(--accent); }

        .system-nav-bar { position: fixed; bottom: 0; width: 100%; height: 48px; background: #1a1b22; z-index: 1001; }

        /* 🗑️ Swipable/Delete Icon */
        .del-icon { color: #333; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>Rare Chat</h1>
        <i class="fas fa-plus-circle add-icon" onclick="toggleAddBox()"></i>
    </div>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search friends...">
        </div>
    </div>

    <div id="addBox" style="display:none; padding:20px; background:#111; margin:10px 20px; border-radius:15px;">
        <input type="text" id="newUID" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:8px; color:white;" placeholder="UID (RGXXXXXX)">
        <input type="text" id="newName" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; border-radius:8px; color:white;" placeholder="Friend Name">
        <button onclick="saveContact()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">Add Friend</button>
    </div>

    <div class="chat-container" id="contactList">
        </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comment-dots"></i><span>CHATS</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        // Firebase Setup (Wahi purana)
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            storageBucket: "rare-gaming-b8875.firebasestorage.app",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleAddBox() {
            const box = document.getElementById('addBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(!uid || !name) return;
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            contacts.push({uid: uid, name: name});
            localStorage.setItem("rareContacts", JSON.stringify(contacts));
            toggleAddBox();
            renderContacts();
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = "";
            
            contacts.forEach((c, index) => {
                const contactHtml = `
                    <a href="chat_screen.html?uid=${c.uid}&name=${encodeURIComponent(c.name)}" class="chat-item">
                        <div class="avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="chat-details">
                            <div class="chat-row">
                                <span class="user-name">${c.name}</span>
                                <span class="last-time">Active</span>
                            </div>
                            <div class="chat-preview">
                                <span>${c.uid}</span>
                                <div class="unread-dot" id="dot-${c.uid}"></div>
                            </div>
                        </div>
                    </a>
                `;
                list.innerHTML += contactHtml;
                checkUnread(c.uid);
            });
        }

        // 🟢 REAL-TIME DOT CHECKER
        function checkUnread(uid) {
            database.ref('messages').on('value', (snapshot) => {
                let hasUnread = false;
                snapshot.forEach((child) => {
                    const data = child.val();
                    // Agar message is dost ne bheja aur tune dekha nahi (seen: false)
                    if (data.sender === uid && data.seen === false) {
                        hasUnread = true;
                    }
                });
                const dot = document.getElementById(`dot-${uid}`);
                if(dot) dot.style.display = hasUnread ? "block" : "none";
            });
        }

        window.onload = renderContacts;
    </script>
</body>
</html>
