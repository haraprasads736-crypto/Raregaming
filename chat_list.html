<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Friends</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg: #030305;
            --surface: #0a0a0f;
            --accent: #00f2fe;
            --red: #ff4444;
            --text-dim: #666;
        }

        body { 
            background-color: var(--bg); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; user-select: none; /* No text selection for native feel */
            -webkit-tap-highlight-color: transparent;
        }

        /* 🛡️ Header */
        .header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 3, 5, 0.95); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h2 { font-size: 18px; margin: 0; color: #ffd700; font-weight: 800; }

        /* ➕ Action Bar */
        .action-bar { display: flex; gap: 10px; padding: 15px 20px; }
        .btn-add { 
            flex: 1; padding: 12px; background: rgba(0, 242, 254, 0.1); 
            border: 1px dashed var(--accent); border-radius: 12px; 
            color: var(--accent); font-weight: 600; font-size: 13px; text-align: center;
        }

        /* 👥 Chat List */
        .chat-list { padding: 0 15px 120px; }
        .chat-card { 
            background: var(--surface); padding: 15px; border-radius: 18px; 
            margin-bottom: 10px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.03); transition: 0.2s;
        }
        .chat-card:active { transform: scale(0.98); background: #111; }

        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: #151515; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-size: 20px; color: var(--accent);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-info { flex: 1; }
        .chat-info b { display: block; font-size: 14px; text-transform: uppercase; }
        .chat-info span { font-size: 10px; color: var(--text-dim); }

        /* 🔴 Bottom Options Menu (Long Press) */
        #optionsMenu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #0a0a0f; border-radius: 25px 25px 0 0;
            padding: 20px; z-index: 2000; transition: 0.4s;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .opt-item { 
            padding: 15px; display: flex; align-items: center; gap: 15px;
            font-weight: 600; font-size: 15px; color: white;
        }
        .opt-delete { color: var(--red); }

        /* 🧭 Nav Bar */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: #050508; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #111; z-index: 1000;
        }
        .nav-item { color: #444; font-size: 10px; text-align: center; text-decoration: none; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* Input Box */
        #addBox { display: none; padding: 20px; background: #0a0a0f; margin: 0 20px 15px; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #222; border-radius: 8px; color: white; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>RARE VAULT</h2>
        <i class="fas fa-lock" onclick="masterLock()" style="color: var(--accent); font-size: 20px; cursor: pointer;"></i>
    </div>

    <div class="action-bar">
        <div class="btn-add" onclick="toggleAdd()"><i class="fas fa-plus"></i> ADD FRIEND</div>
    </div>

    <div id="addBox">
        <input type="text" id="newUID" placeholder="UID (RGXXXXXX)">
        <input type="text" id="newName" placeholder="Friend Name">
        <button onclick="saveContact()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">SAVE FRIEND</button>
    </div>

    <div class="chat-list" id="contactList"></div>

    <div id="optionsMenu">
        <div id="selectedFriendName" style="text-align: center; font-size: 12px; color: var(--text-dim); margin-bottom: 10px;"></div>
        <div class="opt-item" onclick="lockSpecificChat()"><i class="fas fa-user-lock"></i> Lock this Chat</div>
        <div class="opt-item opt-delete" onclick="deleteContact()"><i class="fas fa-trash"></i> Delete Contact</div>
        <button onclick="closeMenu()" style="width:100%; margin-top: 10px; padding: 10px; background: #1a1a1a; border: none; border-radius: 10px; color: white;">Cancel</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i>HOME</a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comment-dots"></i>CHAT</a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i>PROFILE</a>
    </nav>

    <script>
        let longPressTimer;
        let selectedUID = null;
        const MASTER_PASSWORD = "1234"; // Yahan apna confirm password rakho

        function masterLock() {
            let pass = prompt("Enter Vault Password:");
            if(pass === MASTER_PASSWORD) {
                alert("Vault Unlocked! Sabhi hidden chats ab dikhengi.");
            } else {
                alert("Wrong Password! Access Denied.");
            }
        }

        function toggleAdd() {
            const box = document.getElementById('addBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(uid && name) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts.push({uid: uid, name: name});
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                document.getElementById('newUID').value = "";
                document.getElementById('newName').value = "";
                toggleAdd();
                renderContacts();
            }
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = contacts.length ? "" : "<p style='text-align:center; color:#333; margin-top:50px;'>No vault entries found.</p>";
            
            contacts.forEach(c => {
                let friendDP = localStorage.getItem("dp_" + c.uid) || ""; 
                let dpHtml = friendDP ? `<img src="${friendDP}">` : `<i class="fas fa-user-astronaut"></i>`;

                list.innerHTML += `
                    <div class="chat-card" 
                        ontouchstart="startPress('${c.uid}', '${c.name}')" 
                        ontouchend="endPress('${c.uid}', '${c.name}')" 
                        onclick="openChat('${c.uid}', '${c.name}')">
                        <div class="avatar">${dpHtml}</div>
                        <div class="chat-info">
                            <b>${c.name}</b>
                            <span>${c.uid}</span>
                        </div>
                    </div>
                `;
            });
        }

        // Long Press Logic
        function startPress(uid, name) {
            selectedUID = uid;
            longPressTimer = setTimeout(() => {
                document.getElementById('selectedFriendName').innerText = "Options for " + name;
                document.getElementById('optionsMenu').style.bottom = "0";
            }, 800); // 0.8 second hold karne par menu aayega
        }

        function endPress() {
            clearTimeout(longPressTimer);
        }

        function closeMenu() {
            document.getElementById('optionsMenu').style.bottom = "-100%";
        }

        function deleteContact() {
            if(confirm("Dost ko delete kar dein?")) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts = contacts.filter(c => c.uid !== selectedUID);
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                closeMenu();
                renderContacts();
            }
        }

        function lockSpecificChat() {
            alert("Chat Locked! Ab ye bina password ke nahi khulegi.");
            closeMenu();
        }

        function openChat(uid, name) {
            // Agar menu khula nahi hai tabhi chat khulegi
            if(document.getElementById('optionsMenu').style.bottom !== "0px") {
                window.location.href = `chat_screen.html?uid=${uid}&name=${encodeURIComponent(name)}`;
            }
        }

        window.onload = renderContacts;
    </script>
</body>
</html>
