<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Vault - Secure Chat</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        :root {
            --bg: #030305;
            --surface: #0a0a0f;
            --accent: #00f2fe;
            --transfer-green: #39ff14;
            --text-dim: #666;
            --nav-bg: #050508;
            --sys-nav: #1a1b22; /* Grey Protection Bar Color */
        }

        * { box-sizing: border-box; }

        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .header { 
            padding: 20px; 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(3, 3, 5, 0.95);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .header h2 { font-size: 18px; margin: 0; color: #ffd700; font-weight: 800; }

        /* ➕ Add Friend Section */
        .add-friend-bar {
            margin: 15px 20px; padding: 12px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px dashed var(--accent); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; color: var(--accent); font-weight: 600; font-size: 13px;
            cursor: pointer;
        }

        /* 👥 Chat List */
        .chat-list { padding: 0 15px 160px; } /* Padding increased for stable view */
        
        .chat-card { 
            background: var(--surface); padding: 15px; border-radius: 18px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.03);
            text-decoration: none; color: white;
            transition: 0.2s;
        }
        .chat-card:active { transform: scale(0.98); background: #111; }

        .avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: #151515; border: 1px solid #222;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-size: 20px; color: var(--accent);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-info { flex: 1; }
        .chat-info b { display: block; font-size: 14px; text-transform: uppercase; }
        .chat-info span { font-size: 10px; color: var(--text-dim); }

        /* 🧭 STABLE NAVIGATION BAR */
        .bottom-nav { 
            position: fixed; bottom: 40px; /* Shifted up for protection bar */
            left: 0; width: 100%; height: 75px; 
            background: var(--nav-bg); display: flex; 
            justify-content: space-around; align-items: center; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 2000; padding: 0 10px;
            border-radius: 20px 20px 0 0; /* Premium Rounded Look */
        }

        .nav-item { 
            text-decoration: none; color: #444; font-size: 9px; 
            font-weight: 700; display: flex; flex-direction: column; 
            align-items: center; gap: 5px; flex: 1;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--accent); }
        
        .center-btn .icon-circle { 
            width: 52px; height: 52px; background: var(--transfer-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid #050508; box-shadow: 0 0 15px rgba(57, 255, 20, 0.2); 
            margin-top: -30px;
        }
        .center-btn i { color: #000 !important; font-size: 20px; }

        /* 🛡️ SYSTEM NAVIGATION PROTECTION (GREY BAR) */
        .system-nav-protection { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px; 
            background: var(--sys-nav); z-index: 2001; 
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #addBox { display: none; padding: 20px; background: var(--surface); margin: 0 20px 15px; border-radius: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h2>RARE VAULT</h2>
        <i class="fas fa-lock vault-lock" onclick="masterLock()" style="color:var(--accent); font-size:20px;"></i>
    </div>

    <div class="add-friend-bar" onclick="toggleAdd()">
        <i class="fas fa-plus-circle"></i> ADD TO VAULT
    </div>

    <div id="addBox">
        <input type="text" id="newUID" placeholder="UID (RGXXXXXX)">
        <input type="text" id="newName" placeholder="Friend Name">
        <button onclick="saveContact()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; font-weight:bold; color:#000;">SAVE CONTACT</button>
    </div>

    <div class="chat-list" id="contactList"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-th-large"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-coins"></i><span>EARN</span></a>
        
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="color: #fff; margin-top: 2px;">SEND</span>
        </a>

        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comment-alt"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-circle"></i><span>PROFILE</span></a>
    </nav>

    <div class="system-nav-protection"></div>

    <script>
        const MASTER_PASSWORD = "1234"; 

        function masterLock() {
            let pass = prompt("Enter Vault Password:");
            if(pass === MASTER_PASSWORD) alert("Vault Unlocked!");
            else alert("Access Denied.");
        }

        // Firebase Config (Keep your original here)
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleAdd() {
            const box = document.getElementById('addBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(uid && name) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts.push({uid: uid, name: name});
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                toggleAdd();
                renderContacts();
            }
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = contacts.length ? "" : "<p style='text-align:center; color:#333; margin-top:40px;'>Vault is empty.</p>";
            
            contacts.forEach(c => {
                let friendDP = localStorage.getItem("dp_" + c.uid) || ""; 
                let dpHtml = friendDP ? `<img src="${friendDP}">` : `<i class="fas fa-user-astronaut"></i>`;

                list.innerHTML += `
                    <a href="chat_screen.html?uid=${c.uid}&name=${encodeURIComponent(c.name)}" class="chat-card">
                        <div class="avatar">${dpHtml}</div>
                        <div class="chat-info">
                            <b>${c.name}</b>
                            <span>${c.uid}</span>
                        </div>
                    </a>
                `;
            });
        }

        window.onload = renderContacts;
    </script>
</body>
</html>
