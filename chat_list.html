<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rare Chat - Ultimate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-cyan: #00f2fe;
            --neon-red: #ff4444;
            --dark-bg: #050508;
            --glass: rgba(255, 255, 255, 0.05);
            --card-grad: linear-gradient(135deg, rgba(17, 17, 22, 0.9), rgba(5, 5, 8, 0.9));
        }

        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            margin: 0; 
            padding-bottom: 160px; 
            letter-spacing: 0.8px;
            overflow-x: hidden;
        }

        /* ✨ Cyber Background Effect */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(0, 242, 254, 0.05), transparent);
            z-index: -1;
        }

        /* 🛡️ Header Pro */
        .header { 
            padding: 30px 20px; 
            background: #111116; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        .header h2 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 20px; 
            margin: 0; 
            font-weight: 900;
            color: var(--neon-cyan); 
            text-transform: uppercase;
        }

        /* ➕ Add Connection (Modernized) */
        .add-box { 
            padding: 25px; 
            background: var(--glass); 
            margin: 20px 15px; 
            border-radius: 15px; 
            border: 1px solid rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(15px);
        }
        .add-box h3 { font-size: 14px; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        input { 
            width: 100%; 
            padding: 15px; 
            background: rgba(0,0,0,0.6); 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 10px; 
            margin-bottom: 12px; 
            font-size: 15px;
            outline: none;
            transition: 0.4s;
        }
        input:focus { border-color: var(--neon-cyan); background: #000; box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1); }
        
        .btn-add { 
            width: 100%; 
            padding: 15px; 
            background: var(--neon-cyan); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-weight: 900; 
            font-family: 'Orbitron', sans-serif;
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
        }

        /* 👥 Contact List (Advanced) */
        .contact-list { padding: 0 15px; }
        .contact-card { 
            background: var(--card-grad);
            padding: 18px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .contact-card:active { transform: scale(0.97); }
        .contact-card:hover { border-color: var(--neon-cyan); }
        
        .user-icon { 
            width: 55px; height: 55px; 
            background: rgba(0, 242, 254, 0.05); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(0, 242, 254, 0.2);
            color: var(--neon-cyan);
            font-size: 24px;
        }
        
        .contact-info { flex-grow: 1; }
        .contact-info b { font-size: 18px; display: block; font-family: 'Orbitron', sans-serif; color: #fff; margin-bottom: 2px; }
        .contact-info span { font-size: 12px; color: var(--neon-cyan); opacity: 0.6; font-weight: 600; }

        /* 🗑️ Delete Button (Modern) */
        .delete-btn {
            background: rgba(255, 68, 68, 0.1);
            color: var(--neon-red);
            border: 1px solid rgba(255, 68, 68, 0.2);
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .delete-btn:hover { background: var(--neon-red); color: white; }

        /* 🧭 System Navigation Fix */
        .bottom-nav { position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; background: #0c0c12; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #1f1f25; z-index: 1000; }
        .nav-item { text-decoration: none; color: #555; font-size: 9px; font-weight: 700; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }
        .nav-item.active { color: var(--neon-cyan); }
        
        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; border-top: 1px solid #333; }
        
        .empty-text { text-align: center; color: #444; margin-top: 40px; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Rare Chat Pro</h2>
        <div style="width: 10px; height: 10px; background: var(--neon-cyan); border-radius: 50%; box-shadow: 0 0 10px var(--neon-cyan);"></div>
    </div>

    <div class="add-box">
        <h3>Add Secure Link</h3>
        <input type="text" id="newUID" placeholder="PLAYER UID (RG123456)">
        <input type="text" id="newName" placeholder="PLAYER NAME">
        <button class="btn-add" onclick="saveContact()">Connect Player</button>
    </div>

    <div class="contact-list" id="contactList"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-grid-2"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-bolt"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item"><i class="fas fa-random"></i><span>SECURE</span></a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-message"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-gear"></i><span>PROFILE</span></a>
    </nav>
    <div class="system-nav-bar"></div>

    <script>
        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(!uid || !name) return;

            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            contacts.push({uid: uid, name: name});
            localStorage.setItem("rareContacts", JSON.stringify(contacts));
            
            document.getElementById('newUID').value = "";
            document.getElementById('newName').value = "";
            renderContacts();
        }

        // 🔥 DELETE WITH SPECIFIC MESSAGE
        function deleteContact(index) {
            if(confirm("are you sure for delete")) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts.splice(index, 1);
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                renderContacts();
            }
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = contacts.length ? "" : "<p class='empty-text'>NO ACTIVE CONNECTIONS FOUND.</p>";
            
            contacts.forEach((c, index) => {
                list.innerHTML += `
                    <div class="contact-card">
                        <a href="chat_screen.html?uid=${c.uid}&name=${encodeURIComponent(c.name)}" style="text-decoration:none; display:flex; align-items:center; gap:15px; flex-grow:1;">
                            <div class="user-icon">
                                <i class="fas fa-shield-halved"></i>
                            </div>
                            <div class="contact-info">
                                <b>${c.name}</b>
                                <span>ONLINE ID: ${c.uid}</span>
                            </div>
                        </a>
                        <button class="delete-btn" onclick="deleteContact(${index})">
                            <i class="fas fa-xmark"></i>
                        </button>
                    </div>
                `;
            });
        }
        window.onload = renderContacts;
    </script>
</body>
</html>
