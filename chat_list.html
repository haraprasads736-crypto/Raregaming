<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat - RARE VAULT</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #030305;
            --panel: #0a0a0f;
            --accent: #00f2fe;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Poppins', sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* 🛡️ Header with Friend's DP */
        .chat-header {
            padding: 15px 20px; background: rgba(10, 10, 15, 0.95);
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-btn { color: white; font-size: 20px; text-decoration: none; }
        
        .friend-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--accent); overflow: hidden;
            background: #111; display: flex; align-items: center; justify-content: center;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .friend-avatar i { color: var(--accent); font-size: 20px; }

        .friend-info b { display: block; font-size: 16px; text-transform: uppercase; }
        .friend-info span { font-size: 11px; color: #39ff14; }

        /* 💬 Messages Area */
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(circle at 50% 50%, #0a0a1a 0%, #030305 100%);
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #1a1a25; color: #fff; border-bottom-left-radius: 2px; }

        /* ⌨️ Input Area */
        .input-area {
            padding: 15px 20px 35px; background: #0a0a0f;
            display: flex; gap: 10px; align-items: center;
        }
        input { 
            flex: 1; padding: 14px; background: #000; border: 1px solid #222; 
            border-radius: 15px; color: white; outline: none; 
        }
        .send-btn { 
            width: 50px; height: 50px; background: var(--accent); border: none; 
            border-radius: 15px; color: #000; font-size: 20px; 
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="chat_list.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <div class="friend-avatar" id="headerDP">
            <i class="fas fa-user-astronaut"></i>
        </div>
        <div class="friend-info">
            <b id="friendNameDisplay">Loading...</b>
            <span id="status">online</span>
        </div>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqtB-__m6OBgMInODlMskCyidmyiqLlk",
            authDomain: "rare-gaming-b8875.firebaseapp.com",
            projectId: "rare-gaming-b8875",
            databaseURL: "https://rare-gaming-b8875-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. URL se Friend ki details lo
        const params = new URLSearchParams(window.location.search);
        const friendUID = params.get('uid');
        const friendName = params.get('name');
        const userData = JSON.parse(localStorage.getItem("rareGamingUser"));

        document.getElementById('friendNameDisplay').innerText = friendName;

        // 2. 🔥 LIVE DP SYNC (Isse dost ki photo dikhegi)
        function syncFriendDP() {
            if(!friendUID) return;
            database.ref('users/' + friendUID + '/dp').on('value', (snap) => {
                const dpUrl = snap.val();
                if(dpUrl) {
                    document.getElementById('headerDP').innerHTML = `<img src="${dpUrl}">`;
                }
            });
        }

        // 3. Messages Logic
        const chatID = [userData.uid, friendUID].sort().join("_");

        function sendMessage() {
            const text = document.getElementById('msgInput').value.trim();
            if(!text) return;

            database.ref('messages/' + chatID).push({
                sender: userData.uid,
                text: text,
                timestamp: Date.now()
            });
            document.getElementById('msgInput').value = "";
        }

        function loadMessages() {
            database.ref('messages/' + chatID).on('child_added', (snap) => {
                const msg = snap.val();
                const type = msg.sender === userData.uid ? 'sent' : 'received';
                const div = document.createElement('div');
                div.className = `msg ${type}`;
                div.innerText = msg.text;
                document.getElementById('chatBox').appendChild(div);
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
            });
        }

        window.onload = () => {
            syncFriendDP();
            loadMessages();
        };
    </script>
</body>
</html>
