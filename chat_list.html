<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Chat List - RARE GAMING</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #030305;
            --neon-blue: #00f2fe;
            --panel-color: #0a0a0f;
            --transfer-green: #39ff14;
        }

        * { box-sizing: border-box; }

        body { 
            background-color: var(--bg-color); color: white; 
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0; 
            overflow-x: hidden; padding-bottom: 160px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030305 60%);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* HEADER (Matches Index) */
        .header-top { 
            padding: 25px 20px 15px 20px; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(10px); z-index: 999;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .brand-name { 
            font-size: 24px; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; background: linear-gradient(to right, #ffffff, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .vault-lock { font-size: 20px; color: var(--neon-blue); cursor: pointer; }

        /* ADD FRIEND BAR */
        .add-friend-bar {
            margin: 15px 20px; padding: 12px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px dashed var(--neon-blue); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; color: var(--neon-blue); font-weight: 700; font-size: 13px;
            cursor: pointer;
        }

        /* CHAT LIST AREA */
        .chat-list { padding: 0 20px; }
        .chat-card { 
            background: var(--panel-color); padding: 15px; border-radius: 20px; 
            margin-bottom: 12px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: white; transition: 0.2s;
        }
        .chat-card:active { transform: scale(0.97); background: #111; }

        .avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: #111; border: 1.5px solid var(--neon-blue);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-size: 20px; color: var(--neon-blue);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .chat-info { flex: 1; }
        .chat-info b { display: block; font-size: 15px; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
        .chat-info span { font-size: 11px; color: #666; }

        /* LONG PRESS MENU (Options) */
        #optionsMenu {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #0a0a0f; border-radius: 25px 25px 0 0;
            padding: 25px; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .opt-item { 
            padding: 18px; display: flex; align-items: center; gap: 15px;
            font-weight: 600; font-size: 16px; color: white;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .opt-delete { color: #ff3131; }

        /* NAVIGATION (Matches Index Exactly) */
        .bottom-nav { 
            position: fixed; bottom: 48px; left: 0; width: 100%; height: 75px; 
            background: rgba(10, 10, 15, 0.95); display: flex; 
            justify-content: space-around; align-items: center; 
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 1000; border-radius: 20px 20px 0 0; 
        }
        .nav-item { 
            text-decoration: none; color: #666; font-size: 10px; 
            font-weight: 700; display: flex; flex-direction: column; 
            align-items: center; gap: 4px; flex: 1;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--neon-blue); }
        
        .center-btn .icon-circle { 
            width: 55px; height: 55px; background: var(--transfer-green); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 4px solid var(--bg-color); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); 
            margin-top: -35px;
        }
        .center-btn i { color: #000 !important; font-size: 20px; }

        .system-nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 48px; background-color: #1a1b22; z-index: 1001; }

        /* ADD BOX */
        #addBox { display: none; padding: 20px; background: var(--panel-color); margin: 0 20px 15px; border-radius: 20px; border: 1px solid #1a1a20; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; background: #000; border: 1px solid #222; border-radius: 12px; color: white; outline: none; font-family: 'Poppins'; }
    </style>
</head>
<body>

    <div class="header-top">
        <div class="brand-name">RARE VAULT</div>
        <i class="fas fa-user-lock vault-lock" onclick="masterLock()"></i>
    </div>

    <div class="add-friend-bar" onclick="toggleAdd()">
        <i class="fas fa-plus-circle"></i> ADD FRIEND TO VAULT
    </div>

    <div id="addBox">
        <input type="text" id="newUID" placeholder="UID (RGXXXXXX)">
        <input type="text" id="newName" placeholder="Friend Name">
        <button onclick="saveContact()" style="width:100%; padding:14px; background:var(--neon-blue); border:none; border-radius:12px; font-weight:800; color:#000; text-transform:uppercase;">SAVE CONTACT</button>
    </div>

    <div class="chat-list" id="contactList"></div>

    <div id="optionsMenu">
        <div id="selectedFriendName" style="text-align: center; font-size: 12px; color: #555; margin-bottom: 15px; font-weight: 700;"></div>
        <div class="opt-item" onclick="lockSpecificChat()"><i class="fas fa-lock"></i> LOCK CHAT</div>
        <div class="opt-item opt-delete" onclick="deleteContact()"><i class="fas fa-trash-alt"></i> DELETE CONTACT</div>
        <button onclick="closeMenu()" style="width:100%; margin-top: 20px; padding: 15px; background: #151520; border: none; border-radius: 15px; color: white; font-weight: 700;">CANCEL</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>HOME</span></a>
        <a href="earn.html" class="nav-item"><i class="fas fa-wallet"></i><span>EARN</span></a>
        <a href="transfer.html" class="nav-item center-btn">
            <div class="icon-circle"><i class="fas fa-exchange-alt"></i></div>
            <span style="margin-top: 5px; color: #fff;">SEND</span>
        </a>
        <a href="chat_list.html" class="nav-item active"><i class="fas fa-comments"></i><span>CHAT</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user-alt"></i><span>PROFILE</span></a>
    </nav>

    <div class="system-nav-bar"></div>

    <script>
        let longPressTimer;
        let selectedUID = null;
        const MASTER_PASSWORD = "1234";

        function masterLock() {
            let pass = prompt("Enter Vault Password:");
            if(pass === MASTER_PASSWORD) alert("Vault Access Granted!");
            else alert("Access Denied!");
        }

        function toggleAdd() {
            const box = document.getElementById('addBox');
            box.style.display = box.style.display === 'none' ? 'block' : 'none';
        }

        function saveContact() {
            let uid = document.getElementById('newUID').value.trim().toUpperCase();
            let name = document.getElementById('newName').value.trim();
            if(uid && name) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts.push({uid: uid, name: name});
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                toggleAdd();
                renderContacts();
            }
        }

        function renderContacts() {
            let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
            let list = document.getElementById('contactList');
            list.innerHTML = contacts.length ? "" : "<p style='text-align:center; color:#333; margin-top:50px;'>No Vault Contacts Found.</p>";
            
            contacts.forEach(c => {
                let friendDP = localStorage.getItem("dp_" + c.uid) || ""; 
                let dpHtml = friendDP ? `<img src="${friendDP}">` : `<i class="fas fa-user-astronaut"></i>`;

                list.innerHTML += `
                    <div class="chat-card" 
                        onmousedown="startPress('${c.uid}', '${c.name}')" 
                        onmouseup="endPress()" 
                        ontouchstart="startPress('${c.uid}', '${c.name}')" 
                        ontouchend="endPress()"
                        onclick="handleChatClick('${c.uid}', '${c.name}')">
                        <div class="avatar">${dpHtml}</div>
                        <div class="chat-info">
                            <b>${c.name}</b>
                            <span>${c.uid}</span>
                        </div>
                    </div>
                `;
            });
        }

        function startPress(uid, name) {
            selectedUID = uid;
            longPressTimer = setTimeout(() => {
                document.getElementById('selectedFriendName').innerText = "VAULT OPTIONS: " + name;
                document.getElementById('optionsMenu').style.bottom = "0";
            }, 700); 
        }

        function endPress() { clearTimeout(longPressTimer); }
        function closeMenu() { document.getElementById('optionsMenu').style.bottom = "-100%"; }

        function deleteContact() {
            if(confirm("Delete this contact permanently?")) {
                let contacts = JSON.parse(localStorage.getItem("rareContacts")) || [];
                contacts = contacts.filter(c => c.uid !== selectedUID);
                localStorage.setItem("rareContacts", JSON.stringify(contacts));
                closeMenu();
                renderContacts();
            }
        }

        function handleChatClick(uid, name) {
            if(document.getElementById('optionsMenu').style.bottom !== "0px") {
                window.location.href = `chat_screen.html?uid=${uid}&name=${encodeURIComponent(name)}`;
            }
        }

        window.onload = renderContacts;
    </script>
</body>
</html>
